<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মাদরাসাতুল মদীনা</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1a1208">
<link rel="apple-touch-icon" href="/icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* Main role screen: admin full width, other roles in two columns */
  .role-grid.role-grid-index {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }
  .role-grid.role-grid-index > .role-btn-admin {
    grid-column: 1 / -1;
  }
  .role-grid.role-grid-index .role-btn {
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
    padding: 16px 12px;
  }
  .role-grid.role-grid-index .role-icon {
    width: 38px;
    height: 38px;
    border-radius: 14px;
  }
  .role-grid.role-grid-index .role-btn-admin .role-icon {
    width: 44px;
    height: 44px;
    border-radius: 16px;
  }
  .role-grid.role-grid-index .role-name {
    font-size: 13px;
    line-height: 1.25;
  }
  .role-grid.role-grid-index .role-btn-admin .role-name {
    font-size: 15px;
    font-weight: 700;
  }
  .role-icon,
  .pin-role-icon {
    width: 40px;
    height: 40px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink2);
    background: linear-gradient(180deg, #fffaf0, var(--cream2));
    border: 1px solid rgba(201, 149, 42, .22);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.75), 0 4px 14px rgba(26,18,8,.06);
  }
  .role-btn-admin .role-icon {
    width: 44px;
    height: 44px;
    border-radius: 15px;
    color: var(--gold2);
    background: linear-gradient(145deg, var(--ink), var(--ink2));
    border-color: rgba(201,149,42,.42);
  }
  .role-icon svg,
  .pin-role-icon svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
  }
  .role-btn-admin .role-icon svg { width: 23px; height: 23px; }
  .pin-role-icon {
    width: 52px;
    height: 52px;
    border-radius: 18px;
    margin: 0 auto 10px;
    color: var(--gold2);
    background: linear-gradient(145deg, var(--ink), var(--ink2));
    border-color: rgba(201,149,42,.42);
  }
  .pin-role-icon svg { width: 25px; height: 25px; }
  .teacher-login-fields { display:none; margin-bottom:12px; }

  /* ভূমিকা স্ক্রিন: উপরের অংশ ও গ্রিড — আগের চেয়ে একটু আরাম (স্ক্রল এড়াতে মাঝামাঝি) */
  #role-screen.login-screen {
    justify-content: flex-start;
    padding: 12px 14px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    min-height: 100vh;
    min-height: 100dvh;
  }
  #role-screen .login-logo {
    font-size: 23px;
    line-height: 1.18;
    margin-bottom: 2px;
  }
  #role-screen .login-inst-bn {
    font-family: 'Tiro Bangla', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold2);
    text-align: center;
    margin-bottom: 4px;
    line-height: 1.22;
  }
  #role-screen .login-subtitle {
    margin-bottom: 14px;
    font-size: 12px;
    line-height: 1.4;
  }
  #role-screen .role-grid.role-grid-index {
    gap: 8px;
    margin-top: 0;
  }
  #role-screen .role-grid.role-grid-index .role-btn {
    padding: 13px 11px;
    gap: 7px;
  }
  #role-screen .role-grid.role-grid-index .role-icon {
    width: 37px;
    height: 37px;
    border-radius: 13px;
  }
  #role-screen .role-grid.role-grid-index .role-btn-admin .role-icon {
    width: 43px;
    height: 43px;
    border-radius: 15px;
  }
  #role-screen .role-grid.role-grid-index .role-icon svg {
    width: 19px;
    height: 19px;
  }
  #role-screen .role-grid.role-grid-index .role-btn-admin .role-icon svg {
    width: 22px;
    height: 22px;
  }
  #role-screen .role-grid.role-grid-index .role-name {
    font-size: 13px;
    line-height: 1.22;
  }
  #role-screen .role-grid.role-grid-index .role-btn-admin .role-name {
    font-size: 15px;
  }
</style>
</head>
<body>

<!-- ROLE SELECT -->
<div class="login-screen" id="role-screen">
  <div class="login-logo">مدرسة المدينة</div>
  <div class="login-inst-bn">মাদরাসাতুল মদীনা</div>
  <div class="login-subtitle">আপনার ভূমিকা নির্বাচন করুন</div>

  <div class="role-grid role-grid-index">
    <div class="role-btn" onclick="selectRole('restricted_admin')">
      <div class="role-icon" data-icon="assistant"></div>
      <div class="role-name">সহকারী</div>
    </div>
    <div class="role-btn" onclick="selectRole('teacher')">
      <div class="role-icon" data-icon="teacher"></div>
      <div class="role-name">বর্ষ দায়িত্বশীল</div>
    </div>
    <div class="role-btn" onclick="selectRole('daftar')">
      <div class="role-icon" data-icon="daftar"></div>
      <div class="role-name">দফতর দায়িত্বশীল</div>
    </div>
    <div class="role-btn" onclick="selectRole('hifz')">
      <div class="role-icon" data-icon="hifz"></div>
      <div class="role-name">হিফজ দায়িত্বশীল</div>
    </div>
    <div class="role-btn" onclick="selectRole('library')">
      <div class="role-icon" data-icon="library"></div>
      <div class="role-name">মাকতাবা দায়িত্বশীল</div>
    </div>
    <div class="role-btn" onclick="selectRole('alumni')">
      <div class="role-icon" data-icon="alumni"></div>
      <div class="role-name">পুরনো ছাত্র দায়িত্বশীল</div>
    </div>
    <div class="role-btn" onclick="selectRole('khedmat')">
      <div class="role-icon" data-icon="khedmat"></div>
      <div class="role-name">খেদমত দায়িত্বশীল</div>
    </div>
    <div class="role-btn" onclick="location.href='dept/dept-index.html'">
      <div class="role-icon" data-icon="dept"></div>
      <div class="role-name">বিভাগ দায়িত্বশীল</div>
    </div>
  </div>
</div>

<!-- PIN SCREEN -->
<div class="login-screen" id="pin-screen" style="display:none;">
  <div style="text-align:center;margin-bottom:32px;position:relative;">
    <div class="pin-role-icon" id="pin-icon" data-icon="admin"></div>
    <div style="font-family:'Tiro Bangla',serif;font-size:19px;font-weight:700;color:var(--ink2);" id="pin-title">জিম্মাদার লগইন</div>
    <div style="font-size:12px;color:var(--ink3);margin-top:4px;" id="pin-sub">অ্যাডমিন পিন দিন</div>
  </div>

  <div class="login-box">
    <div class="teacher-login-fields" id="teacher-login-fields">
      <span class="login-label">লগইন আইডি</span>
      <input class="form-input" id="teacher-login-id" autocomplete="username" placeholder="যেমন: t1" style="margin-bottom:12px;text-align:center;font-weight:700;">
    </div>
    <span class="login-label">পিন দিন</span>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pressPin('১')">১</button>
      <button class="num-btn" onclick="pressPin('২')">২</button>
      <button class="num-btn" onclick="pressPin('৩')">৩</button>
      <button class="num-btn" onclick="pressPin('৪')">৪</button>
      <button class="num-btn" onclick="pressPin('৫')">৫</button>
      <button class="num-btn" onclick="pressPin('৬')">৬</button>
      <button class="num-btn" onclick="pressPin('৭')">৭</button>
      <button class="num-btn" onclick="pressPin('৮')">৮</button>
      <button class="num-btn" onclick="pressPin('৯')">৯</button>
      <button class="num-btn empty"></button>
      <button class="num-btn" onclick="pressPin('০')">০</button>
      <button class="num-btn del" onclick="delPin()">⌫</button>
    </div>
    <div class="login-error" id="pin-error"></div>
  </div>
  <div class="login-back" onclick="backToRole()">← ভূমিকা পরিবর্তন করুন</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="api-shared.js"></script>
<script src="js/mm-sample-data.js"></script>
<script src="js/api.js"></script>
<script src="js/mm-session.js"></script>
<script>
  let currentRole = '';
  let pinVal = '';

  const BN_MAP = {'০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9'};

  function iconSvg(name) {
    const icons = {
      admin: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M12 3l7 3v5c0 4.5-2.9 8.6-7 10-4.1-1.4-7-5.5-7-10V6l7-3z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9.5 12l1.7 1.7 3.6-4"/>',
      assistant: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M12 3l6 2.7v4.8c0 4-2.4 7.6-6 9.1-3.6-1.5-6-5.1-6-9.1V5.7L12 3z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M12 9v6"/>',
      teacher: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M4 5.5A2.5 2.5 0 016.5 3H20v16H6.5A2.5 2.5 0 014 16.5v-11z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M8 7h8M8 11h6"/>',
      daftar: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 4h6l1 2h2a1 1 0 011 1v12a1 1 0 01-1 1H6a1 1 0 01-1-1V7a1 1 0 011-1h2l1-2z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 11h6M9 15h4"/>',
      hifz: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M6 4h12v16l-6-3-6 3V4z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 8h6M9 11h4"/>',
      library: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M4 5.5A2.5 2.5 0 016.5 3H20v16H6.5A2.5 2.5 0 014 16.5v-11z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M7 3v16M11 7h5M11 11h4"/>',
      alumni: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 8l9-4 9 4-9 4-9-4z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M7 10.5V15c0 1.7 2.2 3 5 3s5-1.3 5-3v-4.5"/>',
      khedmat: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M20.5 8.5c0 5-8.5 10-8.5 10s-8.5-5-8.5-10A4.5 4.5 0 018 5.2c1.6 0 3 1 4 2.2 1-1.2 2.4-2.2 4-2.2a4.5 4.5 0 014.5 3.3z"/>',
      dept: '<path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M4 20h16M6 20V8l6-4 6 4v12"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 20v-6h6v6M9 10h.01M12 10h.01M15 10h.01"/>',
    };
    return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">' + (icons[name] || icons.teacher) + '</svg>';
  }

  function renderIcon(el, name) {
    if (el) el.innerHTML = iconSvg(name);
  }

  function renderStaticIcons() {
    document.querySelectorAll('[data-icon]').forEach(el => renderIcon(el, el.dataset.icon));
  }

  renderStaticIcons();

  function selectRole(role) {
    currentRole = role;
    if (role === 'teacher' || role === 'restricted_admin') {
      renderIcon(document.getElementById('pin-icon'), role === 'teacher' ? 'teacher' : 'assistant');
      document.getElementById('pin-title').textContent = role === 'teacher' ? 'বর্ষ দায়িত্বশীল লগইন' : 'সহকারী জিম্মাদার লগইন';
      document.getElementById('pin-sub').textContent = 'নিজের আইডি ও পিন দিন';
      showScreen('pin-screen');
      resetPin();
      return;
    }
    const info = {
      admin:   { icon:'admin', title:'জিম্মাদার লগইন',   sub:'অ্যাডমিন পিন দিন' },
      daftar:  { icon:'daftar', title:'দফতর লগইন',        sub:'দফতর পিন দিন' },
      hifz:    { icon:'hifz', title:'হিফজ লগইন',        sub:'হিফজ পিন দিন' },
      library: { icon:'library', title:'মাকতাবা লগইন',   sub:'মাকতাবা পিন দিন' },
      alumni:  { icon:'alumni', title:'পুরনো ছাত্র লগইন', sub:'পিন দিন' },
      khedmat: { icon:'khedmat', title:'খেদমত লগইন',       sub:'পিন দিন' },
    };
    const i = info[role];
    renderIcon(document.getElementById('pin-icon'), i.icon);
    document.getElementById('pin-title').textContent = i.title;
    document.getElementById('pin-sub').textContent = i.sub;
    showScreen('pin-screen');
    resetPin();
  }

  function backToRole() {
    currentRole = '';
    showScreen('role-screen');
  }

  function showScreen(id) {
    ['role-screen','pin-screen'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'flex' : 'none';
    });
    const needsLoginId = currentRole === 'teacher' || currentRole === 'restricted_admin';
    document.getElementById('teacher-login-fields').style.display = (id === 'pin-screen' && needsLoginId) ? 'block' : 'none';
    if (id !== 'pin-screen' || !needsLoginId) document.getElementById('teacher-login-id').value = '';
  }

  function pressPin(n) {
    if (pinVal.length >= 4) return;
    pinVal += BN_MAP[n];
    updateDots();
    if (pinVal.length === 4) setTimeout(checkPin, 200);
  }

  function delPin() {
    pinVal = pinVal.slice(0, -1);
    updateDots();
    document.getElementById('pin-error').textContent = '';
  }

  function updateDots() {
    for (let i = 0; i < 4; i++)
      document.getElementById('pd' + i).classList.toggle('filled', i < pinVal.length);
  }

  function resetPin() {
    pinVal = '';
    updateDots();
    document.getElementById('pin-error').textContent = '';
  }

  function normalizeLoginId(v) {
    return String(v || '').trim().toLowerCase();
  }

  const LOCAL_CLASS_BY_SUPA_CODE = {
    kitab_y1: 'cls_k1',
    kitab_iyada: 'cls_ky',
    kitab_y2: 'cls_k2',
    kitab_y3: 'cls_k3',
    kitab_y4: 'cls_k4',
    kitab_y5: 'cls_k5',
    kitab_y6: 'cls_k6',
    kitab_y7: 'cls_k7',
    maktab_y1: 'cls_m1',
    maktab_y2: 'cls_m2',
    maktab_y3: 'cls_m3',
    maktab_y4: 'cls_m4',
    maktab_y5: 'cls_m5',
  };

  const STAFF_ROLE_TO_DB = {
    teacher: 'madrasa_teacher',
    restricted_admin: 'restricted_admin',
    daftar: 'daftar',
    hifz: 'hifz',
    library: 'library',
    alumni: 'alumni_tracker',
    khedmat: 'khedmat',
  };

  function cacheSupabaseTeacher(user) {
    if (!user || user.role !== 'madrasa_teacher') return;
    const classId = LOCAL_CLASS_BY_SUPA_CODE[user.class_code] || '';
    const existing = API.Teachers.getById(user.id);
    const row = {
      id: user.id,
      name: user.name || 'বর্ষ দায়িত্বশীল',
      login_id: user.login_id || '',
      class_id: classId,
      class_code: user.class_code || '',
      class_name: user.class_name || '',
      pin: pinVal,
      role: 'teacher',
      is_active: true,
    };
    if (existing) API.Teachers.update(user.id, row);
    else API.Teachers.add(row);
    MMSession.setTeacherProfile(row);
  }

  async function trySupabaseStaffLogin(role, loginId) {
    if (!window.MMSharedAPI || !STAFF_ROLE_TO_DB[role]) return null;
    try {
      const res = await MMSharedAPI.loginStaff(STAFF_ROLE_TO_DB[role], loginId || null, pinVal);
      return res && res.ok ? res.user : null;
    } catch (e) {
      return null;
    }
  }

  async function checkPin() {
    const settings = API.Settings.get();
    let ok = false;
    let redirect = '';

    if (currentRole === 'admin') {
      const supaOn = !!(window.MMSharedAPI && MMSharedAPI.supabaseClient);
      try {
        const res = window.MMSharedAPI ? await MMSharedAPI.loginAdmin(pinVal) : null;
        if (res && res.ok && res.user) {
          ok = true;
          MMSession.setAdminSession(res.user.name || 'জিম্মাদার', res.user.admin_perms, res.user.id, pinVal);
          redirect = 'main-admin-madrasa.html';
          if (settings.admin_pin !== pinVal) {
            settings.admin_pin = pinVal;
            API.Settings.save(settings);
          }
        }
      } catch (e) {}
      if (!ok && !supaOn && pinVal === settings.admin_pin) {
        ok = true;
        MMSession.setAdminSession('জিম্মাদার', null, null, pinVal);
        redirect = 'main-admin-madrasa.html';
      }
    } else if (currentRole === 'restricted_admin') {
      const loginId = normalizeLoginId(document.getElementById('teacher-login-id').value);
      const su = await trySupabaseStaffLogin('restricted_admin', loginId);
      if (su) {
        ok = true;
        MMSession.setAdminSession(su.name || 'সহকারী জিম্মাদার', su.admin_perms || {}, su.id, pinVal);
        const allowed = MMSession.getAllowedMadrasaDepts();
        redirect = 'main-admin-madrasa.html?dept=' + encodeURIComponent(allowed[0] || 'kitab');
      }
    } else if (currentRole === 'daftar') {
      const su = await trySupabaseStaffLogin('daftar');
      if (su) {
        ok = true;
        MMSession.setStaffSession('daftar', su.name, su.id, pinVal);
        redirect = 'madrasa/madrasa-daftar.html';
      }
      const daftar = API.Teachers.getAll().find(t => t.role === 'daftar');
      if (!ok && !window.MMSharedAPI && daftar && pinVal === daftar.pin) {
        ok = true;
        MMSession.setRole('daftar');
        MMSession.setName(daftar.name);
        redirect = 'madrasa/madrasa-daftar.html';
      }
    } else if (currentRole === 'hifz') {
      const su = await trySupabaseStaffLogin('hifz');
      if (su) {
        ok = true;
        MMSession.setStaffSession('hifz', su.name, su.id, pinVal);
        redirect = 'madrasa/madrasa-hifz.html';
      }
      const user = API.Teachers.getAll().find(t => t.role === 'hifz');
      if (!ok && !window.MMSharedAPI && user && pinVal === user.pin) {
        ok = true;
        MMSession.setRole('hifz');
        MMSession.setName(user.name);
        redirect = 'madrasa/madrasa-hifz.html';
      }
    } else if (currentRole === 'library') {
      const su = await trySupabaseStaffLogin('library');
      if (su) {
        ok = true;
        MMSession.setStaffSession('library', su.name, su.id, pinVal);
        redirect = 'madrasa/madrasa-library.html';
      }
      const user = API.Teachers.getAll().find(t => t.role === 'library');
      if (!ok && !window.MMSharedAPI && user && pinVal === user.pin) {
        ok = true;
        MMSession.setRole('library');
        MMSession.setName(user.name);
        redirect = 'madrasa/madrasa-library.html';
      }
    } else if (currentRole === 'alumni') {
      const su = await trySupabaseStaffLogin('alumni');
      if (su) {
        ok = true;
        MMSession.setStaffSession('alumni', su.name, su.id, pinVal);
        redirect = 'madrasa/madrasa-alumni.html';
      }
      const user = API.Teachers.getAll().find(t => t.role === 'alumni');
      if (!ok && !window.MMSharedAPI && user && pinVal === user.pin) {
        ok = true;
        MMSession.setRole('alumni');
        MMSession.setName(user.name);
        redirect = 'madrasa/madrasa-alumni.html';
      }
    } else if (currentRole === 'khedmat') {
      const su = await trySupabaseStaffLogin('khedmat');
      if (su) {
        ok = true;
        MMSession.setStaffSession('khedmat', su.name, su.id, pinVal);
        redirect = 'khedmat/khedmat-staff.html';
      }
      const user = API.Teachers.getAll().find(t => t.role === 'khedmat');
      if (!ok && !window.MMSharedAPI && user && pinVal === user.pin) {
        ok = true;
        MMSession.setRole('khedmat');
        MMSession.setName(user.name);
        redirect = 'khedmat/khedmat-staff.html';
      }
    } else if (currentRole === 'teacher') {
      const supaOn = !!(window.MMSharedAPI && MMSharedAPI.supabaseClient);
      const loginId = normalizeLoginId(document.getElementById('teacher-login-id').value);
      const su = await trySupabaseStaffLogin('teacher', loginId);
      if (su) {
        ok = true;
        cacheSupabaseTeacher(su);
        MMSession.setStaffSession('teacher', su.name, su.id, pinVal);
        MMSession.setTeacherId(su.id);
        redirect = 'madrasa/madrasa-class.html';
      }
      const teacher = API.Teachers.getAll().find(t =>
        t.class_id &&
        t.is_active !== false &&
        normalizeLoginId(t.login_id) === loginId &&
        String(t.pin || '') === pinVal
      );
      if (!ok && !supaOn && teacher) {
        ok = true;
        const profile = { ...teacher, pin: pinVal };
        MMSession.setStaffSession('teacher', teacher.name, teacher.id, pinVal);
        MMSession.setTeacherId(teacher.id);
        MMSession.setTeacherProfile(profile);
        redirect = 'madrasa/madrasa-class.html';
      }
    }

    if (ok) {
      window.location.href = redirect;
    } else {
      document.getElementById('pin-error').textContent = (currentRole === 'teacher' || currentRole === 'restricted_admin') ? 'আইডি বা পিন ভুল হয়েছে।' : 'পিন ভুল হয়েছে।';
      pinVal = '';
      updateDots();
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
