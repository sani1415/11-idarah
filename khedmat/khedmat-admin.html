<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>খেদমতে খালক — অ্যাডমিন</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .type-card { background:#fff; border-radius:var(--radius-sm); padding:14px; box-shadow:var(--shadow); margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .type-emoji { font-size:24px; width:42px; height:42px; background:var(--teal-light); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .type-name { flex:1; font-size:14px; font-weight:600; color:var(--ink); }
  .type-stats { text-align:right; }
  .type-count { font-family:'Noto Serif Bengali',serif; font-size:14px; font-weight:700; color:var(--ink2); }
  .type-total { font-size:11px; color:var(--ink3); }

  .ben-row { display:flex; align-items:center; padding:11px 0; border-bottom:1px solid var(--cream2); gap:10px; }
  .ben-row:last-child { border-bottom:none; }
  .ben-row-name { flex:1; font-size:13px; font-weight:600; color:var(--ink); }
  .ben-row-sub  { font-size:11px; color:var(--ink3); margin-top:2px; }

  .month-sel { background:#fff; border:1px solid var(--cream3); border-radius:var(--radius-sm); padding:10px 14px; font-family:'Noto Sans Bengali',sans-serif; font-size:13px; color:var(--ink); width:100%; margin-bottom:14px; outline:none; }

  /* ══ Desktop (≥ 960px) ══ */
  @media (min-width: 960px) {
    .content { max-width: 900px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">জিম্মাদার</div>
    <div class="topbar-name">খেদমতে খালক</div>
  </div>
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="location.href='../main-admin-madrasa.html'">এডমিন</button>
  </div>
</div>

<!-- PANEL: OVERVIEW -->
<div class="content" id="panel-overview" style="padding-bottom: var(--app-content-pad-bottom);">
  <select class="month-sel" id="month-sel" onchange="onMonthChange()"></select>
  <div class="stat-row" id="stats-row"></div>
  <div class="sec-header"><div class="sec-title">কার্যক্রমের ধরন অনুযায়ী</div></div>
  <div id="type-breakdown"></div>
  <div class="sec-header"><div class="sec-title">সর্বশেষ দৈনিক লগ</div></div>
  <div id="latest-log"></div>
</div>

<!-- PANEL: BENEFICIARIES -->
<div class="content" id="panel-bens" style="display:none;padding-bottom: var(--app-content-pad-bottom);">
  <div class="sec-header" style="margin-top:10px;"><div class="sec-title">উপকারভোগী তালিকা</div></div>
  <div class="card-static" id="ben-table"></div>
</div>

<!-- PANEL: FINANCE -->
<div class="content" id="panel-finance" style="display:none;padding-bottom: var(--app-content-pad-bottom);">
  <div class="stat-row-2" style="margin-top:10px;" id="fin-stats"></div>
  <button class="add-btn" onclick="openModal('modal-fin')">+ তহবিল লেনদেন যোগ করুন</button>
  <div id="fin-list"></div>
</div>

<!-- PANEL: SETTINGS -->
<div class="content" id="panel-settings" style="display:none;padding-bottom: var(--app-content-pad-bottom);">
  <div class="sec-header" style="margin-top:10px;"><div class="sec-title">কার্যক্রমের ধরন</div></div>
  <button class="add-btn" onclick="openModal('modal-type')">+ নতুন ধরন যোগ করুন</button>
  <div id="type-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="নিচের নেভিগেশন">
  <div class="nav-item active" id="nav-overview" onclick="switchPanel('overview')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" stroke="currentColor" stroke-width="1.5"/></svg></span>
    <span class="nav-label">সারসংক্ষেপ</span>
  </div>
  <div class="nav-item" id="nav-bens" onclick="switchPanel('bens')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">উপকারভোগী</span>
  </div>
  <div class="nav-item" id="nav-finance" onclick="switchPanel('finance')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">তহবিল</span>
  </div>
  <div class="nav-item" id="nav-settings" onclick="switchPanel('settings')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">সেটিং</span>
  </div>
</nav>

<!-- ADD FINANCE MODAL -->
<div class="modal-bg" id="modal-fin">
  <div class="modal">
    <div class="modal-title">তহবিল লেনদেন <button class="modal-close" onclick="closeModal('modal-fin')">✕</button></div>
    <div class="form-group">
      <label class="form-label">ধরন</label>
      <select class="form-input form-select" id="fn-type"><option value="income">আয়</option><option value="expense">ব্যয়</option></select>
    </div>
    <div class="form-group"><label class="form-label">পরিমাণ</label><input class="form-input" type="number" id="fn-amount" placeholder="০"></div>
    <div class="form-group"><label class="form-label">বিবরণ</label><input class="form-input" id="fn-desc" placeholder="লেনদেনের বিবরণ"></div>
    <div class="form-group"><label class="form-label">উৎস (ঐচ্ছিক)</label><input class="form-input" id="fn-source" placeholder="মাদ্রাসা তহবিল / দান"></div>
    <button class="submit-btn" onclick="saveFin()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- ADD TYPE MODAL -->
<div class="modal-bg" id="modal-type">
  <div class="modal">
    <div class="modal-title">নতুন ধরন <button class="modal-close" onclick="closeModal('modal-type')">✕</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">ইমোজি</label><input class="form-input" id="tp-emoji" placeholder="🤝" maxlength="2"></div>
      <div class="form-group"><label class="form-label">নাম</label><input class="form-input" id="tp-name" placeholder="ধরনের নাম"></div>
    </div>
    <button class="submit-btn" onclick="saveType()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/mm-session.js"></script>
<script src="../js/monitor-mode.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/khedmat-api.js"></script>
<script>
  if (!MMSession.isAdmin()) { location.href = '../index.html'; }
  mmInsertMonitorBanner();

  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  const fmtAmt = n => '৳' + toBn(Number(n).toLocaleString('en'));
  const fmtDate = d => { if (!d) return ''; const p = d.split('-'); return toBn(p[2]+'/'+p[1]); };

  let selectedMonth = new Date().toISOString().slice(0,7);

  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function openModal(id) {
    if (mmMutationBlocked(showToast)) return;
    document.getElementById(id).classList.add('open');
  }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function buildMonthOptions() {
    const sel = document.getElementById('month-sel');
    const months = [];
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push(d.toISOString().slice(0,7));
    }
    sel.innerHTML = months.map(m => {
      const p = m.split('-');
      return `<option value="${m}" ${m===selectedMonth?'selected':''}>${toBn(p[1])} — ${toBn(p[0])}</option>`;
    }).join('');
  }

  function onMonthChange() { selectedMonth = document.getElementById('month-sel').value; renderOverview(); }

  function switchPanel(name) {
    ['overview','bens','finance','settings'].forEach(p => {
      document.getElementById('panel-'+p).style.display = p===name ? '' : 'none';
      document.getElementById('nav-'+p).classList.toggle('active', p===name);
    });
    if (name==='overview')  renderOverview();
    if (name==='bens')      renderBens();
    if (name==='finance')   renderFinance();
    if (name==='settings')  renderSettings();
  }

  function renderOverview() {
    const allActs = KhAPI.Activities.getAll();
    const monthActs = allActs.filter(a => a.date?.startsWith(selectedMonth));
    const bens = KhAPI.Beneficiaries.getAll();
    const totalSpent = monthActs.reduce((s,a) => s+(a.amount||0), 0);
    const finSum = KhAPI.Finance.getSummary(selectedMonth);

    document.getElementById('stats-row').innerHTML =
      `<div class="stat-card"><span class="stat-num">${toBn(bens.length)}</span><span class="stat-label">উপকারভোগী</span></div>
       <div class="stat-card"><span class="stat-num">${toBn(monthActs.length)}</span><span class="stat-label">এই মাসে কার্যক্রম</span></div>
       <div class="stat-card"><span class="stat-num" style="font-size:14px;color:var(--red);">${fmtAmt(totalSpent)}</span><span class="stat-label">ব্যয়</span></div>`;

    const breakdown = KhAPI.Activities.getSummaryByType();
    document.getElementById('type-breakdown').innerHTML = breakdown.filter(t=>t.count>0).map(t =>
      `<div class="type-card">
        <div class="type-emoji">${t.emoji}</div>
        <div class="type-name">${KhAPI.esc(t.name)}</div>
        <div class="type-stats">
          <div class="type-count">${toBn(t.count)} বার</div>
          <div class="type-total">${fmtAmt(t.total)}</div>
        </div>
      </div>`
    ).join('') || '<div style="text-align:center;color:var(--ink3);padding:20px 0;font-size:13px;">কোনো কার্যক্রম নেই</div>';

    const latest = KhAPI.DailyLogs.getLatest();
    document.getElementById('latest-log').innerHTML = latest
      ? `<div class="log-item"><div class="log-meta"><span>${KhAPI.esc(latest.by||'—')}</span><span>${fmtDate(latest.date)}</span></div><div class="log-text">${KhAPI.esc(latest.content)}</div></div>`
      : '<div style="text-align:center;color:var(--ink3);padding:20px 0;font-size:13px;">কোনো লগ নেই</div>';
  }

  function renderBens() {
    const bens = KhAPI.Beneficiaries.getAll();
    document.getElementById('ben-table').innerHTML = bens.length
      ? bens.map(b => {
          const acts = KhAPI.Activities.getByBeneficiary(b.id);
          return `<div class="ben-row">
            <div style="flex:1;">
              <div class="ben-row-name">${KhAPI.esc(b.name)}</div>
              <div class="ben-row-sub">${KhAPI.esc(b.address||'—')} · ${KhAPI.esc(b.phone||'')}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:'Noto Serif Bengali',serif;font-size:14px;font-weight:700;color:var(--ink2);">${toBn(acts.length)} বার</div>
              <div style="font-size:11px;color:var(--ink3);">${fmtAmt(acts.reduce((s,a)=>s+(a.amount||0),0))}</div>
            </div>
          </div>`;
        }).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:30px 0;font-size:13px;">কোনো উপকারভোগী নেই</div>';
  }

  function renderFinance() {
    const sum = KhAPI.Finance.getSummary(null);
    document.getElementById('fin-stats').innerHTML =
      `<div class="stat-card"><span class="stat-num" style="color:var(--green)">${fmtAmt(sum.income)}</span><span class="stat-label">মোট আয়</span></div>
       <div class="stat-card"><span class="stat-num" style="color:${sum.balance<0?'var(--red)':'var(--ink2)'}">${fmtAmt(sum.balance)}</span><span class="stat-label">ব্যালেন্স</span></div>`;
    const fins = KhAPI.Finance.getAll();
    document.getElementById('fin-list').innerHTML = fins.length
      ? fins.map(f => `
        <div style="background:#fff;border-radius:var(--radius-sm);padding:13px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:18px;">${f.type==='income'?'↑':'↓'}</span>
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${KhAPI.esc(f.description)}</div><div style="font-size:11px;color:var(--ink3);">${KhAPI.esc(f.source||'—')} · ${fmtDate(f.date)}</div></div>
          <span style="font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:700;color:${f.type==='income'?'var(--green)':'var(--red)'};">${fmtAmt(f.amount)}</span>
        </div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:30px 0;font-size:13px;">কোনো লেনদেন নেই</div>';
  }

  function renderSettings() {
    const types = KhAPI.ActivityTypes.getAll();
    document.getElementById('type-list').innerHTML = types.map(t =>
      `<div class="type-card">
        <div class="type-emoji">${t.emoji}</div>
        <div class="type-name">${KhAPI.esc(t.name)}</div>
      </div>`
    ).join('');
  }

  function saveFin() {
    if (mmMutationBlocked(showToast)) return;
    const type   = document.getElementById('fn-type').value;
    const amount = parseFloat(document.getElementById('fn-amount').value);
    const desc   = document.getElementById('fn-desc').value.trim();
    const source = document.getElementById('fn-source').value.trim();
    if (!amount || amount <= 0) { showToast('সঠিক পরিমাণ দিন'); return; }
    if (!desc) { showToast('বিবরণ দিন'); return; }
    KhAPI.Finance.add({ type, amount, description:desc, source:source||null });
    closeModal('modal-fin');
    renderFinance();
    showToast('লেনদেন সংরক্ষিত হয়েছে');
  }

  function saveType() {
    if (mmMutationBlocked(showToast)) return;
    const emoji = document.getElementById('tp-emoji').value.trim() || '🤝';
    const name  = document.getElementById('tp-name').value.trim();
    if (!name) { showToast('নাম দিন'); return; }
    KhAPI.ActivityTypes.add({ name, emoji });
    closeModal('modal-type');
    renderSettings();
    showToast('ধরন যোগ হয়েছে');
  }

  buildMonthOptions();
  renderOverview();
</script>
</body>
</html>
