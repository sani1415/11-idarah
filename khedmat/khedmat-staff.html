<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>খেদমতে খালক — পোর্টাল</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .ben-card { background:#fff; border-radius:var(--radius); padding:15px; box-shadow:var(--shadow); margin-bottom:10px; cursor:pointer; transition:transform .12s; }
  .ben-card:active { transform:scale(.98); }
  .ben-top { display:flex; align-items:center; gap:12px; }
  .ben-avatar { width:44px; height:44px; border-radius:50%; background:var(--teal-light); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .ben-info { flex:1; }
  .ben-name { font-family:'Tiro Bangla',serif; font-size:15px; font-weight:700; color:var(--ink2); }
  .ben-addr { font-size:11px; color:var(--ink3); margin-top:2px; }
  .ben-count { font-size:11px; color:var(--ink3); padding:4px 8px; background:var(--cream2); border-radius:10px; }

  .act-item { background:#fff; border-radius:var(--radius-sm); padding:13px; box-shadow:var(--shadow); margin-bottom:8px; position:relative; }
  .act-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .act-emoji { font-size:18px; }
  .act-title { font-size:13px; font-weight:600; color:var(--ink); flex:1; }
  .act-amt { font-family:'Tiro Bangla',serif; font-size:13px; font-weight:700; color:var(--red); }
  .act-desc { font-size:12px; color:var(--ink3); line-height:1.5; }
  .act-date { font-size:10px; color:var(--ink3); margin-top:4px; }
  .item-actions { display:flex; gap:6px; justify-content:flex-end; margin-top:8px; }
  .mini-action { border:1px solid var(--cream3); background:var(--cream); color:var(--ink2); border-radius:8px; padding:6px 9px; font-family:'Tiro Bangla',serif; font-size:11px; cursor:pointer; }
  .mini-action.danger { color:var(--red); border-color:rgba(178,67,51,.25); background:rgba(178,67,51,.06); }
  .log-tools { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
  .log-tools .form-input { margin:0; }

  .act-images { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .act-img-thumb { width:60px; height:60px; border-radius:6px; object-fit:cover; border:1px solid var(--cream3); cursor:pointer; transition:transform .12s; background:var(--cream2); }
  .act-img-thumb:active { transform:scale(.95); }
  .act-img-add { width:60px; height:60px; border-radius:6px; border:2px dashed var(--cream3); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink3); font-size:20px; background:var(--cream); transition:border-color .15s; }
  .act-img-add:hover { border-color:var(--gold); color:var(--gold); }

  .fin-item { background:#fff; border-radius:var(--radius-sm); padding:13px 14px; box-shadow:var(--shadow); margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .fin-type { font-size:18px; }
  .fin-desc { flex:1; }
  .fin-title { font-size:13px; font-weight:600; color:var(--ink); }
  .fin-source { font-size:11px; color:var(--ink3); margin-top:2px; }
  .fin-amt { font-family:'Tiro Bangla',serif; font-size:15px; font-weight:700; }
  .fin-amt.income { color:var(--green); }
  .fin-amt.expense { color:var(--red); }

  .bal-card { background:linear-gradient(135deg, var(--green) 0%, var(--teal) 100%); border-radius:var(--radius); padding:20px 18px; color:#fff; margin-bottom:14px; }
  .bal-label { font-size:12px; opacity:.8; margin-bottom:4px; }
  .bal-num { font-family:'Tiro Bangla',serif; font-size:28px; font-weight:700; }
  .acct-tabs { display:flex; gap:4px; margin-bottom:12px; }
  .acct-tab { flex:1; padding:10px 8px; font-family:'Tiro Bangla',serif; font-size:12px; font-weight:600; text-align:center; border-radius:10px; cursor:pointer; background:var(--cream2); color:var(--ink3); border:none; transition:all .15s; }
  .acct-tab.active { background:var(--ink); color:var(--gold2); }
  .acct-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid var(--cream2); gap:8px; }
  .acct-row:last-child { border-bottom:none; }
  .acct-date { font-size:11px; color:var(--ink3); width:64px; flex-shrink:0; }
  .acct-desc { flex:1; font-size:13px; color:var(--ink); min-width:0; }
  .txn-row { display:grid; grid-template-columns:68px minmax(0,1fr) minmax(98px,auto); gap:10px; align-items:start; padding:12px 0; border-bottom:1px solid var(--cream2); }
  .txn-row:last-child { border-bottom:none; }
  .txn-date { min-height:44px; border:1px solid var(--cream3); border-radius:8px; background:var(--cream); color:var(--ink3); display:flex; align-items:center; justify-content:center; text-align:center; font-size:10px; line-height:1.35; padding:5px 4px; }
  .txn-main { min-width:0; padding-top:1px; }
  .txn-title { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--ink); line-height:1.45; }
  .txn-dir { width:18px; height:18px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; background:var(--cream2); }
  .txn-dir.income { color:var(--green); }
  .txn-dir.expense { color:var(--red); }
  .txn-source { font-size:11px; color:var(--ink3); margin-top:3px; line-height:1.4; }
  .txn-side { display:flex; flex-direction:column; align-items:flex-end; gap:7px; text-align:right; }
  .txn-actions { display:flex; gap:4px; }
  .txn-action { min-width:42px; height:26px; padding:0 7px; border:1px solid var(--cream3); border-radius:7px; background:#fff; color:var(--ink3); font-family:'Tiro Bangla',serif; font-size:10.5px; line-height:1; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
  .txn-action.danger { color:var(--red); border-color:rgba(178,67,51,.25); background:rgba(178,67,51,.04); }
  .acct-amt-col { text-align:right; flex-shrink:0; min-width:70px; }
  .acct-in { font-family:'Tiro Bangla',serif; font-size:13px; color:var(--green); font-weight:600; }
  .acct-out { font-family:'Tiro Bangla',serif; font-size:13px; color:var(--red); font-weight:600; }
  .acct-net { font-family:'Tiro Bangla',serif; font-size:11px; }
  .acct-net.pos { color:var(--green); } .acct-net.neg { color:var(--red); }
  .acct-summary { margin-top:10px; padding-top:10px; border-top:2px solid var(--cream3); }
  .acct-sum-row { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
  .acct-sum-label { color:var(--ink3); }
  .acct-sum-val { font-family:'Tiro Bangla',serif; font-weight:700; color:var(--ink2); }
  .acct-sum-val.green { color:var(--green); } .acct-sum-val.red { color:var(--red); }
  .ledger-head { display:flex; justify-content:space-between; align-items:flex-end; gap:10px; margin:8px 0 10px; }
  .ledger-title { font-family:'Tiro Bangla',serif; font-size:15px; font-weight:700; color:var(--ink2); }
  .ledger-sub { font-size:11px; color:var(--ink3); margin-top:2px; }
  .month-sel { display:flex; gap:8px; margin-bottom:12px; align-items:center; }
  .month-sel .form-input { width:auto; flex:1; }
  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:300; align-items:center; justify-content:center; }
  .lightbox.open { display:flex; }
  .lb-close { position:absolute; top:16px; right:16px; color:#fff; font-size:28px; cursor:pointer; z-index:1; background:none; border:none; }
  .lb-counter { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#fff; font-size:12px; opacity:.7; }
  .lb-nav { position:absolute; top:50%; transform:translateY(-50%); color:#fff; font-size:36px; cursor:pointer; background:rgba(255,255,255,.15); border:none; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .lb-prev { left:12px; } .lb-next { right:12px; }
  .lb-img { max-width:92vw; max-height:82vh; object-fit:contain; border-radius:8px; }
  .d-section { margin-top:16px; }
  .d-section-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .d-section-title { font-family:'Tiro Bangla',serif; font-size:15px; font-weight:700; color:var(--ink2); }
  @media (min-width: 960px) {
    .content { max-width: 900px; }
    .ben-card { padding: 18px; }
    .ben-name { font-size: 16px; }
    .act-item { padding: 15px; }
    .act-title { font-size: 14px; }
    .fin-item { padding: 15px 16px; }
    .fin-title { font-size: 14px; }
    .bal-num { font-size: 32px; }
    .act-img-thumb, .act-img-add { width: 74px; height: 74px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">দায়িত্বশীল</div>
    <div class="topbar-name">খেদমতে খালক</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" id="topbar-hub" style="display:none" onclick="location.href='../main-admin-madrasa.html'">এডমিন</button>
    <button type="button" class="topbar-btn topbar-btn--icon" onclick="openPinChangeModal()" title="PIN পরিবর্তন" aria-label="PIN পরিবর্তন"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    <button type="button" class="topbar-btn topbar-btn--icon" id="topbar-lockout" onclick="MMSession.logoutToIndex('../index.html')" title="লগআউট" aria-label="লগআউট"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<!-- PANEL: BENEFICIARIES -->
<div class="content" id="panel-ben" style="padding-bottom: var(--app-content-pad-bottom);">
  <div class="sec-header" style="margin-top:6px;"><div class="sec-title">মাখদুম তালিকা</div></div>
  <button class="add-btn" onclick="openAddBen()">+ নতুন মাখদুম যোগ করুন</button>
  <div id="ben-list"></div>
</div>

<!-- PANEL: FINANCE (ACCOUNTING) -->
<div class="content" id="panel-fin" style="display:none;padding-bottom: var(--app-content-pad-bottom);">
  <div id="bal-card"></div>
  <button class="add-btn" style="margin-bottom:12px;" onclick="openAddFin()">+ আয় / ব্যয় যোগ করুন</button>
  <div class="acct-tabs" id="acct-tabs">
    <button class="acct-tab active" data-tab="all" onclick="switchAcctTab('all')">সব</button>
    <button class="acct-tab" data-tab="daily" onclick="switchAcctTab('daily')">দৈনিক</button>
    <button class="acct-tab" data-tab="monthly" onclick="switchAcctTab('monthly')">মাসিক</button>
    <button class="acct-tab" data-tab="yearly" onclick="switchAcctTab('yearly')">বার্ষিক</button>
  </div>
  <div class="month-sel" id="acct-selector"></div>
  <div class="card-static" style="margin-bottom:6px;" id="acct-opening"></div>
  <div id="acct-rows"></div>
  <div class="card-static" id="acct-closing" style="margin-top:8px;"></div>
</div>

<!-- PANEL: DAILY LOG -->
<div class="content" id="panel-log" style="display:none;padding-bottom: var(--app-content-pad-bottom);">
  <div class="sec-header" style="margin-top:6px;"><div class="sec-title">দৈনিক লগ</div></div>
  <div class="card-static" style="margin-bottom:12px;">
    <div class="form-group" style="margin:0;">
      <label class="form-label" id="log-date-label">আজকের লগ লিখুন</label>
      <div class="log-tools">
        <input class="form-input" type="date" id="log-date">
      </div>
      <textarea class="form-input form-textarea" id="log-input" placeholder="আজ কী কী করলেন, কার সাথে কথা হলো..."></textarea>
    </div>
    <button class="submit-btn" style="margin-top:10px;" onclick="saveLog()">লগ সংরক্ষণ করুন</button>
  </div>
  <div class="sec-header"><div class="sec-title">পুরনো লগ</div></div>
  <div id="log-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="নিচের নেভিগেশন">
  <div class="nav-item active" id="nav-ben" onclick="switchPanel('ben')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">মাখদুম</span>
  </div>
  <div class="nav-item" id="nav-fin" onclick="switchPanel('fin')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">তহবিল</span>
  </div>
  <div class="nav-item" id="nav-log" onclick="switchPanel('log')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V12.75a9 9 0 00-9-9z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">দৈনিক লগ</span>
  </div>
  <div class="nav-item" onclick="location.href='../chat.html'" title="শুধু বার্তা">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">বার্তা</span>
  </div>
</nav>

<!-- MODAL: Add Beneficiary -->
<div class="modal-bg modal-float" id="modal-ben">
  <div class="modal">
    <div class="modal-title">নতুন মাখদুম <button class="modal-close" onclick="closeModal('modal-ben')">✕</button></div>
    <div class="form-group"><label class="form-label">নাম</label><input class="form-input" id="b-name" placeholder="পুরো নাম"></div>
    <div class="form-group"><label class="form-label">ঠিকানা</label><input class="form-input" id="b-addr" placeholder="গ্রাম / পাড়া"></div>
    <div class="form-group"><label class="form-label">ফোন (ঐচ্ছিক)</label><input class="form-input" id="b-phone" placeholder="০১..."></div>
    <div class="form-group"><label class="form-label">পরিবারের তথ্য</label><input class="form-input" id="b-family" placeholder="স্ত্রী ও ৩ সন্তান"></div>
    <div class="form-group"><label class="form-label">প্রথম যোগাযোগের তারিখ</label><input class="form-input" type="date" id="b-date"></div>
    <div class="form-group"><label class="form-label">নোট</label><textarea class="form-input form-textarea" id="b-notes" placeholder="প্রয়োজনীয় তথ্য" style="min-height:70px;"></textarea></div>
    <button class="submit-btn" onclick="saveBen()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- MODAL: Add Finance -->
<div class="modal-bg modal-float" id="modal-fin">
  <div class="modal">
    <div class="modal-title"><span id="modal-fin-title">লেনদেন যোগ করুন</span> <button class="modal-close" onclick="closeModal('modal-fin')">✕</button></div>
    <div class="form-group"><label class="form-label">ধরন</label><select class="form-input form-select" id="fn-type"><option value="income">আয়</option><option value="expense">ব্যয়</option></select></div>
    <div class="form-group"><label class="form-label">পরিমাণ</label><input class="form-input" type="number" id="fn-amount" placeholder="০"></div>
    <div class="form-group"><label class="form-label">তারিখ</label><input class="form-input" type="date" id="fn-date"></div>
    <div class="form-group"><label class="form-label">বিবরণ</label><input class="form-input" id="fn-desc" placeholder="লেনদেনের বিবরণ"></div>
    <div class="form-group"><label class="form-label">উৎস / খাত (ঐচ্ছিক)</label><input class="form-input" id="fn-source" placeholder="মাদ্রাসা তহবিল / দান"></div>
    <button class="submit-btn" onclick="saveFin()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- DETAIL VIEW: Beneficiary -->
<div class="detail-view" id="ben-detail">
  <div class="detail-topbar">
    <span class="detail-back" onclick="closeBenDetail()">←</span>
    <span class="detail-title" id="bd-title">—</span>
    <button class="topbar-btn" style="color:var(--gold2);border-color:var(--gold);margin-left:auto;font-size:11px;" onclick="openEditBen()">তথ্য সম্পাদনা</button>
    <button class="topbar-btn" style="color:var(--red);border-color:rgba(178,67,51,.35);font-size:11px;" onclick="deleteBen()">ডিলিট</button>
  </div>
  <div class="detail-content" id="bd-content"></div>
</div>

<!-- MODAL: Add Activity -->
<div class="modal-bg modal-float" id="modal-act">
  <div class="modal">
    <div class="modal-title"><span id="modal-act-title">কার্যক্রম যোগ করুন</span> <button class="modal-close" onclick="closeModal('modal-act')">✕</button></div>
    <div class="form-group"><label class="form-label">কার্যক্রমের ধরন</label><select class="form-input form-select" id="act-type"></select></div>
    <div class="form-group"><label class="form-label">শিরোনাম</label><input class="form-input" id="act-title-inp" placeholder="সংক্ষিপ্ত শিরোনাম"></div>
    <div class="form-group"><label class="form-label">তারিখ</label><input class="form-input" type="date" id="act-date"></div>
    <div class="form-group"><label class="form-label">বিবরণ</label><textarea class="form-input form-textarea" id="act-desc-inp" placeholder="কী প্রদান করা হলো..." style="min-height:70px;"></textarea></div>
    <div class="form-group"><label class="form-label">ব্যয়িত অর্থ (টাকা)</label><input class="form-input" type="number" id="act-amount" placeholder="০"></div>
    <div class="form-group"><label class="form-label">ছবি (ঐচ্ছিক)</label><input type="file" id="act-images-inp" accept="image/*" multiple style="display:block;font-size:12px;"></div>
    <button class="submit-btn" onclick="saveAct()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- MODAL: Edit Beneficiary -->
<div class="modal-bg modal-float" id="modal-edit-ben">
  <div class="modal">
    <div class="modal-title">মাখদুম তথ্য সম্পাদনা <button class="modal-close" onclick="closeModal('modal-edit-ben')">✕</button></div>
    <div class="form-group"><label class="form-label">নাম</label><input class="form-input" id="eb-name" placeholder="পুরো নাম"></div>
    <div class="form-group"><label class="form-label">ঠিকানা</label><input class="form-input" id="eb-addr" placeholder="গ্রাম / পাড়া"></div>
    <div class="form-group"><label class="form-label">ফোন (ঐচ্ছিক)</label><input class="form-input" id="eb-phone" placeholder="০১..."></div>
    <div class="form-group"><label class="form-label">পরিবারের তথ্য</label><input class="form-input" id="eb-family" placeholder="স্ত্রী ও ৩ সন্তান"></div>
    <div class="form-group"><label class="form-label">প্রথম যোগাযোগের তারিখ</label><input class="form-input" type="date" id="eb-date"></div>
    <div class="form-group"><label class="form-label">নোট</label><textarea class="form-input form-textarea" id="eb-notes" placeholder="প্রয়োজনীয় তথ্য" style="min-height:70px;"></textarea></div>
    <button class="submit-btn" onclick="saveEditBen()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- MODAL: Edit Daily Log -->
<div class="modal-bg modal-float" id="modal-log-edit">
  <div class="modal">
    <div class="modal-title">লগ সম্পাদনা <button class="modal-close" onclick="closeModal('modal-log-edit')">✕</button></div>
    <div class="form-group"><label class="form-label">তারিখ</label><input class="form-input" type="date" id="el-date"></div>
    <div class="form-group"><label class="form-label">লগ</label><textarea class="form-input form-textarea" id="el-content" style="min-height:90px;"></textarea></div>
    <button class="submit-btn" onclick="saveEditLog()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav lb-prev" id="lb-prev" onclick="lbPrev()">‹</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <button class="lb-nav lb-next" id="lb-next" onclick="lbNext()">›</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>
<input type="file" id="act-img-adder" accept="image/*" multiple style="display:none" onchange="onExtraImagesSelected(event)">

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../api-shared.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/monitor-mode.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/khedmat-api.js"></script>
<script>
  const myRole = MMSession.getRole();
  const myName = MMSession.getName() || 'খেদমত দায়িত্বশীল';
  if (myRole !== 'khedmat' && myRole !== 'admin') { location.href = '../index.html'; }
  mmInsertMonitorBanner();
  MMSession.configureTopbarHubAndLockout();
  const khActorId = MMSession.getId ? MMSession.getId() : (MMSession.isAdmin() ? MMSession.getAdminUserId() : MMSession.getStaffUserId());
  const khPin = MMSession.getPin ? MMSession.getPin() : (MMSession.isAdmin() ? MMSession.getAdminPin() : MMSession.getStaffPin());

  const BN_MONTHS = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  const fmtAmt = n => '৳' + toBn(Number(n).toLocaleString('en'));
  const fmtDate = d => { if (!d) return ''; const p = d.split('-'); return toBn(p[2]+'/'+p[1]+'/'+p[0]); };
  const fmtMonth = m => { const p = m.split('-'); return BN_MONTHS[parseInt(p[1])-1]+' '+toBn(p[0]); };
  const fmtYear = y => toBn(y);

  let activeBenId = null;
  let activeAcctTab = 'all';
  let activeAcctPeriod = KhAPI.today();
  let lightboxImages = [];
  let lightboxIndex = 0;
  let pendingImgActId = null;
  let editingActId = null;
  let editingFinId = null;
  let editingLogId = null;

  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }
  function openModal(id) { if (mmMutationBlocked(showToast)) return; document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function showDbError(err) { console.error('[Khedmat] database operation failed:', err); showToast('ডাটাবেজে সংরক্ষণ হয়নি'); }
  async function refreshKhedmatData() { await KhAPI.bootstrapRemote(khActorId, khPin); }

  function switchPanel(name) {
    ['ben','fin','log'].forEach(p => {
      document.getElementById('panel-'+p).style.display = p===name ? '' : 'none';
      document.getElementById('nav-'+p).classList.toggle('active', p===name);
    });
    if (name==='ben') renderBen();
    if (name==='fin') { updateAcctTabUI(); renderFin(); }
    if (name==='log') renderLog();
  }

  function renderBen() {
    const bens = KhAPI.Beneficiaries.getAll();
    document.getElementById('ben-list').innerHTML = bens.length
      ? bens.map(b => {
          const acts = KhAPI.Activities.getByBeneficiary(b.id);
          return `<div class="ben-card" onclick="openBenDetail('${b.id}')">
            <div class="ben-top"><div class="ben-avatar">🤝</div>
            <div class="ben-info"><div class="ben-name">${KhAPI.esc(b.name)}</div><div class="ben-addr">${KhAPI.esc(b.address||'—')}</div></div>
            <div class="ben-count">${toBn(acts.length)} বার</div></div></div>`;
        }).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:40px 0;font-size:13px;">কোনো মাখদুম নেই</div>';
  }

  function openAddBen() {
    ['b-name','b-addr','b-phone','b-family','b-notes'].forEach(id => document.getElementById(id).value='');
    document.getElementById('b-date').value = KhAPI.today();
    openModal('modal-ben');
  }

  async function saveBen() {
    if (mmMutationBlocked(showToast)) return;
    const name = document.getElementById('b-name').value.trim();
    const addr = document.getElementById('b-addr').value.trim();
    if (!name) { showToast('নাম দিন'); return; }
    try {
      await KhAPI.Beneficiaries.add({ name, address:addr, phone:document.getElementById('b-phone').value.trim(), family_info:document.getElementById('b-family').value.trim(), notes:document.getElementById('b-notes').value.trim(), first_contact:document.getElementById('b-date').value || KhAPI.today() }, khActorId, khPin);
      closeModal('modal-ben'); renderBen(); showToast('মাখদুম যোগ হয়েছে');
    } catch (err) { showDbError(err); }
  }

  function openBenDetail(id) {
    activeBenId = id;
    const ben = KhAPI.Beneficiaries.getById(id);
    if (!ben) return;
    document.getElementById('bd-title').textContent = ben.name;
    renderBenDetail(ben);
    document.getElementById('ben-detail').classList.add('open');
  }

  function renderBenDetail(ben) {
    const acts = KhAPI.Activities.getByBeneficiary(ben.id);
    const types = KhAPI.ActivityTypes.getAll();
    const typeMap = {}; types.forEach(t => typeMap[t.id] = t);
    document.getElementById('bd-content').innerHTML = `
      <div class="card-static" style="margin-bottom:12px;">
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${ben.address?`<div style="font-size:13px;"><span style="color:var(--ink3);">ঠিকানা: </span>${KhAPI.esc(ben.address)}</div>`:''}
          ${ben.phone?`<div style="font-size:13px;"><span style="color:var(--ink3);">ফোন: </span>${KhAPI.esc(ben.phone)}</div>`:''}
          ${ben.family_info?`<div style="font-size:13px;"><span style="color:var(--ink3);">পরিবার: </span>${KhAPI.esc(ben.family_info)}</div>`:''}
          ${ben.notes?`<div style="font-size:13px;"><span style="color:var(--ink3);">নোট: </span>${KhAPI.esc(ben.notes)}</div>`:''}
          <div style="font-size:11px;color:var(--ink3);margin-top:2px;">প্রথম যোগাযোগ: ${fmtDate(ben.first_contact)}</div>
        </div>
      </div>
      <div class="d-section"><div class="d-section-hd"><div class="d-section-title">কার্যক্রমের হিস্টরি</div><button class="topbar-btn" style="color:var(--gold2);border-color:var(--gold);" onclick="openAddAct()">+ যোগ করুন</button></div>
      ${acts.length ? acts.map(a => {
        const tp = typeMap[a.type_id];
        const imgs = a.images || [];
        return `<div class="act-item">
          <div class="act-head"><span class="act-emoji">${tp?.emoji||'🤝'}</span><span class="act-title">${KhAPI.esc(a.title)}</span>${a.amount?`<span class="act-amt">${fmtAmt(a.amount)}</span>`:''}</div>
          <div class="act-desc">${KhAPI.esc(a.description)}</div><div class="act-date">${fmtDate(a.date)}</div>
          <div class="act-images">
            ${imgs.map((img,i) => `<img class="act-img-thumb" src="${img}" alt="" onclick="event.stopPropagation();openLightbox('${a.id}',${i})" loading="lazy">`).join('')}
            <div class="act-img-add" onclick="event.stopPropagation();triggerImgUpload('${a.id}')" title="ছবি যোগ করুন">+</div>
          </div>
          <div class="item-actions">
            <button class="mini-action" onclick="event.stopPropagation();openEditAct('${a.id}')">এডিট</button>
            <button class="mini-action danger" onclick="event.stopPropagation();deleteAct('${a.id}')">ডিলিট</button>
          </div>
        </div>`;
      }).join('') : '<div style="text-align:center;color:var(--ink3);padding:30px 0;font-size:13px;">কোনো কার্যক্রম নেই</div>'}
      </div>`;
  }

  function closeBenDetail() { document.getElementById('ben-detail').classList.remove('open'); }
  function openEditBen() {
    const ben = KhAPI.Beneficiaries.getById(activeBenId);
    if (!ben) return;
    document.getElementById('eb-name').value = ben.name || '';
    document.getElementById('eb-addr').value = ben.address || '';
    document.getElementById('eb-phone').value = ben.phone || '';
    document.getElementById('eb-family').value = ben.family_info || '';
    document.getElementById('eb-date').value = ben.first_contact || KhAPI.today();
    document.getElementById('eb-notes').value = ben.notes || '';
    openModal('modal-edit-ben');
  }

  async function saveEditBen() {
    if (mmMutationBlocked(showToast)) return;
    const name = document.getElementById('eb-name').value.trim();
    if (!name) { showToast('নাম দিন'); return; }
    try {
      await KhAPI.Beneficiaries.update(activeBenId, { name, address:document.getElementById('eb-addr').value.trim(), phone:document.getElementById('eb-phone').value.trim(), family_info:document.getElementById('eb-family').value.trim(), first_contact:document.getElementById('eb-date').value || KhAPI.today(), notes:document.getElementById('eb-notes').value.trim() }, khActorId, khPin);
      closeModal('modal-edit-ben');
      const ben = KhAPI.Beneficiaries.getById(activeBenId);
      document.getElementById('bd-title').textContent = ben.name;
      renderBenDetail(ben);
      renderBen();
      showToast('তথ্য আপডেট হয়েছে');
    } catch (err) { showDbError(err); }
  }

  async function deleteBen() {
    if (mmMutationBlocked(showToast)) return;
    const ben = KhAPI.Beneficiaries.getById(activeBenId);
    if (!ben || !confirm('এই মাখদুম ও তার সব কার্যক্রম ডিলিট হবে। নিশ্চিত?')) return;
    try {
      await KhAPI.Beneficiaries.delete(activeBenId, khActorId, khPin);
      closeBenDetail();
      renderBen();
      showToast('মাখদুম ডিলিট হয়েছে');
    } catch (err) { showDbError(err); }
  }

  function openAddAct() {
    editingActId = null;
    document.getElementById('modal-act-title').textContent = 'কার্যক্রম যোগ করুন';
    const types = KhAPI.ActivityTypes.getAll();
    document.getElementById('act-type').innerHTML = types.map(t => `<option value="${t.id}">${t.emoji} ${KhAPI.esc(t.name)}</option>`).join('');
    ['act-title-inp','act-desc-inp','act-amount'].forEach(id => document.getElementById(id).value='');
    document.getElementById('act-date').value = KhAPI.today();
    document.getElementById('act-images-inp').value = '';
    document.getElementById('act-images-inp').closest('.form-group').style.display = '';
    openModal('modal-act');
  }

  function openEditAct(id) {
    const act = KhAPI.Activities.getAll().find(a => a.id === id);
    if (!act) return;
    editingActId = id;
    document.getElementById('modal-act-title').textContent = 'কার্যক্রম সম্পাদনা';
    const types = KhAPI.ActivityTypes.getAll();
    document.getElementById('act-type').innerHTML = types.map(t => `<option value="${t.id}" ${t.id===act.type_id?'selected':''}>${t.emoji} ${KhAPI.esc(t.name)}</option>`).join('');
    document.getElementById('act-title-inp').value = act.title || '';
    document.getElementById('act-date').value = act.date || KhAPI.today();
    document.getElementById('act-desc-inp').value = act.description || '';
    document.getElementById('act-amount').value = act.amount || '';
    document.getElementById('act-images-inp').value = '';
    document.getElementById('act-images-inp').closest('.form-group').style.display = 'none';
    openModal('modal-act');
  }

  async function saveAct() {
    if (mmMutationBlocked(showToast)) return;
    const type_id = document.getElementById('act-type').value;
    const title = document.getElementById('act-title-inp').value.trim();
    const desc = document.getElementById('act-desc-inp').value.trim();
    const amount = parseFloat(document.getElementById('act-amount').value)||0;
    const date = document.getElementById('act-date').value || KhAPI.today();
    if (!title) { showToast('শিরোনাম দিন'); return; }
    if (!desc) { showToast('বিবরণ দিন'); return; }
    try {
      const files = document.getElementById('act-images-inp').files;
      const images = files && files.length ? await readFilesAsBase64Async(files) : [];
      if (editingActId) await KhAPI.Activities.update(editingActId, { beneficiary_id:activeBenId, type_id, title, description:desc, amount, date }, khActorId, khPin);
      else await KhAPI.Activities.add({ beneficiary_id:activeBenId, type_id, title, description:desc, amount, date, images }, khActorId, khPin);
      refreshDetail();
      renderBen();
      closeModal('modal-act'); showToast(editingActId ? 'কার্যক্রম আপডেট হয়েছে' : 'কার্যক্রম যোগ হয়েছে');
      editingActId = null;
    } catch (err) { showDbError(err); }
  }

  async function deleteAct(id) {
    if (mmMutationBlocked(showToast)) return;
    if (!confirm('এই কার্যক্রম ডিলিট হবে। নিশ্চিত?')) return;
    try {
      await KhAPI.Activities.delete(id, khActorId, khPin);
      refreshDetail();
      renderBen();
      showToast('কার্যক্রম ডিলিট হয়েছে');
    } catch (err) { showDbError(err); }
  }

  function triggerImgUpload(actId) {
    pendingImgActId = actId;
    document.getElementById('act-img-adder').click();
  }

  async function onExtraImagesSelected(e) {
    const files = e.target.files;
    if (!files || !files.length || !pendingImgActId) return;
    const activityId = pendingImgActId;
    e.target.value = '';
    pendingImgActId = null;
    try {
      const images = await readFilesAsBase64Async(files);
      if (images.length) await KhAPI.Activities.addImages(activityId, images, khActorId, khPin);
      refreshDetail();
      showToast(toBn(images.length)+' টি ছবি যোগ হয়েছে');
    } catch (err) { showDbError(err); }
  }

  function refreshDetail() {
    const ben = KhAPI.Beneficiaries.getById(activeBenId);
    if (ben) renderBenDetail(ben);
  }

  function readFilesAsBase64(files, cb) { readFilesAsBase64Async(files).then(cb); }
  function readFilesAsBase64Async(files) {
    return Promise.all(Array.from(files).map(file => new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = function () { resolve(r.result); };
      r.onerror = reject;
      r.readAsDataURL(file);
    })));
  }
  function openLightbox(actId, index) {
    const acts = KhAPI.Activities.getByBeneficiary(activeBenId);
    const act = acts.find(a => a.id === actId);
    if (!act || !act.images || !act.images.length) return;
    lightboxImages = act.images;
    lightboxIndex = index;
    showLightboxImage();
    document.getElementById('lightbox').classList.add('open');
  }

  function showLightboxImage() {
    document.getElementById('lb-img').src = lightboxImages[lightboxIndex];
    document.getElementById('lb-counter').textContent = toBn(lightboxIndex+1)+'/'+toBn(lightboxImages.length);
    document.getElementById('lb-prev').style.display = lightboxIndex>0 ? '' : 'none';
    document.getElementById('lb-next').style.display = lightboxIndex<lightboxImages.length-1 ? '' : 'none';
  }

  function lbPrev() { if (lightboxIndex>0) { lightboxIndex--; showLightboxImage(); } }
  function lbNext() { if (lightboxIndex<lightboxImages.length-1) { lightboxIndex++; showLightboxImage(); } }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  function renderFin() {
    const sum = KhAPI.Finance.getSummary(null);
    document.getElementById('bal-card').innerHTML = `<div class="bal-card"><div class="bal-label">বর্তমান জমা</div><div class="bal-num">${fmtAmt(sum.balance)}</div></div>`;
    updateAcctSelector();
    renderAcct();
  }

  function switchAcctTab(tab) {
    activeAcctTab = tab;
    if (tab==='all') activeAcctPeriod = '';
    else if (tab==='daily') activeAcctPeriod = KhAPI.today();
    else if (tab==='monthly') activeAcctPeriod = new Date().toISOString().slice(0,7);
    else activeAcctPeriod = new Date().toISOString().slice(0,4);
    updateAcctTabUI();
    updateAcctSelector();
    renderAcct();
  }

  function updateAcctTabUI() {
    document.querySelectorAll('.acct-tab').forEach(b => b.classList.toggle('active', b.dataset.tab===activeAcctTab));
  }

  function updateAcctSelector() {
    const sel = document.getElementById('acct-selector');
    if (activeAcctTab==='all') sel.innerHTML = '';
    else if (activeAcctTab==='daily') sel.innerHTML = `<input type="date" class="form-input" id="acct-date" value="${activeAcctPeriod}" onchange="onAcctPeriodChange()" style="flex:1;max-width:200px;">`;
    else if (activeAcctTab==='monthly') sel.innerHTML = `<input type="month" class="form-input" id="acct-month" value="${activeAcctPeriod}" onchange="onAcctPeriodChange()" style="flex:1;max-width:220px;">`;
    else {
      const years = KhAPI.Finance.getYearlySummary();
      const opts = years.length ? years.map(y => `<option value="${y.year}">${fmtYear(y.year)}</option>`).join('') : `<option value="${new Date().getFullYear()}">${fmtYear(String(new Date().getFullYear()))}</option>`;
      sel.innerHTML = `<select class="form-input form-select" id="acct-year" onchange="onAcctPeriodChange()" style="flex:1;max-width:200px;">${opts}</select>`;
    }
  }

  function onAcctPeriodChange() {
    if (activeAcctTab==='daily') activeAcctPeriod = document.getElementById('acct-date').value;
    else if (activeAcctTab==='monthly') activeAcctPeriod = document.getElementById('acct-month').value;
    else activeAcctPeriod = document.getElementById('acct-year').value;
    renderAcct();
  }

  function renderTxnRow(f) {
    const isIncome = f.type === 'income';
    const cls = isIncome ? 'income' : 'expense';
    const sign = isIncome ? '+' : '−';
    const dir = isIncome ? '↑' : '↓';
    return `<div class="txn-row">
      <div class="txn-date">${fmtDate(f.date)}</div>
      <div class="txn-main">
        <div class="txn-title"><span class="txn-dir ${cls}">${dir}</span><span>${KhAPI.esc(f.description)}</span></div>
        ${f.source ? `<div class="txn-source">${KhAPI.esc(f.source)}</div>` : ''}
      </div>
      <div class="txn-side">
        <div class="fin-amt ${cls}">${sign}${fmtAmt(f.amount)}</div>
        <div class="txn-actions">
          <button class="txn-action" onclick="openEditFin('${f.id}')" title="এডিট" aria-label="এডিট">এডিট</button>
          <button class="txn-action danger" onclick="deleteFin('${f.id}')" title="ডিলিট" aria-label="ডিলিট">ডিলিট</button>
        </div>
      </div>
    </div>`;
  }

  function renderAcct() {
    let openingBalance, rowsHtml, periodIncome, periodExpense, closingBalance;

    if (activeAcctTab === 'all') {
      const txns = KhAPI.Finance.getAll();
      openingBalance = 0;
      periodIncome = txns.filter(f=>f.type==='income').reduce((s,f)=>s+f.amount,0);
      periodExpense = txns.filter(f=>f.type==='expense').reduce((s,f)=>s+f.amount,0);
      closingBalance = periodIncome - periodExpense;

      rowsHtml = txns.length ? txns.map(renderTxnRow).join('') : '<div style="text-align:center;color:var(--ink3);padding:20px 0;font-size:12px;">কোনো লেনদেন নেই</div>';

    } else if (activeAcctTab === 'daily') {
      openingBalance = KhAPI.Finance.getBalanceBefore(activeAcctPeriod);
      const txns = KhAPI.Finance.getForDay(activeAcctPeriod);
      periodIncome = txns.filter(f=>f.type==='income').reduce((s,f)=>s+f.amount,0);
      periodExpense = txns.filter(f=>f.type==='expense').reduce((s,f)=>s+f.amount,0);
      closingBalance = openingBalance + periodIncome - periodExpense;

      rowsHtml = txns.length ? txns.map(renderTxnRow).join('') : '<div style="text-align:center;color:var(--ink3);padding:20px 0;font-size:12px;">এই দিনে কোনো লেনদেন নেই</div>';

    } else if (activeAcctTab === 'monthly') {
      openingBalance = KhAPI.Finance.getBalanceBefore(activeAcctPeriod+'-01');
      const daily = KhAPI.Finance.getDailySummary(activeAcctPeriod);
      periodIncome = daily.reduce((s,d)=>s+d.income,0);
      periodExpense = daily.reduce((s,d)=>s+d.expense,0);
      closingBalance = openingBalance + periodIncome - periodExpense;

      rowsHtml = daily.length ? daily.map(d => {
        const netCls = d.net >= 0 ? 'pos' : 'neg';
        const netSign = d.net >= 0 ? '+' : '';
        return `<div class="acct-row">
          <div class="acct-date">${fmtDate(d.date)}</div>
          <div class="acct-desc"></div>
          <div class="acct-amt-col"><div class="acct-in">${d.income?fmtAmt(d.income):''}</div><div class="acct-out">${d.expense?fmtAmt(d.expense):''}</div><div class="acct-net ${netCls}">${netSign}${fmtAmt(d.net)}</div></div>
        </div>`;
      }).join('') : '<div style="text-align:center;color:var(--ink3);padding:20px 0;font-size:12px;">এই মাসে কোনো লেনদেন নেই</div>';

    } else {
      openingBalance = KhAPI.Finance.getBalanceBefore(activeAcctPeriod+'-01-01');
      const monthly = KhAPI.Finance.getMonthlySummary(activeAcctPeriod);
      periodIncome = monthly.reduce((s,m)=>s+m.income,0);
      periodExpense = monthly.reduce((s,m)=>s+m.expense,0);
      closingBalance = openingBalance + periodIncome - periodExpense;

      rowsHtml = monthly.length ? monthly.map(m => {
        const netCls = m.net >= 0 ? 'pos' : 'neg';
        const netSign = m.net >= 0 ? '+' : '';
        return `<div class="acct-row">
          <div class="acct-date">${fmtMonth(m.month)}</div>
          <div class="acct-desc"></div>
          <div class="acct-amt-col"><div class="acct-in">${m.income?fmtAmt(m.income):''}</div><div class="acct-out">${m.expense?fmtAmt(m.expense):''}</div><div class="acct-net ${netCls}">${netSign}${fmtAmt(m.net)}</div></div>
        </div>`;
      }).join('') : '<div style="text-align:center;color:var(--ink3);padding:20px 0;font-size:12px;">এই বছরে কোনো লেনদেন নেই</div>';
    }

    document.getElementById('acct-opening').innerHTML = activeAcctTab === 'all'
      ? `<div class="ledger-head"><div><div class="ledger-title">সব আয়-ব্যয়ের এন্ট্রি</div><div class="ledger-sub">${toBn(KhAPI.Finance.getAll().length)}টি লেনদেন · নতুন-পুরনো ক্রমানুসারে</div></div><div style="font-family:'Tiro Bangla',serif;font-size:13px;font-weight:700;color:${closingBalance>=0?'var(--green)':'var(--red)'};">${fmtAmt(closingBalance)}</div></div>`
      : (openingBalance !== 0
        ? `<div style="font-size:12px;color:var(--ink3);">উদ্বৃত্ত (পূর্ববর্তী)</div><div style="font-family:'Tiro Bangla',serif;font-size:16px;font-weight:600;color:${openingBalance>=0?'var(--green)':'var(--red)'};">${fmtAmt(openingBalance)}</div>`
        : '<div style="font-size:12px;color:var(--ink3);text-align:center;">উদ্বৃত্ত (পূর্ববর্তী): ৳০</div>');

    document.getElementById('acct-rows').innerHTML = `<div class="card-static" style="margin-top:4px;">${rowsHtml}</div>`;

    const netSign = (periodIncome-periodExpense) >= 0 ? '+' : '';
    document.getElementById('acct-closing').innerHTML = `
      <div class="acct-summary">
        <div class="acct-sum-row"><span class="acct-sum-label">মোট আয়</span><span class="acct-sum-val green">+${fmtAmt(periodIncome)}</span></div>
        <div class="acct-sum-row"><span class="acct-sum-label">মোট ব্যয়</span><span class="acct-sum-val red">−${fmtAmt(periodExpense)}</span></div>
        <div class="acct-sum-row"><span class="acct-sum-label">নীট পরিবর্তন</span><span class="acct-sum-val ${(periodIncome-periodExpense)>=0?'green':'red'}">${netSign}${fmtAmt(periodIncome-periodExpense)}</span></div>
        <div class="acct-sum-row" style="border-top:1px solid var(--cream3);padding-top:8px;margin-top:4px;"><span class="acct-sum-label">অবশিষ্ট জমা</span><span style="font-family:'Tiro Bangla',serif;font-weight:700;font-size:16px;color:${closingBalance>=0?'var(--green)':'var(--red)'};">${fmtAmt(closingBalance)}</span></div>
      </div>`;
  }

  function openAddFin() {
    editingFinId = null;
    document.getElementById('modal-fin-title').textContent = 'লেনদেন যোগ করুন';
    document.getElementById('fn-type').value = 'income';
    ['fn-amount','fn-desc','fn-source'].forEach(id => document.getElementById(id).value='');
    document.getElementById('fn-date').value = activeAcctTab === 'daily' ? activeAcctPeriod : KhAPI.today();
    openModal('modal-fin');
  }

  function openEditFin(id) {
    const txn = KhAPI.Finance.getAll().find(f => f.id === id);
    if (!txn) return;
    editingFinId = id;
    document.getElementById('modal-fin-title').textContent = 'লেনদেন সম্পাদনা';
    document.getElementById('fn-type').value = txn.type;
    document.getElementById('fn-amount').value = txn.amount || '';
    document.getElementById('fn-date').value = txn.date || KhAPI.today();
    document.getElementById('fn-desc').value = txn.description || '';
    document.getElementById('fn-source').value = txn.source || '';
    openModal('modal-fin');
  }

  async function saveFin() {
    if (mmMutationBlocked(showToast)) return;
    const type = document.getElementById('fn-type').value;
    const amount = parseFloat(document.getElementById('fn-amount').value);
    const desc = document.getElementById('fn-desc').value.trim();
    const source = document.getElementById('fn-source').value.trim();
    const date = document.getElementById('fn-date').value || KhAPI.today();
    if (!amount || amount <= 0) { showToast('সঠিক পরিমাণ দিন'); return; }
    if (!desc) { showToast('বিবরণ দিন'); return; }
    try {
      if (editingFinId) await KhAPI.Finance.update(editingFinId, { type, amount, date, description:desc, source:source||null }, khActorId, khPin);
      else await KhAPI.Finance.add({ type, amount, date, description:desc, source:source||null }, khActorId, khPin);
      activeAcctTab = 'all';
      activeAcctPeriod = '';
      updateAcctTabUI();
      closeModal('modal-fin'); renderFin(); showToast(editingFinId ? 'লেনদেন আপডেট হয়েছে' : 'লেনদেন সংরক্ষিত হয়েছে');
      editingFinId = null;
    } catch (err) { showDbError(err); }
  }

  async function deleteFin(id) {
    if (mmMutationBlocked(showToast)) return;
    if (!confirm('এই লেনদেন ডিলিট হবে। নিশ্চিত?')) return;
    try {
      await KhAPI.Finance.delete(id, khActorId, khPin);
      renderFin();
      showToast('লেনদেন ডিলিট হয়েছে');
    } catch (err) { showDbError(err); }
  }

  function renderLog() {
    if (!document.getElementById('log-date').value) document.getElementById('log-date').value = KhAPI.today();
    document.getElementById('log-date-label').textContent = 'দৈনিক লগ লিখুন';
    const logs = KhAPI.DailyLogs.getAll();
    document.getElementById('log-list').innerHTML = logs.length
      ? logs.map(l => `<div class="log-item"><div class="log-meta"><span>${KhAPI.esc(l.by||'—')}</span><span>${fmtDate(l.date)}</span></div><div class="log-text">${KhAPI.esc(l.content)}</div><div class="item-actions"><button class="mini-action" onclick="openEditLog('${l.id}')">এডিট</button><button class="mini-action danger" onclick="deleteLog('${l.id}')">ডিলিট</button></div></div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:30px 0;font-size:13px;">কোনো লগ নেই</div>';
  }

  async function saveLog() {
    if (mmMutationBlocked(showToast)) return;
    const txt = document.getElementById('log-input').value.trim();
    const date = document.getElementById('log-date').value || KhAPI.today();
    if (!txt) { showToast('লগ লিখুন'); return; }
    try {
      await KhAPI.DailyLogs.add(txt, myName, khActorId, khPin, date);
      document.getElementById('log-input').value = '';
      renderLog(); showToast('লগ সংরক্ষিত হয়েছে');
    } catch (err) { showDbError(err); }
  }

  function openEditLog(id) {
    const log = KhAPI.DailyLogs.getAll().find(l => l.id === id);
    if (!log) return;
    editingLogId = id;
    document.getElementById('el-date').value = log.date || KhAPI.today();
    document.getElementById('el-content').value = log.content || '';
    openModal('modal-log-edit');
  }

  async function saveEditLog() {
    if (mmMutationBlocked(showToast)) return;
    const content = document.getElementById('el-content').value.trim();
    if (!content) { showToast('লগ লিখুন'); return; }
    try {
      await KhAPI.DailyLogs.update(editingLogId, { content, by:myName, date:document.getElementById('el-date').value || KhAPI.today() }, khActorId, khPin);
      closeModal('modal-log-edit');
      renderLog();
      showToast('লগ আপডেট হয়েছে');
      editingLogId = null;
    } catch (err) { showDbError(err); }
  }

  async function deleteLog(id) {
    if (mmMutationBlocked(showToast)) return;
    if (!confirm('এই লগ ডিলিট হবে। নিশ্চিত?')) return;
    try {
      await KhAPI.DailyLogs.delete(id, khActorId, khPin);
      renderLog();
      showToast('লগ ডিলিট হয়েছে');
    } catch (err) { showDbError(err); }
  }

  /* ═══ PIN ─── */
  function openPinChangeModal(){document.getElementById('pc-cur').value='';document.getElementById('pc-new').value='';document.getElementById('pc-conf').value='';document.getElementById('pc-err').textContent='';document.getElementById('modal-pin-change').classList.add('open');}
  function closePinChangeModal(){document.getElementById('modal-pin-change').classList.remove('open');}
  function saveOwnPin(){
    var c=document.getElementById('pc-cur').value,n=document.getElementById('pc-new').value,f=document.getElementById('pc-conf').value,e=document.getElementById('pc-err');
    if(!c||!n||!f){e.textContent='সব ঘর পূরণ করুন';return;} if(n!==f){e.textContent='PIN মিলছে না';return;}
    if(n.length!==4||!/^\d+$/.test(n)){e.textContent='PIN ৪ সংখ্যার হতে হবে';return;}
    var uid=MMSession.getStaffUserId(); if(!uid||!API.Teachers.changeOwnPin(uid,c,n)){e.textContent='বর্তমান PIN ভুল';return;}
    MMSession.setStaffSession(MMSession.getRole(),MMSession.getName(),uid,n);
    if(typeof MMSharedAPI!=='undefined'&&MMSharedAPI.staffChangeOwnPin){try{MMSharedAPI.staffChangeOwnPin(uid,c,n);}catch(ex){console.warn('Supabase PIN sync skipped',ex);}}
    closePinChangeModal(); if(typeof showToast==='function')showToast('PIN সফলভাবে পরিবর্তন হয়েছে');
  }

  async function initKhedmatPage() {
    try {
      await refreshKhedmatData();
    } catch (err) {
      console.error('[Khedmat] bootstrap failed:', err);
      showToast('ডাটাবেজ থেকে খেদমত ডেটা লোড হয়নি');
    }
    renderBen();
    var h = (location.hash || '').replace(/^#/, '');
    if (['ben', 'fin', 'log'].indexOf(h) >= 0) switchPanel(h);
  }
  MMLoading.run(initKhedmatPage);
</script>

<div class="modal-bg modal-float" id="modal-pin-change" onclick="if(event.target===this)closePinChangeModal()">
  <div class="modal" style="max-width:380px">
    <div class="modal-title"><span>PIN পরিবর্তন</span><button type="button" class="modal-close" onclick="closePinChangeModal()">✕</button></div>
    <form onsubmit="event.preventDefault();saveOwnPin()">
      <div class="form-group"><label class="form-label">বর্তমান PIN</label><input class="form-input" type="password" id="pc-cur" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password" placeholder="বর্তমান PIN"></div>
      <div class="form-group"><label class="form-label">নতুন PIN</label><input class="form-input" type="password" id="pc-new" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password" placeholder="নতুন ৪-সংখ্যার PIN"></div>
      <div class="form-group"><label class="form-label">নতুন PIN নিশ্চিত করুন</label><input class="form-input" type="password" id="pc-conf" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password" placeholder="পুনরায় PIN লিখুন"></div>
      <button type="submit" class="submit-btn">PIN সংরক্ষণ করুন</button>
      <div style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px" id="pc-err"></div>
    </form>
  </div>
</div>
</body>
</html>
