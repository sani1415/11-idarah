<!doctype html>
<html lang="bn" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>হিসাব Prototype 4 - Minimal Mobile</title>
  <link rel="stylesheet" href="accounts-prototypes.css">
</head>
<body>
  <main class="stage minimal">
    <section class="phone minimal">
      <header class="topbar">
        <div>
          <div class="eyebrow">ব্যয় · শাওয়াল</div>
          <h1 class="title">আজকের হিসাব</h1>
        </div>
        <button class="icon-btn">⋯</button>
      </header>

      <section class="mini-summary">
        <div class="mini-pill"><span>আজ</span><b style="color:var(--red)">৳৫৪,৬০০</b></div>
        <div class="mini-pill"><span>মাস</span><b>৳২,৮১,৪৪২</b></div>
        <div class="mini-pill"><span>বাকি</span><b style="color:var(--green)">৳৩,১৮,৫৫৮</b></div>
      </section>

      <div class="toolbar">
        <button class="tool active">সব</button>
        <button class="tool">তারিখ</button>
        <button class="tool">মাতবাখ</button>
        <button class="tool">⇅</button>
      </div>

      <section class="list">
        <div class="day-head"><span>১৪৪৭-১০-০২</span><span>২টি</span></div>
        <article class="txn">
          <div><h3>মিনিকেট চাল</h3><p>১২ বস্তা · বড় বাজার · সকাল</p></div>
          <div class="amt" style="color:var(--red)">৳৪৬,৮০০</div>
        </article>
        <article class="txn">
          <div><h3>পোলাউ চাল</h3><p>২ বস্তা · বড় বাজার</p></div>
          <div class="amt" style="color:var(--red)">৳৭,৮০০</div>
        </article>

        <div class="day-head"><span>১৪৪৭-১০-০৩</span><span>৩টি</span></div>
        <article class="txn">
          <div><h3>সয়াবিন তেল</h3><p>৬০ লিটার · রান্নাঘর</p></div>
          <div class="amt" style="color:var(--red)">৳৭,৮০০</div>
        </article>
        <article class="txn">
          <div><h3>ধনিয়া পাতা</h3><p>কাঁচা বাজার</p></div>
          <div class="amt" style="color:var(--red)">৳২১০</div>
        </article>
        <article class="txn">
          <div><h3>সাধারণ খরচ</h3><p>পরিবহন ও আনুষঙ্গিক</p></div>
          <div class="amt" style="color:var(--red)">৳১৫০</div>
        </article>
      </section>

      <button class="fab">＋</button>
      <nav class="bottom">
        <button>সারাংশ</button><button class="on">ব্যয়</button><button>বকেয়া</button><button>রিপোর্ট</button>
      </nav>
    </section>
  </main>
</body>
</html>
