<html lang="bn">
<head>
<meta charset="UTF-8">

<body>

<!-- ADMIN INBOX -->
<div id="view-inbox" style="display:none;">
  <div class="inbox-topbar">
    <div>
      <div class="inbox-title">💬 বার্তা</div>
      <div class="inbox-sub" id="inbox-sub">স্টাফ থেকে — শুধু আপনার কাছে (স্টাফ ↔ জিম্মাদার)</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button type="button" class="topbar-btn" id="notif-enable-btn" style="display:none;" onclick="onEnableNotif()">🔔 নোটিফিকেশন চালু</button>
      <button type="button" class="topbar-btn" id="inbox-back-btn">← এডমিন</button>
    </div>
  </div>
  <div class="content" style="padding-top:14px; padding-bottom: var(--app-content-pad-bottom);">
    <div id="thread-list"></div>
  </div>
  <button class="fab" onclick="openCompose()" title="নতুন বার্তা">✏️</button>
</div>

<!-- CHAT VIEW -->
<div id="view-chat" class="chat-wrap" style="display:none;">
  <div class="chat-topbar">
    <button type="button" class="chat-back" onclick="chatBack()" aria-label="পিছে">←</button>
    <div class="chat-peer-avatar" id="peer-avatar">👤</div>
    <div class="chat-peer-info">
      <div class="chat-peer-name" id="peer-name">—</div>
      <div class="chat-peer-role" id="peer-role">—</div>
    </div>
  </div>
  <div class="chat-staff-notice" id="chat-staff-notice" style="display:none;">
    এই বার্তা শুধু জিম্মাদারের কাছে যায়। অন্য স্টাফের সাথে এখানে যোগাযোগ নেই।
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-input-bar">
    <textarea class="chat-inp" id="chat-inp" placeholder="বার্তা লিখুন..." rows="1"
      onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

  <a class="main-nav-btn" href="main-admin-recent.html" aria-label="কার্যক্রম"><svg class="main-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle stroke-width="1.75" cx="12" cy="12" r="9"/><path stroke-width="1.75" stroke-linecap="round" d="M12 7v5l3 3"/></svg><span class="main-nav-lbl">কার্যক্রম</span></a>

<!-- স্টাফ: পোর্টাল ↔ বার্তা (জিম্মাদার হাব নেভের মতো নিচে স্টিক) -->
<nav class="bottom-nav" id="chat-page-staff-nav" aria-label="নিচের নেভিগেশন" style="display:none;"></nav>

<!-- COMPOSE MODAL (admin picks staff) -->
<div class="modal-bg" id="modal-compose">
  <div class="modal">
    <div class="modal-title">
      নতুন বার্তা পাঠান
      <button class="modal-close" onclick="closeCompose()">✕</button>
    </div>
    <div id="staff-pick-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="js/api/api-shared.js"></script>
<script src="js/core/mm-sample-data.js"></script>
<script src="js/api/api.js"></script>
<script src="js/madrasa/mdr-daftar-supabase.js"></script>
<script src="js/core/mm-session.js"></script>
<script src="js/madrasa/mdr-daftar-attendance-gate.js?v=20260624-gate4"></script>
<script src="js/core/mm-push.js"></script>
<script src="js/dept/dept-api.js"></script>
<script src="js/madrasa/madrasa-accounts-api.js?v=20260614-live-import-refresh"></script>
<script src="js/shared/chat-api.js"></script>
<script src="js/shared/daftar-bottom-nav.js"></script>
<script src="js/shared/chat-staff-nav.js"></script>
<script>
  /* ── IDENTITY ── */
  const myRole     = MMSession.getRole()     || '';
  const myDeptRole = MMSession.getDeptRole()|| '';
  const myName     = MMSession.getName() || MMSession.getDeptName() || 'স্টাফ';
  const isAdmin    = myRole === 'admin';
  if (isAdmin && !MMSession.canAdmin('messages')) {
    location.href = 'main-admin-madrasa.html';
    throw new Error('admin messages permission denied');
  }

  function getMyThread() {
    if (myDeptRole === 'dept')  return 'dept-' + (MMSession.getDeptId()||'x');
    if (myRole === 'teacher')   return 'teacher-' + (MMSession.getTeacherId()||'x');
    if (['daftar','hifz','library','alumni','khedmat'].includes(myRole)) return myRole;
    return null;
  }

  const myThread = getMyThread();
  let activeThread = null, activePeerName = '', activePeerIcon = '👤';
  let remoteStaffUsers = [];
  const CHAT_REALTIME_CHANNEL = 'mm-chat-broadcast';
  const CHAT_FALLBACK_SYNC_MS = 5000;
  let chatSyncTimer = 0;
  let chatSyncPromise = null;
  let chatReadPromise = null;
  let chatRealtimeChannel = null;
  let chatRealtimeReady = false;

  function setupStaffChatNav() {
    const nav = document.getElementById('chat-page-staff-nav');
    if (!nav || !window.MMChatStaffNav) return;
    nav.innerHTML = MMChatStaffNav.getInnerHtml(myRole, myDeptRole);
    nav.style.display = 'flex';
    if (typeof MMRefreshChatBadges === 'function') MMRefreshChatBadges();
  }
  function initVisualViewportKeyboard() {
    document.documentElement.style.setProperty('--keyboard-cover', '0px');
    const vv = window.visualViewport;
    if (!vv) return;
    let raf = 0;
    function sync() {
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(function () {
        raf = 0;
        const h = window.innerHeight || document.documentElement.clientHeight || 0;
        const gap = Math.max(0, h - vv.height - (vv.offsetTop || 0));
        document.documentElement.style.setProperty('--keyboard-cover', gap + 'px');
      });
    }
    vv.addEventListener('resize', sync);
    vv.addEventListener('scroll', sync);
    window.addEventListener('resize', sync);
    sync();
  }

  function chatActorId() {
    return MMSession.getChatActorId ? MMSession.getChatActorId() : (isAdmin ? (MMSession.getAdminUserId && MMSession.getAdminUserId()) : (MMSession.getStaffUserId && MMSession.getStaffUserId()));
  }
  function chatPin() {
    return MMSession.getChatPin ? MMSession.getChatPin() : (isAdmin ? (MMSession.getAdminPin && MMSession.getAdminPin()) : (MMSession.getStaffPin && MMSession.getStaffPin()));
  }
  function hasUnreadIncoming(threadId) {
    if (!threadId) return false;
    return ChatAPI.getThread(threadId).some((m) => (
      isAdmin
        ? (m.from_role !== 'admin' && !m.read_admin)
        : (m.from_role === 'admin' && !m.read_staff)
    ));
  }
  function refreshChatUi() {
    if (isAdmin && document.getElementById('view-inbox').style.display !== 'none') renderInbox();
    if (activeThread && document.getElementById('view-chat').style.display !== 'none') renderMsgs();
  }
  function shouldHandleRealtimeHint(threadId) {
    if (!threadId) return true;
    if (isAdmin) return true;
    return threadId === myThread;
  }
  async function announceChatRealtime(kind, threadId, extra) {
    if (!chatRealtimeChannel || !chatRealtimeReady) return false;
    try {
      await chatRealtimeChannel.send({
        type: 'broadcast',
        event: 'chat_changed',
        payload: {
          kind: kind || 'changed',
          thread_id: threadId || '',
          actor_role: isAdmin ? 'admin' : (myRole || myDeptRole || 'staff'),
          at: new Date().toISOString(),
          ...(extra || {}),
        },
      });
      return true;
    } catch (e) {
      console.warn('Chat realtime broadcast failed', e);
      return false;
    }
  }
  async function markActiveThreadRead() {
    if (chatReadPromise) return chatReadPromise;
    if (!activeThread || document.visibilityState !== 'visible' || !hasUnreadIncoming(activeThread)) return false;
    const threadId = activeThread;
    chatReadPromise = (async () => {
      try {
        if (isAdmin) ChatAPI.markReadAdmin(threadId);
        else ChatAPI.markReadStaff(threadId);
        refreshChatUi();
        if (!ChatAPI.markReadRemote) {
          if (typeof window.MMSyncChatBadges === 'function') window.MMSyncChatBadges();
          return true;
        }
        await ChatAPI.markReadRemote(chatActorId(), chatPin(), threadId, isAdmin);
        await announceChatRealtime('read', threadId);
        // পড়ার পর সার্ভার থেকে অপঠিত সংখ্যা পুনঃগণনা করে OS app-icon badge হালনাগাদ/মুছে দিই।
        if (typeof window.MMSyncChatBadges === 'function') window.MMSyncChatBadges();
        return true;
      } catch (e) {
        console.warn('Chat mark read failed', e);
        return false;
      } finally {
        chatReadPromise = null;
      }
    })();
    return chatReadPromise;
  }
  async function syncChatRemote(opts) {
    if (!window.MMSharedAPI || !ChatAPI.syncRemote) return false;
    if (chatSyncPromise) return chatSyncPromise;
    const options = opts || {};
    chatSyncPromise = (async () => {
      try {
        await ChatAPI.syncRemote(chatActorId(), chatPin(), isAdmin);
        if (options.refreshUi !== false) refreshChatUi();
        if (options.autoMark !== false && await markActiveThreadRead()) {
          await ChatAPI.syncRemote(chatActorId(), chatPin(), isAdmin);
          if (options.refreshUi !== false) refreshChatUi();
        }
        return true;
      } catch (e) {
        console.warn('Chat Supabase sync failed', e);
        return false;
      } finally {
        chatSyncPromise = null;
      }
    })();
    return chatSyncPromise;
  }
  function startChatFallbackSync() {
    if (chatSyncTimer) clearInterval(chatSyncTimer);
    chatSyncTimer = window.setInterval(function () {
      if (document.visibilityState !== 'visible') return;
      syncChatRemote({ refreshUi: true, autoMark: true });
    }, CHAT_FALLBACK_SYNC_MS);
  }
  function stopChatFallbackSync() {
    if (!chatSyncTimer) return;
    clearInterval(chatSyncTimer);
    chatSyncTimer = 0;
  }
  function setupChatRealtime() {
    const client = window.MMSharedAPI && MMSharedAPI.supabaseClient;
    if (!client || typeof client.channel !== 'function') {
      startChatFallbackSync();
      return;
    }
    if (chatRealtimeChannel && typeof client.removeChannel === 'function') {
      client.removeChannel(chatRealtimeChannel);
    }
    chatRealtimeReady = false;
    chatRealtimeChannel = client.channel(CHAT_REALTIME_CHANNEL, {
      config: { broadcast: { ack: true } },
    });
    chatRealtimeChannel
      .on('broadcast', { event: 'chat_changed' }, async function (event) {
        const payload = event && event.payload ? event.payload : {};
        if (!shouldHandleRealtimeHint(payload.thread_id)) return;
        await syncChatRemote({ refreshUi: true, autoMark: true });
      })
      .subscribe(function (status) {
        chatRealtimeReady = status === 'SUBSCRIBED';
        if (chatRealtimeReady) stopChatFallbackSync();
        else startChatFallbackSync();
      });
  }
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') syncChatRemote({ refreshUi: true, autoMark: true });
  });
  window.addEventListener('focus', function () {
    syncChatRemote({ refreshUi: true, autoMark: true });
  });
  window.addEventListener('beforeunload', function () {
    const client = window.MMSharedAPI && MMSharedAPI.supabaseClient;
    if (client && chatRealtimeChannel && typeof client.removeChannel === 'function') client.removeChannel(chatRealtimeChannel);
  });
  async function syncRemoteStaffUsers() {
    if (!isAdmin || !window.MMSharedAPI || !MMSession.getAdminPin) return;
    try {
      const res = await MMSharedAPI.adminUsers(MMSession.getAdminPin());
      remoteStaffUsers = res && res.ok && Array.isArray(res.users) ? res.users : [];
    } catch (e) {
      console.warn('Chat staff list sync failed', e);
    }
  }

  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);

  /* ── INIT ── */
  const urlParams = new URLSearchParams(location.search);

  async function initChatPage() {
    initVisualViewportKeyboard();
    setupChatRealtime();

    if (myRole === 'daftar' && MMSession.ensureDaftarDataReady) {
      try {
        var daftarWarm = MMSession.isAppDataWarm && MMSession.isAppDataWarm();
        await MMSession.ensureDaftarDataReady({ silent: daftarWarm });
      } catch (e) {}
    }

    if (isAdmin) {
      await syncChatRemote();
      await syncRemoteStaffUsers();
      document.body.classList.add('chat-page', 'chat-has-bottom-nav', 'chat-admin');
      const hubNav = document.getElementById('chat-page-hub-nav');
      if (hubNav) hubNav.style.display = 'flex';
      const inboxBack = document.getElementById('inbox-back-btn');
      if (inboxBack) inboxBack.onclick = () => { location.href = 'chat.html'; };
      setupNotifButton();

      if (urlParams.get('compose') === '1') {
        document.getElementById('view-inbox').style.display = 'none';
        setTimeout(() => openCompose(), 120);
      } else if (urlParams.get('thread')) {
        const tid = urlParams.get('thread');
        const threads = ChatAPI.getThreads();
        const t = threads.find((x) => x.thread_id === tid);
        const lbl = ChatAPI.getLabel(tid);
        const staffName = t ? t.staff_name : lbl.name;
        openChat(tid, staffName, lbl.icon, lbl.name);
      } else {
        showInbox();
      }
    } else if (myThread) {
      document.body.classList.add('chat-page', 'chat-has-bottom-nav', 'chat-staff');
      setupStaffChatNav();
      await syncChatRemote();
      const inp0 = document.getElementById('chat-inp');
      if (inp0) inp0.placeholder = 'বার্তা লিখুন…';
      const lbl = ChatAPI.getLabel(myThread);
      openChat(myThread, myName, lbl.icon, lbl.name);
    } else {
      document.body.innerHTML =
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);padding:24px;text-align:center;">' +
        '<p style="font-family:\'Tiro Bangla\',serif;font-size:15px;color:var(--ink3);line-height:1.6;">লগইন করুন প্রথমে।</p></div>';
      setTimeout(() => location.replace('index.html'), 2000);
    }
  }

  /* ── INBOX ── */
  function showInbox() {
    document.getElementById('view-inbox').style.display = 'block';
    document.getElementById('view-chat').style.display  = 'none';
    renderInbox();
  }

  function renderInbox() {
    const threads = ChatAPI.getThreads();
    const totalUnread = threads.reduce((s,t)=>s+t.unread, 0);
    document.getElementById('inbox-sub').textContent =
      totalUnread > 0 ? toBn(totalUnread) + ' টি অপঠিত (স্টাফ → জিম্মাদার)' : 'স্টাফ থেকে — শুধু আপনার কাছে';

    const el = document.getElementById('thread-list');
    if (!threads.length) {
      el.innerHTML = `<div class="empty-chat"><div class="empty-chat-icon">💬</div><div class="empty-chat-text">কোনো বার্তা নেই।<br>✏️ চেপে কোনো স্টাফকে লিখুন — বার্তা শুধু তাদের ও আপনার মধ্যে।</div></div>`;
      return;
    }
    el.innerHTML = threads.map(t => {
      const isUnread = t.unread > 0;
      const preview  = t.last_msg ? (t.last_msg.from_role==='admin'?'আপনি: ':'')+t.last_msg.text.slice(0,45)+(t.last_msg.text.length>45?'...':'') : '—';
      return `<div class="thread-item" onclick="openChat('${t.thread_id}','${ChatAPI.esc(t.staff_name)}','${t.label.icon}','${ChatAPI.esc(t.label.name)}')">
        <div class="thread-avatar">
          ${t.label.icon}
          ${isUnread ? `<div class="unread-dot">${t.unread}</div>` : ''}
        </div>
        <div class="thread-info">
          <div class="thread-name">${ChatAPI.esc(t.staff_name)}</div>
          <div class="thread-role">${ChatAPI.esc(t.label.name)}</div>
          <div class="thread-preview ${isUnread?'unread':''}">${ChatAPI.esc(preview)}</div>
        </div>
        <div class="thread-right">
          <div class="thread-time">${t.last_msg ? fmtTime(t.last_msg.ts) : ''}</div>
          ${isUnread ? `<div class="thread-badge">${toBn(t.unread)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  /* ── OPEN CHAT ── */
  async function openChat(thread_id, peerName, peerIcon, peerRole) {
    activeThread   = thread_id;
    activePeerName = peerName;
    activePeerIcon = peerIcon || '👤';

    document.getElementById('view-inbox').style.display = 'none';
    document.getElementById('view-chat').style.display  = 'flex';
    document.getElementById('peer-avatar').textContent  = activePeerIcon;
    document.getElementById('peer-name').textContent    = isAdmin ? peerName : 'জিম্মাদার';
    document.getElementById('peer-role').textContent    = isAdmin ? peerRole  : 'অ্যাডমিন';
    const staffNotice = document.getElementById('chat-staff-notice');
    if (staffNotice) staffNotice.style.display = isAdmin ? 'none' : 'block';

    if (isAdmin) ChatAPI.markReadAdmin(thread_id);
    else         ChatAPI.markReadStaff(thread_id);
    renderMsgs();
    setTimeout(scrollEnd, 60);
    await markActiveThreadRead();
    syncChatRemote({ refreshUi: true, autoMark: true });
  }

  function chatBack() {
    if (isAdmin) {
      location.href = 'chat.html';
      return;
    }
    goBack();
  }

  function goBack() {
    if (document.referrer && document.referrer !== location.href) { history.back(); return; }
    if (isAdmin) { location.href = 'chat.html'; return; }
    if (myDeptRole === 'dept') { location.href = 'dept/dept-staff.html'; return; }
    if (myRole === 'teacher') { location.href = 'madrasa/madrasa-class.html'; return; }
    if (myRole === 'daftar') { location.href = 'madrasa/madrasa-daftar.html'; return; }
    if (myRole === 'hifz') { location.href = 'madrasa/madrasa-hifz.html'; return; }
    if (myRole === 'library') { location.href = 'madrasa/madrasa-library.html'; return; }
    if (myRole === 'alumni') { location.href = 'madrasa/madrasa-alumni.html'; return; }
    if (myRole === 'khedmat') { location.href = 'khedmat/khedmat-staff.html'; return; }
    location.href = 'index.html';
  }

  /* ── RENDER MESSAGES ── */
  function renderRequestHtml(m) {
    const req = m.request;
    if (!req || !['account_entry_delete', 'account_entry_edit', 'dept_transaction_edit', 'dept_transaction_delete'].includes(req.kind)) return '';
    const status = req.status || 'pending';
    const statusLabel = status === 'approved' ? 'অনুমোদিত' : status === 'rejected' ? 'রিজেক্টেড' : 'অপেক্ষমান';
    const isEdit = req.kind === 'account_entry_edit' || req.kind === 'dept_transaction_edit';
    const actionLabel = isEdit ? 'এডিট অনুরোধ' : 'ডিলিট অনুরোধ';
    const buttons = isAdmin && status === 'pending'
      ? `<div class="msg-request-actions">
          <button type="button" class="msg-request-btn approve" onclick="decideAccountRequest('${ChatAPI.esc(m.id)}','approved')">অনুমোদন</button>
          <button type="button" class="msg-request-btn reject" onclick="decideAccountRequest('${ChatAPI.esc(m.id)}','rejected')">রিজেক্ট</button>
        </div>`
      : '';
    return `<div class="msg-request-card">
      <span class="msg-request-status ${status}">${statusLabel}</span>
      <div style="font-size:11px;font-weight:800;margin-bottom:3px;">${actionLabel}</div>
      <div style="font-size:11px;line-height:1.55;">${ChatAPI.esc(req.reason ? 'কারণ: ' + req.reason : 'সংশোধন অনুরোধ')}</div>
      ${buttons}
    </div>`;
  }

  function renderMsgs() {
    const msgs = ChatAPI.getThread(activeThread);
    const el   = document.getElementById('chat-msgs');
    if (!msgs.length) {
      el.innerHTML = `<div class="empty-chat"><div class="empty-chat-icon">💬</div><div class="empty-chat-text">এখনো কোনো বার্তা নেই।<br>বার্তা লিখুন — অন্য স্টাফ দেখবে না।</div></div>`;
      return;
    }
    let lastDay = '';
    el.innerHTML = msgs.map(m => {
      const fromMe = isAdmin ? m.from_role==='admin' : m.from_role!=='admin';
      const day    = m.ts.split('T')[0];
      const sep    = day!==lastDay ? `<div class="day-sep">── ${fmtDay(day)} ──</div>` : '';
      lastDay = day;
      return sep + `
        <div class="msg-row ${fromMe?'me':'other'}">
          ${!fromMe ? `<div class="msg-sender">${ChatAPI.esc(m.from_name)}</div>` : ''}
          <div class="msg-bubble">${ChatAPI.esc(m.text).replace(/\n/g, '<br>')}${renderRequestHtml(m)}</div>
          <div class="msg-time">${fmtTime(m.ts)}${fromMe && m.read_staff ? ' ✓✓' : fromMe ? ' ✓' : ''}</div>
        </div>`;
    }).join('');
  }

  async function decideAccountRequest(messageId, decision) {
    if (!isAdmin) return;
    const msg = ChatAPI.getThread(activeThread).find(m => m.id === messageId);
    const req = msg && msg.request;
    if (!req || req.status !== 'pending') return;
    if (decision === 'approved') {
      if (req.kind === 'dept_transaction_edit' || req.kind === 'dept_transaction_delete') {
        try {
          if (req.kind === 'dept_transaction_edit') {
            const res = await MMSharedAPI.updateDeptTransaction(chatActorId(), chatPin(), req.deptCode, req.entryId, req.proposed || {});
            if (!res || !res.ok) throw new Error((res && res.error) || 'dept_update_failed');
          } else {
            const res = await MMSharedAPI.deleteDeptTransaction(chatActorId(), chatPin(), req.deptCode, req.entryId);
            if (!res || !res.ok) throw new Error((res && res.error) || 'dept_delete_failed');
          }
        } catch (e) {
          console.warn('Dept request apply failed', e);
          alert('বিভাগের লেনদেন আপডেট/ডিলিট করা যায়নি।');
          return;
        }
      } else {
        const entryType = req.entryType;
        const entryId = req.entryId;
        try {
          if (req.kind === 'account_entry_edit') {
            if (entryType === 'income') await MdrAccAPI.Income.update(entryId, req.proposed || {});
            else if (entryType === 'expense') await MdrAccAPI.Expense.update(entryId, req.proposed || {});
          } else {
            if (entryType === 'income') await MdrAccAPI.Income.del(entryId);
            else if (entryType === 'expense') await MdrAccAPI.Expense.del(entryId);
          }
        } catch (e) {
          console.warn('Account request apply failed', e);
          alert('হিসাবের এন্ট্রি আপডেট/ডিলিট করা যায়নি।');
          return;
        }
      }
    }
    const reviewedRequest = {
      ...req,
      status: decision,
      reviewedAt: new Date().toISOString(),
      reviewedBy: 'জিম্মাদার',
    };
    if (ChatAPI.updateRequestRemote) {
      try {
        await ChatAPI.updateRequestRemote(chatActorId(), chatPin(), messageId, decision);
        await announceChatRealtime('request', activeThread, { message_id: messageId, status: decision });
      } catch (e) {
        console.warn('Chat request remote update failed', e);
      }
    }
    ChatAPI.updateMessage(messageId, (m) => ({
      ...m,
      request: reviewedRequest,
      read_staff: false,
    }));
    const reply = decision === 'approved'
      ? 'হিসাব সংশোধন অনুরোধ অনুমোদন করা হয়েছে।'
      : 'হিসাব সংশোধন অনুরোধ রিজেক্ট করা হয়েছে।';
    let remoteId = '';
    if (ChatAPI.sendRemote) {
      try {
        const res = await ChatAPI.sendRemote(chatActorId(), chatPin(), activeThread, reply, true);
        if (!res || !res.ok) throw new Error((res && res.error) || 'chat_send_failed');
        remoteId = res.id ? String(res.id) : '';
      } catch (e) {
        console.warn('Chat request reply remote send failed', e);
        alert('বার্তা পাঠানো যায়নি। ইন্টারনেট সংযোগ/ডাটাবেজ সংযোগ চেক করুন।');
        return;
      }
    }
    ChatAPI.send(activeThread, 'admin', 'জিম্মাদার', reply, remoteId ? { id: remoteId } : null);
    await announceChatRealtime('message', activeThread, { message_id: remoteId || messageId });
    renderMsgs();
    scrollEnd();
  }

  /* ── SEND ── */
  async function sendMsg() {
    const inp  = document.getElementById('chat-inp');
    const text = inp.value.trim();
    if (!text || !activeThread) return;
    const fromRole = isAdmin ? 'admin' : (myRole || myDeptRole || 'staff');
    const fromName = isAdmin ? 'জিম্মাদার' : myName;
    let remoteId = '';
    if (ChatAPI.sendRemote) {
      try {
        const res = await ChatAPI.sendRemote(chatActorId(), chatPin(), activeThread, text, isAdmin);
        if (!res || !res.ok) throw new Error((res && res.error) || 'chat_send_failed');
        remoteId = res.id ? String(res.id) : '';
      } catch (e) {
        console.warn('Chat Supabase send failed', e);
        alert('বার্তা পাঠানো যায়নি। ইন্টারনেট সংযোগ/ডাটাবেজ সংযোগ চেক করুন।');
        return;
      }
    } else {
      alert('ডাটাবেজ সংযোগ নেই। সংযোগ না থাকলে বার্তা পাঠানো যাবে না।');
      return;
    }
    ChatAPI.send(activeThread, fromRole, fromName, text, remoteId ? { id: remoteId } : null);
    await announceChatRealtime('message', activeThread, { message_id: remoteId });
    inp.value = '';
    resize(inp);
    renderMsgs();
    scrollEnd();
  }

  function onKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
  function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
  function scrollEnd() { const el=document.getElementById('chat-msgs'); el.scrollTop=el.scrollHeight; }

  /* ── COMPOSE (admin → staff) ── */
  function openCompose() {
    const list = buildStaffList();
    const existing = new Set(ChatAPI.getThreads().map(t=>t.thread_id));
    document.getElementById('staff-pick-list').innerHTML = list.map(s => {
      const hasThread = existing.has(s.thread_id);
      return `<div class="staff-pick-item" onclick="pickStaff('${s.thread_id}','${ChatAPI.esc(s.name)}','${s.icon}','${ChatAPI.esc(s.role)}')">
        <div style="width:42px;height:42px;border-radius:50%;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${s.icon}</div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:var(--ink);">${ChatAPI.esc(s.name)}</div>
          <div style="font-size:11px;color:var(--ink3);margin-top:2px;">${ChatAPI.esc(s.role)}</div>
        </div>
        ${hasThread ? '<span style="font-size:11px;color:var(--green);font-weight:600;">চ্যাট আছে</span>' : ''}
      </div>`;
    }).join('');
    document.getElementById('modal-compose').classList.add('open');
  }

  function closeCompose() { document.getElementById('modal-compose').classList.remove('open'); }

  function pickStaff(thread_id, name, icon, role) {
    closeCompose();
    openChat(thread_id, name, icon, role);
  }

  function buildStaffList() {
    const list = [];
    const seen = new Set();
    function pushStaff(item) {
      if (!item || !item.thread_id || seen.has(item.thread_id)) return;
      seen.add(item.thread_id);
      list.push(item);
    }
    remoteStaffUsers.forEach(u => {
      if (u.role === 'madrasa_teacher') {
        pushStaff({ thread_id:'teacher-' + u.id, name:u.name, icon:'📖', role:u.class_name || 'বর্ষ দায়িত্বশীল' });
      } else if (u.role === 'daftar') {
        pushStaff({ thread_id:'daftar', name:u.name, icon:'📋', role:'দফতর দায়িত্বশীল' });
      } else if (u.role === 'hifz') {
        pushStaff({ thread_id:'hifz', name:u.name, icon:'📿', role:'হিফজ দায়িত্বশীল' });
      } else if (u.role === 'library') {
        pushStaff({ thread_id:'library', name:u.name, icon:'📚', role:'মাকতাবা দায়িত্বশীল' });
      } else if (u.role === 'alumni_tracker') {
        pushStaff({ thread_id:'alumni', name:u.name, icon:'🎓', role:'পুরনো ছাত্র দায়িত্বশীল' });
      } else if (u.role === 'khedmat') {
        pushStaff({ thread_id:'khedmat', name:u.name, icon:'🤝', role:'খেদমত দায়িত্বশীল' });
      }
    });
    // Fixed-role staff
    const fixedRoles = [
      { role:'daftar',  lbl:'দফতর দায়িত্বশীল',      icon:'📋' },
      { role:'hifz',    lbl:'হিফজ দায়িত্বশীল',       icon:'📿' },
      { role:'library', lbl:'মাকতাবা দায়িত্বশীল',  icon:'📚' },
      { role:'alumni',  lbl:'পুরনো ছাত্র দায়িত্বশীল', icon:'🎓' },
      { role:'khedmat', lbl:'খেদমত দায়িত্বশীল',      icon:'🤝' },
    ];
    fixedRoles.forEach(r => {
      const user = API.Teachers.getAll().find(t => t.role === r.role);
      pushStaff({ thread_id:r.role, name: user?.name||r.lbl, icon:r.icon, role:r.lbl });
    });
    // Class teachers
    API.Teachers.getAll().filter(t=>t.class_id).forEach(t => {
      const cls = API.Classes.getById(t.class_id);
      pushStaff({ thread_id:'teacher-'+t.id, name:t.name, icon:'📖', role: cls?cls.name:'বর্ষ দায়িত্বশীল' });
    });
    // Dept heads
    DeptAPI.Departments.getAll().forEach(d => {
      pushStaff({ thread_id:'dept-'+d.id, name:d.name+' দায়িত্বশীল', icon:d.emoji, role:'বিভাগ দায়িত্বশীল' });
    });
    return list;
  }

  /* ── FORMAT ── */
  function fmtTime(ts) {
    try {
      const d = new Date(ts);
      const h = d.getHours(), m = d.getMinutes();
      const hh = h>12 ? h-12 : h||12;
      const ap = h>=12 ? ' PM' : ' AM';
      return toBn(String(hh).padStart(2,'0')+':'+String(m).padStart(2,'0'))+ap;
    } catch { return ''; }
  }

  function fmtDay(dateStr) {
    try {
      const today = new Date().toISOString().split('T')[0];
      if (dateStr === today) return 'আজ';
      const yest = new Date(); yest.setDate(yest.getDate()-1);
      if (dateStr === yest.toISOString().split('T')[0]) return 'গতকাল';
      const p = dateStr.split('-');
      return toBn(p[2]+'/'+p[1]+'/'+p[0]);
    } catch { return dateStr; }
  }
  /* ── নোটিফিকেশন (Web Push) — শুধু জিম্মাদার inbox ── */
  function notifToast(msg) {
    let t = document.getElementById('mm-notif-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'mm-notif-toast';
      t.style.cssText = 'position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:9999;'
        + 'background:#1a1208;color:#f3d785;padding:10px 16px;border-radius:12px;font-size:13px;'
        + "font-family:'Tiro Bangla',serif;box-shadow:0 6px 18px rgba(0,0,0,.25);max-width:80vw;text-align:center;";
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._h);
    t._h = setTimeout(() => { t.style.transition = 'opacity .4s'; t.style.opacity = '0'; }, 2600);
  }

  async function setupNotifButton() {
    const btn = document.getElementById('notif-enable-btn');
    if (!btn || !window.MMPush || !MMPush.supported()) return;
    const perm = MMPush.permission();
    if (perm === 'granted') {
      btn.style.display = 'none';
      MMPush.refreshSub();
    } else if (perm === 'denied') {
      btn.style.display = 'none';
    } else {
      btn.style.display = '';
    }
  }

  async function onEnableNotif() {
    const btn = document.getElementById('notif-enable-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ চালু হচ্ছে…'; }
    const res = await MMPush.enablePush();
    if (res && res.ok) {
      notifToast('🔔 নোটিফিকেশন চালু হয়েছে');
      if (btn) btn.style.display = 'none';
    } else {
      const msg = res && res.error === 'denied' ? 'অনুমতি দেওয়া হয়নি'
        : res && res.error === 'unsupported' ? 'এই ব্রাউজারে সমর্থিত নয়'
        : 'চালু করা যায়নি, আবার চেষ্টা করুন';
      notifToast(msg);
      if (btn) { btn.disabled = false; btn.textContent = '🔔 নোটিফিকেশন চালু'; }
    }
  }
  window.onEnableNotif = onEnableNotif;

  MMLoading.run(initChatPage);
</script>
<script src="js/shared/admin-nav.js"></script>
