<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>দফতর — মাদরাসাতুল মদীনা</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .att-card { background: #fff; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 10px; }
  .att-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .att-class-name { font-family: 'Noto Serif Bengali', serif; font-size: 15px; font-weight: 700; color: var(--ink2); }
  .att-summary { font-size: 12px; color: var(--ink3); }
  .att-done-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; }

  .save-att-btn {
    background: var(--green); color: #fff; border: none; border-radius: 10px;
    padding: 10px 18px; font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 12px;
    width: 100%; transition: all .15s;
  }
  .save-att-btn:active { transform: scale(.98); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">দফতর বিভাগ</div>
    <div class="topbar-name" id="top-name">দফতর দায়িত্বশীল</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" id="topbar-hub" style="display:none" onclick="location.href='../admin-hub.html'">হাব</button>
    <button type="button" class="topbar-btn" onclick="MMSession.logoutToIndex('../index.html')">লগআউট</button>
  </div>
</div>

<div class="content">

  <!-- HOME PANEL -->
  <div class="panel active" id="panel-home">

    <div id="daftar-pending-card" style="background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin:8px 0 12px;border-left:4px solid var(--gold);">
      <div style="font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:8px;">📋 আজকের বাকি</div>
      <div id="daftar-pending-body" style="font-size:12px;color:var(--ink3);line-height:1.55;"></div>
    </div>

    <div style="background:linear-gradient(135deg,var(--blue),#2471a3);border-radius:var(--radius);padding:16px;color:#fff;margin:8px 0 14px;">
      <div style="font-size:12px;opacity:.85;margin-bottom:8px;" id="today-date"></div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;text-align:center;">
        <div><div style="font-family:'Noto Serif Bengali',serif;font-size:22px;font-weight:700;" id="total-present">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">উপস্থিত</div></div>
        <div><div style="font-family:'Noto Serif Bengali',serif;font-size:22px;font-weight:700;" id="total-absent">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">অনুপস্থিত</div></div>
        <div><div style="font-family:'Noto Serif Bengali',serif;font-size:22px;font-weight:700;" id="total-leave">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">ছুটি</div></div>
        <div><div style="font-family:'Noto Serif Bengali',serif;font-size:22px;font-weight:700;" id="total-students">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">সক্রিয় ছাত্র</div></div>
      </div>
      <div style="font-size:10px;opacity:.65;margin-top:10px;text-align:center;" id="att-summary-hint">নির্বাচিত তারিখের সারসংক্ষেপ (সারা প্রতিষ্ঠান)</div>
    </div>

    <div class="sec-header">
      <span class="sec-title">উপস্থিতি</span>
      <span class="sec-link" id="today-label"></span>
    </div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <button type="button" class="topbar-btn" onclick="daftarPrevDay()" title="আগের দিন">‹</button>
      <input type="date" class="form-input" id="daftar-att-date" style="flex:1;min-width:140px;padding:10px 12px;font-size:14px;" onchange="onDaftarDateInput()">
      <button type="button" class="topbar-btn" onclick="daftarNextDay()" title="পরের দিন">›</button>
    </div>

    <!-- Class filter tabs -->
    <div class="tab-bar" id="class-tabs"></div>

    <div id="attendance-area"></div>

    <div class="pb-safe"></div>
  </div>

  <!-- FEES PANEL -->
  <div class="panel" id="panel-fees">
    <div class="sec-header" style="margin-top:8px;">
      <span class="sec-title">বেতন ইতিহাস</span>
    </div>
    <div class="form-group" style="margin-bottom:10px;">
      <label class="form-label">বর্ষ</label>
      <select class="form-input form-select" id="fee-history-class" onchange="renderFeeHistory()"></select>
    </div>
    <div id="fee-history-list"></div>

    <div class="sec-header" style="margin-top:16px;">
      <span class="sec-title">নতুন সারসংক্ষেপ</span>
    </div>
    <button class="add-btn" style="background:var(--gold);" onclick="openModal('add-fees')">＋ নতুন মাসের সারসংক্ষেপ</button>
    <div class="pb-safe"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="নিচের নেভিগেশন">
  <div class="nav-item active" id="nav-home" onclick="switchPanel('home')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nav-label">উপস্থিতি</span>
  </div>
  <div class="nav-item" id="nav-fees" onclick="switchPanel('fees');renderFees()">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nav-label">বেতন</span>
  </div>
  <div class="nav-item" onclick="location.href='../chat.html'" title="শুধু বার্তা">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nav-label">বার্তা</span>
  </div>
  <div class="nav-item" onclick="location.href='madrasa-admin.html'">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M4 10.25 12 4l8 6.25V20a1 1 0 01-1 1h-4.5v-7h-3v7H5a1 1 0 01-1-1v-9.75z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span><span class="nav-label">অ্যাডমিন</span>
  </div>
</nav>

<!-- FEES MODAL -->
<div class="modal-bg" id="modal-add-fees">
  <div class="modal">
    <div class="modal-title">বেতন সারসংক্ষেপ <button class="modal-close" onclick="closeModal('add-fees')">✕</button></div>
    <div class="form-group">
      <label class="form-label">বর্ষ</label>
      <select class="form-input form-select" id="fee-class"></select>
    </div>
    <div class="form-group">
      <label class="form-label">মাস</label>
      <input class="form-input" id="fee-month" type="month">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">মোট ছাত্র</label>
        <input class="form-input" id="fee-total" type="number">
      </div>
      <div class="form-group">
        <label class="form-label">আদায় করেছে</label>
        <input class="form-input" id="fee-paid" type="number">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">বকেয়া পরিমাণ (টাকা)</label>
      <input class="form-input" id="fee-arrear" type="number" placeholder="০">
    </div>
    <div class="form-group">
      <label class="form-label">মন্তব্য / বিলম্বকারীদের নাম</label>
      <textarea class="form-input form-textarea" id="fee-note" placeholder="যেমন: আব্দুর রহমান ২ মাস বাকি..."></textarea>
    </div>
    <button class="submit-btn gold" onclick="saveFees()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/api.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/monitor-mode.js"></script>
<script>
  if (!MMSession.getRole()) location.href = '../index.html';
  document.getElementById('top-name').textContent = MMSession.getName() || 'দফতর';
  mmInsertMonitorBanner();
  if (MMSession.isAdmin()) {
    const hb = document.getElementById('topbar-hub');
    if (hb) hb.style.removeProperty('display');
  }

  let selectedClassId = null;
  let daftarAttDate = API.today();
  let attState = {};
  let feeHistoryClassId = null;

  const daysBn = ['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];

  function isoToBnWeekday(iso) {
    const d = new Date(iso + 'T12:00:00');
    return daysBn[d.getDay()] + ', ' + toBn(d.getDate()) + '/' + toBn(d.getMonth()+1) + '/' + toBn(d.getFullYear());
  }

  function updateDateBanner() {
    document.getElementById('today-date').textContent = isoToBnWeekday(daftarAttDate) + (daftarAttDate === API.today() ? ' · আজ' : '');
    document.getElementById('today-label').textContent = toBn(daftarAttDate);
    const inp = document.getElementById('daftar-att-date');
    if (inp) {
      inp.max = API.today();
      inp.value = daftarAttDate;
    }
  }

  function setDaftarAttDate(iso) {
    daftarAttDate = iso;
    attState = {};
    updateDateBanner();
    renderAttendance();
    updateSummary();
  }

  function daftarPrevDay() {
    const d = new Date(daftarAttDate + 'T12:00:00');
    d.setDate(d.getDate() - 1);
    setDaftarAttDate(d.toISOString().split('T')[0]);
  }

  function daftarNextDay() {
    if (daftarAttDate >= API.today()) {
      showToast('ভবিষ্যতের তারিখ নির্বাচন যাবে না');
      return;
    }
    const d = new Date(daftarAttDate + 'T12:00:00');
    d.setDate(d.getDate() + 1);
    const next = d.toISOString().split('T')[0];
    if (next > API.today()) {
      showToast('ভবিষ্যতের তারিখ নির্বাচন যাবে না');
      return;
    }
    setDaftarAttDate(next);
  }

  function onDaftarDateInput() {
    const v = document.getElementById('daftar-att-date').value;
    if (!v) return;
    if (v > API.today()) {
      showToast('ভবিষ্যতের তারিখ নির্বাচন যাবে না');
      document.getElementById('daftar-att-date').value = daftarAttDate;
      return;
    }
    setDaftarAttDate(v);
  }

  function renderPendingCard() {
    const todayStr = API.today();
    const classes = API.Classes.getAll();
    const pendingNames = [];
    let complete = 0;
    classes.forEach(cls => {
      const att = API.Attendance.getByClassDate(cls.id, todayStr);
      if (att.length === 0) pendingNames.push(cls.name);
      else complete++;
    });
    const el = document.getElementById('daftar-pending-body');
    if (!el) return;
    if (pendingNames.length === 0) {
      el.innerHTML = '<span style="color:var(--green);font-weight:600;">✓ সব বর্ষে আজকের উপস্থিতি নেওয়া হয়েছে</span> · <strong>' + toBn(complete) + '</strong> / ' + toBn(classes.length) + ' বর্ষ';
      return;
    }
    el.innerHTML =
      '<div style="margin-bottom:6px;"><strong>' + toBn(pendingNames.length) + '</strong> বর্ষে আজ উপস্থিতি এখনো সেভ হয়নি · <strong>' + toBn(complete) + '</strong> বর্ষ সম্পূর্ণ (মোট ' + toBn(classes.length) + ')</div>' +
      '<div style="font-size:11px;color:var(--ink2);">বাকি: ' + pendingNames.map(n => API.esc(n)).join(' · ') + '</div>';
  }

  function switchPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + name)?.classList.add('active');
    window.scrollTo(0, 0);
    if (name === 'home') renderPendingCard();
  }

  /* ── CLASS TABS ── */
  function renderClassTabs() {
    const classes = API.Classes.getAll();
    if (!selectedClassId) selectedClassId = classes[0]?.id;
    const el = document.getElementById('class-tabs');
    el.innerHTML = classes.map(c => `
      <div class="tab-btn ${c.id === selectedClassId ? 'active' : ''}" onclick="selectClass('${c.id}')">${API.esc(c.name)}</div>
    `).join('');
  }

  function selectClass(cid) {
    selectedClassId = cid;
    attState = {};
    renderClassTabs();
    renderAttendance();
  }

  /* ── ATTENDANCE ── */
  function renderAttendance() {
    const students = API.Students.getByClass(selectedClassId);
    const existing = API.Attendance.getByClassDate(selectedClassId, daftarAttDate);
    const el = document.getElementById('attendance-area');

    if (!students.length) {
      el.innerHTML = '<div class="empty-state"><span class="empty-icon">👥</span><div class="empty-text">এই বর্ষে কোনো ছাত্র নেই</div></div>';
      return;
    }

    const isDone = existing.length > 0;
    el.innerHTML = `<div class="att-card">
      <div class="att-header">
        <div class="att-class-name">${API.esc(API.Classes.getName(selectedClassId))}</div>
        <span class="att-done-badge ${isDone ? 'badge-green list-badge' : 'badge-gold list-badge'}">${isDone ? '✓ নেওয়া হয়েছে' : 'বাকি আছে'}</span>
      </div>
      ${students.map(s => {
        const rec = existing.find(a => a.student_id === s.id);
        const st = attState[s.id] !== undefined ? attState[s.id] : (rec ? API.Attendance.statusOf(rec) : 'present');
        return `<div class="att-row" id="att-${s.id}">
          <span class="att-id">${API.esc(s.permanent_id)}</span>
          <span class="att-name">${API.esc(s.name)}</span>
          <div class="att-toggle">
            <button type="button" class="att-btn ${st === 'present' ? 'present' : ''}" onclick="markAtt('${s.id}','present',this.closest('.att-row'))" title="উপস্থিত">✓</button>
            <button type="button" class="att-btn ${st === 'absent' ? 'absent' : ''}" onclick="markAtt('${s.id}','absent',this.closest('.att-row'))" title="অনুপস্থিত">✗</button>
            <button type="button" class="att-btn ${st === 'leave' ? 'leave' : ''}" onclick="markAtt('${s.id}','leave',this.closest('.att-row'))" title="ছুটি">ছ</button>
          </div>
        </div>`;
      }).join('')}
      <button class="save-att-btn" onclick="saveAllAttendance()">✓ উপস্থিতি সংরক্ষণ করুন</button>
    </div>`;
    updateSummary();
  }

  function markAtt(sid, status, row) {
    if (mmMutationBlocked(showToast)) return;
    attState[sid] = status;
    const btns = row.querySelectorAll('.att-btn');
    btns.forEach(b => b.classList.remove('present', 'absent', 'leave'));
    if (status === 'present') btns[0].classList.add('present');
    else if (status === 'absent') btns[1].classList.add('absent');
    else btns[2].classList.add('leave');
  }

  function saveAllAttendance() {
    if (mmMutationBlocked(showToast)) return;
    const students = API.Students.getByClass(selectedClassId);
    const existing = API.Attendance.getByClassDate(selectedClassId, daftarAttDate);
    students.forEach(s => {
      let st = attState[s.id];
      if (st === undefined) {
        const rec = existing.find(a => a.student_id === s.id);
        st = rec ? API.Attendance.statusOf(rec) : 'present';
      }
      API.Attendance.save(s.id, daftarAttDate, st);
    });
    showToast('উপস্থিতি সংরক্ষিত হয়েছে ✓');
    attState = {};
    updateSummary();
    renderAttendance();
    renderPendingCard();
  }

  function updateSummary() {
    const sum = API.Attendance.getDateSummary(daftarAttDate);
    document.getElementById('total-present').textContent = toBn(sum.present);
    document.getElementById('total-absent').textContent = toBn(sum.absent);
    document.getElementById('total-leave').textContent = toBn(sum.leave || 0);
    document.getElementById('total-students').textContent = toBn(API.Students.getAll().filter(s => s.active).length);
  }

  /* ── FEES ── */
  function renderFees() {
    const classes = API.Classes.getAll();
    const sel = document.getElementById('fee-history-class');
    const prev = feeHistoryClassId || sel.value;
    sel.innerHTML = classes.map(c => `<option value="${c.id}">${API.esc(c.name)}</option>`).join('');
    if (prev && classes.some(c => c.id === prev)) sel.value = prev;
    else if (selectedClassId && classes.some(c => c.id === selectedClassId)) sel.value = selectedClassId;
    feeHistoryClassId = sel.value;
    renderFeeHistory();
    document.getElementById('fee-class').innerHTML = classes.map(c => `<option value="${c.id}">${API.esc(c.name)}</option>`).join('');
  }

  function renderFeeHistory() {
    const sel = document.getElementById('fee-history-class');
    const cid = sel.value;
    feeHistoryClassId = cid;
    const rows = API.Fees.getByClass(cid);
    const el = document.getElementById('fee-history-list');
    if (!rows.length) {
      el.innerHTML = '<div class="empty-state"><span class="empty-icon">💰</span><div class="empty-text">এই বর্ষে কোনো বেতন সারসংক্ষেপ নেই</div></div>';
      return;
    }
    el.innerHTML = rows.map(f => {
      const unpaid = f.unpaid != null ? f.unpaid : (f.total - f.paid);
      return `<div class="card-static" style="margin-bottom:10px;">
        <div style="font-family:'Noto Serif Bengali',serif;font-size:14px;font-weight:700;margin-bottom:8px;">${API.esc(f.month)}</div>
        <div style="display:flex;gap:14px;font-size:13px;flex-wrap:wrap;">
          <span>মোট: <strong>${toBn(f.total)}</strong></span>
          <span style="color:var(--green)">আদায়: <strong>${toBn(f.paid)}</strong></span>
          <span style="color:var(--red)">বাকি: <strong>${toBn(unpaid)}</strong></span>
          ${f.arrear ? `<span style="color:var(--red)">বকেয়া: ৳ ${toBn(f.arrear)}</span>` : ''}
        </div>
        ${f.note ? `<div style="font-size:12px;color:var(--ink3);margin-top:6px;">${API.esc(f.note)}</div>` : ''}
      </div>`;
    }).join('');
  }

  function saveFees() {
    if (mmMutationBlocked(showToast)) return;
    const class_id = document.getElementById('fee-class').value;
    const month = document.getElementById('fee-month').value;
    const total = parseInt(document.getElementById('fee-total').value) || 0;
    const paid = parseInt(document.getElementById('fee-paid').value) || 0;
    const arrear = parseInt(document.getElementById('fee-arrear').value) || 0;
    const note = document.getElementById('fee-note').value;
    if (!month) { showToast('মাস আবশ্যক'); return; }
    API.Fees.add({ month, class_id, total, paid, unpaid: total - paid, arrear, note });
    closeModal('add-fees');
    showToast('সংরক্ষিত হয়েছে ✓');
    feeHistoryClassId = class_id;
    renderFees();
  }

  function openModal(id) {
    if (mmMutationBlocked(showToast)) return;
    document.getElementById('modal-' + id).classList.add('open');
  }
  function closeModal(id) { document.getElementById('modal-' + id).classList.remove('open'); }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }
  function toBn(n) { return String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]); }

  /* init */
  updateDateBanner();
  renderClassTabs();
  renderAttendance();
  updateSummary();
  renderPendingCard();
</script>
