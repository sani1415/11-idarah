<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ছুটির ছাত্র — মাদ্রাসা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .leave-page { max-width: 520px; margin: 0 auto; padding: 12px 16px calc(24px + env(safe-area-inset-bottom)); }
  .leave-head { font-family: 'Tiro Bangla', serif; font-size: 18px; font-weight: 700; color: var(--ink2); margin-bottom: 6px; }
  .leave-sub { font-size: 12px; color: var(--ink3); line-height: 1.5; margin-bottom: 16px; }
  .leave-row {
    background: #fff;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid rgba(26, 18, 8, 0.06);
  }
  .leave-rank {
    font-family: 'Tiro Bangla', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    min-width: 36px;
    text-align: center;
  }
  .leave-info { flex: 1; min-width: 0; }
  .leave-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .leave-meta { font-size: 11px; color: var(--ink3); margin-top: 3px; }
  .leave-days {
    font-family: 'Tiro Bangla', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--red);
    flex-shrink: 0;
  }
  .leave-empty { text-align: center; color: var(--ink3); padding: 40px 16px; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">মাদ্রাসা</div>
    <div class="topbar-name">ছুটির রেকর্ড</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" onclick="location.href='../main-admin-madrasa.html'">← এডমিন</button>
  </div>
</div>

<div class="leave-page">
  <div class="leave-head">ছুটিতে থাকা ছাত্র</div>
  <p class="leave-sub">যাদের কমপক্ষে এক দিন <strong>ছুটি</strong> রেকর্ড আছে। বেশি ছুটির দিন থেকে কম — সাজানো।</p>
  <div id="leave-list"></div>
</div>

<script src="../js/mm-sample-data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/mm-student-modal.js"></script>
<script>
  if (!MMSession.requireAdminPerm('daftar', '../main-admin-madrasa.html')) { throw new Error('admin permission denied'); }

  const toBn = (n) => String(n).replace(/[0-9]/g, (d) => '০১২৩৪৫৬৭৮৯'[d]);

  const params = new URLSearchParams(location.search);
  let dept = params.get('dept') === 'maktab' ? 'maktab' : 'kitab';
  if (!MMSession.canUseMadrasaDept(dept)) dept = MMSession.getAllowedMadrasaDepts()[0] || 'kitab';
  const deptLabel = dept === 'maktab' ? 'মক্তব বিভাগ' : 'কিতাব বিভাগ';
  const sub = document.querySelector('.leave-sub');
  if (sub) sub.textContent = deptLabel + ' — যাদের কমপক্ষে এক দিন ছুটির রেকর্ড আছে। বেশি ছুটির দিন থেকে কম — সাজানো।';

  function render() {
    const rows = API.Attendance.getStudentsWithLeaveSortedByDept(dept);
    const el = document.getElementById('leave-list');
    if (!rows.length) {
      el.innerHTML = '<div class="leave-empty">কোনো ছাত্রের ছুটির রেকর্ড নেই। উপস্থিতি স্ক্রিনে ছুটি চিহ্নিত করলে এখানে দেখা যাবে।</div>';
      return;
    }
    el.innerHTML = rows
      .map((x, i) => {
        const cls = API.Classes.getById(x.student.class_id);
        return `<div class="leave-row">
          <div class="leave-rank">${toBn(i + 1)}</div>
          <div class="leave-info">
            <div class="leave-name"><button type="button" class="s-name-btn" style="font-size:14px;font-weight:600;" onclick="MMStudentModal.open('${x.student.id}')">${API.esc(x.student.name)}</button></div>
            <div class="leave-meta">${API.esc(cls ? cls.name : '—')} · রোল ${API.escBn(x.student.roll || '—')}</div>
          </div>
          <div class="leave-days">${toBn(x.leaveDays)} দিন</div>
        </div>`;
      })
      .join('');
  }
  render();
</script>
</body>
</html>
