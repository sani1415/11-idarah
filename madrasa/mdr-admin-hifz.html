<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>হিফজ বিভাগ — জিম্মাদার</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/main-admin-nav.css">
<style>
  .group-card { background:#fff; border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:10px; }
  .group-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--cream2); }
  .group-name { font-family:'Tiro Bangla',serif; font-size:16px; font-weight:700; color:var(--ink2); }
  .group-meta { font-size:11px; color:var(--ink3); margin-top:3px; }
  .para-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin:10px 0; }
  .para-cell { aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; border:1.5px solid var(--cream3); background:#fff; color:var(--ink3); cursor:pointer; transition:all .15s; }
  .para-cell.done { background:var(--green); border-color:var(--green); color:#fff; }
  .para-cell.current { background:var(--gold2); border-color:var(--gold); color:var(--ink); }
  .para-cell.revision { background:var(--blue-light); border-color:var(--blue); color:var(--blue); }
  .progress-ring { transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:var(--cream3); stroke-width:4; }
  .ring-fill { fill:none; stroke:var(--green); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .5s; }
  .ring-label { font-family:'Tiro Bangla',serif; font-size:13px; font-weight:700; color:var(--green); }
  .member-row { display:flex; align-items:center; padding:9px 0; border-bottom:1px solid var(--cream2); gap:10px; }
  .member-row:last-child { border-bottom:none; }
  .member-name { flex:1; font-size:13px; font-weight:600; color:var(--ink); }
  .member-class { font-size:11px; color:var(--ink3); }
  .activity-log-item { background:#fff; border-radius:var(--radius-sm); padding:13px; box-shadow:var(--shadow); border-left:3px solid var(--purple); margin-bottom:8px; }
  .legend { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink3); }
  .legend-dot { width:12px; height:12px; border-radius:3px; }
  .cls-overlay { position:fixed; inset:0; z-index:200; background:var(--bg,#faf6ef); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .25s ease; }
  .cls-overlay.is-open { transform:translateX(0); }
  .cls-ov-header { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; background:var(--ink); color:var(--gold2); flex-shrink:0; }
  .cls-ov-back { background:none; border:none; color:inherit; font-size:22px; cursor:pointer; padding:4px 10px 4px 0; line-height:1; }
  .cls-ov-info { flex:1; min-width:0; }
  .cls-ov-title { font-family:'Tiro Bangla',serif; font-size:16px; font-weight:700; }
  .cls-ov-teacher { font-size:11px; color:rgba(255,255,255,.65); margin-top:2px; }
  .cls-ov-tabs { display:flex; border-bottom:2px solid var(--cream2); background:#fff; flex-shrink:0; }
  .cls-ov-tab { flex:1; padding:10px 4px; border:none; background:none; font-family:'Tiro Bangla',serif; font-size:12px; color:var(--ink3); cursor:pointer; border-bottom:2.5px solid transparent; margin-bottom:-2px; transition:color .15s; }
  .cls-ov-tab.active { color:var(--ink); font-weight:700; border-bottom-color:var(--gold); }
  .cls-ov-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; padding-bottom:32px; }
  .ov-list { display:flex; flex-direction:column; gap:8px; }
  .ov-student-row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-s-id { font-size:10px; color:var(--ink3); min-width:30px; }
  .ov-s-name { flex:1; font-size:13px; font-family:'Tiro Bangla',serif; color:var(--ink); }
  .ov-s-status { font-size:11px; font-weight:700; min-width:60px; text-align:right; }
  .ov-kitab-row { padding:12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-k-name { font-size:13px; font-family:'Tiro Bangla',serif; color:var(--ink); margin-bottom:4px; }
  .ov-k-pct { font-size:12px; font-weight:700; color:var(--green); margin-bottom:6px; }
  .ov-k-bar { height:6px; background:var(--cream2); border-radius:3px; overflow:hidden; }
  .ov-k-fill { height:100%; background:var(--green); border-radius:3px; }
  .ov-log-row { padding:10px 12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-log-date { font-size:10px; color:var(--ink3); margin-bottom:4px; }
  .ov-log-text { font-size:13px; color:var(--ink2); line-height:1.5; white-space:pre-wrap; }
  .ov-empty { text-align:center; color:var(--ink3); padding:40px 0; font-size:13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">জিম্মাদার</div>
    <div class="topbar-name">হিফজ বিভাগ</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" onclick="location.href='../main-admin-madrasa.html'">← এডমিন</button>
  </div>
</div>

<div class="content">
  <div class="panel active" id="panel-home">
    <div style="background:linear-gradient(135deg,#6c3483,#8e44ad);border-radius:var(--radius);padding:16px;color:#fff;margin:8px 0 14px;">
      <div style="font-size:13px;opacity:.6;margin-bottom:10px;">হিফজ বিভাগ · সামগ্রিক</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="total-hifz">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">হাফেজ ছাত্র</div></div>
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="total-groups">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">সক্রিয় ফরিক</div></div>
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="avg-para">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">গড় পারা</div></div>
      </div>
    </div>
    <div class="sec-header"><span class="sec-title">সক্রিয় ফরিকসমূহ</span></div>
    <div id="group-list"></div>
    <div class="pb-safe"></div>
  </div>

  <div class="panel" id="panel-group">
    <div class="sec-header" style="margin-top:8px;">
      <span class="sec-title" id="group-detail-name">ফরিকের বিবরণ</span>
      <span class="sec-link" onclick="switchPanel('home');renderHome()">← ফিরুন</span>
    </div>
    <div class="tab-bar">
      <div class="tab-btn active" id="gtab-progress" onclick="switchGroupTab('progress')">পারা অগ্রগতি</div>
      <div class="tab-btn" id="gtab-members" onclick="switchGroupTab('members')">সদস্য</div>
      <div class="tab-btn" id="gtab-activity" onclick="switchGroupTab('activity')">কার্যক্রম লগ</div>
    </div>
    <div id="gtab-content-progress">
      <div class="card-static" style="margin-bottom:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div><div style="font-size:13px;color:var(--ink3);">সম্পন্ন পারা</div>
          <div style="font-family:'Tiro Bangla',serif;font-size:24px;font-weight:700;color:var(--green);" id="g-para-done">—</div></div>
          <div id="progress-ring-container"></div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:4px;">
          <div style="flex:1;background:var(--green-light);border-radius:var(--radius-sm);padding:10px;text-align:center;">
            <div style="font-family:'Tiro Bangla',serif;font-size:16px;font-weight:700;color:var(--green);" id="g-surah-done">—</div>
            <div style="font-size:10px;color:var(--green);">সূরা সম্পন্ন</div>
          </div>
          <div style="flex:1;background:var(--blue-light);border-radius:var(--radius-sm);padding:10px;text-align:center;">
            <div style="font-family:'Tiro Bangla',serif;font-size:16px;font-weight:700;color:var(--blue);" id="g-revision">—</div>
            <div style="font-size:10px;color:var(--blue);">মুরাজাআ পারা</div>
          </div>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>সম্পন্ন</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--gold2)"></div>চলছে</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue-light);border:1px solid var(--blue)"></div>মুরাজাআ</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--cream3)"></div>বাকি</div>
      </div>
      <div class="para-grid" id="para-grid"></div>
    </div>
    <div id="gtab-content-members" style="display:none;">
      <div class="card-static" id="member-list"></div>
    </div>
    <div id="gtab-content-activity" style="display:none;">
      <div id="activity-list"></div>
    </div>
    <div class="pb-safe"></div>
  </div>
</div>

<script src="../js/mm-sample-data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/mm-hijri.js"></script>
<script src="../js/mm-student-modal.js"></script>
<script>
  if (!MMSession.requireAdminPerm('hifz', '../main-admin-madrasa.html')) { throw new Error('admin permission denied'); }
  const HIFZ_KEY='mm_hifz_groups', HIFZ_PROG_KEY='mm_hifz_progress', HIFZ_MEMBERS_KEY='mm_hifz_members', HIFZ_ACTIVITY_KEY='mm_hifz_activity';
  function toBn(n) { return String(n).replace(/[0-9]/g,d=>'০১২৩৪৫৬৭৮৯'[d]); }
  if (!API.persistLoadArr(HIFZ_KEY).length) {
    API.persistSaveArr(HIFZ_KEY,[{id:'grp_1',name:'ফরিক আলিফ',start:'2025-01-01',note:'',active:true},{id:'grp_2',name:'ফরিক বা',start:'2025-02-01',note:'',active:true}]);
    API.persistSaveArr(HIFZ_PROG_KEY,[{id:API.uid(),group_id:'grp_1',para_done:15,surah_done:40,revision_para:10,current_para:16,note:'',date:API.today()},{id:API.uid(),group_id:'grp_2',para_done:8,surah_done:22,revision_para:5,current_para:9,note:'',date:API.today()}]);
    API.persistSaveArr(HIFZ_MEMBERS_KEY,[{id:API.uid(),group_id:'grp_1',student_id:'std_2',joined:'2025-01-01'},{id:API.uid(),group_id:'grp_2',student_id:'std_1',joined:'2025-02-01'}]);
    API.persistSaveArr(HIFZ_ACTIVITY_KEY,[{id:API.uid(),group_id:'grp_1',type:'পাঠ',text:'আজ ১৬তম পারার ৫ম রুকু পর্যন্ত পড়ানো হয়েছে।',date:API.today(),by:'জিম্মাদার'}]);
  }
  let currentGroupId=null;
  function switchPanel(name) { document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-'+name).classList.add('active'); window.scrollTo(0,0); }
  function switchGroupTab(tab) {
    ['progress','members','activity'].forEach(t=>{
      document.getElementById('gtab-'+t).classList.toggle('active',t===tab);
      document.getElementById('gtab-content-'+t).style.display=t===tab?'block':'none';
    });
    if(tab==='progress') renderGroupProgress(); else if(tab==='members') renderGroupMembers(); else renderGroupActivity();
  }
  function renderHome() {
    const groups=API.persistLoadArr(HIFZ_KEY).filter(g=>g.active), members=API.persistLoadArr(HIFZ_MEMBERS_KEY), prog=API.persistLoadArr(HIFZ_PROG_KEY);
    document.getElementById('total-hifz').textContent=toBn([...new Set(members.map(m=>m.student_id))].length);
    document.getElementById('total-groups').textContent=toBn(groups.length);
    const latestPG=groups.map(g=>{const p=prog.filter(p=>p.group_id===g.id).sort((a,b)=>b.date.localeCompare(a.date))[0];return p?p.para_done:0;});
    document.getElementById('avg-para').textContent=toBn(latestPG.length?Math.round(latestPG.reduce((a,b)=>a+b,0)/latestPG.length):0);
    document.getElementById('group-list').innerHTML=groups.map(g=>{
      const latest=prog.filter(p=>p.group_id===g.id).sort((a,b)=>b.date.localeCompare(a.date))[0], mems=members.filter(m=>m.group_id===g.id), pct=latest?Math.round(latest.para_done/30*100):0;
      return `<div class="group-card" onclick="openGroup('${g.id}')">
        <div class="group-header"><div><div class="group-name">${API.esc(g.name)}</div><div class="group-meta">${toBn(mems.length)} সদস্য · শুরু ${API.esc(g.start||'')}</div></div>
        <div style="text-align:right;"><div style="font-family:'Tiro Bangla',serif;font-size:20px;font-weight:700;color:var(--purple);">${latest?toBn(latest.para_done):'০'}/৩০</div><div style="font-size:10px;color:var(--ink3);">পারা সম্পন্ন</div></div></div>
        <div style="height:6px;background:var(--cream3);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:var(--purple);border-radius:3px;"></div></div>
        ${latest?`<div style="display:flex;gap:12px;margin-top:8px;font-size:12px;"><span style="color:var(--green);">✓ ${toBn(latest.surah_done)} সূরা</span><span style="color:var(--blue);">↻ ${toBn(latest.revision_para)} পারা মুরাজাআ</span><span style="color:var(--gold);">চলছে: ${toBn(latest.current_para)} নং পারা</span></div>`:''}
      </div>`;
    }).join('')||'<div class="empty-state"><span class="empty-icon">📿</span><div class="empty-text">কোনো ফরিক নেই</div></div>';
  }
  function openGroup(gid) {
    currentGroupId=gid; const g=API.persistLoadArr(HIFZ_KEY).find(g=>g.id===gid);
    document.getElementById('group-detail-name').textContent=g?g.name:'';
    ['progress','members','activity'].forEach((t,i)=>{document.getElementById('gtab-'+t).classList.toggle('active',i===0);document.getElementById('gtab-content-'+t).style.display=i===0?'block':'none';});
    renderGroupProgress(); switchPanel('group');
  }
  function renderGroupProgress() {
    const prog=API.persistLoadArr(HIFZ_PROG_KEY).filter(p=>p.group_id===currentGroupId).sort((a,b)=>b.date.localeCompare(a.date));
    const latest=prog[0], paraDone=latest?latest.para_done:0, surahDone=latest?latest.surah_done:0, revisionPara=latest?latest.revision_para:0, currentPara=latest?latest.current_para:1;
    document.getElementById('g-para-done').textContent=toBn(paraDone)+' / ৩০ পারা';
    document.getElementById('g-surah-done').textContent=toBn(surahDone);
    document.getElementById('g-revision').textContent=toBn(revisionPara);
    const pct=Math.round(paraDone/30*100), r=28, circ=2*Math.PI*r;
    document.getElementById('progress-ring-container').innerHTML=`<svg width="70" height="70" class="progress-ring" viewBox="0 0 70 70"><circle class="ring-bg" cx="35" cy="35" r="${r}"/><circle class="ring-fill" cx="35" cy="35" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${circ-circ*pct/100}"/></svg><div style="text-align:center;margin-top:-60px;height:60px;display:flex;align-items:center;justify-content:center;position:relative;"><span class="ring-label">${toBn(pct)}%</span></div>`;
    document.getElementById('para-grid').innerHTML=Array.from({length:30},(_,i)=>{const n=i+1;let cls='';if(n<=paraDone&&n!==currentPara)cls='done';else if(n===currentPara)cls='current';else if(n<=revisionPara)cls='revision';return `<div class="para-cell ${cls}">${toBn(n)}</div>`;}).join('');
  }
  function renderGroupMembers() {
    const members=API.persistLoadArr(HIFZ_MEMBERS_KEY).filter(m=>m.group_id===currentGroupId);
    document.getElementById('member-list').innerHTML=members.map(m=>{const s=API.Students.getById(m.student_id);const cls=s?API.Classes.getById(s.class_id):null;return s?`<div class="member-row"><div class="list-avatar">📿</div><div style="flex:1;"><div class="member-name"><button type="button" class="s-name-btn" style="font-size:13px;font-weight:600;color:var(--ink);" onclick="MMStudentModal.open('${s.id}')">${API.esc(s.name)}</button></div><div class="member-class">${cls?API.esc(cls.name):''} · যোগদান: ${API.esc(m.joined||'')}</div></div><span class="list-badge badge-ink">${API.escBn(s.permanent_id)}</span></div>`:''}).join('')||'<div class="empty-state"><span class="empty-icon">👥</span><div class="empty-text">কোনো সদস্য নেই</div></div>';
  }
  function renderGroupActivity() {
    const acts=API.persistLoadArr(HIFZ_ACTIVITY_KEY).filter(a=>a.group_id===currentGroupId).sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById('activity-list').innerHTML=acts.map(a=>`<div class="activity-log-item"><div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span class="list-badge badge-ink">${API.esc(a.type)}</span><span style="font-size:11px;color:var(--ink3);">${API.esc(a.date)}</span></div><div style="font-size:13px;color:var(--ink);line-height:1.6;">${API.esc(a.text)}</div><div style="font-size:11px;color:var(--ink3);margin-top:4px;">${API.esc(a.by||'')}</div></div>`).join('')||'<div class="empty-state"><span class="empty-icon">📝</span><div class="empty-text">কোনো লগ নেই</div></div>';
  }
  function openModal(id) { document.getElementById('modal-'+id).classList.add('open'); }
  function closeModal(id) { document.getElementById('modal-'+id).classList.remove('open'); }
  function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
  renderHome();
</script>

<!-- CLASS DETAIL OVERLAY -->
<div class="cls-overlay" id="cls-overlay">
  <div class="cls-ov-header">
    <button class="cls-ov-back" onclick="closeClassOverlay()" aria-label="ফিরে যাও">←</button>
