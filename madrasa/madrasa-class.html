<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বর্ষ ড্যাশবোর্ড — মাদরাসাতুল মদীনা</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .content { max-width:520px; margin:0 auto; padding:12px 16px var(--app-content-pad-bottom); }
  .stat-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; margin-bottom:10px; }
  .stat-tile { background:#fff; border-radius:var(--radius-sm); padding:10px 4px; box-shadow:var(--shadow); text-align:center; min-height:96px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-sizing:border-box; }
  button.stat-tile {
    -webkit-appearance: none;
    appearance: none;
    border: none;
    margin: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
    width: 100%;
    transition: background 0.12s, box-shadow 0.12s;
  }
  button.stat-tile:active { opacity: 0.92; }
  button.stat-tile:focus-visible { outline: none; box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.35); }
  #modal-watch-list .modal-large > .watch-list-sub { flex-shrink: 0; font-size: 12px; color: var(--ink3); margin: 0 0 10px; line-height: 1.35; }
  #modal-watch-list .modal-large .watch-list-panel { flex: 1 1 auto; min-height: 0; margin-top: 0; padding-right: 2px; }
  .watch-list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #fff; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--cream3); }
  .watch-list-item:last-child { margin-bottom: 0; }
  .watch-list-item .watch-open-std { flex: 1; text-align: left; border: none; background: transparent; padding: 0; cursor: pointer; font: inherit; font-weight: 600; color: var(--ink); min-width: 0; }
  .stat-tile--kh { padding:6px 4px; min-height:96px; justify-content:center; }
  .stat-num { font-family:'Noto Serif Bengali',serif; font-size:20px; font-weight:700; color:var(--ink2); display:block; line-height:1.1; }
  .stat-label { font-size:9px; color:var(--ink3); margin-top:4px; display:block; line-height:1.2; }
  .kh-mini { width:100%; text-align:left; font-size:9px; line-height:1.2; }
  .kh-mini .kh-line { display:flex; justify-content:space-between; align-items:center; gap:6px; padding:2px 0; border-top:1px solid var(--cream2); }
  .kh-mini .kh-line:first-of-type { border-top:none; }
  .kh-mini .kh-cat { flex:1; min-width:0; font-size:10px; line-height:1.2; font-weight:600; }
  .kh-mini .kh-n { font-family:'Noto Serif Bengali',serif; font-weight:700; font-size:12px; flex-shrink:0; line-height:1.1; }
  .kh-line--gr .kh-cat, .kh-line--gr .kh-n { color:var(--green); }
  .kh-line--sky .kh-cat, .kh-line--sky .kh-n { color:#0ea5e9; }
  .kh-line--red .kh-cat, .kh-line--red .kh-n { color:var(--red); }
  .stat-kh-hd { font-size:9px; font-weight:700; color:var(--ink2); margin-bottom:2px; line-height:1.2; }
  .std-name-row { display:flex; flex-wrap:wrap; align-items:baseline; gap:4px 8px; width:100%; min-width:0; }
  .std-name-row .std-name { flex:0 1 auto; max-width:100%; }
  .std-name-inner { display:flex; flex-wrap:wrap; align-items:center; gap:4px 8px; min-width:0; flex:1; }
  .std-kh-inline { font-size:10px; font-weight:700; padding:1px 7px; border-radius:6px; flex-shrink:0; line-height:1.2; }
  .std-kh-inline.kh-high { background:#d1fae5; color:#059669; }
  .std-kh-inline.kh-mid { background:#fef9c3; color:#b45309; }
  .std-kh-inline.kh-low { background:#fee2e2; color:#dc2626; }
  .std-kh-inline.kh-none { background:var(--cream2); color:var(--ink3); font-weight:600; }
  /* বাটন হিসেবে রাখলে ডিফলট বর্ডার/বড় সাইজ এড়াতে (আগের <span> লুক) */
  button.std-kh-inline {
    display: inline-block;
    font: inherit;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Noto Sans Bengali', sans-serif;
    -webkit-appearance: none;
    appearance: none;
    border: 0;
    box-shadow: none;
    margin: 0;
    padding: 1px 7px;
    line-height: 1.2;
    border-radius: 6px;
    cursor: pointer;
    vertical-align: baseline;
    color: inherit;
  }
  button.std-kh-inline:focus { outline: none; }
  button.std-kh-inline:focus-visible { box-shadow: 0 0 0 1px rgba(26,18,8,.2); }
  .kh-latest-summary { font-size:12px; color:var(--ink2); line-height:1.45; margin-bottom:10px; padding:10px; background:var(--cream2); border-radius:8px; }
  .kh-hist-block { margin-top:4px; }
  .kh-hist-toggle { display:none; width:100%; margin-top:0; padding:8px 10px; background:#fff; border:1.5px solid var(--cream3); border-radius:8px; font-size:12px; font-weight:600; color:var(--ink2); cursor:pointer; font-family:'Noto Sans Bengali',sans-serif; }
  .kh-hist-toggle:active { opacity:0.9; }
  .kh-history-wrap { max-height:200px; overflow-y:auto; margin-top:6px; padding:8px; background:var(--cream2); border-radius:8px; font-size:11px; -webkit-overflow-scrolling:touch; }
  .kh-hist-line { padding:4px 0; border-bottom:1px solid var(--cream3); }
  .kh-hist-line:last-child { border-bottom:none; }
  .kh-hist-date { font-size:9px; color:var(--ink3); }
  .stat-num--leave { color:var(--red) !important; }
  .std-row { background:#fff; border-radius:var(--radius-sm); padding:12px 14px; box-shadow:var(--shadow); margin-bottom:7px; display:flex; align-items:center; gap:12px; }
  .std-roll { font-size:11px; font-weight:700; color:var(--ink3); background:var(--cream2); padding:3px 8px; border-radius:99px; flex-shrink:0; }
  .std-name { flex:1; font-size:13px; font-weight:600; color:var(--ink); }
  .std-meta { font-size:11px; color:var(--ink3); }
  .book-row { background:#fff; border-radius:var(--radius-sm); padding:13px 14px; box-shadow:var(--shadow); margin-bottom:7px; }
  .book-name { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:6px; }
  .prog-wrap { display:flex; align-items:center; gap:10px; }
  .prog-track { flex:1; height:7px; background:var(--cream2); border-radius:99px; overflow:hidden; }
  .prog-fill { height:100%; background:var(--gold); border-radius:99px; transition:width .3s; }
  .prog-pct { font-size:11px; font-weight:700; color:var(--ink3); width:36px; text-align:right; flex-shrink:0; }
  .prog-pages { font-size:10px; color:var(--ink3); margin-top:4px; }
  .log-item { background:#fff; border-radius:var(--radius-sm); padding:12px 14px; box-shadow:var(--shadow); margin-bottom:7px; border-left:3px solid var(--gold); }
  .log-item--student { border-left-color:#0ea5e9; }
  .log-date { font-size:10px; color:var(--ink3); margin-bottom:4px; }
  .log-text { font-size:13px; color:var(--ink); line-height:1.55; }
  /* লগ — নেভ/ট্যাবের মতো ক্রিম বর্ডার, আন্ডারলাইন নয় */
  .std-log-link, .std-watch-link {
    flex-shrink: 0;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink2);
    background: var(--cream2);
    border: 1.5px solid var(--cream3);
    border-radius: 8px;
    padding: 6px 10px;
    line-height: 1.2;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .std-log-link:hover,
  .std-log-link:focus-visible {
    background: #fff;
    border-color: var(--gold);
    color: var(--ink);
    outline: none;
  }
  .std-log-link:active { opacity: 0.92; }
  .std-watch-link.is-on { background:#faf7fc; border-color:rgba(124,58,237,.35); color:#7c3aed; }
  .log-tabs { display:flex; gap:6px; margin-bottom:12px; }
  .log-tab { flex:1; padding:10px 8px; border:1.5px solid var(--cream3); border-radius:var(--radius-sm); background:#fff; font-family:'Noto Sans Bengali',sans-serif; font-size:12px; font-weight:600; color:var(--ink3); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background .15s,border-color .15s,color .15s; }
  .log-tab.active { background:var(--ink); color:var(--gold2); border-color:var(--ink); }
  .log-student-block { margin-bottom:10px; border-radius:8px; overflow:hidden; border:1px solid rgba(14,165,233,.25); background:#fff; }
  .log-student-block:last-child { margin-bottom:0; }
  .log-student-hd {
    display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; text-align:left;
    padding:10px 12px; background:var(--cream2); border:none; border-bottom:1px solid rgba(14,165,233,.12); box-shadow:inset 3px 0 0 #0ea5e9;
    -webkit-tap-highlight-color:transparent; box-sizing:border-box; transition:background .12s;
  }
  .log-student-hd:hover, .log-student-hd:focus-within { background:rgba(255,255,255,.65); }
  .log-student-hd-text { flex:1; min-width:0; display:flex; flex-wrap:wrap; align-items:baseline; gap:4px 8px; font-size:14px; font-weight:700; font-family:'Noto Serif Bengali',serif; color:var(--ink2); }
  .log-student-hd .s-name-btn { font-size:14px; font-weight:700; font-family:'Noto Serif Bengali',serif; color:var(--ink2); }
  .log-student-expand {
    flex-shrink:0; display:flex; align-items:center; justify-content:center; width:40px; min-height:40px; margin:-6px -6px -6px 0; padding:0;
    background:transparent; border:none; border-radius:8px; cursor:pointer; color:var(--ink3);
    -webkit-tap-highlight-color:transparent;
  }
  .log-student-expand:hover, .log-student-expand:focus-visible { background:rgba(0,0,0,.05); outline:none; }
  .log-student-hd .log-cnt { font-size:10px; font-weight:600; color:var(--ink3); font-family:'Noto Sans Bengali',sans-serif; margin-top:3px; display:block; }
  .log-chevron { flex-shrink:0; width:1.2em; height:1.2em; color:var(--ink3); transition:transform .2s ease; }
  .log-student-block.is-open .log-chevron { transform:rotate(180deg); }
  .log-student-body { padding:0 8px 8px; }
  .log-student-body[hidden] { display:none !important; }
  .log-student-body .log-item { margin-bottom:6px; }
  .log-student-body .log-item:last-child { margin-bottom:0; }
  .log-panel-empty { text-align:center; padding:32px 12px; color:var(--ink3); font-size:13px; line-height:1.55; }
  .add-btn { width:100%; padding:12px; background:var(--gold-light); border:1.5px dashed var(--gold); border-radius:var(--radius-sm); font-family:'Noto Sans Bengali',sans-serif; font-size:13px; font-weight:700; color:var(--ink2); cursor:pointer; margin-bottom:14px; }
  /* modals */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:200; padding:18px; backdrop-filter:blur(2px); box-sizing:border-box; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; border-radius:20px; padding:20px; width:min(520px, calc(100vw - 36px)); max-height:min(760px, calc(100vh - 36px)); overflow:auto; box-shadow:0 22px 70px rgba(26,18,8,.22); border:1px solid rgba(201,149,42,.16); }
  .modal.modal-large { width:min(640px, calc(100vw - 36px)); height:min(720px, calc(100vh - 36px)); display:flex; flex-direction:column; overflow:hidden; }
  .modal-title { font-family:'Noto Serif Bengali',serif; font-size:16px; font-weight:700; color:var(--ink2); margin-bottom:16px; display:flex; justify-content:space-between; }
  .modal-close { background:none; border:none; font-size:18px; color:var(--ink3); cursor:pointer; }
  .modal-tabs { display:flex; gap:6px; padding:4px; background:var(--cream2); border-radius:12px; margin:10px 0 14px; }
  .modal-tab { flex:1; border:0; border-radius:9px; padding:9px 8px; background:transparent; color:var(--ink3); font-family:'Noto Sans Bengali',sans-serif; font-size:12px; font-weight:700; cursor:pointer; }
  .modal-tab.active { background:#fff; color:var(--ink2); box-shadow:0 1px 6px rgba(26,18,8,.08); }
  .modal-panel[hidden] { display:none !important; }
  .modal.modal-large .modal-panel { flex:1 1 auto; min-height:0; overflow:auto; padding-right:2px; }
  .modal-history-list { max-height:310px; overflow:auto; padding:8px; background:var(--cream2); border-radius:12px; }
  .modal.modal-large .modal-history-list { max-height:none; min-height:100%; box-sizing:border-box; }
  .mini-edit-btn { border:1px solid var(--cream3); border-radius:8px; background:#fff; color:var(--ink2); font-family:'Noto Sans Bengali',sans-serif; font-size:10px; font-weight:700; padding:3px 8px; cursor:pointer; }
  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:12px; font-weight:600; color:var(--ink2); margin-bottom:6px; }
  .form-input { width:100%; padding:11px 12px; border:1.5px solid var(--cream3); border-radius:var(--radius-sm); font-family:'Noto Sans Bengali',sans-serif; font-size:13px; color:var(--ink); outline:none; box-sizing:border-box; }
  .form-input:focus { border-color:var(--gold); }
  .submit-btn { width:100%; padding:14px; background:var(--ink2); border:none; border-radius:var(--radius-sm); font-family:'Noto Sans Bengali',sans-serif; font-size:14px; font-weight:700; color:var(--gold2); cursor:pointer; margin-top:4px; }
</style>
</head>

  <div class="topbar-left">

<div class="content" id="panel-std">
  <div id="home-stats-block" style="padding-bottom:4px;padding-top:4px;">
    <div class="stat-grid" id="stat-grid"></div>
  </div>
  <div id="std-list"></div>
</div>

<!-- PANEL: কিতাব -->

</div>

<!-- PANEL: লগ (শ্রেণী / ছাত্র — উপট্যাব) -->

  <div class="log-tabs" role="tablist" aria-label="লগের ধরন">
    <button type="button" class="log-tab active" data-log-tab="class" role="tab" aria-selected="true" id="log-tab-class" onclick="setLogSubTab('class')">শ্রেণী লগ</button>
    <button type="button" class="log-tab" data-log-tab="student" role="tab" aria-selected="false" id="log-tab-student" onclick="setLogSubTab('student')">ছাত্রলোগ</button>
  </div>
  <button class="add-btn" type="button" onclick="openLogModal()">＋ নতুন লগ যোগ করুন</button>
  <div id="log-list" role="tabpanel" aria-labelledby="log-tab-class"></div>
</div>

<!-- MODAL: হুসনুল খুলুক -->
<div class="modal-bg" id="modal-khuluk">
  <div class="modal modal-large">
    <div class="modal-title">হুসনুল খুলুক <button class="modal-close" onclick="closeModal('modal-khuluk')">✕</button></div>
    <div style="font-size:13px;color:var(--ink2);font-weight:600;margin-bottom:6px;" id="kh-std-name">—</div>
    <p id="kh-latest-summary" class="kh-latest-summary" style="display:none"></p>
    <div class="modal-tabs" role="tablist" aria-label="হুসনুল খুলুক">
      <button type="button" class="modal-tab active" id="kh-tab-form" onclick="setKhulukModalTab('form')" aria-selected="true">নতুন / এডিট</button>
      <button type="button" class="modal-tab" id="kh-tab-history" onclick="setKhulukModalTab('history')" aria-selected="false">সম্পূর্ণ ইতিহাস</button>
    </div>
    <div class="modal-panel" id="kh-panel-form">
      <div class="form-group">
        <label class="form-label">নতুন হুসনুল খুলুক (০–১০০)</label>
        <input class="form-input" id="kh-score" type="number" min="0" max="100" placeholder="যেমন: 85">
      </div>
      <div class="form-group">
        <label class="form-label">কারণ / মন্তব্য</label>
        <input class="form-input" id="kh-reason" placeholder="সংক্ষিপ্ত বিবরণ (প্রতি সেভে ইতিহাসে সঞ্চিত)">
      </div>
      <button type="button" class="submit-btn" onclick="saveKhuluk()">সংরক্ষণ করুন</button>
    </div>
    <div class="modal-panel" id="kh-panel-history" hidden>
      <div id="kh-history-wrap" class="kh-history-wrap modal-history-list"></div>
    </div>
  </div>
</div>

<!-- MODAL: কিতাব অগ্রগতি -->
<div class="modal-bg" id="modal-book-prog">
  <div class="modal">
    <div class="modal-title">কিতাব অগ্রগতি <button class="modal-close" onclick="closeModal('modal-book-prog')">✕</button></div>
    <div class="form-group">
      <label class="form-label">কিতাব</label>
      <select class="form-input" id="bp-book"></select>
    </div>
    <div class="form-group">
      <label class="form-label">পঠিত পৃষ্ঠা</label>
      <input class="form-input" id="bp-pages" type="number" min="0" placeholder="যেমন: 45">
    </div>
    <div class="form-group">
      <label class="form-label">নোট (ঐচ্ছিক)</label>
      <input class="form-input" id="bp-note" placeholder="সংক্ষিপ্ত মন্তব্য">
    </div>
    <button class="submit-btn" onclick="saveBookProg()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- MODAL: লগ (বর্ষ / নির্দিষ্ট ছাত্র — পুরনো অ্যাপের মতো) -->
<div class="modal-bg" id="modal-log">
  <div class="modal modal-large">
    <div class="modal-title">নতুন লগ <button type="button" class="modal-close" onclick="closeModal('modal-log')">✕</button></div>
    <div class="modal-tabs" role="tablist" aria-label="লগ">
      <button type="button" class="modal-tab active" id="log-modal-tab-form" onclick="setLogModalTab('form')" aria-selected="true">নতুন / এডিট</button>
      <button type="button" class="modal-tab" id="log-modal-tab-history" onclick="setLogModalTab('history')" aria-selected="false">পুরনো লগ</button>
    </div>
    <div class="modal-panel" id="log-modal-panel-form">
      <div class="form-group">
        <label class="form-label">কার জন্য</label>
        <select class="form-input" id="log-student" aria-label="বর্ষ অথবা ছাত্র">
          <option value="">সবাই — বর্ষের সাধারণ লগ</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">লগের বিষয়বস্তু</label>
        <textarea class="form-input" id="log-text" rows="4" placeholder="আজকের বর্ষের কার্যক্রম, অথবা নির্দিষ্ট ছাত্র সম্পর্কে বিবরণ…" style="resize:none;"></textarea>
      </div>
      <button type="button" class="submit-btn" onclick="saveLog()">সংরক্ষণ করুন</button>
    </div>
    <div class="modal-panel" id="log-modal-panel-history" hidden>
      <div id="log-modal-history-wrap" class="modal-history-list"></div>
    </div>
  </div>
</div>

<!-- MODAL: পর্যবেক্ষণ তালিকা (আকৃতি অন্য modal-large-এর মতো — তালিকা ভেতরে স্ক্রল) -->
<div class="modal-bg" id="modal-watch-list">
  <div class="modal modal-large">
    <div class="modal-title">পর্যবেক্ষণ <button type="button" class="modal-close" onclick="closeModal('modal-watch-list')">✕</button></div>
    <p id="watch-list-sub" class="watch-list-sub">—</p>
    <div class="modal-panel watch-list-panel">
      <div id="watch-list-body" class="modal-history-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../api-shared.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mdr-supabase-sync.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/mm-student-modal.js"></script>
<script>
  if (MMSession.getRole() !== 'teacher') location.href = '../index.html';

  const tid = MMSession.getTeacherId();
  const teacher = API.Teachers.getById(tid);
  if (!teacher) { location.href = '../index.html'; }

  const myClass = API.Classes.getById(teacher.class_id);
  const classId = myClass ? myClass.id : null;

  document.getElementById('top-teacher').textContent = teacher.name;
  document.getElementById('top-class').textContent = myClass ? myClass.name : 'বর্ষ নির্ধারিত নেই';

  const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
  function teacherActor() {
    return {
      id: MMSession.getStaffUserId && MMSession.getStaffUserId(),
      pin: MMSession.getStaffPin && MMSession.getStaffPin(),
    };
  }
  async function refreshTeacherData() {
    if (window.MDRSupabaseSync && window.MMSharedAPI) {
      try {
        await MDRSupabaseSync.syncTeacherClass();
        return true;
      } catch (e) {
        console.warn('Teacher class Supabase refresh failed', e);
      }
    }
    return false;
  }

  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);

  /** লগ প্যানেল: 'class' = বর্ষের সাধারণ লগ, 'student' = ছাত্রভিত্তিক (নামের নিচে গুচ্ছ) */
  let logSubTab = 'class';

  function _attrId(id) { return String(id).replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }
  function _jsQuote(id) { return String(id).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
  function openLogFromRowBtn(el) {
    const sid = el.getAttribute('data-std-sid');
    if (sid) openLogModal(sid);
  }

  /** ছাত্রলোগ: নামে ক্লিক করলে নিচের লগ প্রসারিত/অ্যাকordion */
  function toggleStdLogGroup(btn) {
    if (!btn) return;
    const block = btn.closest('.log-student-block');
    const body = block && block.querySelector('.log-student-body');
    if (!body || !body.classList.contains('log-student-body')) return;
    const willOpen = body.hasAttribute('hidden');
    if (willOpen) {
      body.removeAttribute('hidden');
      btn.setAttribute('aria-expanded', 'true');
      if (block) block.classList.add('is-open');
    } else {
      body.setAttribute('hidden', '');
      btn.setAttribute('aria-expanded', 'false');
      if (block) block.classList.remove('is-open');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  /* ── TAB ── */
  function switchTab(name) {
    ['std','kitab','log'].forEach(p => {
      document.getElementById('panel-'+p).style.display = p===name ? '' : 'none';
      document.getElementById('nav-'+p).classList.toggle('active', p===name);
    });
    if (name==='std') renderStudents();
    if (name==='kitab') renderKitab();
    if (name==='log') renderLog();
  }

  function setLogSubTab(which) {
    if (which !== 'class' && which !== 'student') return;
    logSubTab = which;
    document.querySelectorAll('#panel-log .log-tab').forEach(function (btn) {
      const on = btn.getAttribute('data-log-tab') === which;
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    const list = document.getElementById('log-list');
    if (list) list.setAttribute('aria-labelledby', which === 'student' ? 'log-tab-student' : 'log-tab-class');
    renderLog();
  }

  /* ── STATS ── */
  function renderStats() {
    const grid = document.getElementById('stat-grid');
    if (!grid) return;
    if (!classId) { grid.innerHTML = ''; return; }

    const students = API.Students.getByClass(classId);
    const today = API.today();
    const att = API.Attendance.getByClassDate(classId, today) || {};
    const recs = att.records || [];
    const present = recs.filter(r => r.status === 'present').length;
    const avg = API.Khuluk.getClassAvg(classId);

    const st = API.Settings.get();
    const hy = st && st.hijri_year && String(st.hijri_year) !== '—' ? String(st.hijri_year) : null;
    const leavers = API.Students.getWithdrawalsFromClass(classId, hy);
    const leaveCount = leavers.length;

    const bands = API.Khuluk.getClassKhulukBands(classId);
    const watchCount = students.filter(function (s) { return s.special_watch; }).length;
    const threeLines =
      '<div class="kh-line kh-line--gr"><span class="kh-cat">মুজতাহিদ</span><span class="kh-n">' + toBn(bands.high) + '</span></div>' +
      '<div class="kh-line kh-line--sky"><span class="kh-cat">মুতাওয়াস্সিত</span><span class="kh-n">' + toBn(bands.mid) + '</span></div>' +
      '<div class="kh-line kh-line--red"><span class="kh-cat">মুসতায়িদ</span><span class="kh-n">' + toBn(bands.low) + '</span></div>';

    grid.innerHTML =
      '<div class="stat-tile"><span class="stat-num">' + toBn(students.length) + '</span><span class="stat-label">মোট ছাত্র</span></div>' +
      '<div class="stat-tile"><span class="stat-num" style="color:var(--green)">' + toBn(present) + '</span><span class="stat-label">আজ উপস্থিত</span></div>' +
      '<div class="stat-tile"><span class="stat-num stat-num--leave">' + toBn(leaveCount) + '</span><span class="stat-label">বিদায়ী</span></div>' +
      '<button type="button" class="stat-tile" onclick="openWatchListModal()"><span class="stat-num" style="color:#7c3aed">' + toBn(watchCount) + '</span><span class="stat-label">পর্যবেক্ষণ</span></button>' +
      '<div class="stat-tile"><span class="stat-num" style="color:var(--gold)">' + (avg !== null ? toBn(avg) : '—') + '</span><span class="stat-label">গড় হুসনুল খুলুক</span></div>' +
      '<div class="stat-tile stat-tile--kh">' +
      '<div class="stat-kh-hd">' + '\u09B9\u09C1\u09B8\u09A8\u09C1\u09B2 \u0996\u09C1\u09B2\u09C1\u0995' + '</div>' +
      '<div class="kh-mini">' + threeLines + '</div>' +
      '</div>';
  }

  function openWatchListModal() {
    if (!classId) return;
    const body = document.getElementById('watch-list-body');
    const sub = document.getElementById('watch-list-sub');
    if (!body) return;
    const watched = API.Students.getByClass(classId).filter(function (s) { return s.special_watch; });
    watched.sort(function (a, b) { return String(a.name || '').localeCompare(String(b.name || ''), 'bn'); });
    if (sub) sub.textContent = watched.length ? 'মোট ' + toBn(watched.length) + ' জন' : 'কেউ নেই';
    if (!watched.length) {
      body.innerHTML = '<div class="log-panel-empty">পর্যবেক্ষণে কেউ নেই। নিচের ছাত্র তালিকায় «পর্যবেক্ষণ» চেপে যুক্ত করুন।</div>';
    } else {
      body.innerHTML = watched.map(function (s) {
        var hasR = s.roll != null && String(s.roll).trim() !== '';
        var rollPill = hasR ? API.esc(String(s.roll)) : '—';
        return '<div class="watch-list-item">' +
          '<span class="std-roll">' + rollPill + '</span>' +
          '<button type="button" class="watch-open-std" onclick="closeModal(\'modal-watch-list\'); MMStudentModal.open(\'' + _jsQuote(s.id) + '\')">' + API.esc(s.name) + '</button>' +
          '</div>';
      }).join('');
    }
    openModal('modal-watch-list');
  }

  /* ── STUDENTS ── */
  function renderStudents() {
    if (!classId) { document.getElementById('std-list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink3);">বর্ষ নির্ধারিত নেই</div>'; return; }
    const students = API.Students.getByClass(classId);
    const today = API.today();
    const att = API.Attendance.getByClassDate(classId, today) || {};
    const recs = att.records || [];
    document.getElementById('std-list').innerHTML = students.length
      ? students.map(s => {
          const rec = recs.find(r => r.student_id === s.id);
          const status = rec ? rec.status : 'unknown';
          const attLine = status === 'present' ? '🟢 উপস্থিত' : status === 'absent' ? '🔴 অনুপস্থিত' : '';
          const kh = API.Khuluk.getLatest(s.id);
          const khScore = kh != null && kh.score != null ? Number(kh.score) : null;
          const khClass = khScore === null || Number.isNaN(khScore) ? 'kh-none' : khScore >= 81 ? 'kh-high' : khScore >= 60 ? 'kh-mid' : 'kh-low';
          const khText = khScore !== null && !Number.isNaN(khScore) ? toBn(khScore) : '—';
          const hasR = s.roll != null && String(s.roll).trim() !== '';
          const rollPill = hasR ? API.esc(String(s.roll)) : '—';
          const khTag = '<button type="button" class="std-kh-inline ' + khClass + '" title="হুসনুল খুলুক (সর্বশেষ)" onclick="event.stopPropagation();openKhuluk(\'' + _jsQuote(s.id) + '\')">' + khText + '</button>';
          const watchOn = !!s.special_watch;
          const watchBtn = '<button type="button" class="std-watch-link' + (watchOn ? ' is-on' : '') + '" data-std-sid="' + _attrId(s.id) + '" onclick="event.stopPropagation(); toggleSpecialWatchFromRowBtn(this)">' + (watchOn ? 'পর্যবেক্ষণ ✓' : 'পর্যবেক্ষণ') + '</button>';
          return '<div class="std-row" data-std-sid="' + _attrId(s.id) + '">' +
            '<span class="std-roll">' + rollPill + '</span>' +
            '<div style="flex:1;min-width:0;">' +
            '<div class="std-name-row">' +
            '<div class="std-name-inner"><button type="button" class="s-name-btn std-name" onclick="event.stopPropagation();MMStudentModal.open(\'' + _jsQuote(s.id) + '\')">' + API.esc(s.name) + '</button>' + khTag + '</div>' +
            '</div>' +
            (attLine ? '<div class="std-meta">' + attLine + '</div>' : '') +
            '</div>' +
            watchBtn +
            '<button type="button" class="std-log-link" data-std-sid="' + _attrId(s.id) + '" onclick="event.stopPropagation(); openLogFromRowBtn(this)">লগ</button>' +
            '</div>';
        }).join('')
      : '<div style="text-align:center;padding:40px;color:var(--ink3);font-size:13px;">এই বর্ষে কোনো ছাত্র নেই</div>';
  }
  async function toggleSpecialWatchFromRowBtn(btn) {
    const sid = btn && btn.getAttribute('data-std-sid');
    const stu = sid ? API.Students.getById(sid) : null;
    if (!stu) { showToast('ছাত্র পাওয়া যায়নি'); return; }
    const next = !stu.special_watch;
    API.Students.update(sid, { special_watch: next });
    renderStudents();
    renderStats();
    if (window.MMSharedAPI && MMSession.getStaffUserId && MMSession.getStaffUserId()) {
      try {
        const res = await MMSharedAPI.setSpecialWatch(
          MMSession.getStaffUserId(),
          MMSession.getStaffPin && MMSession.getStaffPin(),
          stu.supabase_id || stu.id,
          next
        );
        if (!res || !res.ok) throw new Error((res && res.error) || 'special_watch_failed');
      } catch (e) {
        API.Students.update(sid, { special_watch: !next });
        renderStudents();
        renderStats();
        showToast('ডাটাবেজে সংরক্ষণ হয়নি');
        return;
      }
    }
    showToast(next ? 'বিশেষ পর্যবেক্ষণে যুক্ত হয়েছে' : 'বিশেষ পর্যবেক্ষণ থেকে সরানো হয়েছে');
  }

  /* ── KHULUK: সর্বশেষ সারাংশ + modal tab history ── */
  let khulukTargetId = '';
  let khulukEditId = '';
  function setKhulukModalTab(which) {
    const form = which !== 'history';
    document.getElementById('kh-panel-form').hidden = !form;
    document.getElementById('kh-panel-history').hidden = form;
    document.getElementById('kh-tab-form').classList.toggle('active', form);
    document.getElementById('kh-tab-history').classList.toggle('active', !form);
    document.getElementById('kh-tab-form').setAttribute('aria-selected', form ? 'true' : 'false');
    document.getElementById('kh-tab-history').setAttribute('aria-selected', form ? 'false' : 'true');
  }
  function fillKhulukHistory(sid) {
    const sumEl = document.getElementById('kh-latest-summary');
    const wrap = document.getElementById('kh-history-wrap');
    const hist = API.Khuluk.getByStudent(sid);
    const total = hist.length;
    const latest = API.Khuluk.getLatest(sid);
    if (sumEl) {
      if (latest && latest.score != null && !Number.isNaN(Number(latest.score))) {
        var rs = (latest.reason && String(latest.reason).length > 100) ? String(latest.reason).slice(0, 100) + '…' : (latest.reason || '');
        sumEl.style.display = 'block';
        sumEl.textContent = 'সর্বশেষ: হুসনুল খুলুক ' + toBn(latest.score) + ' · ' + (latest.date || '') + (rs ? ' — ' + rs : '') + (latest.by ? ' (' + latest.by + ')' : '');
      } else {
        sumEl.style.display = 'block';
        sumEl.textContent = 'এখনো কোনো হুসনুল খুলুক এন্ট্রি নেই — নিচে নতুন মান দিন';
      }
    }
    if (!wrap) return;
    if (total > 0) {
      var sub = total > 50 ? ' (মোট ' + toBn(total) + ' · সর্বোচ্চ ৫০টা দেখা)' : ' (মোট ' + toBn(total) + ')';
      wrap.innerHTML = '<div style="font-size:10px;font-weight:600;color:var(--ink3);margin-bottom:6px;">আগের এন্ট্রি' + sub + '</div>' +
        hist.slice(0, 50).map(function (h, i) {
          return '<div class="kh-hist-line" style="padding:6px 0;' + (i ? 'border-top:1px solid var(--cream3);' : '') + 'font-size:11px;line-height:1.35;">' +
            '<span class="kh-hist-date">' + API.esc(h.date) + (h.by ? ' · ' + API.esc(h.by) : '') + '</span><br>' +
            'হুসনুল খুলুক ' + toBn(h.score) + (h.reason ? ' — ' + API.esc(h.reason) : '') +
            ' <button type="button" class="mini-edit-btn" onclick="editKhulukEntry(\'' + _jsQuote(h.id) + '\')">এডিট</button>' +
            '</div>';
        }).join('');
    } else {
      wrap.innerHTML = '<div class="log-panel-empty">এখনো কোনো পুরনো এন্ট্রি নেই।</div>';
    }
  }
  function openKhuluk(sid) {
    if (!sid || !API.Students.getById(sid)) { showToast('ছাত্র পাওয়া যায়নি'); return; }
    khulukTargetId = sid;
    khulukEditId = '';
    const stu = API.Students.getById(sid);
    document.getElementById('kh-std-name').textContent = stu && stu.name ? stu.name : '—';
    const kh = API.Khuluk.getLatest(sid);
    document.getElementById('kh-score').value = kh != null && kh.score != null ? kh.score : '';
    document.getElementById('kh-reason').value = '';
    fillKhulukHistory(sid);
    setKhulukModalTab('form');
    openModal('modal-khuluk');
  }
  function editKhulukEntry(id) {
    const entry = API.Khuluk.getByStudent(khulukTargetId).find(k => k.id === id);
    if (!entry) { showToast('এন্ট্রি পাওয়া যায়নি'); return; }
    khulukEditId = id;
    document.getElementById('kh-score').value = entry.score;
    document.getElementById('kh-reason').value = entry.reason || '';
    setKhulukModalTab('form');
    showToast('এন্ট্রি এডিট করুন, তারপর সংরক্ষণ চাপুন');
  }
  async function saveKhuluk() {
    const scoreN = parseInt(String(document.getElementById('kh-score').value).trim(), 10);
    const reason = document.getElementById('kh-reason').value.trim();
    if (Number.isNaN(scoreN) || scoreN < 0 || scoreN > 100) { showToast('হুসনুল খুলুক ০–১০০ এর মধ্যে পূর্ণসংখ্যা হিসেবে দিন'); return; }
    if (!reason) { showToast('কারণ / মন্তব্য লিখুন'); return; }
    if (!khulukTargetId) { showToast('ছাত্র নির্বাচিত নেই'); return; }
    if (khulukEditId) API.Khuluk.update(khulukEditId, { score: scoreN, reason, edited: true });
    else API.Khuluk.add(khulukTargetId, scoreN, reason, teacher.name);
    if (window.MMSharedAPI && UUID_RE.test(khulukTargetId)) {
      try {
        const actor = teacherActor();
        const res = khulukEditId && UUID_RE.test(khulukEditId)
          ? await MMSharedAPI.updateAkhlaq(actor.id, actor.pin, khulukEditId, scoreN, reason)
          : await MMSharedAPI.saveAkhlaq(actor.id, actor.pin, khulukTargetId, scoreN, reason);
        if (!res || !res.ok) throw new Error((res && res.error) || 'akhlaq_failed');
        await refreshTeacherData();
      } catch (e) {
        console.warn('Save akhlaq failed', e);
        showToast('লোকালি সংরক্ষিত, ডাটাবেজে হয়নি');
        await refreshTeacherData();
      }
    }
    const latest = API.Khuluk.getLatest(khulukTargetId);
    if (latest) document.getElementById('kh-score').value = latest.score;
    document.getElementById('kh-reason').value = '';
    khulukEditId = '';
    fillKhulukHistory(khulukTargetId);
    renderStudents();
    renderStats();
    showToast('হুসনুল খুলুক সংরক্ষিত');
  }

  /* ── KITAB ── */
  function renderKitab() {
    if (!classId) return;
    const books = API.KitabProgress.getByClass(classId);
    document.getElementById('kitab-list').innerHTML = books.length
      ? books.map(b => {
          const pct = b.total_pages ? Math.min(100, Math.round((b.pages_done / b.total_pages) * 100)) : 0;
          return `<div class="book-row">
            <div class="book-name">${API.esc(b.name)}</div>
            <div class="prog-wrap">
              <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
              <span class="prog-pct">${toBn(pct)}%</span>
            </div>
            <div class="prog-pages">${toBn(b.pages_done)} / ${b.total_pages ? toBn(b.total_pages) : '?'} পৃষ্ঠা${b.last_updated ? ' · ' + b.last_updated : ''}</div>
          </div>`;
        }).join('')
      : '<div style="text-align:center;padding:36px;color:var(--ink3);font-size:13px;">কোনো কিতাব নেই<br>সেটিংস থেকে কিতাব যোগ করুন</div>';
    /* populate book select */
    const sel = document.getElementById('bp-book');
    sel.innerHTML = books.map(b => `<option value="${b.id}">${API.esc(b.name)}</option>`).join('');
  }
  async function saveBookProg() {
    const book_id = document.getElementById('bp-book').value;
    const pages = parseInt(document.getElementById('bp-pages').value);
    const note = document.getElementById('bp-note').value.trim();
    if (!book_id) { showToast('কিতাব নির্বাচন করুন'); return; }
    if (isNaN(pages) || pages < 0) { showToast('সঠিক পৃষ্ঠা সংখ্যা দিন'); return; }
    API.KitabProgress.update(book_id, classId, pages, note);
    if (window.MMSharedAPI && UUID_RE.test(book_id)) {
      try {
        const actor = teacherActor();
        const res = await MMSharedAPI.saveBookProgress(actor.id, actor.pin, book_id, pages, note);
        if (!res || !res.ok) throw new Error((res && res.error) || 'book_progress_failed');
        await refreshTeacherData();
      } catch (e) {
        console.warn('Save book progress failed', e);
        showToast('লোকালি আপডেট হয়েছে, ডাটাবেজে হয়নি');
      }
    }
    closeModal('modal-book-prog'); renderKitab(); showToast('অগ্রগতি আপডেট হয়েছে');
  }

  /* ── LOG (বর্ষ + নির্দিষ্ট ছাত্র — API.Logs type class | student) ── */
  function populateLogStudentSelect() {
    const sel = document.getElementById('log-student');
    if (!sel || !classId) return;
    const students = API.Students.getByClass(classId);
    sel.innerHTML = '<option value="">সবাই — বর্ষের সাধারণ লগ</option>' +
      students.map(function (s) {
        return '<option value="' + _attrId(s.id) + '">' + API.esc(s.name) + (s.roll != null && String(s.roll) !== '' ? ' · রোল ' + API.esc(String(s.roll)) : '') + '</option>';
      }).join('');
  }
  let logEditId = '';
  function setLogModalTab(which) {
    const form = which !== 'history';
    document.getElementById('log-modal-panel-form').hidden = !form;
    document.getElementById('log-modal-panel-history').hidden = form;
    document.getElementById('log-modal-tab-form').classList.toggle('active', form);
    document.getElementById('log-modal-tab-history').classList.toggle('active', !form);
    document.getElementById('log-modal-tab-form').setAttribute('aria-selected', form ? 'true' : 'false');
    document.getElementById('log-modal-tab-history').setAttribute('aria-selected', form ? 'false' : 'true');
  }
  function renderModalLogHistory() {
    const wrap = document.getElementById('log-modal-history-wrap');
    const sel = document.getElementById('log-student');
    if (!wrap || !classId) return;
    const sid = sel && sel.value ? sel.value : '';
    const logs = sid ? API.Logs.getByStudent(sid) : API.Logs.getByClass(classId);
    const title = sid ? 'এই ছাত্রের পুরনো লগ' : 'এই বর্ষের সাধারণ লগ';
    wrap.innerHTML = logs.length
      ? '<div style="font-size:10px;font-weight:600;color:var(--ink3);margin-bottom:6px;">' + title + ' (' + toBn(logs.length) + ')</div>' +
        logs.slice(0, 60).map(function (l, i) {
          return '<div class="log-item" style="' + (i ? 'border-top:1px solid var(--cream3);padding-top:8px;' : '') + '">' +
            '<div class="log-date">' + API.esc(l.date) + ' · ' + API.esc(l.by || '') + ' <button type="button" class="mini-edit-btn" onclick="editLogEntry(\'' + _jsQuote(l.id) + '\')">এডিট</button></div>' +
            '<div class="log-text">' + API.esc(l.text || '') + '</div></div>';
        }).join('')
      : '<div class="log-panel-empty">' + title + ' নেই।</div>';
  }
  function openLogModal(prefStudentId) {
    if (!classId) { showToast('বর্ষ নেই'); return; }
    logEditId = '';
    populateLogStudentSelect();
    const sel = document.getElementById('log-student');
    if (sel) {
      sel.disabled = false;
      sel.value = prefStudentId && API.Students.getById(prefStudentId) ? prefStudentId : '';
      sel.onchange = renderModalLogHistory;
    }
    document.getElementById('log-text').value = '';
    renderModalLogHistory();
    setLogModalTab('form');
    openModal('modal-log');
  }
  function editLogEntry(id) {
    const log = API.Logs.getAll().find(l => l.id === id);
    if (!log) { showToast('লগ পাওয়া যায়নি'); return; }
    logEditId = id;
    populateLogStudentSelect();
    const sel = document.getElementById('log-student');
    if (sel) {
      sel.value = log.type === 'student' ? log.ref_id : '';
      sel.disabled = true;
    }
    document.getElementById('log-text').value = log.text || '';
    renderModalLogHistory();
    setLogModalTab('form');
    openModal('modal-log');
    showToast('লগ এডিট করুন, তারপর সংরক্ষণ চাপুন');
  }
  function renderLog() {
    if (!classId) return;
    const el = document.getElementById('log-list');
    if (!el) return;

    const classLogs = API.Logs.getByClass(classId);
    const students = API.Students.getByClass(classId);

    if (logSubTab === 'class') {
      el.innerHTML = classLogs.length
        ? classLogs.map(function (l) {
            return '<div class="log-item"><div class="log-date">' + l.date + ' · ' + API.esc(l.by || '') + ' <button type="button" class="mini-edit-btn" onclick="editLogEntry(\'' + _jsQuote(l.id) + '\')">এডিট</button></div><div class="log-text">' + API.esc(l.text) + '</div></div>';
          }).join('')
        : '<div class="log-panel-empty">কোনো <strong>শ্রেণী লগ</strong> নেই।<br><span style="font-size:12px;opacity:.95;">＋ বাটনে বর্ষের সাধারণ নোট যোগ করুন (কোনো ছাত্র বেছে না নিলেই হবে)।</span></div>';
      return;
    }

    /* ছাত্রলোগ: প্রতি ছাত্রের নামের আন্ডারে ঐ ছাত্রের সব এন্ট্রি (একাধিক হলে সব এখানে) */
    const groups = students.map(function (s) {
      return { student: s, logs: API.Logs.getByStudent(s.id) };
    }).filter(function (g) { return g.logs.length > 0; });
    groups.sort(function (a, b) { return b.logs[0].date.localeCompare(a.logs[0].date); });

    if (!groups.length) {
      el.innerHTML = '<div class="log-panel-empty">কোনো <strong>ছাত্র-নির্দিষ্ট লগ</strong> নেই।<br><span style="font-size:12px;opacity:.95;">নতুন লগে নির্দিষ্ট ছাত্র বেছে কিংবা হোম থেকে ছাত্রের সারিতে <strong>লগ</strong> চেপে এন্ট্রি করুন।</span></div>';
      return;
    }

    el.innerHTML = groups.map(function (g) {
      const s = g.student;
      const rollPart = s.roll != null && String(s.roll) !== '' ? ' · রোল ' + toBn(String(s.roll)) : '';
      const n = toBn(String(g.logs.length));
      const head =
        '<div class="log-student-hd">' +
        '<div class="log-student-hd-text">' +
        '<button type="button" class="s-name-btn" onclick="event.stopPropagation();MMStudentModal.open(\'' + _jsQuote(s.id) + '\')">' + API.esc(s.name) + '</button>' +
        rollPart + '<span class="log-cnt">লগ ' + n + ' টি</span></div>' +
        '<button type="button" class="log-student-expand" aria-expanded="false" aria-label="লগ তালিকা প্রসারিত বা সংকুচিত" onclick="toggleStdLogGroup(this)">' +
        '<svg class="log-chevron" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg></button></div>';
      const body = '<div class="log-student-body" hidden>' + g.logs.map(function (l) {
        return '<div class="log-item log-item--student"><div class="log-date">' + l.date + ' · ' + API.esc(l.by || '') + ' <button type="button" class="mini-edit-btn" onclick="editLogEntry(\'' + _jsQuote(l.id) + '\')">এডিট</button></div><div class="log-text">' + API.esc(l.text) + '</div></div>';
      }).join('') + '</div>';
      return '<div class="log-student-block">' + head + body + '</div>';
    }).join('');
  }
  async function saveLog() {
    const text = document.getElementById('log-text').value.trim();
    if (!text) { showToast('লগ লিখুন'); return; }
    const sel = document.getElementById('log-student');
    const sid = sel && sel.value ? sel.value : '';
    if (logEditId) {
      API.Logs.update(logEditId, { text, edited: true });
      if (window.MMSharedAPI && UUID_RE.test(logEditId)) {
        try {
          const actor = teacherActor();
          const res = await MMSharedAPI.updateTeacherLog(actor.id, actor.pin, logEditId, text);
          if (!res || !res.ok) throw new Error((res && res.error) || 'log_update_failed');
          await refreshTeacherData();
        } catch (e) {
          console.warn('Update teacher log failed', e);
          showToast('লোকালি সংশোধিত, ডাটাবেজে হয়নি');
          await refreshTeacherData();
        }
      }
      logEditId = '';
      if (sel) sel.disabled = false;
      document.getElementById('log-text').value = '';
      closeModal('modal-log'); renderLog(); showToast('লগ সংশোধন হয়েছে');
      return;
    }
    let logType = 'class';
    if (sid) {
      if (!API.Students.getById(sid)) { showToast('অকার্যকর ছাত্র'); return; }
      API.Logs.add('student', sid, text, teacher.name);
      logType = 'student';
    } else {
      API.Logs.add('class', classId, text, teacher.name);
    }
    if (window.MMSharedAPI && (logType === 'class' || UUID_RE.test(sid))) {
      try {
        const actor = teacherActor();
        const res = await MMSharedAPI.saveTeacherLog(actor.id, actor.pin, logType, logType === 'student' ? sid : null, text);
        if (!res || !res.ok) throw new Error((res && res.error) || 'log_failed');
        await refreshTeacherData();
      } catch (e) {
        console.warn('Save teacher log failed', e);
        showToast('লোকালি সংরক্ষিত, ডাটাবেজে হয়নি');
      }
    }
    document.getElementById('log-text').value = '';
    if (sel) sel.disabled = false;
    closeModal('modal-log'); renderLog(); showToast('লগ যোগ হয়েছে');
  }

  async function initClassPage() {
    await refreshTeacherData();
    renderStats();
    renderStudents();
    initTabFromUrl();
  }

  function initTabFromUrl() {
    const q = new URLSearchParams(window.location.search).get('tab');
    if (q === 'kitab') switchTab('kitab');
    else if (q === 'log') switchTab('log');
  }

  initClassPage();
</script>
</body>
</html>
