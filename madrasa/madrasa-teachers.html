<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>শ্রেণি শিক্ষক — মাদ্রাসা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .mmt-page { max-width: 520px; margin: 0 auto; padding: 12px 16px calc(24px + env(safe-area-inset-bottom)); }
  .mmt-head { font-family: 'Tiro Bangla', serif; font-size: 18px; font-weight: 700; color: var(--ink2); margin-bottom: 4px; }
  .mmt-sub { font-size: 12px; color: var(--ink3); margin-bottom: 14px; line-height: 1.45; }
  .mmt-row {
    background: #fff;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(26, 18, 8, 0.06);
    cursor: pointer;
    transition: background 0.12s;
  }
  .mmt-row:active { background: rgba(0,0,0,0.04); }
  .mmt-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .mmt-meta { font-size: 11px; color: var(--ink3); margin-top: 4px; }
  .mmt-empty { text-align: center; color: var(--ink3); padding: 36px 12px; font-size: 14px; line-height: 1.6; }
  @media (min-width: 900px) {
    .mmt-page {
      max-width: 760px;
      padding-left: 20px;
      padding-right: 20px;
    }
    #mmt-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }
    .mmt-row { margin-bottom: 0; }
  }
  @media (min-width: 1100px) {
    .mmt-page {
      max-width: 1000px;
      padding-left: 28px;
      padding-right: 28px;
    }
    #mmt-list {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">মাদ্রাসা</div>
    <div class="topbar-name" id="mmt-top-name">শ্রেণি শিক্ষক</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" onclick="location.href='../main-admin-madrasa.html'">← এডমিন</button>
  </div>
</div>

<div class="mmt-page">
  <div class="mmt-head" id="mmt-title">শ্রেণি শিক্ষক</div>
  <p class="mmt-sub" id="mmt-sub">—</p>
  <div id="mmt-list"></div>
</div>

<script src="../js/mm-sample-data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mm-session.js"></script>
<script>
  if (!MMSession.requireAdminPerm('teachers', '../main-admin-madrasa.html')) { throw new Error('admin permission denied'); }

  const params = new URLSearchParams(location.search);
  let dept = params.get('dept') === 'maktab' ? 'maktab' : 'kitab';
  if (!MMSession.canUseMadrasaDept(dept)) dept = MMSession.getAllowedMadrasaDepts()[0] || 'kitab';
  const deptLabel = dept === 'maktab' ? 'মক্তব বিভাগ' : 'কিতাব বিভাগ';

  document.getElementById('mmt-sub').textContent = deptLabel + ' · শ্রেণি শিক্ষকের নামে ট্যাপ করলে বিস্তারিত দেখুন';

  function render() {
    const list = API.Teachers.getByDept(dept);
    const el = document.getElementById('mmt-list');
    if (!list.length) {
      el.innerHTML = '<div class="mmt-empty">এই বিভাগে কোনো শ্রেণি শিক্ষক নিবন্ধিত নেই।</div>';
      return;
    }
    el.innerHTML = list.map((t) => {
      const cls = t.class_id ? API.Classes.getById(t.class_id) : null;
      const meta = cls ? API.esc(cls.name) : '—';
      return `<div class="mmt-row" role="button" tabindex="0" data-id="${API.esc(t.id)}">
        <div class="mmt-name">${API.esc(t.name)}</div>
        <div class="mmt-meta">${meta}</div>
      </div>`;
    }).join('');

    el.querySelectorAll('.mmt-row').forEach((row) => {
      const go = () => {
        location.href = 'madrasa-teacher-detail.html?id=' + encodeURIComponent(row.dataset.id) + '&dept=' + encodeURIComponent(dept);
      };
      row.addEventListener('click', go);
      row.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    });
  }
  render();
</script>
</body>
</html>
