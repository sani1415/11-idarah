<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>হিফজ বিভাগ — মাদরাসাতুল মদীনা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .group-card { background:#fff; border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:10px; }
  .group-name { font-family:'Tiro Bangla',serif; font-size:16px; font-weight:700; color:var(--ink2); }
  .group-meta { font-size:11px; color:var(--ink3); margin-top:3px; }
  .para-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin:10px 0; }
  .para-cell { aspect-ratio:1; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; border:1.5px solid var(--cream3); background:#fff; color:var(--ink3); }
  .para-cell.done { background:var(--green); border-color:var(--green); color:#fff; }
  .para-cell.current { background:var(--gold2); border-color:var(--gold); color:var(--ink); }
  .member-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--cream2); gap:8px; }
  .member-row:last-child { border-bottom:none; }
  .member-class { font-size:11px; color:var(--ink3); }
  .legend { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--ink3); }
  .legend-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .card-actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:10px; }
  .card-actions .add-btn { margin:0; font-size:12px; padding:9px 4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">হিফজ বিভাগ</div>
    <div class="topbar-name" id="top-name">দায়িত্বশীল</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" id="topbar-hub" style="display:none" onclick="location.href='../main-admin-madrasa.html'">এডমিন</button>
    <button type="button" class="topbar-btn topbar-btn--icon" onclick="openPinChangeModal()" title="PIN পরিবর্তন" aria-label="PIN পরিবর্তন"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    <button type="button" class="topbar-btn topbar-btn--icon" id="topbar-lockout" onclick="MMSession.logoutToIndex('../index.html')" title="লগআউট" aria-label="লগআউট"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<div class="content">
  <div class="panel active" id="panel-home">
    <div style="background:linear-gradient(135deg,#1a6b3c,#27ae60);border-radius:var(--radius);padding:16px;color:#fff;margin:8px 0 14px;">
      <div style="font-size:13px;opacity:.6;margin-bottom:10px;">হিফজ বিভাগ · সামগ্রিক</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="total-hifz">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">হাফেজ ছাত্র</div></div>
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="total-groups">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">সক্রিয় ফরিক</div></div>
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="avg-para">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">গড় পারা</div></div>
      </div>
    </div>
    <button class="add-btn" style="background:var(--green);" onclick="openModal('add-group')">＋ নতুন ফরিক তৈরি করুন</button>
    <div class="sec-header"><span class="sec-title">সক্রিয় ফরিকসমূহ</span></div>
    <div id="group-list"></div>
    <div class="pb-safe"></div>
  </div>
  <div class="panel" id="panel-log" style="display:none;">
    <div class="sec-header"><span class="sec-title">সব লগ</span></div>
    <div id="log-list"></div>
    <div class="pb-safe"></div>
  </div>
</div>

<nav class="bottom-nav" aria-label="নিচের নেভিগেশন">
  <div class="nav-item active" id="nav-home" onclick="switchPanel('home')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nav-label">হোম</span>
  </div>
  <div class="nav-item" id="nav-log" onclick="switchPanel('log')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nav-label">লগ</span>
  </div>
  <div class="nav-item" onclick="location.href='../chat.html'">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nav-label">বার্তা</span>
  </div>
</nav>

<!-- MODALS -->
<div class="modal-bg" id="modal-add-group">
  <div class="modal">
    <div class="modal-title">নতুন ফরিক <button class="modal-close" onclick="closeModal('add-group')">✕</button></div>
    <div class="form-group"><label class="form-label">ফরিকের নাম</label><input class="form-input" id="grp-name" placeholder="যেমন: ফরিক আলিফ"></div>
    <div class="form-group"><label class="form-label">দায়িত্বশীল</label><input class="form-input" id="grp-teacher" placeholder="দায়িত্বশীলের নাম"></div>
    <div class="form-group"><label class="form-label">শুরুর তারিখ</label><input class="form-input" id="grp-start" type="date"></div>
    <div class="form-group"><label class="form-label">মন্তব্য</label><input class="form-input" id="grp-note" placeholder="যেকোনো তথ্য"></div>
    <button class="submit-btn" style="background:var(--green);" onclick="addGroup()">ফরিক তৈরি করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-update-progress">
  <div class="modal">
    <div class="modal-title">অগ্রগতি আপডেট <button class="modal-close" onclick="closeModal('update-progress')">✕</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">সম্পন্ন পারা</label><input class="form-input" id="upd-para" type="number" min="0" max="30" placeholder="০–৩০"></div>
      <div class="form-group"><label class="form-label">চলমান পারা নম্বর</label><input class="form-input" id="upd-current" type="number" min="1" max="30" placeholder="১–৩০"></div>
    </div>
    <div class="form-group"><label class="form-label">আজকের পর্যবেক্ষণ</label><textarea class="form-input form-textarea" id="upd-note" placeholder="আজ কী পড়ানো হলো, কার অবস্থা কেমন..."></textarea></div>
    <button class="submit-btn" style="background:var(--green);" onclick="saveProgress()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-add-member">
  <div class="modal">
    <div class="modal-title">সদস্য যোগ করুন <button class="modal-close" onclick="closeModal('add-member')">✕</button></div>
    <div class="form-group">
      <label class="form-label">ছাত্র খুঁজুন</label>
      <input class="form-input" id="member-search" placeholder="নাম, রোল বা দাখেলা..." oninput="filterMemberSearch()" autocomplete="off">
      <div id="member-search-list" style="max-height:180px;overflow-y:auto;border:1px solid var(--cream3);border-radius:var(--radius-sm);margin-top:4px;"></div>
      <input type="hidden" id="member-student-id">
      <div id="member-selected" style="font-size:12px;color:var(--green);margin-top:4px;min-height:16px;"></div>
    </div>
    <div class="form-group"><label class="form-label">যোগদানের তারিখ</label><input class="form-input" id="member-date" type="date"></div>
    <button class="submit-btn" style="background:var(--green);" onclick="addMember()">যোগ করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-add-activity">
  <div class="modal">
    <div class="modal-title">কার্যক্রম লগ <button class="modal-close" onclick="closeModal('add-activity')">✕</button></div>
    <div class="form-group"><label class="form-label">কার্যক্রমের ধরন</label>
      <select class="form-input form-select" id="act-type">
        <option value="পাঠ">নিয়মিত পাঠ</option>
        <option value="মুরাজাআ">মুরাজাআ সেশন</option>
        <option value="পরীক্ষা">হিফজ পরীক্ষা</option>
        <option value="বিশেষ">বিশেষ কার্যক্রম</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">বিবরণ</label><textarea class="form-input form-textarea" id="act-text" placeholder="আজকের কার্যক্রম, অগ্রগতি..."></textarea></div>
    <button class="submit-btn" style="background:var(--green);" onclick="saveActivity()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-member-leave">
  <div class="modal">
    <div class="modal-title">বিভাগ ত্যাগ <button class="modal-close" onclick="closeModal('member-leave')">✕</button></div>
    <div style="font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:14px;" id="leave-member-name"></div>
    <div class="form-group"><label class="form-label">কারণ</label>
      <select class="form-input form-select" id="leave-reason">
        <option value="হিফজ সম্পন্ন">হিফজ সম্পন্ন</option>
        <option value="অন্য প্রতিষ্ঠানে">অন্য প্রতিষ্ঠানে স্থানান্তর</option>
        <option value="বাদ">বাদ দেওয়া হয়েছে</option>
        <option value="অন্যান্য">অন্যান্য</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">তারিখ</label><input class="form-input" id="leave-date" type="date"></div>
    <div class="form-group"><label class="form-label">মন্তব্য (ঐচ্ছিক)</label><input class="form-input" id="leave-note" placeholder="বিবরণ"></div>
    <button class="submit-btn" style="background:var(--red);" onclick="saveMemberLeave()">বিভাগ ত্যাগ নিশ্চিত করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-edit-group">
  <div class="modal">
    <div class="modal-title">ফরিক সম্পাদনা <button class="modal-close" onclick="document.getElementById('modal-edit-group').classList.remove('open')">✕</button></div>
    <div class="form-group"><label class="form-label">ফরিকের নাম</label><input class="form-input" id="egrp-name" placeholder="ফরিকের নাম"></div>
    <div class="form-group"><label class="form-label">দায়িত্বশীল</label><input class="form-input" id="egrp-teacher" placeholder="দায়িত্বশীলের নাম"></div>
    <div class="form-group"><label class="form-label">শুরুর তারিখ</label><input class="form-input" id="egrp-start" type="date"></div>
    <div class="form-group"><label class="form-label">মন্তব্য</label><input class="form-input" id="egrp-note" placeholder="যেকোনো তথ্য"></div>
    <button class="submit-btn" style="background:var(--green);" onclick="saveGroupEdit()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../api-shared.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/mm-student-modal.js"></script>
<script src="../js/monitor-mode.js"></script>
<script src="../js/mm-hijri.js"></script>
<script>
  if (!MMSession.requireStaffRoleOrAdminPerm('hifz','hifz','../main-admin-madrasa.html')) { throw new Error('hifz permission denied'); }
  document.getElementById('top-name').textContent = MMSession.getName() || 'দায়িত্বশীল';
  mmInsertMonitorBanner();
  MMSession.configureTopbarHubAndLockout();

  function toBn(n) { return String(n).replace(/[0-9]/g,d=>'০১২৩৪৫৬৭৮৯'[d]); }
  function fmtDate(iso) {
    if (!iso) return '—';
    if (window.MMHijri && MMHijri.hijriOrFallback) { const h=MMHijri.hijriOrFallback(String(iso)); if (h) return h; }
    const p=String(iso).split('-'); if (p.length<3) return String(iso);
    return toBn(parseInt(p[2],10))+'/'+toBn(parseInt(p[1],10))+'/'+toBn(p[0]);
  }

  let hifzData = {groups:[],members:[],progress:[],activity:[]};
  let currentGroupId=null, leavingMemberId=null, editingGroupId=null;
  let expandedGroups=new Set(), _availableStudents=[];

  async function loadHifzData() {
    try {
      const res = await MMSharedAPI.hifzBootstrap(MMSession.getId(), MMSession.getPin());
      if (res && res.ok) hifzData = {groups:res.groups||[],members:res.members||[],progress:res.progress||[],activity:res.activity||[]};
    } catch(e) { console.warn('hifz load failed', e); }
  }

  function renderHome() {
    const groups=hifzData.groups.filter(g=>g.active), members=hifzData.members, prog=hifzData.progress;
    const activeAll=members.filter(m=>!m.status||m.status==='active');
    document.getElementById('total-hifz').textContent=toBn(new Set(activeAll.map(m=>m.student_id)).size);
    document.getElementById('total-groups').textContent=toBn(groups.length);
    const paras=groups.map(g=>{const p=prog.filter(p=>p.group_id===g.id).sort((a,b)=>b.date.localeCompare(a.date))[0];return p?p.para_done:0;});
    document.getElementById('avg-para').textContent=toBn(paras.length?Math.round(paras.reduce((a,b)=>a+b,0)/paras.length):0);
    document.getElementById('group-list').innerHTML=groups.map(g=>{
      const latest=prog.filter(p=>p.group_id===g.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
      const gMems=members.filter(m=>m.group_id===g.id&&(!m.status||m.status==='active'));
      const paraDone=latest?latest.para_done:0, curPara=latest?latest.current_para:1;
      const pct=Math.round(paraDone/30*100), isOpen=expandedGroups.has(g.id);
      const paraGrid=Array.from({length:30},(_,i)=>{const n=i+1,cls=n<=paraDone&&n!==curPara?'done':n===curPara?'current':'';return '<div class="para-cell '+cls+'">'+toBn(n)+'</div>';}).join('');
      const memberRows=gMems.map(m=>'<div class="member-row"><div class="list-avatar">📿</div><div style="flex:1;"><div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">'+(m.student_roll?'<span style="font-size:11px;color:var(--ink3);font-weight:700;">'+toBn(m.student_roll)+'</span>':'')+'<span style="font-size:13px;font-weight:600;color:var(--ink);">'+API.esc(m.student_name||'')+'</span>'+(m.student_permanent_id?'<span class="list-badge badge-ink" style="font-size:10px;">'+toBn(m.student_permanent_id)+'</span>':'')+'</div>'+(m.class_name?'<div class="member-class">'+API.esc(m.class_name)+'</div>':'')+'</div><button type="button" class="topbar-btn" style="font-size:11px;padding:3px 7px;color:var(--red);" onclick="event.stopPropagation();openLeaveModal(\''+m.id+'\')">ত্যাগ</button></div>').join('')||'<div style="padding:10px;text-align:center;color:var(--ink3);font-size:12px;">কোনো সদস্য নেই</div>';
      return '<div class="group-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;" onclick="toggleGroup(\''+g.id+'\')">'
        +'<div><div style="display:flex;align-items:center;gap:6px;"><div class="group-name">'+API.esc(g.name)+'</div><button type="button" onclick="event.stopPropagation();openEditGroupModal(\''+g.id+'\')" style="font-size:10px;color:var(--ink3);padding:2px 5px;border:1px solid var(--cream3);border-radius:3px;background:#fff;cursor:pointer;flex-shrink:0;">✎</button></div>'
        +'<div class="group-meta">'+toBn(gMems.length)+' সদস্য · শুরু '+fmtDate(g.start)+'</div>'+(g.teacher?'<div class="group-meta" style="color:var(--ink2);font-weight:600;margin-top:2px;">দায়িত্বশীল: '+API.esc(g.teacher)+'</div>':'')+'</div>'
        +'<div style="display:flex;align-items:center;gap:8px;"><div style="text-align:right;"><div style="font-family:\'Tiro Bangla\',serif;font-size:20px;font-weight:700;color:var(--green);">'+toBn(paraDone)+'/৩০</div><div style="font-size:10px;color:var(--ink3);">পারা সম্পন্ন</div></div><span style="font-size:16px;color:var(--ink3);">'+(isOpen?'▼':'▶')+'</span></div></div>'
        +'<div style="height:6px;background:var(--cream3);border-radius:3px;overflow:hidden;margin-top:8px;"><div style="height:100%;width:'+pct+'%;background:var(--green);border-radius:3px;"></div></div>'
        +(latest?'<div style="font-size:12px;color:var(--gold);margin-top:6px;">'+toBn(curPara)+' নং পারা চলছে</div>':'')
        +(isOpen?'<div style="margin-top:12px;"><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>সম্পন্ন</div><div class="legend-item"><div class="legend-dot" style="background:var(--gold2)"></div>চলছে</div></div><div class="para-grid">'+paraGrid+'</div><div style="font-size:12px;color:var(--ink2);font-weight:600;margin:10px 0 4px;">সদস্য</div><div class="card-static">'+memberRows+'</div><div class="card-actions"><button class="add-btn" style="background:var(--green);" onclick="event.stopPropagation();openProgressModal(\''+g.id+'\')">অগ্রগতি</button><button class="add-btn" style="background:var(--green);" onclick="event.stopPropagation();openAddMemberModal(\''+g.id+'\')">＋ সদস্য</button><button class="add-btn" style="background:var(--ink3);" onclick="event.stopPropagation();openActivityModal(\''+g.id+'\')">লগ যোগ</button></div></div>':'')
        +'</div>';
    }).join('')||'<div class="empty-state"><span class="empty-icon">📿</span><div class="empty-text">কোনো ফরিক নেই</div></div>';
  }

  function switchPanel(name) {
    document.getElementById('panel-home').style.display=name==='home'?'':'none';
    document.getElementById('panel-log').style.display=name==='log'?'':'none';
    document.getElementById('nav-home').classList.toggle('active',name==='home');
    document.getElementById('nav-log').classList.toggle('active',name==='log');
    if (name==='log') renderLog();
  }
  function renderLog() {
    const gMap={}; hifzData.groups.forEach(g=>gMap[g.id]=g);
    const logs=[...hifzData.activity].sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById('log-list').innerHTML=logs.length?logs.map(l=>{const g=gMap[l.group_id];return '<div style="padding:10px 0;border-bottom:1px solid var(--cream2);"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;"><span style="font-size:11px;color:var(--ink3);">'+fmtDate(l.date)+'</span>'+(g?'<span class="list-badge badge-ink" style="font-size:10px;">'+API.esc(g.name)+'</span>':'')+'<span style="font-size:10px;background:var(--cream2);border-radius:3px;padding:1px 5px;">'+API.esc(l.type||'')+'</span></div><div style="font-size:13px;color:var(--ink2);">'+API.esc(l.text||'')+'</div>'+(l.by?'<div style="font-size:11px;color:var(--ink3);margin-top:3px;">— '+API.esc(l.by)+'</div>':'')+'</div>';}).join(''):'<div style="text-align:center;color:var(--ink3);padding:40px 0;font-size:13px;">কোনো লগ নেই</div>';
  }
  function toggleGroup(gid) { if(expandedGroups.has(gid))expandedGroups.delete(gid);else expandedGroups.add(gid); renderHome(); }
  function openProgressModal(gid) {
    currentGroupId=gid;
    const latest=hifzData.progress.filter(p=>p.group_id===gid).sort((a,b)=>b.date.localeCompare(a.date))[0];
    document.getElementById('upd-para').value=latest?latest.para_done:'';
    document.getElementById('upd-current').value=latest?latest.current_para:'';
    document.getElementById('upd-note').value=latest?latest.note||'':'';
    openModal('update-progress');
  }
  function openAddMemberModal(gid) {
    currentGroupId=gid;
    const existing=new Set(hifzData.members.filter(m=>m.group_id===gid&&(!m.status||m.status==='active')).map(m=>String(m.student_id)));
    _availableStudents=API.Students.getAll().filter(s=>s.active!==false&&!existing.has(String(s.id)));
    document.getElementById('member-search').value=''; document.getElementById('member-student-id').value='';
    document.getElementById('member-selected').textContent=''; document.getElementById('member-date').value='';
    filterMemberSearch(); openModal('add-member');
  }
  function openActivityModal(gid) { currentGroupId=gid; document.getElementById('act-text').value=''; openModal('add-activity'); }

  async function saveProgress() {
    if (mmMutationBlocked(showToast)) return;
    const para=parseInt(document.getElementById('upd-para').value)||0, cur=parseInt(document.getElementById('upd-current').value)||1, note=document.getElementById('upd-note').value;
    try {
      const res=await MMSharedAPI.hifzSaveProgress(MMSession.getId(),MMSession.getPin(),currentGroupId,para,cur,note);
      if (!res||!res.ok) { showToast('সংরক্ষণ ব্যর্থ'); return; }
      await loadHifzData(); closeModal('update-progress'); showToast('অগ্রগতি সংরক্ষিত ✓'); renderHome();
    } catch(e) { showToast('ত্রুটি হয়েছে'); }
  }
  async function addMember() {
    if (mmMutationBlocked(showToast)) return;
    const sid=document.getElementById('member-student-id').value, date=document.getElementById('member-date').value||null;
    if (!sid) { showToast('ছাত্র নির্বাচন করুন'); return; }
    try {
      const res=await MMSharedAPI.hifzAddMember(MMSession.getId(),MMSession.getPin(),currentGroupId,sid,date);
      if (!res||!res.ok) { showToast('সংরক্ষণ ব্যর্থ'); return; }
      await loadHifzData(); closeModal('add-member'); showToast('সদস্য যোগ করা হয়েছে ✓'); renderHome();
    } catch(e) { showToast('ত্রুটি হয়েছে'); }
  }
  function filterMemberSearch() {
    document.getElementById('member-student-id').value=''; document.getElementById('member-selected').textContent='';
    const q=document.getElementById('member-search').value.toLowerCase();
    const items=_availableStudents.filter(s=>!q||s.name.toLowerCase().includes(q)||(s.roll||'').toLowerCase().includes(q)||(s.permanent_id||'').toLowerCase().includes(q));
    document.getElementById('member-search-list').innerHTML=items.map(s=>'<div onclick="selectMember(\''+s.id+'\',\''+API.esc(s.name)+'\')" style="padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--cream2);font-size:13px;">'+(s.roll?'<small style="color:var(--ink3);">'+API.toBn(s.roll)+' · </small>':'')+API.esc(s.name)+(s.permanent_id?'<small style="color:var(--ink3);"> ('+API.toBn(s.permanent_id)+')</small>':'')+' </div>').join('')||'<div style="padding:10px;color:var(--ink3);font-size:12px;">কেউ পাওয়া যায়নি</div>';
  }
  function selectMember(id,name) {
    document.getElementById('member-student-id').value=id; document.getElementById('member-selected').textContent='✓ '+name;
    document.getElementById('member-search').value=''; document.getElementById('member-search-list').innerHTML='';
  }
  function openLeaveModal(memberId) {
    leavingMemberId=memberId;
    const m=hifzData.members.find(x=>x.id===memberId);
    document.getElementById('leave-member-name').textContent=m?m.student_name||'':'';
    document.getElementById('leave-reason').value='হিফজ সম্পন্ন'; document.getElementById('leave-date').value='';
    document.getElementById('leave-note').value=''; document.getElementById('modal-member-leave').classList.add('open');
  }
  async function saveMemberLeave() {
    if (mmMutationBlocked(showToast)||!leavingMemberId) return;
    const reason=document.getElementById('leave-reason').value, date=document.getElementById('leave-date').value||null, note=document.getElementById('leave-note').value;
    const statusMap={'হিফজ সম্পন্ন':'completed','অন্য প্রতিষ্ঠানে':'transferred'};
    try {
      const res=await MMSharedAPI.hifzMemberLeave(MMSession.getId(),MMSession.getPin(),leavingMemberId,statusMap[reason]||'dropped',reason,date,note);
      if (!res||!res.ok) { showToast('সংরক্ষণ ব্যর্থ'); return; }
      await loadHifzData(); closeModal('member-leave'); leavingMemberId=null; showToast('বিভাগ ত্যাগের তথ্য সংরক্ষিত ✓'); renderHome();
    } catch(e) { showToast('ত্রুটি হয়েছে'); }
  }
  async function saveActivity() {
    if (mmMutationBlocked(showToast)) return;
    const type=document.getElementById('act-type').value, text=document.getElementById('act-text').value.trim();
    if (!text) { showToast('বিবরণ দিন'); return; }
    try {
      const res=await MMSharedAPI.hifzSaveActivity(MMSession.getId(),MMSession.getPin(),currentGroupId,type,text,MMSession.getName()||'দায়িত্বশীল');
      if (!res||!res.ok) { showToast('সংরক্ষণ ব্যর্থ'); return; }
      await loadHifzData(); closeModal('add-activity'); showToast('লগ সংরক্ষিত ✓'); renderHome();
    } catch(e) { showToast('ত্রুটি হয়েছে'); }
  }
  async function addGroup() {
    if (mmMutationBlocked(showToast)) return;
    const name=document.getElementById('grp-name').value.trim(); if (!name) { showToast('ফরিকের নাম দিন'); return; }
    const start=document.getElementById('grp-start').value||null, note=document.getElementById('grp-note').value, teacher=document.getElementById('grp-teacher').value.trim();
    try {
      const res=await MMSharedAPI.hifzSaveGroup(MMSession.getId(),MMSession.getPin(),{name,teacher,start,note});
      if (!res||!res.ok) { showToast('সংরক্ষণ ব্যর্থ'); return; }
      const newId=res.id;
      await loadHifzData(); closeModal('add-group'); showToast('ফরিক তৈরি হয়েছে ✓');
      if (newId) expandedGroups.add(newId); renderHome();
    } catch(e) { showToast('ত্রুটি হয়েছে'); }
  }
  function openEditGroupModal(gid) {
    editingGroupId=gid;
    const g=hifzData.groups.find(x=>x.id===gid); if (!g) return;
    document.getElementById('egrp-name').value=g.name||''; document.getElementById('egrp-teacher').value=g.teacher||'';
    document.getElementById('egrp-start').value=g.start||''; document.getElementById('egrp-note').value=g.note||'';
    document.getElementById('modal-edit-group').classList.add('open');
  }
  async function saveGroupEdit() {
    if (mmMutationBlocked(showToast)||!editingGroupId) return;
    const name=document.getElementById('egrp-name').value.trim(); if (!name) { showToast('ফরিকের নাম দিন'); return; }
    const teacher=document.getElementById('egrp-teacher').value.trim(), start=document.getElementById('egrp-start').value||null, note=document.getElementById('egrp-note').value;
    try {
      const res=await MMSharedAPI.hifzSaveGroup(MMSession.getId(),MMSession.getPin(),{id:editingGroupId,name,teacher,start,note});
      if (!res||!res.ok) { showToast('সংরক্ষণ ব্যর্থ'); return; }
      await loadHifzData(); document.getElementById('modal-edit-group').classList.remove('open');
      editingGroupId=null; showToast('ফরিক আপডেট হয়েছে ✓'); renderHome();
    } catch(e) { showToast('ত্রুটি হয়েছে'); }
  }
  function openPinChangeModal() {
    ['pc-cur','pc-new','pc-conf'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('pc-err').textContent=''; document.getElementById('modal-pin-change').classList.add('open');
  }
  function closePinChangeModal() { document.getElementById('modal-pin-change').classList.remove('open'); }
  async function saveOwnPin() {
    var c=document.getElementById('pc-cur').value,n=document.getElementById('pc-new').value,f=document.getElementById('pc-conf').value,e=document.getElementById('pc-err');
    if (!c||!n||!f){e.textContent='সব ঘর পূরণ করুন';return;} if(n!==f){e.textContent='PIN মিলছে না';return;}
    if(n.length!==4||!/^\d+$/.test(n)){e.textContent='PIN ৪ সংখ্যার হতে হবে';return;} e.textContent='Saving...';
    var result=await MMSession.changeStaffPin(c,n,function(uid,cur,next){return API.Teachers.changeOwnPin(uid,cur,next);});
    if(!result.ok){e.textContent=(MMSession.pinChangeErrorMessage&&MMSession.pinChangeErrorMessage(result.error))||'PIN change failed';return;}
    closePinChangeModal(); showToast('PIN সফলভাবে পরিবর্তন হয়েছে');
  }
  function openModal(id) { if (mmMutationBlocked(showToast)) return; document.getElementById('modal-'+id).classList.add('open'); }
  function closeModal(id) { document.getElementById('modal-'+id).classList.remove('open'); }
  function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

  async function initHifzPage() {
    await loadHifzData();
    renderHome();
  }
  MMLoading.run(initHifzPage);
</script>

<div class="modal-bg" id="modal-pin-change" onclick="if(event.target===this)closePinChangeModal()">
  <div class="modal" style="max-width:380px">
    <div class="modal-title"><span>PIN পরিবর্তন</span><button type="button" class="modal-close" onclick="closePinChangeModal()">✕</button></div>
    <form onsubmit="event.preventDefault();saveOwnPin()">
      <div class="form-group"><label class="form-label">বর্তমান PIN</label><input class="form-input" type="password" id="pc-cur" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password" placeholder="বর্তমান PIN"></div>
      <div class="form-group"><label class="form-label">নতুন PIN</label><input class="form-input" type="password" id="pc-new" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password" placeholder="নতুন ৪-সংখ্যার PIN"></div>
      <div class="form-group"><label class="form-label">নতুন PIN নিশ্চিত করুন</label><input class="form-input" type="password" id="pc-conf" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password" placeholder="পুনরায় PIN লিখুন"></div>
      <button type="submit" class="submit-btn">PIN সংরক্ষণ করুন</button>
      <div style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px" id="pc-err"></div>
    </form>
  </div>
</div>
</body>
</html>
