<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>হিফজ বিভাগ — মাদরাসাতুল মদীনা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .group-card { background:#fff; border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:10px; }
  .group-name { font-family:'Tiro Bangla',serif; font-size:16px; font-weight:700; color:var(--ink2); }
  .group-meta { font-size:11px; color:var(--ink3); margin-top:3px; }
  .para-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin:10px 0; }
  .para-cell { aspect-ratio:1; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; border:1.5px solid var(--cream3); background:#fff; color:var(--ink3); }
  .para-cell.done { background:var(--green); border-color:var(--green); color:#fff; }
  .para-cell.current { background:var(--gold2); border-color:var(--gold); color:var(--ink); }
  .para-cell.revision { background:var(--blue-light); border-color:var(--blue); color:var(--blue); }
  .member-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--cream2); gap:8px; }
  .member-row:last-child { border-bottom:none; }
  .member-class { font-size:11px; color:var(--ink3); }
  .legend { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--ink3); }
  .legend-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .card-actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:10px; }
  .card-actions .add-btn { margin:0; font-size:12px; padding:9px 4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">হিফজ বিভাগ</div>
    <div class="topbar-name" id="top-name">দায়িত্বশীল</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" id="topbar-hub" style="display:none" onclick="location.href='../main-admin-madrasa.html'">এডমিন</button>
    <button type="button" class="topbar-btn topbar-btn--icon" onclick="openPinChangeModal()" title="PIN পরিবর্তন" aria-label="PIN পরিবর্তন"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    <button type="button" class="topbar-btn topbar-btn--icon" id="topbar-lockout" onclick="MMSession.logoutToIndex('../index.html')" title="লগআউট" aria-label="লগআউট"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<div class="content">
  <div class="panel active">

    <div style="background:linear-gradient(135deg,#6c3483,#8e44ad);border-radius:var(--radius);padding:16px;color:#fff;margin:8px 0 14px;">
      <div style="font-size:13px;opacity:.6;margin-bottom:10px;">হিফজ বিভাগ · সামগ্রিক</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="total-hifz">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">হাফেজ ছাত্র</div></div>
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="total-groups">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">সক্রিয় ফরিক</div></div>
        <div><div style="font-family:'Tiro Bangla',serif;font-size:22px;font-weight:700;" id="avg-para">—</div><div style="font-size:10px;opacity:.7;margin-top:2px;">গড় পারা</div></div>
      </div>
    </div>

    <button class="add-btn" style="background:var(--purple);" onclick="openModal('add-group')">＋ নতুন ফরিক তৈরি করুন</button>
    <div class="sec-header"><span class="sec-title">সক্রিয় ফরিকসমূহ</span></div>
    <div id="group-list"></div>
    <div class="pb-safe"></div>
  </div>
</div>

<nav class="bottom-nav" aria-label="নিচের নেভিগেশন">
  <div class="nav-item active">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nav-label">হোম</span>
  </div>
  <div class="nav-item" onclick="location.href='../chat.html'">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nav-label">বার্তা</span>
  </div>
</nav>

<!-- MODALS -->
<div class="modal-bg" id="modal-add-group">
  <div class="modal">
    <div class="modal-title">নতুন ফরিক <button class="modal-close" onclick="closeModal('add-group')">✕</button></div>
    <div class="form-group"><label class="form-label">ফরিকের নাম</label><input class="form-input" id="grp-name" placeholder="যেমন: ফরিক আলিফ"></div>
    <div class="form-group"><label class="form-label">শুরুর তারিখ</label><input class="form-input" id="grp-start" type="date"></div>
    <div class="form-group"><label class="form-label">মন্তব্য</label><input class="form-input" id="grp-note" placeholder="যেকোনো তথ্য"></div>
    <button class="submit-btn" style="background:var(--purple);" onclick="addGroup()">ফরিক তৈরি করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-update-progress">
  <div class="modal">
    <div class="modal-title">অগ্রগতি আপডেট <button class="modal-close" onclick="closeModal('update-progress')">✕</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">সম্পন্ন পারা</label><input class="form-input" id="upd-para" type="number" min="0" max="30" placeholder="০–৩০"></div>
      <div class="form-group"><label class="form-label">চলমান পারা নম্বর</label><input class="form-input" id="upd-current" type="number" min="1" max="30" placeholder="১–৩০"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">মুরাজাআ পারা</label><input class="form-input" id="upd-revision" type="number" min="0" max="30" placeholder="০–৩০"></div>
      <div class="form-group"><label class="form-label">সম্পন্ন সূরা</label><input class="form-input" id="upd-surah" type="number" min="0" max="114" placeholder="০–১১৪"></div>
    </div>
    <div class="form-group"><label class="form-label">আজকের পর্যবেক্ষণ</label><textarea class="form-input form-textarea" id="upd-note" placeholder="আজ কী পড়ানো হলো, কার অবস্থা কেমন..."></textarea></div>
    <button class="submit-btn" style="background:var(--purple);" onclick="saveProgress()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-add-member">
  <div class="modal">
    <div class="modal-title">সদস্য যোগ করুন <button class="modal-close" onclick="closeModal('add-member')">✕</button></div>
    <div class="form-group">
      <label class="form-label">ছাত্র খুঁজুন</label>
      <input class="form-input" id="member-search" placeholder="নাম, রোল বা আইডি..." oninput="filterMemberSearch()" autocomplete="off">
      <div id="member-search-list" style="max-height:180px;overflow-y:auto;border:1px solid var(--cream3);border-radius:var(--radius-sm);margin-top:4px;"></div>
      <input type="hidden" id="member-student-id">
      <div id="member-selected" style="font-size:12px;color:var(--green);margin-top:4px;min-height:16px;"></div>
    </div>
    <div class="form-group"><label class="form-label">যোগদানের তারিখ</label><input class="form-input" id="member-date" type="date"></div>
    <button class="submit-btn" style="background:var(--purple);" onclick="addMember()">যোগ করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-add-activity">
  <div class="modal">
    <div class="modal-title">কার্যক্রম লগ <button class="modal-close" onclick="closeModal('add-activity')">✕</button></div>
    <div class="form-group"><label class="form-label">কার্যক্রমের ধরন</label>
      <select class="form-input form-select" id="act-type">
        <option value="পাঠ">নিয়মিত পাঠ</option>
        <option value="মুরাজাআ">মুরাজাআ সেশন</option>
        <option value="পরীক্ষা">হিফজ পরীক্ষা</option>
        <option value="বিশেষ">বিশেষ কার্যক্রম</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">বিবরণ</label><textarea class="form-input form-textarea" id="act-text" placeholder="আজকের কার্যক্রম, অগ্রগতি..."></textarea></div>
    <button class="submit-btn" style="background:var(--purple);" onclick="saveActivity()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="modal-bg" id="modal-member-leave">
  <div class="modal">
    <div class="modal-title">বিভাগ ত্যাগ <button class="modal-close" onclick="closeModal('member-leave')">✕</button></div>
    <div style="font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:14px;" id="leave-member-name"></div>
    <div class="form-group"><label class="form-label">কারণ</label>
      <select class="form-input form-select" id="leave-reason">
        <option value="হিফজ সম্পন্ন">হিফজ সম্পন্ন</option>
        <option value="অন্য প্রতিষ্ঠানে">অন্য প্রতিষ্ঠানে স্থানান্তর</option>
        <option value="বাদ">বাদ দেওয়া হয়েছে</option>
        <option value="অন্যান্য">অন্যান্য</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">তারিখ</label><input class="form-input" id="leave-date" type="date"></div>
    <div class="form-group"><label class="form-label">মন্তব্য (ঐচ্ছিক)</label><input class="form-input" id="leave-note" placeholder="বিবরণ"></div>
    <button class="submit-btn" style="background:var(--red);" onclick="saveMemberLeave()">বিভাগ ত্যাগ নিশ্চিত করুন</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../api-shared.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/mm-student-modal.js"></script>
<script src="../js/monitor-mode.js"></script>
<script>
  if (!MMSession.requireStaffRoleOrAdminPerm('hifz', 'hifz', '../main-admin-madrasa.html')) { throw new Error('hifz permission denied'); }
  document.getElementById('top-name').textContent = MMSession.getName() || 'দায়িত্বশীল';
  mmInsertMonitorBanner();
  MMSession.configureTopbarHubAndLockout();

  const HIFZ_KEY = 'mm_hifz_groups';
  const HIFZ_PROG_KEY = 'mm_hifz_progress';
  const HIFZ_MEMBERS_KEY = 'mm_hifz_members';
  const HIFZ_ACTIVITY_KEY = 'mm_hifz_activity';

  function toBn(n) { return String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]); }
  if (!API.persistLoadArr(HIFZ_KEY).length) [HIFZ_KEY,HIFZ_PROG_KEY,HIFZ_MEMBERS_KEY,HIFZ_ACTIVITY_KEY].forEach(k=>API.persistSaveArr(k,[]));

  let currentGroupId = null, leavingMemberId = null, _availableStudents = [];
  let expandedGroups = new Set();

  function renderHome() {
    const groups = API.persistLoadArr(HIFZ_KEY).filter(g => g.active);
    const allMembers = API.persistLoadArr(HIFZ_MEMBERS_KEY);
    const prog = API.persistLoadArr(HIFZ_PROG_KEY);

    const activeAll = allMembers.filter(m => !m.status || m.status === 'active');
    document.getElementById('total-hifz').textContent = toBn(new Set(activeAll.map(m => m.student_id)).size);
    document.getElementById('total-groups').textContent = toBn(groups.length);
    const paras = groups.map(g => { const p = prog.filter(p=>p.group_id===g.id).sort((a,b)=>b.date.localeCompare(a.date))[0]; return p?p.para_done:0; });
    document.getElementById('avg-para').textContent = toBn(paras.length ? Math.round(paras.reduce((a,b)=>a+b,0)/paras.length) : 0);

    document.getElementById('group-list').innerHTML = groups.map(g => {
      const latest = prog.filter(p=>p.group_id===g.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
      const gMembers = allMembers.filter(m=>m.group_id===g.id&&(!m.status||m.status==='active'));
      const paraDone=latest?latest.para_done:0, curPara=latest?latest.current_para:1, revPara=latest?latest.revision_para:0;
      const pct=Math.round(paraDone/30*100), isOpen=expandedGroups.has(g.id);

      const paraGrid = Array.from({length:30},(_,i)=>{
        const n=i+1, cls=n<=paraDone&&n!==curPara?'done':n===curPara?'current':n<=revPara?'revision':'';
        return '<div class="para-cell '+cls+'">'+toBn(n)+'</div>';
      }).join('');

      const memberRows = gMembers.map(m=>{
        const s=API.Students.getById(m.student_id); if(!s) return '';
        const c=API.Classes.getById(s.class_id);
        return '<div class="member-row"><div class="list-avatar">📿</div>'
          +'<div style="flex:1;"><div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">'
          +(s.roll?'<span style="font-size:11px;color:var(--ink3);font-weight:700;">'+API.escBn(s.roll)+'</span>':'')
          +'<button type="button" class="s-name-btn" style="font-size:13px;font-weight:600;color:var(--ink);" onclick="MMStudentModal.open(\''+s.id+'\')">'+API.esc(s.name)+'</button>'
          +'<span class="list-badge badge-ink" style="font-size:10px;">'+API.escBn(s.permanent_id||'')+'</span>'
          +'</div>'+(c?'<div class="member-class">'+API.esc(c.name)+'</div>':'')+'</div>'
          +'<button type="button" class="topbar-btn" style="font-size:11px;padding:3px 7px;color:var(--red);" onclick="event.stopPropagation();openLeaveModal(\''+m.id+'\')">ত্যাগ</button></div>';
      }).join('') || '<div style="padding:10px;text-align:center;color:var(--ink3);font-size:12px;">কোনো সদস্য নেই</div>';

      return '<div class="group-card">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;" onclick="toggleGroup(\''+g.id+'\')">'
        +'<div><div class="group-name">'+API.esc(g.name)+'</div>'
        +'<div class="group-meta">'+toBn(gMembers.length)+' সদস্য · শুরু '+API.esc(g.start||'')+'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<div style="text-align:right;"><div style="font-family:\'Tiro Bangla\',serif;font-size:20px;font-weight:700;color:var(--purple);">'+toBn(paraDone)+'/৩০</div>'
        +'<div style="font-size:10px;color:var(--ink3);">পারা সম্পন্ন</div></div>'
        +'<span style="font-size:16px;color:var(--ink3);">'+(isOpen?'▼':'▶')+'</span></div></div>'
        +'<div style="height:6px;background:var(--cream3);border-radius:3px;overflow:hidden;margin-top:8px;">'
        +'<div style="height:100%;width:'+pct+'%;background:var(--purple);border-radius:3px;"></div></div>'
        +(latest?'<div style="display:flex;gap:12px;margin-top:6px;font-size:12px;flex-wrap:wrap;">'
          +'<span style="color:var(--green);">✓ '+toBn(latest.surah_done)+' সূরা</span>'
          +'<span style="color:var(--blue);">↻ '+toBn(revPara)+' মুরাজাআ</span>'
          +'<span style="color:var(--gold);">'+toBn(curPara)+' নং পারা চলছে</span></div>':'')
        +(isOpen
          ?'<div style="margin-top:12px;">'
            +'<div class="legend">'
            +'<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>সম্পন্ন</div>'
            +'<div class="legend-item"><div class="legend-dot" style="background:var(--gold2)"></div>চলছে</div>'
            +'<div class="legend-item"><div class="legend-dot" style="background:var(--blue-light);border:1px solid var(--blue)"></div>মুরাজাআ</div></div>'
            +'<div class="para-grid">'+paraGrid+'</div>'
            +'<div style="font-size:12px;color:var(--ink2);font-weight:600;margin:10px 0 4px;">সদস্য</div>'
            +'<div class="card-static">'+memberRows+'</div>'
            +'<div class="card-actions">'
            +'<button class="add-btn" style="background:var(--purple);" onclick="event.stopPropagation();openProgressModal(\''+g.id+'\')">অগ্রগতি</button>'
            +'<button class="add-btn" style="background:var(--green);" onclick="event.stopPropagation();openAddMemberModal(\''+g.id+'\')">＋ সদস্য</button>'
            +'<button class="add-btn" style="background:var(--ink3);" onclick="event.stopPropagation();openActivityModal(\''+g.id+'\')">লগ যোগ</button>'
            +'</div></div>'
          :'')
        +'</div>';
    }).join('') || '<div class="empty-state"><span class="empty-icon">📿</span><div class="empty-text">কোনো ফরিক নেই</div></div>';
  }

  function toggleGroup(gid) {
    if (expandedGroups.has(gid)) expandedGroups.delete(gid); else expandedGroups.add(gid);
    renderHome();
  }

  function openProgressModal(gid) {
    currentGroupId = gid;
    const latest = API.persistLoadArr(HIFZ_PROG_KEY).filter(p=>p.group_id===gid).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if (latest) ['upd-para','upd-current','upd-revision','upd-surah'].forEach((id,i)=>
      document.getElementById(id).value=[latest.para_done,latest.current_para,latest.revision_para,latest.surah_done][i]);
    openModal('update-progress');
  }

  function openAddMemberModal(gid) {
    currentGroupId = gid;
    const active = API.persistLoadArr(HIFZ_MEMBERS_KEY).filter(m=>m.group_id===gid&&(!m.status||m.status==='active'));
    const existing = new Set(active.map(m=>m.student_id));
    _availableStudents = API.Students.getAll().filter(s=>s.active!==false&&!existing.has(s.id));
    document.getElementById('member-search').value=''; document.getElementById('member-student-id').value='';
    document.getElementById('member-selected').textContent=''; document.getElementById('member-date').value='';
    filterMemberSearch(); openModal('add-member');
  }

  function openActivityModal(gid) {
    currentGroupId=gid; document.getElementById('act-text').value=''; openModal('add-activity');
  }

  function saveProgress() {
    if (mmMutationBlocked(showToast)) return;
    const para=parseInt(document.getElementById('upd-para').value)||0;
    const cur=parseInt(document.getElementById('upd-current').value)||1;
    const rev=parseInt(document.getElementById('upd-revision').value)||0;
    const surah=parseInt(document.getElementById('upd-surah').value)||0;
    const note=document.getElementById('upd-note').value;
    const list=API.persistLoadArr(HIFZ_PROG_KEY);
    list.push({id:API.uid(), group_id:currentGroupId, para_done:para, current_para:cur, revision_para:rev, surah_done:surah, note, date:API.today()});
    API.persistSaveArr(HIFZ_PROG_KEY,list); closeModal('update-progress'); showToast('অগ্রগতি সংরক্ষিত ✓'); renderHome();
  }

  function addMember() {
    if (mmMutationBlocked(showToast)) return;
    const sid=document.getElementById('member-student-id').value, date=document.getElementById('member-date').value||API.today();
    if (!sid) { showToast('ছাত্র নির্বাচন করুন'); return; }
    const list=API.persistLoadArr(HIFZ_MEMBERS_KEY);
    list.push({id:API.uid(), group_id:currentGroupId, student_id:sid, joined:date, status:'active'});
    API.persistSaveArr(HIFZ_MEMBERS_KEY,list); closeModal('add-member'); showToast('সদস্য যোগ করা হয়েছে ✓'); renderHome();
  }

  function filterMemberSearch() {
    document.getElementById('member-student-id').value=''; document.getElementById('member-selected').textContent='';
    const q=document.getElementById('member-search').value.toLowerCase();
    const items=_availableStudents.filter(s=>!q||s.name.toLowerCase().includes(q)||(s.roll||'').toLowerCase().includes(q)||(s.permanent_id||'').toLowerCase().includes(q));
    document.getElementById('member-search-list').innerHTML=items.map(s=>'<div onclick="selectMember(\''+s.id+'\',\''+API.esc(s.name)+'\')" style="padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--cream2);font-size:13px;">'+(s.roll?'<small style="color:var(--ink3);">'+API.toBn(s.roll)+' · </small>':'')+API.esc(s.name)+(s.permanent_id?'<small style="color:var(--ink3);"> ('+API.toBn(s.permanent_id)+')</small>':'')+' </div>').join('')||'<div style="padding:10px;color:var(--ink3);font-size:12px;">কেউ পাওয়া যায়নি</div>';
  }
  function selectMember(id, name) {
    document.getElementById('member-student-id').value=id; document.getElementById('member-selected').textContent='✓ '+name;
    document.getElementById('member-search').value=''; document.getElementById('member-search-list').innerHTML='';
  }

  function openLeaveModal(memberId) {
    leavingMemberId=memberId;
    const m=API.persistLoadArr(HIFZ_MEMBERS_KEY).find(x=>x.id===memberId);
    const s=m?API.Students.getById(m.student_id):null;
    document.getElementById('leave-member-name').textContent=s?s.name:'';
    document.getElementById('leave-reason').value='হিফজ সম্পন্ন'; document.getElementById('leave-date').value=API.today();
    document.getElementById('leave-note').value=''; document.getElementById('modal-member-leave').classList.add('open');
  }
  function saveMemberLeave() {
    if (mmMutationBlocked(showToast)||!leavingMemberId) return;
    const reason=document.getElementById('leave-reason').value, date=document.getElementById('leave-date').value||API.today(), note=document.getElementById('leave-note').value;
    const statusMap={'হিফজ সম্পন্ন':'completed','অন্য প্রতিষ্ঠানে':'transferred'};
    const list=API.persistLoadArr(HIFZ_MEMBERS_KEY), idx=list.findIndex(x=>x.id===leavingMemberId);
    if (idx===-1) { showToast('সদস্য পাওয়া যায়নি'); return; }
    list[idx]={...list[idx], status:statusMap[reason]||'dropped', left_reason:reason, left_at:date, left_note:note};
    API.persistSaveArr(HIFZ_MEMBERS_KEY,list); closeModal('member-leave'); leavingMemberId=null; showToast('বিভাগ ত্যাগের তথ্য সংরক্ষিত ✓'); renderHome();
  }

  function saveActivity() {
    if (mmMutationBlocked(showToast)) return;
    const type=document.getElementById('act-type').value, text=document.getElementById('act-text').value.trim();
    if (!text) { showToast('বিবরণ দিন'); return; }
    const list=API.persistLoadArr(HIFZ_ACTIVITY_KEY);
    list.push({id:API.uid(), group_id:currentGroupId, type, text, date:API.today(), by:MMSession.getName()||'দায়িত্বশীল'});
    API.persistSaveArr(HIFZ_ACTIVITY_KEY,list); closeModal('add-activity'); showToast('লগ সংরক্ষিত ✓'); renderHome();
  }

  function addGroup() {
    if (mmMutationBlocked(showToast)) return;
    const name=document.getElementById('grp-name').value.trim(), start=document.getElementById('grp-start').value||API.today(), note=document.getElementById('grp-note').value;
    if (!name) { showToast('ফরিকের নাম দিন'); return; }
    const list=API.persistLoadArr(HIFZ_KEY);
    const gid='grp_'+API.uid();
    list.push({id:gid, name, start, note, active:true});
    API.persistSaveArr(HIFZ_KEY,list); closeModal('add-group'); showToast('ফরিক তৈরি হয়েছে ✓');
    expandedGroups.add(gid); renderHome();
  }

  function openPinChangeModal() {
    ['pc-cur','pc-new','pc-conf'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('pc-err').textContent=''; document.getElementById('modal-pin-change').classList.add('open');
  }
  function closePinChangeModal() { document.getElementById('modal-pin-change').classList.remove('open'); }
  async function saveOwnPin() {
    var c=document.getElementById('pc-cur').value, n=document.getElementById('pc-new').value, f=document.getElementById('pc-conf').value, e=document.getElementById('pc-err');
    if (!c||!n||!f) { e.textContent='সব ঘর পূরণ করুন'; return; }
    if (n!==f) { e.textContent='PIN মিলছে না'; return; }
    if (n.length!==4||!/^\d+$/.test(n)) { e.textContent='PIN ৪ সংখ্যার হতে হবে'; return; }
    e.textContent='Saving...';
    var result=await MMSession.changeStaffPin(c,n,function(uid,cur,next){return API.Teachers.changeOwnPin(uid,cur,next);});
    if (!result.ok) { e.textContent=(MMSession.pinChangeErrorMessage&&MMSession.pinChangeErrorMessage(result.error))||'PIN change failed'; return; }
    closePinChangeModal(); if (typeof showToast==='function') showToast('PIN সফলভাবে পরিবর্তন হয়েছে');
  }

  function openModal(id) { if (mmMutationBlocked(showToast)) return; document.getElementById('modal-'+id).classList.add('open'); }
  function closeModal(id) { document.getElementById('modal-'+id).classList.remove('open'); }
  function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

  renderHome();
</script>

<div class="modal-bg" id="modal-pin-change" onclick="if(event.target===this)closePinChangeModal()">
  <div class="modal" style="max-width:380px">
    <div class="modal-title"><span>PIN পরিবর্তন</span><button type="button" class="modal-close" onclick="closePinChangeModal()">✕</button></div>
    <form onsubmit="event.preventDefault();saveOwnPin()">
      <div class="form-group"><label class="form-label">বর্তমান PIN</label><input class="form-input" type="password" id="pc-cur" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password" placeholder="বর্তমান PIN"></div>
      <div class="form-group"><label class="form-label">নতুন PIN</label><input class="form-input" type="password" id="pc-new" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password" placeholder="নতুন ৪-সংখ্যার PIN"></div>
      <div class="form-group"><label class="form-label">নতুন PIN নিশ্চিত করুন</label><input class="form-input" type="password" id="pc-conf" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password" placeholder="পুনরায় PIN লিখুন"></div>
      <button type="submit" class="submit-btn">PIN সংরক্ষণ করুন</button>
      <div style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px" id="pc-err"></div>
    </form>
  </div>
</div>
</body>
</html>
