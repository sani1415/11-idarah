<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>দফতর — জিম্মাদার</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/main-admin-nav.css">
<style>
  .att-summary-row { display:flex; gap:8px; margin-bottom:14px; }
  .att-sum-card { flex:1; background:#fff; border-radius:var(--radius-sm); padding:10px 8px; text-align:center; box-shadow:var(--shadow); border:1px solid rgba(26,18,8,.05); }
  .att-sum-val { font-family:'Tiro Bangla',serif; font-size:18px; font-weight:700; display:block; line-height:1.15; }
  .att-sum-lbl { font-size:9px; color:var(--ink3); margin-top:3px; display:block; }
  .att-table { width:100%; border-collapse:collapse; font-family:'Tiro Bangla',serif; font-size:12px; }
  .att-table thead th { background:var(--ink); color:var(--gold2); padding:7px 8px; text-align:left; font-size:10px; font-weight:600; white-space:nowrap; }
  .att-table thead th:not(:first-child) { text-align:center; }
  .att-table tbody td { padding:8px; border-bottom:1px solid var(--cream2); color:var(--ink2); vertical-align:middle; }
  .att-table tbody tr:last-child td { border-bottom:none; }
  .att-table .cls-name { font-family:'Tiro Bangla',serif; font-size:13px; font-weight:700; color:var(--ink); }
  .att-table .num-cell { text-align:center; font-family:'Tiro Bangla',serif; font-size:13px; font-weight:700; }
  .att-table .pct-cell { text-align:center; }
  .pct-bar { height:5px; background:var(--cream2); border-radius:3px; overflow:hidden; margin-top:3px; }
  .pct-fill { height:100%; border-radius:3px; }
  .hero-date-card { background:#fff; border-radius:var(--radius-sm); box-shadow:var(--shadow); overflow:hidden; margin-bottom:12px; }
  .date-nav { display:flex; align-items:center; background:var(--ink); color:#fff; }
  .date-nav-btn { flex:0 0 42px; height:42px; background:none; border:none; cursor:pointer; font-family:'Tiro Bangla',serif; font-size:18px; color:rgba(255,255,255,.68); }
  .date-nav-btn:hover { background:rgba(255,255,255,.07); color:#fff; }
  .date-nav-btn:disabled { opacity:.35; cursor:not-allowed; }
  .date-label { flex:1; text-align:center; font-family:'Tiro Bangla',serif; font-size:12px; font-weight:700; line-height:1.3; padding:6px 4px; cursor:pointer; user-select:none; }
  .date-label .date-sub { display:block; font-family:'Tiro Bangla',serif; font-size:10px; font-weight:500; color:rgba(255,255,255,.7); margin-top:2px; }
  .today-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--gold2); margin-right:4px; vertical-align:middle; }
  .cal-chev { display:inline-block; margin-left:4px; color:rgba(255,255,255,.55); transition:transform .15s ease; }
  .date-nav.is-cal-open .cal-chev { transform:rotate(180deg); color:rgba(255,255,255,.85); }
  .audit-strip { padding:7px 10px; border-bottom:1px solid var(--cream2); background:#fff; }
  .audit-panel { background:#fff; padding:8px 10px 10px; border-top:1px solid var(--cream2); }
  .audit-panel[hidden] { display:none !important; }
  .audit-meta { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .audit-mnav { width:32px; height:30px; border:none; border-radius:8px; background:rgba(26,18,8,.05); color:var(--ink2); font-size:16px; line-height:1; cursor:pointer; flex-shrink:0; }
  .audit-mnav:disabled { opacity:.3; cursor:not-allowed; }
  .audit-month { flex:1; text-align:center; min-width:0; font-size:12px; font-weight:700; color:var(--ink2); }
  .audit-legend { display:flex; align-items:center; justify-content:center; gap:6px; font-size:10px; color:var(--ink3); margin-bottom:6px; }
  .audit-legend .lg { width:10px; height:10px; border-radius:4px; border:1px solid var(--cream2); display:inline-block; }
  .audit-legend .lg-taken { border-color:rgba(45,106,79,.35); background:rgba(45,106,79,.18); }
  .audit-legend .lg-miss { border-color:rgba(220,53,69,.35); background:rgba(220,53,69,.18); }
  .audit-dow, .audit-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .audit-dow { margin-bottom:5px; }
  .ad-dow { height:18px; font-size:10px; color:var(--ink3); display:flex; align-items:center; justify-content:center; }
  .audit-line { font-size:11px; color:var(--ink2); margin:0; line-height:1.45; }
  .audit-line strong { color:var(--ink); }
  .ad-day { height:24px; border-radius:8px; border:1px solid var(--cream2); background:#fff; font-size:11px; font-family:'Tiro Bangla',serif; color:var(--ink2); cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; }
  .ad-day:hover { background:var(--cream); }
  .ad-day:disabled { opacity:.45; cursor:default; background:#fff; }
  .ad-taken { border-color:rgba(45,106,79,.35); background:rgba(45,106,79,.10); color:var(--green); }
  .ad-miss { border-color:rgba(220,53,69,.35); background:rgba(220,53,69,.10); color:var(--red); }
  .ad-out { opacity:.22; cursor:default; }
  .ad-sel { box-shadow:0 0 0 2px rgba(201,149,42,.35); border-color:rgba(201,149,42,.55); }
  .ad-pad { height:24px; }
  .audit-date-jump { margin-top:8px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .audit-date-jump label { font-size:10px; color:var(--ink3); }
  .audit-date-jump .form-input { padding:6px 8px; font-size:12px; max-width:100%; }
  .dept-tab { display:flex; gap:6px; margin-bottom:14px; }
  .dept-tab-btn { flex:1; padding:10px; border:1px solid var(--cream3); border-radius:var(--radius-sm); text-align:center; font-family:'Tiro Bangla',serif; font-size:12px; font-weight:600; cursor:pointer; background:#fff; color:var(--ink3); transition:all .15s; }
  .dept-tab-btn.active { background:var(--ink); color:var(--gold2); border-color:var(--ink); }
  .att-table tbody tr.cls-row { cursor:pointer; transition:background .12s; }
  .att-table tbody tr.cls-row:hover { background:rgba(0,0,0,.03); }
  .att-table tbody tr.cls-row:active { background:rgba(0,0,0,.06); }
  .att-table tbody tr.dept-section-row td { background:var(--cream2); color:var(--ink2); font-size:10px; font-weight:700; padding:6px 8px; border-bottom:1px solid var(--cream3); }
  /* class overlay */
  .cls-overlay { position:fixed; inset:0; z-index:200; background:var(--bg,#faf6ef); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .25s ease; }
  .cls-overlay.is-open { transform:translateX(0); }
  .cls-ov-header { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; background:var(--ink); color:var(--gold2); flex-shrink:0; }
  .cls-ov-back { background:none; border:none; color:inherit; font-size:22px; cursor:pointer; padding:4px 10px 4px 0; line-height:1; }
  .cls-ov-info { flex:1; min-width:0; }
  .cls-ov-title { font-family:'Tiro Bangla',serif; font-size:16px; font-weight:700; }
  .cls-ov-teacher { font-size:11px; color:rgba(255,255,255,.65); margin-top:2px; }
  .cls-ov-tabs { display:flex; border-bottom:2px solid var(--cream2); background:#fff; flex-shrink:0; }
  .cls-ov-tab { flex:1; padding:10px 4px; border:none; background:none; font-family:'Tiro Bangla',serif; font-size:12px; color:var(--ink3); cursor:pointer; border-bottom:2.5px solid transparent; margin-bottom:-2px; transition:color .15s; }
  .cls-ov-tab.active { color:var(--ink); font-weight:700; border-bottom-color:var(--gold); }
  .cls-ov-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; padding-bottom:32px; }
  .ov-list { display:flex; flex-direction:column; gap:8px; }
  .ov-student-row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-s-id { font-size:10px; color:var(--ink3); min-width:30px; }
  .ov-s-name { flex:1; font-size:13px; font-family:'Tiro Bangla',serif; color:var(--ink); }
  .ov-s-status { font-size:11px; font-weight:700; min-width:60px; text-align:right; }
  .ov-kitab-row { padding:12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-k-name { font-size:13px; font-family:'Tiro Bangla',serif; color:var(--ink); margin-bottom:4px; }
  .ov-k-pct { font-size:12px; font-weight:700; color:var(--green); margin-bottom:6px; }
  .ov-k-bar { height:6px; background:var(--cream2); border-radius:3px; overflow:hidden; }
  .ov-k-fill { height:100%; background:var(--green); border-radius:3px; }
  .ov-log-row { padding:10px 12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-log-date { font-size:10px; color:var(--ink3); margin-bottom:4px; }
  .ov-log-text { font-size:13px; color:var(--ink2); line-height:1.5; white-space:pre-wrap; }
  .ov-empty { text-align:center; color:var(--ink3); padding:40px 0; font-size:13px; }
</style>
</head>

  <div class="hero-date-card">

      <button class="date-nav-btn" onclick="changeDate(-1)" aria-label="আগের দিন">‹</button>
      <div class="date-label" id="date-label" role="button" tabindex="0" onclick="toggleAuditCalendar()" onkeydown="onDateLabelKeydown(event)">—</div>

      <div class="audit-date-jump">

  <div class="att-summary-row">

    <div class="att-sum-card"><span class="att-sum-val" id="s-present" style="color:var(--green);">—</span><span class="att-sum-lbl">উপস্থিত</span></div>
    <div class="att-sum-card"><span class="att-sum-val" id="s-absent" style="color:var(--red);">—</span><span class="att-sum-lbl">অনুপস্থিত</span></div>
    <div class="att-sum-card"><span class="att-sum-val" id="s-pct" style="color:var(--gold);">—</span><span class="att-sum-lbl">উপস্থিতির হার</span></div>

  <div class="dept-tab">

    <div class="dept-tab-btn" id="dtab-kitab" onclick="switchDept('kitab')">কিতাব বিভাগ</div>

</div>

<script>
  if (!MMSession.requireAdminPerm('daftar', '../main-admin-madrasa.html')) { throw new Error('admin permission denied'); }
  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  let currentDate = API.today();
  let currentDept = 'all';
  let auditExpanded = false;
  let auditView = { y: new Date(currentDate + 'T12:00:00').getFullYear(), m: new Date(currentDate + 'T12:00:00').getMonth() };
  (function() {
    const allowed = MMSession.getAllowedMadrasaDepts();
    try {
      const d = new URLSearchParams(location.search).get('dept');
      if (d === 'all' && allowed.length > 1) currentDept = 'all';
      if ((d === 'kitab' || d === 'maktab') && MMSession.canUseMadrasaDept(d)) currentDept = d;
    } catch (e) {}
    if (currentDept !== 'all' && !MMSession.canUseMadrasaDept(currentDept)) currentDept = allowed[0] || 'kitab';
    if (currentDept === 'all' && allowed.length <= 1) currentDept = allowed[0] || 'kitab';
  })();

  function isoAddDays(iso, delta) {
    const d = new Date(iso + 'T12:00:00');
    d.setDate(d.getDate() + delta);
    return d.toISOString().split('T')[0];
  }
  function ddmmyyBn(iso) {
    const d = new Date(iso + 'T12:00:00');
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yy = String(d.getFullYear()).slice(-2);
    return toBn(dd) + '/' + toBn(mm) + '/' + toBn(yy);
  }
  function getSessionStartISO() {
    try {
      const s = API.Settings && API.Settings.get ? API.Settings.get() : null;
      const fromSet = s && s.session_start_date != null && String(s.session_start_date).trim() !== '' ? String(s.session_start_date).trim() : '';
      if (fromSet) return fromSet;
    } catch (e) {}
    try {
      if (API.Sessions && API.Sessions.getCurrent) {
        const cur = API.Sessions.getCurrent();
        if (cur && cur.start_date) return String(cur.start_date);
      }
    } catch (e) {}
    return null;
  }
  function changeDate(dir) {
    currentDate = isoAddDays(currentDate, dir);
    render();
  }

  function switchDept(dept) {
    const allowed = MMSession.getAllowedMadrasaDepts();
    if (dept === 'all' && allowed.length <= 1) return;
    if (dept !== 'all' && !MMSession.canUseMadrasaDept(dept)) return;
    currentDept = dept;
    syncDeptTabs();
    render();
  }

  function deptLabel(dept) { return dept === 'maktab' ? 'মক্তব বিভাগ' : 'কিতাব বিভাগ'; }
  function getScopeDepts() {
    const allowed = MMSession.getAllowedMadrasaDepts();
    return currentDept === 'all' ? allowed : [currentDept];
  }
  function getScopedClasses() {
    return getScopeDepts().flatMap(dept => API.Classes.getByDept(dept).map(cls => ({ ...cls, dept })));
  }
  function scopeStudentIds() {
    const ids = new Set();
    getScopedClasses().forEach(cls => {
      API.Students.getByClass(cls.id).forEach(s => {
        ids.add(String(s.id));
        if (s.supabase_id) ids.add(String(s.supabase_id));
      });
    });
    return ids;
  }
  function hasAttendanceForScope(iso) {
    const ids = scopeStudentIds();
    return API.Attendance.getByDate(iso).some(a => ids.has(String(a.student_id)));
  }
  function syncAuditViewFromDate() {
    const d = new Date(currentDate + 'T12:00:00');
    auditView = { y: d.getFullYear(), m: d.getMonth() };
  }
  function ymcmp(a, b) {
    if (a.y !== b.y) return a.y - b.y;
    return a.m - b.m;
  }
  function getAuditMinYM() {
    const s = getSessionStartISO();
    if (!s) return null;
    const d = new Date(s + 'T12:00:00');
    return { y: d.getFullYear(), m: d.getMonth() };
  }
  function getAuditMaxYM() {
    const d = new Date(API.today() + 'T12:00:00');
    return { y: d.getFullYear(), m: d.getMonth() };
  }
  function setAuditMonthNavDisabled() {
    const minA = getAuditMinYM();
    const maxA = getAuditMaxYM();
    const prevB = document.getElementById('audit-m-prev');
    const nextB = document.getElementById('audit-m-next');
    if (prevB) prevB.disabled = !!(minA && ymcmp(auditView, minA) <= 0);
    if (nextB) nextB.disabled = !!(maxA && ymcmp(auditView, maxA) >= 0);
  }
  function toggleAuditCalendar() {
    setAuditExpanded(!auditExpanded);
  }
  function onDateLabelKeydown(ev) {
    if (ev.key === 'Enter' || ev.key === ' ') {
      ev.preventDefault();
      toggleAuditCalendar();
    }
  }
  function setAuditExpanded(next) {
    auditExpanded = !!next;
    const nav = document.getElementById('date-nav');
    const panel = document.getElementById('audit-panel');
    if (nav) {
      nav.classList.toggle('is-cal-open', auditExpanded);
      nav.setAttribute('aria-expanded', auditExpanded ? 'true' : 'false');
    }
    if (panel) {
      panel.hidden = !auditExpanded;
      panel.setAttribute('aria-hidden', auditExpanded ? 'false' : 'true');
    }
    if (auditExpanded) {
      syncAuditViewFromDate();
      renderAttendanceAudit(true);
    }
  }
  function shiftAuditMonth(delta) {
    const d = new Date(auditView.y, auditView.m + delta, 1, 12, 0, 0);
    auditView = { y: d.getFullYear(), m: d.getMonth() };
    const minA = getAuditMinYM();
    const maxA = getAuditMaxYM();
    if (minA && ymcmp(auditView, minA) < 0) auditView = { y: minA.y, m: minA.m };
    if (maxA && ymcmp(auditView, maxA) > 0) auditView = { y: maxA.y, m: maxA.m };
    renderAttendanceAudit(true);
  }
  function trySetCurrentDate(iso) {
    const today = API.today();
    const start = getSessionStartISO();
    if (iso > today) return;
    if (start && iso < start) return;
    currentDate = iso;
    render();
    if (auditExpanded) {
      syncAuditViewFromDate();
      renderAttendanceAudit(true);
    }
  }
  function onAdminDateInput() {
    const inp = document.getElementById('admin-daftar-date');
    if (inp && inp.value) trySetCurrentDate(inp.value);
  }
  function renderDateHeader() {
    const isToday = currentDate === API.today();
    const d0 = new Date(currentDate + 'T12:00:00');
    const BN_D_SHORT = ['রবি', 'সোম', 'মঙ্গল', 'বুধ', 'বৃহস্পতি', 'শুক্র', 'শনি'];
    const weekday = BN_D_SHORT[d0.getDay()];
    const greg = ddmmyyBn(currentDate);
    const hijri = window.MMHijri && MMHijri.shortHijriBn ? MMHijri.shortHijriBn(currentDate) : '';
    const label = document.getElementById('date-label');
    if (label) {
      const dot = isToday ? '<span class="today-dot"></span>' : '';
      label.innerHTML = dot + weekday + (hijri ? ' · হি: ' + hijri : '') + '<span class="cal-chev">⌄</span><span class="date-sub">খ্রি: ' + greg + '</span>';
    }
    const nextBtn = document.getElementById('btn-next');
    if (nextBtn) nextBtn.disabled = currentDate >= API.today();
    const inp = document.getElementById('admin-daftar-date');
    if (inp) {
      inp.value = currentDate;
      inp.max = API.today();
      const start = getSessionStartISO();
      if (start) inp.min = start; else inp.removeAttribute('min');
    }
  }
  function renderAttendanceAudit(forceGrid) {
    const startISO = getSessionStartISO();
    const todayISO = API.today();
    const summary = document.getElementById('audit-summary');
    const panel = document.getElementById('audit-panel');
    if (!summary || !startISO || startISO > todayISO) {
      if (summary) summary.style.display = 'none';
      if (panel) panel.hidden = true;
      return;
    }

    const missingDays = [];
    for (let cur = startISO; cur <= todayISO; cur = isoAddDays(cur, 1)) {
      if (!hasAttendanceForScope(cur)) missingDays.push(cur);
    }
    const lineEl = document.getElementById('audit-line');
    if (lineEl) {
      if (!missingDays.length) {
        lineEl.innerHTML = 'নির্বাচিত অংশে শিক্ষাবর্ষ শুরু থেকে আজ পর্যন্ত <strong>সব দিনেই</strong> হাজিরা আছে';
      } else {
        const sample = missingDays.slice(0, 5).map(ddmmyyBn).join(', ');
        const extra = missingDays.length > 5 ? '…' : '';
        lineEl.innerHTML = 'নির্বাচিত অংশে বাকি <strong>' + toBn(missingDays.length) + '</strong> দিন · ' + sample + extra;
      }
    }
    summary.style.display = 'block';

    if (!forceGrid && !auditExpanded) return;

    const y = auditView.y;
    const m = auditView.m;
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const firstDow = new Date(y, m, 1).getDay();
    const grid = document.getElementById('audit-grid');
    if (!grid) return;
    grid.innerHTML = '';

    const MON_BN = ['জানু', 'ফেব্রু', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগ', 'সেপ', 'অক্টো', 'নভে', 'ডিসে'];
    const monthEl = document.getElementById('audit-month');
    if (monthEl) monthEl.textContent = MON_BN[m] + ' ' + toBn(y);
    const dowEl = document.getElementById('audit-dow');
    if (dowEl) {
      const DOW = ['রবি','সোম','মঙ্গল','বুধ','বৃহ','শুক্র','শনি'];
      dowEl.innerHTML = DOW.map(d0 => '<div class="ad-dow">' + d0 + '</div>').join('');
    }

    for (let i = 0; i < firstDow; i++) {
      const pad = document.createElement('div');
      pad.className = 'ad-pad';
      grid.appendChild(pad);
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const iso = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ad-day';
      btn.textContent = toBn(day);
      const outOfSession = iso < startISO;
      const future = iso > todayISO;
      if (outOfSession) btn.classList.add('ad-out');
      if (iso === currentDate) btn.classList.add('ad-sel');
      if (outOfSession || future) {
        btn.disabled = true;
      } else {
        btn.classList.add(hasAttendanceForScope(iso) ? 'ad-taken' : 'ad-miss');
        btn.addEventListener('click', () => trySetCurrentDate(iso));
      }
      grid.appendChild(btn);
    }
    setAuditMonthNavDisabled();
  }
  function syncDeptTabs() {
    const allowed = MMSession.getAllowedMadrasaDepts();
    document.getElementById('dtab-all').classList.toggle('active', currentDept === 'all');
    document.getElementById('dtab-kitab').classList.toggle('active', currentDept === 'kitab');
    document.getElementById('dtab-maktab').classList.toggle('active', currentDept === 'maktab');
    document.getElementById('dtab-all').style.display = allowed.length > 1 ? '' : 'none';
    document.getElementById('dtab-kitab').style.display = allowed.includes('kitab') ? '' : 'none';
    document.getElementById('dtab-maktab').style.display = allowed.includes('maktab') ? '' : 'none';
  }

  function render() {
    renderDateHeader();

    const allClasses = getScopedClasses();
    let totalStudents = 0, totalPresent = 0, totalAbsent = 0;
    let lastDept = '';
    const rows = allClasses.map(cls => {
      const students = API.Students.getByClass(cls.id);
      const attRecs  = API.Attendance.getByClassDate(cls.id, currentDate);
      const present  = attRecs.filter(a => API.Attendance.statusOf(a) === 'present').length;
      const absent   = attRecs.filter(a => API.Attendance.statusOf(a) === 'absent').length;
      const pct      = students.length ? Math.round(present / students.length * 100) : 0;
      const pctColor = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--gold)' : 'var(--red)';
      totalStudents += students.length; totalPresent += present; totalAbsent += absent;
      const section = currentDept === 'all' && cls.dept !== lastDept ? `<tr class="dept-section-row"><td colspan="5">${deptLabel(cls.dept)}</td></tr>` : '';
      lastDept = cls.dept;
      return section + `<tr class="cls-row" onclick="openClassOverlay('${cls.id}')">
        <td class="cls-name">${API.esc(cls.name)}</td>
        <td class="num-cell">${toBn(students.length)}</td>
        <td class="num-cell" style="color:var(--green);">${attRecs.length ? toBn(present) : '—'}</td>
        <td class="num-cell" style="color:var(--red);">${attRecs.length ? toBn(absent) : '—'}</td>
        <td class="pct-cell">
          ${attRecs.length ? `<div style="font-family:'Tiro Bangla',serif;font-size:12px;font-weight:700;color:${pctColor};">${toBn(pct)}%</div><div class="pct-bar"><div class="pct-fill" style="width:${pct}%;background:${pctColor};"></div></div>` : '<span style="color:var(--ink3);font-size:11px;">এন্ট্রি নেই</span>'}
        </td>
      </tr>`;
    }).join('');

    document.getElementById('att-table-body').innerHTML = rows || `<tr><td colspan="5" style="text-align:center;color:var(--ink3);padding:20px;">কোনো বর্ষ নেই</td></tr>`;
    document.getElementById('s-total').textContent    = toBn(totalStudents);
    document.getElementById('s-present').textContent  = toBn(totalPresent);
    document.getElementById('s-absent').textContent   = toBn(totalAbsent);
    const overallPct = totalStudents ? Math.round(totalPresent / totalStudents * 100) : 0;
    document.getElementById('s-pct').textContent = toBn(overallPct) + '%';
    renderAttendanceAudit(auditExpanded);
  }

  async function initAdminDaftar() {
    syncDeptTabs();
    if (window.MDRDaftarSupabase && window.MMSharedAPI) {
      try {
        await MDRDaftarSupabase.sync();
      } catch (e) {
        console.warn('Admin daftar Supabase sync failed', e);
      }
    }
    render();
  }

  initAdminDaftar();
</script>
