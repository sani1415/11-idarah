<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>শ্রেণি শিক্ষক — জিম্মাদার</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/main-admin-nav.css">
<style>
  .mmt-page { max-width:520px; margin:0 auto; padding:12px 16px var(--app-content-pad-bottom); }
  .mmt-head { font-family:'Tiro Bangla',serif; font-size:18px; font-weight:700; color:var(--ink2); margin-bottom:4px; }
  .mmt-sub { font-size:12px; color:var(--ink3); margin-bottom:14px; line-height:1.45; }
  .mmt-row { background:#fff; border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px; box-shadow:var(--shadow); border:1px solid rgba(26,18,8,.06); transition:background .12s; display:flex; align-items:center; gap:10px; }
  .mmt-info { flex:1; min-width:0; }
  .mmt-name { font-size:14px; font-weight:600; color:var(--ink); }
  .mmt-name-btn { display:block; width:100%; text-align:left; background:none; border:none; padding:0; margin:0; font:inherit; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer; }
  .mmt-name-btn:hover, .mmt-name-btn:focus { text-decoration:underline; color:var(--ink2); }
  .mmt-meta { font-size:11px; color:var(--ink3); margin-top:4px; }
  .mmt-cls-btn { background:var(--ink); color:var(--gold2); border:none; border-radius:8px; padding:6px 12px; font-size:11px; font-family:'Tiro Bangla',serif; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:opacity .12s; }
  .mmt-cls-btn:active { opacity:.8; }
  .mmt-section { margin:14px 0 8px; padding:6px 10px; border-radius:10px; background:var(--cream2); color:var(--ink2); font-size:11px; font-weight:700; }
  .dept-tab { display:flex; gap:6px; margin-bottom:14px; }
  .dept-tab-btn { flex:1; padding:10px; border:1px solid var(--cream3); border-radius:var(--radius-sm); text-align:center; font-family:'Tiro Bangla',serif; font-size:12px; font-weight:600; cursor:pointer; background:#fff; color:var(--ink3); transition:all .15s; }
  .dept-tab-btn.active { background:var(--ink); color:var(--gold2); border-color:var(--ink); }
  /* class overlay */
  .cls-overlay { position:fixed; inset:0; z-index:200; background:var(--bg,#faf6ef); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .25s ease; }
  .cls-overlay.is-open { transform:translateX(0); }
  .cls-ov-header { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; background:var(--ink); color:var(--gold2); flex-shrink:0; }
  .cls-ov-back { background:none; border:none; color:inherit; font-size:22px; cursor:pointer; padding:4px 10px 4px 0; line-height:1; }
  .cls-ov-info { flex:1; min-width:0; }
  .cls-ov-title { font-family:'Tiro Bangla',serif; font-size:16px; font-weight:700; }
  .cls-ov-teacher { font-size:11px; color:rgba(255,255,255,.65); margin-top:2px; }
  .cls-ov-tabs { display:flex; border-bottom:2px solid var(--cream2); background:#fff; flex-shrink:0; }
  .cls-ov-tab { flex:1; padding:10px 4px; border:none; background:none; font-family:'Tiro Bangla',serif; font-size:12px; color:var(--ink3); cursor:pointer; border-bottom:2.5px solid transparent; margin-bottom:-2px; transition:color .15s; }
  .cls-ov-tab.active { color:var(--ink); font-weight:700; border-bottom-color:var(--gold); }
  .cls-ov-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; padding-bottom:32px; }
  .ov-list { display:flex; flex-direction:column; gap:8px; }
  .ov-student-row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-s-id { font-size:10px; color:var(--ink3); min-width:30px; }
  .ov-s-name { flex:1; font-size:13px; font-family:'Tiro Bangla',serif; color:var(--ink); }
  .ov-s-status { font-size:11px; font-weight:700; min-width:60px; text-align:right; }
  .ov-kitab-row { padding:12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-k-name { font-size:13px; font-family:'Tiro Bangla',serif; color:var(--ink); margin-bottom:4px; }
  .ov-k-pct { font-size:12px; font-weight:700; color:var(--green); margin-bottom:6px; }
  .ov-k-bar { height:6px; background:var(--cream2); border-radius:3px; overflow:hidden; }
  .ov-k-fill { height:100%; background:var(--green); border-radius:3px; }
  .ov-log-row { padding:10px 12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .ov-log-date { font-size:10px; color:var(--ink3); margin-bottom:4px; }
  .ov-log-text { font-size:13px; color:var(--ink2); line-height:1.5; white-space:pre-wrap; }
  .ov-empty { text-align:center; color:var(--ink3); padding:40px 0; font-size:13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">জিম্মাদার</div>
    <div class="topbar-name">শ্রেণি শিক্ষক</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" onclick="location.href='../main-admin-madrasa.html'">← এডমিন</button>
  </div>
</div>

<div class="mmt-page">
  <div class="dept-tab">
    <div class="dept-tab-btn active" id="dtab-all" onclick="switchDept('all')">সামগ্রিক</div>
    <div class="dept-tab-btn" id="dtab-kitab" onclick="switchDept('kitab')">কিতাব বিভাগ</div>
    <div class="dept-tab-btn" id="dtab-maktab" onclick="switchDept('maktab')">মক্তব বিভাগ</div>
  </div>
  <div class="mmt-sub" id="mmt-sub">—</div>
  <div id="mmt-list"></div>
</div>

<!-- CLASS DETAIL OVERLAY -->
<div class="cls-overlay" id="cls-overlay">
  <div class="cls-ov-header">
    <button class="cls-ov-back" onclick="closeClassOverlay()" aria-label="ফিরে যাও">←</button>
    <div class="cls-ov-info">
      <div class="cls-ov-title" id="cls-ov-title">—</div>
      <div class="cls-ov-teacher" id="cls-ov-teacher">—</div>
    </div>
  </div>
  <div class="cls-ov-tabs">
    <button class="cls-ov-tab active" data-tab="students" onclick="switchOvTab('students')">ছাত্র তালিকা</button>
    <button class="cls-ov-tab" data-tab="kitab" onclick="switchOvTab('kitab')">বই</button>
    <button class="cls-ov-tab" data-tab="logs" onclick="switchOvTab('logs')">লগ</button>
  </div>
  <div class="cls-ov-body" id="cls-ov-body"></div>
</div>

<nav class="main-nav" role="navigation" aria-label="জিম্মাদার নেভিগেশন">

  <a class="main-nav-btn" href="mdr-admin-accounts.html" aria-label="হিসাব" data-admin-perm="daftar"><svg class="main-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 6h18v12H3z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M7 10h.01M17 14h.01"/><circle stroke-width="1.75" cx="12" cy="12" r="2.5"/></svg><span class="main-nav-lbl">হিসাব</span></a>
  <a class="main-nav-btn" href="../main-admin-khedmat.html" aria-label="খেদমত"><svg class="main-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg><span class="main-nav-lbl">খেদমত</span></a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../api-shared.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/mdr-supabase-sync.js"></script>
<script src="../js/mm-hijri.js"></script>
<script src="../js/mm-student-modal.js"></script>
<script src="../js/mm-teacher-modal.js"></script>
<script src="../js/mam-overlay.js"></script>
<script>
  if (!MMSession.requireAdminPerm('teachers', '../main-admin-madrasa.html')) { throw new Error('admin permission denied'); }
  let currentDept = 'all';
  (function() {
    const allowed = MMSession.getAllowedMadrasaDepts();
    try {
      const d = new URLSearchParams(location.search).get('dept');
      if (d === 'all' && allowed.length > 1) currentDept = 'all';
      if ((d === 'kitab' || d === 'maktab') && MMSession.canUseMadrasaDept(d)) currentDept = d;
    } catch (e) {}
    if (currentDept !== 'all' && !MMSession.canUseMadrasaDept(currentDept)) currentDept = allowed[0] || 'kitab';
    if (currentDept === 'all' && allowed.length <= 1) currentDept = allowed[0] || 'kitab';
  })();

  function switchDept(dept) {
    const allowed = MMSession.getAllowedMadrasaDepts();
    if (dept === 'all' && allowed.length <= 1) return;
    if (dept !== 'all' && !MMSession.canUseMadrasaDept(dept)) return;
    currentDept = dept;
    syncDeptTabs();
    render();
  }

  function deptLabel(dept) { return dept === 'maktab' ? 'মক্তব বিভাগ' : 'কিতাব বিভাগ'; }
  function getScopeDepts() {
    const allowed = MMSession.getAllowedMadrasaDepts();
    return currentDept === 'all' ? allowed : [currentDept];
  }
  function syncDeptTabs() {
    const allowed = MMSession.getAllowedMadrasaDepts();
    document.getElementById('dtab-all').classList.toggle('active', currentDept === 'all');
    document.getElementById('dtab-kitab').classList.toggle('active', currentDept === 'kitab');
    document.getElementById('dtab-maktab').classList.toggle('active', currentDept === 'maktab');
    document.getElementById('dtab-all').style.display = allowed.length > 1 ? '' : 'none';
    document.getElementById('dtab-kitab').style.display = allowed.includes('kitab') ? '' : 'none';
    document.getElementById('dtab-maktab').style.display = allowed.includes('maktab') ? '' : 'none';
  }

  function render() {
    const label = currentDept === 'all' ? 'সামগ্রিক' : deptLabel(currentDept);
    document.getElementById('mmt-sub').textContent = label + ' · বর্ষের নামে ট্যাপ করলে বিস্তারিত দেখুন';
    const list = getScopeDepts().flatMap(dept => API.Teachers.getByDept(dept).map(t => ({ ...t, dept })));
    const el = document.getElementById('mmt-list');
    if (!list.length) {
      el.innerHTML = '<div style="text-align:center;color:var(--ink3);padding:36px 12px;font-size:14px;">এই বিভাগে কোনো শ্রেণি শিক্ষক নিবন্ধিত নেই।</div>';
      return;
    }
    let lastDept = '';
    el.innerHTML = list.map(t => {
      const cls = t.class_id ? API.Classes.getById(t.class_id) : null;
      const section = currentDept === 'all' && t.dept !== lastDept ? `<div class="mmt-section">${deptLabel(t.dept)}</div>` : '';
      lastDept = t.dept;
      return section + `<div class="mmt-row">
        <div class="mmt-info">
          <button type="button" class="mmt-name-btn" onclick="MMTeacherModal.open('${String(t.id).replace(/'/g, "\\'")}')">${API.esc(t.name)}</button>
          <div class="mmt-meta">${cls ? API.esc(cls.name) : 'বর্ষ নির্ধারিত নেই'}</div>
        </div>
        ${cls ? `<button type="button" class="mmt-cls-btn" onclick="openClassOverlay('${String(cls.id).replace(/'/g, "\\'")}')">বর্ষ দেখুন →</button>` : ''}
      </div>`;
    }).join('');
  }
  async function initPage() {
    syncDeptTabs();
    try {
      if (window.MDRSupabaseSync) await MDRSupabaseSync.syncAdminUsers();
      if (window.MDRSupabaseSync) await MDRSupabaseSync.syncAdminStudents();
    } catch (e) {
      console.warn('madrasa teacher sync failed', e);
    }
    render();
  }
  MMLoading.run(initPage);
</script>
</body>
</html>
