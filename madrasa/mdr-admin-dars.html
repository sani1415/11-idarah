<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>দরস — কিতাব পড়া — জিম্মাদার</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  .dars-lead { font-size:12px; color:var(--ink3); line-height:1.5; margin:0 0 12px; }
  .dars-tabs { display:flex; gap:8px; margin-bottom:10px; }
  .dars-tab { flex:1; padding:10px 6px; background:#fff; border:1.5px solid var(--cream3); border-radius:var(--radius-sm); text-align:center; cursor:pointer; font-size:12px; color:var(--ink3); }
  .dars-tab.active { border-color:var(--ink); background:var(--ink); color:var(--gold2); font-weight:600; }
  .dars-class-select-wrap { margin:0 0 12px; }
  .dars-class-select-label { display:block; font-size:11px; color:var(--ink3); margin-bottom:5px; }
  .dars-book-btn { display:inline; border:0; background:none; padding:0; margin:0; font:inherit; font-family:'Tiro Bangla',serif; color:var(--ink); text-align:left; cursor:pointer; }
  .dars-book-btn:hover { color:var(--gold); text-decoration:underline; }
  .dars-panel { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; border:1px solid rgba(26,18,8,.06); }
  .dars-class-h { padding:10px 12px; background:var(--cream2); font-family:'Tiro Bangla',serif; font-size:14px; font-weight:700; color:var(--ink2); }
  .dars-class-sub { font-size:10px; font-weight:500; color:var(--ink3); margin-top:2px; font-family:'Tiro Bangla',serif; }
  .dars-book { padding:10px 12px; border-top:1px solid var(--cream2); }
  .dars-book-t { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:4px; }
  .dars-book-n { font-size:13px; font-family:'Tiro Bangla',serif; color:var(--ink); }
  .dars-book-meta { font-size:10px; color:var(--ink3); }
  .dars-pct { font-size:12px; font-weight:700; color:var(--green); }
  .dars-bar { height:6px; background:var(--cream2); border-radius:3px; overflow:hidden; margin-top:6px; }
  .dars-fill { height:100%; background:var(--green); border-radius:3px; transition:width .3s; }
  .dars-empty { text-align:center; color:var(--ink3); padding:20px; font-size:12px; }
  .hist-row { padding:10px 0; border-bottom:1px solid var(--cream2); }
  .hist-row:last-child { border-bottom:none; }
  .hist-date { font-size:11px; color:var(--ink3); margin-bottom:3px; }
  .hist-main { font-size:13px; color:var(--ink2); font-weight:700; }
  .hist-note { font-size:12px; color:var(--ink3); margin-top:4px; line-height:1.45; }
  .content { padding-bottom:var(--app-content-pad-bottom); }

  /* ══ Desktop (≥ 960px) ══ */
  @media (min-width: 960px) {
    html body .content { max-width: 1100px !important; }
    .dars-panel { max-width: none; }
    .dars-book { padding: 12px 16px; }
    .dars-book-n { font-size: 14px; }
    .dars-pct { font-size: 13px; }
    .dars-tab { font-size: 13px; padding: 12px 8px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">জিম্মাদার</div>
    <div class="topbar-name">দরস — বই পড়া</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" onclick="location.href='../main-admin-madrasa.html'">← এডমিন</button>
  </div>
</div>

<div class="content" style="max-width:640px; margin:0 auto;">
  <p class="dars-lead">উপরে <strong>বর্ষ</strong> বেছে নিন—নিচে ওই বর্ষের কিতাবের পড়া দেখাবে। বইয়ের নামে ক্লিক করলে হালনাগাদের বিস্তারিত ইতিহাস দেখা যাবে।</p>
  <div class="dars-tabs">
    <button type="button" class="dars-tab active" id="dtab-a" onclick="setDept('all')">সামগ্রিক</button>
    <button type="button" class="dars-tab" id="dtab-k" onclick="setDept('kitab')">কিতাব বিভাগ</button>
    <button type="button" class="dars-tab" id="dtab-m" onclick="setDept('maktab')">মক্তব বিভাগ</button>
  </div>
  <div class="dars-class-select-wrap">
    <label class="dars-class-select-label" for="dars-class-select">বর্ষ নির্বাচন করুন</label>
    <select class="form-input form-select" id="dars-class-select" onchange="selectClass(this.value)" aria-label="বর্ষ নির্বাচন"></select>
  </div>
  <div id="dars-detail"></div>
</div>

<div class="modal-bg" id="modal-dars-history">
  <div class="modal">
    <div class="modal-title"><span id="hist-title">কিতাবের ইতিহাস</span> <button class="modal-close" onclick="closeHistoryModal()">✕</button></div>
    <div id="hist-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../api-shared.js"></script>
<script src="../api-mdr.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/mdr-supabase-sync.js"></script>
<script>
  if (!MMSession.requireAdminPerm('dars', '../main-admin-madrasa.html')) { throw new Error('admin permission denied'); }
  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  let dept = 'all';
  (function() {
    const allowed = MMSession.getAllowedMadrasaDepts();
    try {
      const d = new URLSearchParams(location.search).get('dept');
      if (d === 'all' && allowed.length > 1) dept = 'all';
      if ((d === 'kitab' || d === 'maktab') && MMSession.canUseMadrasaDept(d)) dept = d;
    } catch (e) {}
    if (dept !== 'all' && !MMSession.canUseMadrasaDept(dept)) dept = allowed[0] || 'kitab';
    if (dept === 'all' && allowed.length <= 1) dept = allowed[0] || 'kitab';
  })();
  let selectedClassId = null;

  function sortClasses(list) {
    return [...list].sort((a, b) => {
      const o = (Number(a.sort_order) || 0) - (Number(b.sort_order) || 0);
      if (o !== 0) return o;
      return String(a.name || '').localeCompare(String(b.name || ''), 'bn');
    });
  }

  function deptLabel(d) { return d === 'maktab' ? 'মক্তব বিভাগ' : 'কিতাব বিভাগ'; }
  function getScopeDepts() {
    const allowed = MMSession.getAllowedMadrasaDepts();
    return dept === 'all' ? allowed : [dept];
  }
  function currentClasses() {
    return getScopeDepts().flatMap(d => sortClasses(API.Classes.getByDept(d)).map(c => ({ ...c, dept: d })));
  }

  function setDept(d) {
    const allowed = MMSession.getAllowedMadrasaDepts();
    if (d === 'all' && allowed.length <= 1) return;
    if (d !== 'all' && !MMSession.canUseMadrasaDept(d)) return;
    dept = d;
    document.getElementById('dtab-a').classList.toggle('active', d === 'all');
    document.getElementById('dtab-k').classList.toggle('active', d === 'kitab');
    document.getElementById('dtab-m').classList.toggle('active', d === 'maktab');
    document.getElementById('dtab-a').style.display = allowed.length > 1 ? '' : 'none';
    document.getElementById('dtab-k').style.display = MMSession.canUseMadrasaDept('kitab') ? '' : 'none';
    document.getElementById('dtab-m').style.display = MMSession.canUseMadrasaDept('maktab') ? '' : 'none';
    const cl = currentClasses();
    const still = cl.some(c => c.id === selectedClassId);
    if (!still) selectedClassId = cl[0] ? cl[0].id : null;
    renderAll();
  }

  function selectClass(cid) {
    selectedClassId = cid;
    renderClassSelect();
    renderDetail();
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const p = iso.split('-');
    if (p.length < 3) return API.esc(iso);
    return toBn(parseInt(p[2], 10)) + '/' + toBn(parseInt(p[1], 10)) + '/' + toBn(p[0]);
  }

  function barPct(done, total) {
    const t = Number(total) || 0;
    const d = Math.max(0, Number(done) || 0);
    if (t <= 0) return d > 0 ? 100 : 0;
    return Math.min(100, Math.round((d / t) * 1000) / 10);
  }

  function teacherMap() {
    const m = {};
    getScopeDepts().forEach(d => API.Teachers.getByDept(d).forEach(t => { m[t.class_id] = t.name; }));
    return m;
  }

  function renderClassSelect() {
    const classes = currentClasses();
    const sel = document.getElementById('dars-class-select');
    if (!classes.length) {
      selectedClassId = null;
      sel.innerHTML = '';
      return;
    }
    if (!selectedClassId || !classes.some(c => c.id === selectedClassId)) selectedClassId = classes[0].id;
    sel.innerHTML = classes.map(c => `<option value="${API.esc(c.id)}">${dept === 'all' ? API.esc(deptLabel(c.dept)) + ' — ' : ''}${API.esc(c.name)}</option>`).join('');
    sel.value = selectedClassId;
  }

  function jsArg(v) {
    return String(v || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  function renderDetail() {
    const el = document.getElementById('dars-detail');
    const classes = currentClasses();
    const tm = teacherMap();
    if (!classes.length) {
      el.innerHTML = '<div class="dars-empty">এ বিভাগে কোনো বর্ষ নেই।</div>';
      return;
    }
    const cls = classes.find(c => c.id === selectedClassId) || classes[0];
    const books = API.KitabProgress.getByClass(cls.id);
    const tName = tm[cls.id] || '—';

    if (!books.length) {
      el.innerHTML = `<div class="dars-panel">
        <div class="dars-class-h">${API.esc(cls.name)}<div class="dars-class-sub">${dept === 'all' ? deptLabel(cls.dept) + ' · ' : ''}শ্রেণি শিক্ষক: ${API.esc(tName)}</div></div>
        <div class="dars-empty">এ বর্ষে কোনো কিতাব যোগ নেই। সেটিং বা বই তালিকা যাচাই করুন।</div>
      </div>`;
      return;
    }
    const rows = books.map(k => {
      const total = k.total_pages != null ? Number(k.total_pages) : 0;
      const done = Number(k.pages_done) || 0;
      const pct = barPct(done, total);
      const pctInt = Math.round(pct);
      return `<div class="dars-book">
        <div class="dars-book-t">
          <div><div class="dars-book-n"><button type="button" class="dars-book-btn" onclick="openHistoryModal('${jsArg(k.id)}')">${API.esc(k.name || '—')}</button></div>
            <div class="dars-book-meta">সর্বশেষ হালনাগাদ: ${fmtDate(k.last_updated)}</div></div>
          <div class="dars-pct">${toBn(pctInt)}%</div>
        </div>
        <div class="dars-book-meta">পৃষ্ঠা: <strong style="color:var(--ink2);">${toBn(done)}</strong> / ${total ? toBn(total) : '—'}</div>
        <div class="dars-bar" aria-hidden="true"><div class="dars-fill" style="width:${Math.min(100, pct)}%"></div></div>
      </div>`;
    }).join('');

    el.innerHTML = `<div class="dars-panel">
      <div class="dars-class-h">${API.esc(cls.name)}<div class="dars-class-sub">${dept === 'all' ? deptLabel(cls.dept) + ' · ' : ''}শ্রেণি শিক্ষক: ${API.esc(tName)}</div></div>
      ${rows}
    </div>`;
  }

  function renderAll() {
    renderClassSelect();
    renderDetail();
  }

  function openHistoryModal(bookId) {
    const cls = currentClasses().find(c => c.id === selectedClassId);
    const book = (cls ? API.KitabProgress.getByClass(cls.id) : []).find(k => k.id === bookId);
    if (!book) return;
    document.getElementById('hist-title').textContent = (book.name || 'কিতাব') + ' — হালনাগাদ ইতিহাস';
    const hist = Array.isArray(book.history) ? book.history : [];
    document.getElementById('hist-body').innerHTML = hist.length ? hist.map(h => {
      const done = Number(h.pages_done) || 0;
      const total = Number(book.total_pages) || 0;
      const pct = Math.round(barPct(done, total));
      return `<div class="hist-row">
        <div class="hist-date">${fmtDate(h.date)}</div>
        <div class="hist-main">${toBn(done)} পৃষ্ঠা${total ? ' / ' + toBn(total) : ''} · ${toBn(pct)}%</div>
        ${h.note ? `<div class="hist-note">${API.esc(h.note)}</div>` : ''}
      </div>`;
    }).join('') : '<div class="dars-empty">এ বইয়ের কোনো হালনাগাদ ইতিহাস নেই।</div>';
    document.getElementById('modal-dars-history').classList.add('open');
  }

  function closeHistoryModal() {
    document.getElementById('modal-dars-history').classList.remove('open');
  }
  async function initDarsPage() {
    const el = document.getElementById('dars-detail');
    if (el) el.innerHTML = '<div class="dars-empty">দরস তালিকা লোড হচ্ছে...</div>';
    if (window.MDRSupabaseSync && MMSession.getAdminPin && MMSession.getAdminPin()) {
      try {
        await MDRSupabaseSync.syncAdminDars();
      } catch (e) {
        console.warn('admin dars sync failed', e);
      }
    }
    setDept(dept);
  }

  initDarsPage();
</script>
</body>
