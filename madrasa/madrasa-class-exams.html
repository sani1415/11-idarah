<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>পরীক্ষা ও ফল — বর্ষ দায়িত্বশীল</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .exam-card { background:#fff; border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:10px; cursor:pointer; transition:transform .12s; }
  .exam-card:active { transform:scale(.98); }
  .exam-type { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:600; }
  .type-half    { background:var(--blue-light);  color:var(--blue);  }
  .type-yearly  { background:var(--green-light); color:var(--green); }
  .type-test    { background:var(--gold-light);  color:var(--gold);  }
  .type-weekly  { background:rgba(124,58,237,.12); color:#6d28d9; }
  .type-monthly { background:rgba(14,116,144,.12); color:#0e7490; }
  .result-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid var(--cream2); gap:8px; }
  .result-row:last-child { border-bottom:none; }
  .result-rank { font-family:'Tiro Bangla',serif; font-size:18px; font-weight:700; min-width:28px; color:var(--ink3); }
  .rank-1 { color:var(--gold); }
  .rank-2 { color:var(--ink2); }
  .rank-3 { color:var(--red); }
  .subj-row { display:flex; flex-wrap:wrap; gap:8px; align-items:flex-end; margin-bottom:10px; }
  .mark-sheet-scroll { overflow:auto; -webkit-overflow-scrolling:touch; height:calc(100vh - 268px); border-radius:var(--radius); box-shadow:var(--shadow); background:#fff; }
  .mark-grid { border-collapse:collapse; width:100%; }
  .mark-grid th,.mark-grid td { padding:6px 4px; text-align:center; border-bottom:1px solid var(--cream2); white-space:nowrap; font-size:12px; }
  .mark-grid th { background:var(--ink); color:var(--gold2); font-size:11px; font-weight:600; position:sticky; top:0; z-index:2; }
  .mark-grid td:first-child,.mark-grid th:first-child { position:sticky; left:0; text-align:left; min-width:80px; max-width:110px; white-space:normal; z-index:3; }
  .mark-grid td:first-child { background:var(--cream); }
  .mark-grid th:first-child { background:var(--ink); z-index:5; }
  .mark-grid td:last-child { position:sticky; right:0; background:var(--cream); font-family:'Tiro Bangla',serif; font-weight:700; min-width:62px; z-index:3; }
  .mark-grid th:last-child { background:var(--ink); z-index:5; }
  .mark-cell { width:52px; border:1.5px solid var(--cream3); border-radius:6px; padding:5px 2px; text-align:center; font-size:13px; font-family:'Tiro Bangla',serif; outline:none; }
  .mark-cell:focus { border-color:var(--gold); }
  .row-done { background:rgba(34,197,94,.07); }
  .exam-actions { display:flex; gap:5px; align-items:center; flex-shrink:0; }
  .exam-act-btn { background:none; border:1.5px solid var(--cream3); border-radius:8px; padding:4px 8px; font-size:12px; cursor:pointer; line-height:1; color:var(--ink2); font-family:'Tiro Bangla',serif; }
  .exam-act-btn:active { opacity:.7; }
  .grade-badge { font-size:12px; font-weight:700; padding:3px 8px; border-radius:8px; }
  .g-mumtaz { background:#d4efdf; color:#1e8449; }
  .g-jayyid2 { background:var(--blue-light); color:var(--blue); }
  .g-jayyid  { background:var(--teal-light); color:var(--teal); }
  .g-maqbul  { background:var(--gold-light); color:var(--gold); }
  .g-rasib   { background:var(--red-light);  color:var(--red);  }
  .cls-overlay { position:fixed; inset:0; z-index:200; background:var(--bg,#faf6ef); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .25s ease; }
  .cls-overlay.is-open { transform:translateX(0); }
  .cls-ov-header { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; background:var(--ink); color:var(--gold2); flex-shrink:0; }
  .cls-ov-back { background:none; border:none; color:inherit; font-size:22px; cursor:pointer; padding:4px 10px 4px 0; line-height:1; }
  .cls-ov-info { flex:1; min-width:0; }
  .cls-ov-title { font-family:'Tiro Bangla',serif; font-size:16px; font-weight:700; }
  .cls-ov-teacher { font-size:11px; color:rgba(255,255,255,.65); margin-top:2px; }
  .cls-ov-tabs { display:flex; border-bottom:2px solid var(--cream2); background:#fff; flex-shrink:0; }
  .cls-ov-tab { flex:1; padding:10px 4px; border:none; background:none; font-family:'Tiro Bangla',serif; font-size:12px; color:var(--ink3); cursor:pointer; border-bottom:2.5px solid transparent; margin-bottom:-2px; transition:color .15s; }
  .cls-ov-tab.active { color:var(--ink); font-weight:700; border-bottom-color:var(--gold); }
  .cls-ov-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; padding-bottom:32px; }
  .ov-empty { text-align:center; color:var(--ink3); padding:40px 0; font-size:13px; }
  a.nav-item { -webkit-tap-highlight-color:transparent; }

  /* প্রশ্নপত্র আপলোড */
  .paper-upload { margin-top:10px; }
  .paper-upload-label { display:block; font-size:11px; font-weight:600; color:var(--ink2); margin-bottom:5px; }
  .paper-upload-row { display:flex; gap:8px; align-items:center; }
  .paper-file-input { flex:1; min-width:0; font-family:'Tiro Bangla',serif; font-size:11px; padding:8px 10px; border:1.5px dashed var(--cream3); border-radius:var(--radius-sm); background:var(--cream2); color:var(--ink3); cursor:pointer; outline:none; }
  .paper-file-input:focus { border-color:var(--gold); }
  .paper-name { font-size:11px; color:var(--green); margin-top:5px; display:none; word-break:break-all; }
  .paper-name.show { display:block; }
  .paper-clear { background:none; border:none; color:var(--red); cursor:pointer; font-size:13px; padding:4px 8px; flex-shrink:0; }
  .paper-preview-link { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--blue); cursor:pointer; text-decoration:none; margin-left:6px; }
  .paper-preview-link:hover { text-decoration:underline; }
  .paper-card-link { font-size:11px; color:var(--blue); cursor:pointer; margin-top:4px; display:inline-block; }

  /* ══ Desktop (≥ 960px) ══ */
  @media (min-width: 960px) {
    html body .content { max-width: 1000px !important; }
    .exam-card { padding: 16px; }
    .mark-cell { font-size: 14px; }
    .mark-sheet-scroll { height: calc(100vh - 220px); }
  }
</style>
</head>

<script>
  if (MMSession.getRole() !== 'teacher') { location.href = '../index.html'; }
  const tid = MMSession.getTeacherId();
  const teacher = API.Teachers.getById(tid);
  if (!teacher || !teacher.class_id) { location.href = '../index.html'; }
  const classId = teacher.class_id;
  const myClass = API.Classes.getById(classId);
  document.getElementById('top-class-name').textContent = myClass ? myClass.name : 'বর্ষ';

  function toBn(n) { return String(n).replace(/[0-9]/g, d=>'০১২৩৪৫৬৭৮৯'[d]); }
  function getGrade(pct) {
    if (pct>=90) return {label:'ممتاز',  cls:'g-mumtaz'};
    if (pct>=80) return {label:'جيد جداً',cls:'g-jayyid2'};
    if (pct>=70) return {label:'جيد',    cls:'g-jayyid'};
    if (pct>=60) return {label:'مقبول',  cls:'g-maqbul'};
    return              {label:'راسب',   cls:'g-rasib'};
  }
  const TYPE_LABEL = { weekly:'সাপ্তাহিক', monthly:'মাসিক', half_yearly:'ষান্মাসিক', yearly:'বার্ষিক', test:'টেস্ট' };
  const TYPE_CLS   = { weekly:'type-weekly', monthly:'type-monthly', half_yearly:'type-half', yearly:'type-yearly', test:'type-test' };

  let currentExamId = null;
  let subjectIdx = 0;
  let editExamId = null;
  let editSubjectIdx = 0;
  let paperFileData = null;
  let paperFileName = '';

  function handlePaperFile(input) {
    var file = input.files && input.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { showToast('ফাইল ১০ MB-র বেশি হতে পারবে না'); input.value = ''; return; }
    var ext = (file.name || '').split('.').pop().toLowerCase();
    var allowed = ['jpg','jpeg','png','gif','webp','bmp','pdf'];
    if (allowed.indexOf(ext) === -1) { showToast('শুধু ইমেজ বা PDF ফাইল দিন'); input.value = ''; return; }
    var reader = new FileReader();
    reader.onload = function() {
      paperFileData = reader.result;
      paperFileName = file.name;
      document.getElementById('paper-name').textContent = '📎 ' + file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)';
      document.getElementById('paper-name').classList.add('show');
      document.getElementById('paper-clear').style.display = '';
    };
    reader.readAsDataURL(file);
  }

  function clearPaperFile() {
    paperFileData = null;
    paperFileName = '';
    document.getElementById('paper-file').value = '';
    document.getElementById('paper-name').classList.remove('show');
    document.getElementById('paper-clear').style.display = 'none';
  }

  function goHome() { switchPanel('home'); renderHome(); }
  function switchPanel(name) {
    document.getElementById('panel-home').classList.toggle('active', name === 'home');
    document.getElementById('panel-exam').classList.toggle('active', name === 'exam');
    window.scrollTo(0,0);
  }
  function switchExamTab(tab) {
    ['results','entry','analytics','history'].forEach(t=>{
      const btn = document.getElementById('etab-'+t);
      const box = document.getElementById('etab-content-'+t);
      if (btn) btn.classList.toggle('active',t===tab);
      if (box) box.style.display = t===tab ? 'block' : 'none';
    });
    if(tab==='results') renderResults();
    else if(tab==='entry') renderEntry();
    else if(tab==='analytics') renderExamAnalytics();
    else renderHistory();
  }
  function kitabOptionsHtml() {
    const kitabs = API.KitabProgress.getKitabsByClass(classId);
    let o = '<option value="">— বই বেছে নিন —</option>';
    kitabs.forEach(k => { o += '<option value="k:'+k.id+'">'+API.esc(k.name)+'</option>'; });
    o += '<option value="custom">অন্যান্য (নিজে লিখুন)</option>';
    return o;
  }
  function toggleSubjCustom(i) {
    const sel = document.getElementById('ks-'+i);
    const inp = document.getElementById('sn-'+i);
    if (!sel || !inp) return;
    const on = sel.value === 'custom';
    inp.style.display = on ? 'block' : 'none';
  }
  function prepareExamModal() {
    document.getElementById('ex-name').value = '';
    document.getElementById('subject-rows').innerHTML = '';
    subjectIdx = 0;
    clearPaperFile();
    addSubjectRow();
    addSubjectRow();
  }
  function addSubjectRow() {
    const i = subjectIdx++;
    const div = document.createElement('div');
    div.id = 'sr-'+i;
    div.className = 'subj-row';
    div.innerHTML = '<select class="form-input form-select" id="ks-'+i+'" style="flex:1;min-width:140px" onchange="toggleSubjCustom('+i+')">'+kitabOptionsHtml()+'</select>'+
      '<input class="form-input" id="sn-'+i+'" placeholder="বিষয়ের নাম" style="flex:1;min-width:100px;display:none" />'+
      '<input class="form-input" type="number" id="sm-'+i+'" placeholder="মান" min="1" value="100" style="width:72px" />'+
      '<button type="button" onclick="document.getElementById(\'sr-'+i+'\').remove()" style="background:var(--red-light);color:var(--red);border:none;border-radius:8px;width:40px;height:44px;cursor:pointer;flex-shrink:0;font-size:16px">✕</button>';
    document.getElementById('subject-rows').appendChild(div);
  }
  function setBusy(on) {
    document.body.style.pointerEvents = on ? 'none' : '';
    const t = document.getElementById('toast');
    if (on) { t.textContent = 'অপেক্ষা করুন…'; t.classList.add('show'); }
    else if (t.textContent === 'অপেক্ষা করুন…') t.classList.remove('show');
  }
  async function saveExam() {
    const name = document.getElementById('ex-name').value.trim();
    const type = document.getElementById('ex-type').value;
    if (!name) { showToast('পরীক্ষার নাম দিন'); return; }
    const kitabList = API.KitabProgress.getKitabsByClass(classId);
    const subjects = [];
    document.getElementById('subject-rows').querySelectorAll('[id^="sr-"]').forEach(function(row) {
      const k = row.id.replace('sr-','');
      const sel = document.getElementById('ks-'+k);
      const sm = parseInt(document.getElementById('sm-'+k).value, 10) || 100;
      if (!sel || !sel.value) return;
      if (sel.value.indexOf('k:') === 0) {
        const bk = kitabList.find(x => 'k:'+x.id === sel.value);
        if (bk) subjects.push({ name: bk.name, max: sm });
      } else if (sel.value === 'custom') {
        const nm = (document.getElementById('sn-'+k).value || '').trim();
        if (nm) subjects.push({ name: nm, max: sm });
      }
    });
    if (!subjects.length) {
      showToast(kitabList.length ? 'কমপক্ষে একটি বই বেছে নিন' : 'কোনো বই নেই; সেটিংসে বই যোগ করুন, অথবা «অন্যান্য»');
      return;
    }
    setBusy(true);
    try {
      var newId = await MDRExamsSync.saveExam(name, type, subjects, paperFileName, paperFileData);
      if (paperFileData && paperFileName) {
        var savedExams = API.Exams.getAll();
        var saved = null;
        if (newId) saved = savedExams.find(function(e) { return String(e.supabase_id || e.id) === String(newId); });
        if (!saved) saved = savedExams[savedExams.length - 1];
        if (saved) {
          API.Exams.update(saved.id, { paper_name: paperFileName, paper_data: paperFileData });
        }
      }
      document.getElementById('ex-name').value = '';
      clearPaperFile();
      closeModal('add-exam');
      showToast('পরীক্ষা তৈরি হয়েছে ✓');
      renderHome();
    } catch(err) {
      showToast('ত্রুটি: ' + (err.message || 'সংরক্ষণ ব্যর্থ'));
    } finally { setBusy(false); }
  }
  function openModal(id) { document.getElementById('modal-'+id).classList.add('open'); }
  function closeModal(id) { document.getElementById('modal-'+id).classList.remove('open'); }

  function openEditExamModal(e, eid) {
    e.stopPropagation();
    const ex = API.Exams.getAll().find(x => x.id === eid);
    if (!ex) return;
    editExamId = eid;
    document.getElementById('edit-ex-name').value = ex.name || '';
    document.getElementById('edit-ex-type').value = ex.type || 'monthly';
    const hasResults = API.Exams.getResults(eid).length > 0;
    const subjArea = document.getElementById('edit-subject-area');
    if (hasResults) {
      subjArea.innerHTML = '<div style="background:var(--gold-light);border-radius:8px;padding:10px;font-size:12px;color:var(--gold);margin-bottom:8px;">মার্ক জমা আছে — বিষয় পরিবর্তন করা যাবে না।</div>'+
        '<div class="card-static" style="font-size:12px;margin-bottom:8px;">'+(ex.subjects||[]).map(s=>'<div style="padding:5px 0;border-bottom:1px solid var(--cream2);">'+API.esc(s.name)+'<span style="float:right;color:var(--ink3)">পূর্ণমান: '+toBn(s.max)+'</span></div>').join('')+'</div>';
    } else {
      editSubjectIdx = 0;
      subjArea.innerHTML = '<div id="edit-subject-rows"></div>'+
        '<button type="button" onclick="addEditSubjectRow()" style="background:var(--cream2);border:none;border-radius:8px;padding:9px;font-family:\'Tiro Bangla\',serif;font-size:12px;cursor:pointer;width:100%;margin-bottom:14px;">＋ আরেকটি বই/বিষয়</button>';
      (ex.subjects||[]).forEach(s => addEditSubjectRow(s));
      if (!(ex.subjects||[]).length) addEditSubjectRow();
    }
    openModal('edit-exam');
  }
  function addEditSubjectRow(preset) {
    const i = editSubjectIdx++;
    const div = document.createElement('div');
    div.id = 'esr-'+i; div.className = 'subj-row';
    let selVal = preset && preset.kitab_id ? 'k:'+preset.kitab_id : (preset ? 'custom' : '');
    const customName = (preset && !preset.kitab_id) ? (preset.name||'') : '';
    div.innerHTML = '<select class="form-input form-select" id="eks-'+i+'" style="flex:1;min-width:140px" onchange="toggleEditSubjCustom('+i+')">'+kitabOptionsHtml()+'</select>'+
      '<input class="form-input" id="esn-'+i+'" placeholder="বিষয়ের নাম" style="flex:1;min-width:100px;display:'+(selVal==='custom'?'block':'none')+'" value="'+API.esc(customName)+'" />'+
      '<input class="form-input" type="number" id="esm-'+i+'" placeholder="মান" min="1" value="'+(preset?preset.max:100)+'" style="width:72px" />'+
      '<button type="button" onclick="document.getElementById(\'esr-'+i+'\').remove()" style="background:var(--red-light);color:var(--red);border:none;border-radius:8px;width:40px;height:44px;cursor:pointer;flex-shrink:0;font-size:16px">✕</button>';
    const rows = document.getElementById('edit-subject-rows');
    if (rows) {
      rows.appendChild(div);
      if (selVal) { const s = document.getElementById('eks-'+i); if(s) s.value = selVal; }
    }
  }
  function toggleEditSubjCustom(i) {
    const sel = document.getElementById('eks-'+i);
    const inp = document.getElementById('esn-'+i);
    if (sel && inp) inp.style.display = sel.value === 'custom' ? 'block' : 'none';
  }
  async function updateExam() {
    const name = document.getElementById('edit-ex-name').value.trim();
    const type = document.getElementById('edit-ex-type').value;
    if (!name) { showToast('পরীক্ষার নাম দিন'); return; }
    const hasResults = API.Exams.getResults(editExamId).length > 0;
    let subjects = null;
    if (!hasResults) {
      const kitabList = API.KitabProgress.getKitabsByClass(classId);
      subjects = [];
      (document.getElementById('edit-subject-rows')||{querySelectorAll:()=>[]}).querySelectorAll('[id^="esr-"]').forEach(function(row) {
        const k = row.id.replace('esr-','');
        const sel = document.getElementById('eks-'+k);
        const sm = parseInt((document.getElementById('esm-'+k)||{}).value,10)||100;
        if (!sel||!sel.value) return;
        if (sel.value.indexOf('k:')===0) {
          const bk = kitabList.find(x=>'k:'+x.id===sel.value);
          if (bk) subjects.push({name:bk.name,max:sm});
        } else if (sel.value==='custom') {
          const nm=((document.getElementById('esn-'+k)||{}).value||'').trim();
          if (nm) subjects.push({name:nm,max:sm});
        }
      });
      if (!subjects.length) { showToast('কমপক্ষে একটি বিষয় রাখুন'); return; }
    }
    setBusy(true);
    try {
      await MDRExamsSync.updateExam(editExamId, name, type, subjects);
      closeModal('edit-exam');
      showToast('পরীক্ষা আপডেট হয়েছে ✓');
      renderHome();
    } catch(err) {
      showToast('ত্রুটি: ' + (err.message || 'আপডেট ব্যর্থ'));
    } finally { setBusy(false); }
  }
  async function deleteExam(e, eid) {
    e.stopPropagation();
    const ex = API.Exams.getAll().find(x => x.id === eid);
    if (!ex) return;
    const rc = API.Exams.getResults(eid).length;
    const msg = rc
      ? '"'+ex.name+'" মুছলে '+toBn(rc)+' জনের ফলাফলও মুছবে। নিশ্চিত?'
      : '"'+ex.name+'" পরীক্ষা মুছে ফেলবেন?';
    if (!confirm(msg)) return;
    setBusy(true);
    try {
      await MDRExamsSync.deleteExam(eid);
      showToast('পরীক্ষা মুছে গেছে');
      renderHome();
    } catch(err) {
      showToast('ত্রুটি: ' + (err.message || 'মুছতে ব্যর্থ'));
    } finally { setBusy(false); }
  }

  function openPaperPreview(eid) {
    var ex = API.Exams.getAll().find(function(e) { return e.id === eid; });
    if (!ex || !ex.paper_data) { showToast('প্রশ্নপত্র নেই'); return; }
    window.open(ex.paper_data, '_blank');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  function renderHome() {
    document.getElementById('exam-list-title').textContent = (myClass && myClass.name ? myClass.name : '') + ' — পরীক্ষা তালিকা';
    const exams = API.Exams.getByClass(classId);
    document.getElementById('exam-list').innerHTML = exams.length ? exams.map(function(ex) {
      const results = API.Exams.getResults(ex.id);
      const students = API.Students.getByClass(ex.class_id);
      return '<div class="exam-card" onclick="openExam(\''+ex.id+'\')"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'+
        '<div style="min-width:0;flex:1;margin-right:6px;"><div style="font-family:\'Tiro Bangla\',serif;font-size:15px;font-weight:700;">'+API.esc(ex.name)+'</div>'+
        '<div style="font-size:11px;color:var(--ink3);margin-top:3px;">'+API.esc(ex.created||'')+'</div></div>'+
        '<div class="exam-actions"><span class="exam-type '+(TYPE_CLS[ex.type]||'')+'">'+(TYPE_LABEL[ex.type]||ex.type||'')+'</span>'+
        '<button class="exam-act-btn" onclick="openEditExamModal(event,\''+ex.id+'\')" title="সম্পাদনা">✏</button>'+
        '<button class="exam-act-btn" style="color:var(--red);border-color:var(--red-light)" onclick="deleteExam(event,\''+ex.id+'\')" title="মুছুন">🗑</button></div></div>'+
        '<div style="display:flex;gap:12px;font-size:12px;color:var(--ink3);"><span>📚 '+toBn((ex.subjects||[]).length)+' বিষয়</span>'+
        '<span>✍️ '+toBn(results.length)+'/'+toBn(students.length)+' জমা</span>'+
        (ex.paper_data ? '<span class="paper-card-link" onclick="event.stopPropagation();openPaperPreview(\''+String(ex.id).replace(/'/g,"\\'")+'\')">📄 প্রশ্নপত্র</span>' : '') +
        '</div></div>';
    }).join('') : '<div class="empty-state"><span class="empty-icon">📝</span><div class="empty-text">কোনো পরীক্ষা তৈরি করুন</div></div>';
  }
  function openExam(eid) {
    currentExamId = eid;
    const ex = API.Exams.getAll().find(e=>e.id===eid);
    document.getElementById('exam-detail-name').textContent = ex && ex.name ? ex.name : '';
    switchPanel('exam');
    ['results','entry','analytics','history'].forEach(function(t, i) {
      document.getElementById('etab-'+t).classList.toggle('active', i===0);
      document.getElementById('etab-content-'+t).style.display = i===0 ? 'block' : 'none';
    });
    renderResults();
  }
  function renderExamAnalytics() {
    const el = document.getElementById('etab-content-analytics');
    if (!currentExamId || typeof ExamAnalytics === 'undefined') {
      el.innerHTML = '<div class="empty-state"><span class="empty-icon">📊</span><div class="empty-text">বিশ্লেষণ লোড হয়নি</div></div>';
      return;
    }
    el.innerHTML = ExamAnalytics.renderPanelHTML(currentExamId, { esc: API.esc, toBn });
  }
  function renderResults() {
    const results = API.Exams.getResults(currentExamId).sort(function(a,b) { return (b.total||0) - (a.total||0); });
    const el = document.getElementById('etab-content-results');
    if (!results.length) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">📊</span><div class="empty-text">এখনো কোনো ফলাফল নেই</div></div>'; return; }
    el.innerHTML = '<div class="card-static">'+results.map(function(r, i) {
      const s = API.Students.getById(r.student_id);
      const g = getGrade(r.percentage||0);
      return '<div class="result-row"><div class="result-rank rank-'+(i+1<=3?i+1:'')+'">'+toBn(i+1)+'</div><div style="flex:1;"><div style="font-size:13px;font-weight:600;">'+(s?('<button type="button" class="s-name-btn" style="font-size:13px;font-weight:600;" onclick="MMStudentModal.open(\''+String(s.id).replace(/'/g,"\\'")+'\')">'+API.esc(s.name)+'</button>'):'—')+'</div></div><div style="text-align:right;">'+
        '<div style="font-family:\'Tiro Bangla\',serif;font-size:15px;font-weight:700;">'+toBn(r.total||0)+'/'+toBn(r.max_total||0)+'</div><span class="grade-badge '+g.cls+'">'+g.label+'</span></div></div>';
    }).join('')+'</div>';
  }
  function renderEntry() {
    const ex = API.Exams.getAll().find(e=>e.id===currentExamId);
    const students = API.Students.getByClass(ex && ex.class_id || classId);
    const el = document.getElementById('etab-content-entry');
    if (!ex || !ex.subjects || !ex.subjects.length) {
      el.innerHTML = '<div class="empty-state"><span class="empty-icon">📝</span><div class="empty-text">পরীক্ষায় কোনো বিষয় নেই</div></div>';
      return;
    }
    const prevMap = {};
    API.Exams.getResults(currentExamId).forEach(r=>{ prevMap[r.student_id]=r; });
    const maxTotal = ex.subjects.reduce((a,s)=>a+s.max,0);
    let thead = '<tr><th>ছাত্র</th>';
    ex.subjects.forEach(s=>{
      thead += '<th>'+API.esc(s.name)+'<div style="font-weight:400;opacity:.7;font-size:10px">'+toBn(s.max)+'</div></th>';
    });
    thead += '<th>মোট</th></tr>';
    let tbody = '';
    students.forEach(st=>{
      const prev = prevMap[st.id];
      tbody += '<tr'+(prev?' class="row-done"':'')+' id="mgr-'+st.id+'">';
      tbody += '<td><div style="font-size:12px;font-weight:600;">'+API.esc(st.name)+'</div><div style="font-size:10px;color:var(--ink3)">'+API.escBn(st.roll||'')+'</div></td>';
      ex.subjects.forEach((s,i)=>{
        const pv = prev ? rowMarksPrev(prev,ex,i) : '';
        tbody += '<td><input class="mark-cell" type="number" min="0" max="'+s.max+'" value="'+(pv!=null&&pv!==''?pv:'')+'" data-sid="'+st.id+'" data-subj="'+i+'" data-subject-id="'+(s.id||'')+'" oninput="updateRowTotal(\''+st.id+'\')" onkeydown="cellKeyDown(event,this)"></td>';
      });
      const t = prev && prev.total!=null ? prev.total : null;
      tbody += '<td id="tot-'+st.id+'">'+(t!=null?toBn(t)+'/'+toBn(maxTotal):'—')+'</td>';
      tbody += '</tr>';
    });
    el.innerHTML = '<button class="submit-btn" style="margin-bottom:8px" type="button" onclick="saveAllMarks()">সব সংরক্ষণ করুন</button>'+
      '<div class="mark-sheet-scroll"><table class="mark-grid"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
  }
  function rowMarksPrev(prev, ex, i) {
    if (!prev || !prev.subjects || !ex.subjects[i]) return '';
    const want = (ex.subjects[i].name||'')+'|'+(ex.subjects[i].max||0);
    for (var j=0;j<prev.subjects.length;j++) {
      if (((prev.subjects[j].name||'')+'|'+(prev.subjects[j].max||0))===want) return prev.subjects[j].marks;
    }
    if (prev.subjects[i] && prev.subjects[i].marks!=null) return prev.subjects[i].marks;
    return '';
  }
  function updateRowTotal(sid) {
    const ex = API.Exams.getAll().find(e=>e.id===currentExamId);
    if (!ex) return;
    let total=0, max=0;
    ex.subjects.forEach((s,i)=>{
      const inp = document.querySelector('.mark-cell[data-sid="'+sid+'"][data-subj="'+i+'"]');
      if(inp) total += parseFloat(inp.value)||0;
      max += s.max;
    });
    const el = document.getElementById('tot-'+sid);
    if(el) el.textContent = toBn(total)+'/'+toBn(max);
  }
  function cellKeyDown(e,el) {
    if(e.key==='Enter') {
      e.preventDefault();
      const ex = API.Exams.getAll().find(x=>x.id===currentExamId);
      const students = API.Students.getByClass(ex&&ex.class_id||classId);
      const idx = students.findIndex(s=>s.id===el.dataset.sid);
      const nextSt = students[idx+1];
      if(nextSt) {
        const next = document.querySelector('.mark-cell[data-sid="'+nextSt.id+'"][data-subj="'+el.dataset.subj+'"]');
        if(next){next.focus();next.select();}
      }
    }
  }
  async function saveAllMarks() {
    const ex = API.Exams.getAll().find(e=>e.id===currentExamId);
    const students = API.Students.getByClass(ex&&ex.class_id||classId);
    if(!ex||!students.length) return;
    const resultsArr = [];
    students.forEach(st=>{
      ex.subjects.forEach((s,i)=>{
        const inp = document.querySelector('.mark-cell[data-sid="'+st.id+'"][data-subj="'+i+'"]');
        if(!inp || inp.value==='' || !s.id) return;
        resultsArr.push({student_id:st.id, subject_id:s.id, marks:parseFloat(inp.value)||0});
      });
    });
    if(!resultsArr.length) { showToast('কোনো মার্ক পাওয়া যায়নি'); return; }
    setBusy(true);
    try {
      await MDRExamsSync.saveResults(currentExamId, resultsArr);
      const uniqueStudents = new Set(resultsArr.map(r=>r.student_id)).size;
      showToast(toBn(uniqueStudents)+' জনের মার্ক সংরক্ষিত ✓');
      renderEntry();
    } catch(err) {
      showToast('ত্রুটি: ' + (err.message || 'সংরক্ষণ ব্যর্থ'));
    } finally { setBusy(false); }
  }
  function renderHistory() {
    const ex = API.Exams.getAll().find(e=>e.id===currentExamId);
    const students = API.Students.getByClass(ex && ex.class_id || classId);
    const el = document.getElementById('etab-content-history');
    el.innerHTML = '<div class="form-group"><label class="form-label">ছাত্র</label><select class="form-input form-select" id="hist-student" onchange="renderStudentHistory()">'+
      students.map(s=>'<option value="'+s.id+'">'+API.esc(s.name)+'</option>').join('')+'</select></div><div id="student-history"></div>';
    renderStudentHistory();
  }
  function renderStudentHistory() {
    const sid = document.getElementById('hist-student') && document.getElementById('hist-student').value;
    const results  = API.Exams.getStudentResults(sid);
    const allExams = API.Exams.getAll();
    document.getElementById('student-history').innerHTML = results.length ? results.map(function(r) {
      const ex0 = allExams.find(e=>e.id===r.exam_id);
      const g  = getGrade(r.percentage||0);
      return '<div class="card-static" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<div style="font-family:\'Tiro Bangla\',serif;font-size:14px;font-weight:700">'+API.esc((ex0 && ex0.name) || 'পরীক্ষা')+'</div><span class="grade-badge '+g.cls+'">'+g.label+'</span></div>'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:8px">'+toBn(r.total||0)+'/'+toBn(r.max_total||0)+' · '+toBn(r.percentage||0)+'%</div>'+
        (r.subjects||[]).map(s=>'<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--cream2)"><span>'+API.esc(s.name)+'</span><span style="font-weight:600">'+toBn(s.marks||0)+'/'+toBn(s.max||0)+'</span></div>').join('')+
        '</div>';
    }).join('') : '<div class="empty-state"><span class="empty-icon">📊</span><div class="empty-text">কোনো ফলাফল নেই</div></div>';
  }
  async function initPage() {
    setBusy(true);
    try {
      if (window.MDRExamsSync) await MDRExamsSync.bootstrap();
    } catch(err) {
      console.warn('Exam bootstrap failed, using local data:', err.message);
    } finally { setBusy(false); }
    switchPanel('home');
    renderHome();
  }
  initPage();
</script>

      <div class="cls-ov-title" id="cls-ov-title">—</div>

    <button class="cls-ov-tab" data-tab="khuluk" onclick="switchOvTab('khuluk')">হুসনুল খুলুক</button>

  </div>
  <div class="cls-ov-body" id="cls-ov-body"></div>
</div>
