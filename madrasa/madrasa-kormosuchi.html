<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<script src="../js/mm-boot.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কর্মসূচি হিসাব — দফতর</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.prog-select-wrap { display:flex; gap:8px; align-items:center; }
.prog-select { flex:1; padding:10px 12px; border:1px solid var(--cream3); border-radius:var(--radius-sm); background:#fff; font-family:'Tiro Bangla',serif; font-size:14px; color:var(--ink); }
.prog-new-btn { flex:0 0 auto; border:1px solid var(--ink); border-radius:var(--radius-sm); background:var(--ink); color:var(--gold2); padding:8px 10px; font-family:'Tiro Bangla',serif; font-size:12px; font-weight:800; line-height:1; white-space:nowrap; cursor:pointer; }
.prog-new-btn:disabled,.t4-btn:disabled,.submit-btn:disabled,.settings-danger-btn:disabled { opacity:.45; cursor:not-allowed; }
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px; }
.kpi-card { background:var(--cream); border:1px solid var(--cream2); border-radius:var(--radius-sm); padding:10px 6px; text-align:center; }
.kpi-card span { display:block; font-size:10px; color:var(--ink3); margin-bottom:3px; font-weight:700; }
.kpi-card b { font-family:'Tiro Bangla',serif; font-size:16px; font-weight:800; color:var(--ink2); }
.kpi-card b.g { color:var(--green); }
.kpi-card b.r { color:var(--red); }
.kpi-card b.o { color:var(--gold); }
.prog-tag { display:inline-block; background:var(--gold-light); color:var(--gold); border-radius:999px; padding:3px 10px; font-size:11px; font-weight:700; margin-top:6px; }
.toolbar-4 { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:10px; }
.t4-btn { border:1px solid var(--cream3); border-radius:var(--radius-sm); background:#fff; padding:10px 6px; font-family:'Tiro Bangla',serif; font-size:12px; font-weight:700; cursor:pointer; text-align:center; transition:.12s; }
.t4-btn.green { background:var(--green-light); color:var(--green); border-color:var(--green2); }
.t4-btn.red   { background:var(--red-light);   color:var(--red);   border-color:var(--red); }
.t4-btn.gray  { background:var(--cream2); color:var(--ink2); }
#modal-settings .modal { height:min(760px, calc(100vh - 32px)); display:flex; flex-direction:column; }
.settings-panel-wrap { flex:1 1 auto; min-height:0; overflow-y:auto; padding-right:2px; }
.settings-panel { display:block; }
.settings-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.settings-danger-btn { width:100%; padding:10px; border:1px solid var(--red); border-radius:var(--radius-sm); background:var(--red-light); color:var(--red); font-family:'Tiro Bangla',serif; font-weight:800; cursor:pointer; }
.type-config-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.type-hint { font-size:11px; color:var(--ink3); line-height:1.5; margin-top:-6px; margin-bottom:10px; }
.k-tabs { display:flex; gap:5px; background:var(--gold-light); border-radius:var(--radius-sm); padding:4px; margin-bottom:10px; overflow-x:auto; }
.k-tab { border:none; background:transparent; border-radius:var(--radius-sm); padding:8px 11px; font-family:'Tiro Bangla',serif; font-weight:700; font-size:12px; color:var(--ink3); white-space:nowrap; cursor:pointer; transition:.12s; }
.k-tab.active { background:var(--ink); color:var(--gold2); }
.tbl-wrap { overflow:auto; border:1px solid var(--cream2); border-radius:var(--radius-sm); max-height:420px; }
.tbl { border-collapse:collapse; width:100%; min-width:650px; font-size:13px; }
.tbl th { background:var(--cream); color:var(--ink3); text-align:right; padding:8px; font-size:11px; font-weight:700; }
.tbl td { padding:8px; border-bottom:1px solid var(--cream2); white-space:nowrap; }
.tbl tr:nth-child(even) td { background:#fffaf2; }
.mini-row { display:flex; justify-content:space-between; align-items:center; background:var(--cream); border:1px solid var(--cream2); border-radius:var(--radius-sm); padding:9px 10px; margin-bottom:6px; }
.mini-label { font-size:13px; font-weight:700; color:var(--ink2); }
.mini-sub { font-size:11px; color:var(--ink3); margin-top:2px; }
.chip-list { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.chip { border:1px solid var(--cream2); background:#fff; border-radius:999px; padding:5px 10px; font-size:12px; display:flex; align-items:center; gap:4px; }
.chip button { background:none; border:none; color:var(--red); cursor:pointer; font-size:14px; line-height:1; padding:0 2px; }
.rpt-bar { display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; padding:2px 0 6px; }
.rpt-bar button { flex:0 0 auto; border:1px solid var(--cream3); background:#fff; border-radius:999px; padding:7px 11px; font-family:'Tiro Bangla',serif; font-size:12px; color:var(--ink3); cursor:pointer; }
.rpt-bar button.active { background:var(--ink); color:var(--gold2); border-color:var(--ink); font-weight:700; }
.act-btns { display:flex; gap:5px; }
.tbl-act { border:1px solid var(--cream3); border-radius:6px; background:#fff; padding:4px 8px; cursor:pointer; font-family:'Tiro Bangla',serif; font-size:11px; color:var(--ink2); }
.tbl-del { border:1px solid var(--red); border-radius:6px; background:var(--red-light); color:var(--red); padding:4px 8px; cursor:pointer; font-family:'Tiro Bangla',serif; font-size:11px; }
.receipt-pill { border:1px solid var(--gold); border-radius:999px; background:var(--gold-light); color:var(--gold); padding:4px 9px; cursor:pointer; font-family:'Tiro Bangla',serif; font-size:11px; font-weight:800; }
.receipt-list { display:flex; flex-direction:column; gap:6px; margin-top:7px; }
.receipt-row { display:flex; justify-content:space-between; align-items:center; gap:8px; border:1px solid var(--cream2); border-radius:var(--radius-sm); background:#fff; padding:7px 8px; font-size:12px; color:var(--ink2); }
.receipt-row span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.receipt-row.pending { background:var(--cream); color:var(--ink3); }
.receipt-row small { color:var(--ink3); white-space:nowrap; }
.receipt-actions { display:flex; gap:5px; flex:0 0 auto; }
.receipt-actions button { border:1px solid var(--cream3); border-radius:6px; background:#fff; color:var(--ink2); padding:4px 7px; font-family:'Tiro Bangla',serif; font-size:11px; cursor:pointer; }
.receipt-actions button.danger { border-color:var(--red); background:var(--red-light); color:var(--red); }
.receipt-empty { font-size:11px; color:var(--ink3); background:var(--cream); border:1px dashed var(--cream3); border-radius:var(--radius-sm); padding:8px; text-align:center; }
.check-line { display:flex; align-items:center; gap:8px; border:1px solid var(--cream2); border-radius:var(--radius-sm); background:var(--cream); padding:9px 10px; font-size:12px; font-weight:800; color:var(--ink2); cursor:pointer; }
.check-line input { width:16px; height:16px; accent-color:var(--gold); }
.stt-card { background:#fff; border:1px solid var(--cream2); border-radius:var(--radius-sm); padding:10px; margin-bottom:8px; }
.add-row { display:flex; gap:8px; margin-top:6px; }
.add-row .form-input { flex:1; }
.student-income-picker { display:none; }
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.type-config-grid{grid-template-columns:1fr}}</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">দফতর</div>
    <div class="topbar-name">কর্মসূচি হিসাব</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn topbar-btn--icon" onclick="location.href='madrasa-daftar.html#accounts'" title="পেছনে" aria-label="পেছনে">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <button type="button" class="topbar-btn topbar-btn--icon" onclick="openSettings()" title="সেটিং" aria-label="সেটিং">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8.9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.38.3.88.48 1.51.48H21a2 2 0 0 1 0 4h-.09A1.65 1.65 0 0 0 19.4 15Z"/></svg>
    </button>
    <button type="button" class="topbar-btn topbar-btn--icon" id="topbar-lockout" onclick="MMSession.logoutToIndex('../index.html')" title="লগআউট" aria-label="লগআউট">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<div class="content" style="padding-bottom:var(--app-content-pad-bottom)">

  <div class="card-static" style="margin-bottom:8px">
    <div class="prog-select-wrap">
      <select class="prog-select" id="prog-select" onchange="changeProgram(this.value)"></select>
      <button type="button" class="prog-new-btn" onclick="newProgram()">+ নতুন</button>
    </div>
  </div>

  <div class="card-static" style="margin-bottom:8px">
    <div style="font-family:'Tiro Bangla',serif;font-size:17px;font-weight:800;color:var(--ink)" id="prog-title"></div>
    <div style="font-size:12px;color:var(--ink3);margin-top:4px;line-height:1.5" id="prog-note"></div>
    <span class="prog-tag" id="prog-tag"></span>
    <div class="kpi-grid" id="kpi-grid"></div>
  </div>

  <div class="toolbar-4">
    <button class="t4-btn green" onclick="openIncome()">↑ আয়</button>
    <button class="t4-btn red"   onclick="openExpense()">↓ ব্যয়</button>
  </div>

  <div class="k-tabs">
    <button class="k-tab active" data-tab="income"  onclick="setTab('income')">আয়</button>
    <button class="k-tab" data-tab="expense" onclick="setTab('expense')">ব্যয়</button>
    <button class="k-tab" data-tab="report"  onclick="setTab('report')">রিপোর্ট</button>
  </div>

  <div id="root"></div>
</div>

<!-- BOTTOM NAV (শেয়ার্ড: js/daftar-bottom-nav.js) -->
<nav class="bottom-nav" id="daftar-nav-root" aria-label="নিচের নেভিগেশন"></nav>

<!-- MODAL: কর্মসূচি যোগ/এডিট -->
<div class="modal-bg" id="modal-program">
  <div class="modal">
    <div class="modal-title"><span id="prog-modal-title">কর্মসূচি</span><button class="modal-close" onclick="closeModal('program')">✕</button></div>
    <input type="hidden" id="prog-edit-id">
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">কর্মসূচির নাম <span style="color:var(--red)">*</span></label>
        <input class="form-input" id="prog-name" placeholder="যেমন: কোরবানি ১৪৪৭">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">অবস্থা</label>
        <select class="form-input form-select" id="prog-status">
          <option>চলমান</option><option>পরিকল্পনা</option><option>শেষ</option><option>স্থগিত</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">তারিখ</label>
        <input class="form-input" type="date" id="prog-date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">বিবরণ</label>
      <textarea class="form-input form-textarea" id="prog-note-inp" placeholder="কর্মসূচির বিস্তারিত" rows="3"></textarea>
    </div>
    <label class="check-line" style="margin-bottom:10px">
      <input type="checkbox" id="prog-share-enabled">
      <span>হিস্যা হিসাব চালু</span>
    </label>
    <label class="check-line" style="margin-bottom:10px">
      <input type="checkbox" id="prog-donor-required" checked>
      <span>আয়ে দাতার নাম বাধ্যতামূলক</span>
    </label>
    <div class="type-config-grid">
      <div class="form-group">
        <label class="form-label">আয়ের ধরন</label>
        <textarea class="form-input form-textarea" id="prog-income-types" rows="5" placeholder="প্রতি লাইনে একটি ধরন"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">ব্যয়ের খাত</label>
        <textarea class="form-input form-textarea" id="prog-expense-types" rows="5" placeholder="প্রতি লাইনে একটি খাত"></textarea>
      </div>
    </div>
    <div class="type-hint">প্রতি লাইনে একটি করে ধরন/খাত লিখুন। হিস্যা হিসাব চালু থাকলে আয় যোগ করার সময় আলাদাভাবে হিস্যা সংখ্যা লেখা যাবে।</div>
    <button class="submit-btn gold" onclick="saveProgram()">সংরক্ষণ করুন</button>
    <button id="prog-del-btn" onclick="deleteProgram()" style="display:none;width:100%;margin-top:6px;padding:10px;border:none;border-radius:var(--radius-sm);background:var(--red-light);color:var(--red);font-family:'Tiro Bangla',serif;font-weight:700;cursor:pointer">এই কর্মসূচি মুছুন</button>
  </div>
</div>

<!-- MODAL: আয় -->
<div class="modal-bg" id="modal-income">
  <div class="modal">
    <div class="modal-title"><span id="inc-modal-title">আয় যোগ</span><button class="modal-close" onclick="closeModal('income')">✕</button></div>
    <input type="hidden" id="inc-edit-id">
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">তারিখ</label>
        <input class="form-input" type="date" id="inc-date">
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">আয়ের ধরন</label>
        <select class="form-input form-select" id="inc-type" onchange="onIncTypeChange()"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">ব্যক্তির ধরন</label>
        <select class="form-input form-select" id="inc-person-type" onchange="syncIncomeStudentField()">
          <option>ছাত্র</option><option>সাধারণ মানুষ</option><option>প্রতিষ্ঠান</option>
        </select>
      </div>
      <label class="check-line" style="flex:1" id="inc-share-option">
        <input type="checkbox" id="inc-is-share" onchange="syncIncShareField()">
        <span>হিস্যা হিসেবে</span>
      </label>
    </div>
    <div class="form-group student-income-picker" id="inc-student-wrap">
      <label class="form-label">ছাত্র নির্বাচন করুন <span style="color:var(--red)">*</span></label>
      <input class="form-input" id="inc-student" list="inc-student-list" autocomplete="off" placeholder="নাম বা দাখেলা লিখুন" oninput="onIncomeStudentChange()" onchange="onIncomeStudentChange()">
      <input type="hidden" id="inc-student-id">
      <datalist id="inc-student-list"></datalist>
    </div>
    <div class="form-group" id="inc-share-wrap">
      <label class="form-label">হিস্যা সংখ্যা</label>
      <input class="form-input" type="number" id="inc-share" min="0.01" step="0.01" value="1">
    </div>
    <div class="form-group">
      <label class="form-label">নাম <span id="inc-name-required-mark" style="color:var(--red)">*</span></label>
      <input class="form-input" id="inc-name" placeholder="দাতার নাম">
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">টাকা <span style="color:var(--red)">*</span></label>
        <input class="form-input" type="number" id="inc-amount" placeholder="০">
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">পরিচিতি / মোবাইল</label>
        <input class="form-input" id="inc-ref" placeholder="ঐচ্ছিক">
      </div>
    </div>
    <button class="submit-btn" style="background:var(--green);color:#fff" onclick="saveIncome()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- MODAL: ব্যয় -->
<div class="modal-bg" id="modal-expense">
  <div class="modal">
    <div class="modal-title"><span id="exp-modal-title">ব্যয় যোগ</span><button class="modal-close" onclick="closeModal('expense')">✕</button></div>
    <input type="hidden" id="exp-edit-id">
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">তারিখ</label>
        <input class="form-input" type="date" id="exp-date">
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">ব্যয়ের খাত <span style="font-size:10px;color:var(--ink3);font-weight:400">(ঐচ্ছিক)</span></label>
        <select class="form-input form-select" id="exp-type"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">টাকা <span style="color:var(--red)">*</span></label>
        <input class="form-input" type="number" id="exp-amount" placeholder="০">
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">বিবরণ</label>
        <input class="form-input" id="exp-note" placeholder="সংক্ষিপ্ত বিবরণ">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">রশিদ / মেমো <span style="font-size:10px;color:var(--ink3);font-weight:400">(ঐচ্ছিক)</span></label>
      <input class="form-input" type="file" id="exp-files" multiple accept="image/jpeg,image/png,image/webp,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" onchange="onExpenseFilesChange()">
      <div class="receipt-list" id="exp-file-list"></div>
    </div>
    <button class="submit-btn" style="background:var(--red);color:#fff" onclick="saveExpense()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- MODAL: সেটিং -->
<div class="modal-bg modal-float" id="modal-settings">
  <div class="modal">
    <div class="modal-title">সেটিং<button class="modal-close" onclick="closeModal('settings')">✕</button></div>
    <div class="settings-panel-wrap">
      <div class="settings-panel active" id="settings-panel-program">
        <div class="form-group">
          <label class="form-label">কোন কর্মসূচি এডিট করবেন</label>
          <select class="form-input form-select" id="set-prog-select" onchange="loadSettingsProgram(this.value)"></select>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="form-label">কর্মসূচির নাম <span style="color:var(--red)">*</span></label>
            <input class="form-input" id="set-prog-name" placeholder="যেমন: কোরবানি ১৪৪৭">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="form-label">অবস্থা</label>
            <select class="form-input form-select" id="set-prog-status">
              <option>চলমান</option><option>পরিকল্পনা</option><option>শেষ</option><option>স্থগিত</option>
            </select>
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label">তারিখ</label>
            <input class="form-input" type="date" id="set-prog-date">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">বিবরণ</label>
          <textarea class="form-input form-textarea" id="set-prog-note" rows="3" placeholder="কর্মসূচির বিস্তারিত"></textarea>
        </div>
        <label class="check-line" style="margin-bottom:10px">
          <input type="checkbox" id="set-prog-share-enabled">
          <span>হিস্যা হিসাব চালু</span>
        </label>
        <label class="check-line" style="margin-bottom:10px">
          <input type="checkbox" id="set-prog-donor-required" checked>
          <span>আয়ে দাতার নাম বাধ্যতামূলক</span>
        </label>
        <div class="type-config-grid">
          <div class="form-group">
            <label class="form-label">আয়ের ধরন</label>
            <textarea class="form-input form-textarea" id="set-prog-income-types" rows="5" placeholder="প্রতি লাইনে একটি ধরন"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">ব্যয়ের খাত</label>
            <textarea class="form-input form-textarea" id="set-prog-expense-types" rows="5" placeholder="প্রতি লাইনে একটি খাত"></textarea>
          </div>
        </div>
        <div class="type-hint">প্রতি লাইনে একটি করে ধরন/খাত লিখুন। যেমন: অনুদান, খাবার, পরিবহন।</div>
        <div class="settings-actions">
          <button class="submit-btn gold" onclick="saveSettingsProgram()">সংরক্ষণ করুন</button>
          <button class="settings-danger-btn" onclick="deleteSettingsProgram()">মুছুন</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: নিশ্চিতকরণ -->
<div class="modal-bg" id="modal-confirm">
  <div class="modal" style="max-width:320px;text-align:center">
    <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:14px;line-height:1.5" id="confirm-msg">নিশ্চিত করুন</div>
    <div style="display:flex;gap:8px">
      <button onclick="confirmYes()" style="flex:1;padding:10px;border:none;border-radius:var(--radius-sm);background:var(--red-light);color:var(--red);font-family:'Tiro Bangla',serif;font-weight:700;cursor:pointer">হ্যাঁ, মুছুন</button>
      <button onclick="closeModal('confirm')" style="flex:1;padding:10px;border:1px solid var(--cream3);border-radius:var(--radius-sm);background:var(--cream2);color:var(--ink2);font-family:'Tiro Bangla',serif;font-weight:700;cursor:pointer">বাতিল</button>
    </div>
  </div>
</div>
