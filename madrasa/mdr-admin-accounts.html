<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>হিসাব — জিম্মাদার</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/main-admin-nav.css">
<style>
  .content { padding-bottom:var(--app-content-pad-bottom); }
  .acc-page-lead { font-size:12px; color:var(--ink3); line-height:1.55; margin:0 0 12px; }
  .acc-stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
  .acc-stat-card { background:#fff; border-radius:var(--radius-sm); padding:10px 8px; box-shadow:var(--shadow); border:1px solid rgba(26,18,8,.06); text-align:center; }
  .acc-stat-val { display:block; font-family:'Noto Serif Bengali',serif; font-size:15px; line-height:1.18; font-weight:800; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .acc-stat-lbl { display:block; margin-top:4px; font-size:9px; color:var(--ink3); font-weight:700; }
  .acc-stat-card.good .acc-stat-val { color:var(--green); }
  .acc-stat-card.bad .acc-stat-val { color:var(--red); }
  .acc-stat-card.warn .acc-stat-val { color:var(--gold); }
  .admin-accounts-shell { background:rgba(255,255,255,.55); border:1px solid rgba(26,18,8,.06); border-radius:22px; padding:10px 0 0; box-shadow:0 10px 28px rgba(26,18,8,.06); overflow:hidden; }
  @media (max-width:420px) {
    .acc-stat-grid { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">জিম্মাদার</div>
    <div class="topbar-name">হিসাব</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" onclick="location.href='../main-admin-madrasa.html'">← এডমিন</button>
  </div>
</div>

<div class="content" style="max-width:640px;margin:0 auto;">
  <p class="acc-page-lead">মাদ্রাসার আয়-ব্যয়, ব্যালেন্স ও বকেয়ার সামগ্রিক অবস্থা এখানে দেখা যাবে। নিচের বিস্তারিত অংশ থেকে হিসাব বই অনুযায়ী খরচও দেখা যাবে।</p>

  <div class="acc-stat-grid" aria-label="হিসাব সারসংক্ষেপ">
    <div class="acc-stat-card good"><span class="acc-stat-val" id="admin-acc-income">—</span><span class="acc-stat-lbl">মোট আয়</span></div>
    <div class="acc-stat-card bad"><span class="acc-stat-val" id="admin-acc-expense">—</span><span class="acc-stat-lbl">মোট ব্যয়</span></div>
    <div class="acc-stat-card" id="admin-acc-balance-card"><span class="acc-stat-val" id="admin-acc-balance">—</span><span class="acc-stat-lbl">বর্তমান ব্যালেন্স</span></div>
    <div class="acc-stat-card warn"><span class="acc-stat-val" id="admin-acc-due">—</span><span class="acc-stat-lbl">বাকি / বকেয়া</span></div>
  </div>

  <div class="admin-accounts-shell">
    <div id="accounts-root"></div>
  </div>
</div>

<!-- ACCOUNT DETAILS MODAL -->
<div class="modal-bg" id="modal-account-details">
  <div class="modal modal-wide">
    <div class="modal-title"><span id="account-details-title">বিস্তারিত হিসাব</span> <button class="modal-close" onclick="closeModal('account-details')">✕</button></div>
    <div id="account-details-root"></div>
  </div>
</div>

<!-- ACCOUNT ENTRY MODAL -->
<div class="modal-bg" id="modal-account-entry">
  <div class="modal">
    <div class="modal-title">
      <span id="account-modal-title">হিসাব এন্ট্রি</span>
      <button class="modal-close" onclick="closeModal('account-entry')">✕</button>
    </div>
    <input type="hidden" id="account-entry-type">
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">হিজরী তারিখ</label>
        <input class="form-input" id="acc-date" inputmode="numeric" placeholder="১৪৪৭-১০-০৯">
      </div>
    </div>
    <div id="acc-income-fields">
      <div class="form-row">
        <div class="form-group"><label class="form-label">মোট টাকা</label><input class="form-input" id="acc-inc-amount" type="number" placeholder="০" min="0"></div>
        <div class="form-group"><label class="form-label">উৎস / বিবরণ</label><input class="form-input" id="acc-inc-note" placeholder="যেমন: বিকাশ অনুদান"></div>
      </div>
    </div>
    <div id="acc-expense-fields" style="display:none">
      <div class="form-row">
        <div class="form-group"><label class="form-label">হিসাব বই</label><select class="form-input form-select" id="acc-exp-account"><option value="matbakh">মাতবাখ</option><option value="madrasa">মাদরাসা</option><option value="tamirat">তামিরাত</option><option value="general">সাধারণ</option></select></div>
        <div class="form-group"><label class="form-label">সরবরাহকারী</label><input class="form-input" id="acc-exp-supplier" placeholder="নাম / দোকান"></div>
      </div>
      <div style="font-size:11px;color:var(--ink3);margin:6px 0 4px;font-weight:600">আইটেম সমূহ</div><div id="acc-items-container"></div>
      <button type="button" onclick="addAccItem()" style="width:100%;margin-top:6px;padding:8px;border:1px dashed var(--ink3);border-radius:8px;background:none;cursor:pointer;font-size:12px;color:var(--ink2);font-family:inherit">＋ আরেকটি আইটেম</button>
      <div style="text-align:right;font-weight:700;padding:8px 0 2px;font-size:14px;border-top:1px solid var(--cream2);margin-top:8px">মোট: ৳<span id="acc-grand-total">০</span></div>
    </div>
    <button class="submit-btn gold" onclick="saveAccountEntry()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="main-nav" role="navigation" aria-label="জিম্মাদার নেভিগেশন">
  <a class="main-nav-btn is-active" href="../main-admin-madrasa.html" aria-label="মাদ্রাসা"><svg class="main-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span class="main-nav-lbl">মাদ্রাসা</span></a>
  <a class="main-nav-btn" href="../main-admin-dept.html" aria-label="বিভাগ"><svg class="main-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 22V12h6v10"/></svg><span class="main-nav-lbl">বিভাগ</span></a>
  <a class="main-nav-btn" href="../main-admin-khedmat.html" aria-label="খেদমত"><svg class="main-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg><span class="main-nav-lbl">খেদমত</span></a>
  <a class="main-nav-btn" href="../chat.html" aria-label="বার্তা"><svg class="main-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M22 6l-10 7L2 6"/></svg><span class="main-nav-lbl">বার্তা</span></a>
  <a class="main-nav-btn" href="../main-admin-recent.html" aria-label="কার্যক্রম"><svg class="main-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle stroke-width="1.75" cx="12" cy="12" r="9"/><path stroke-width="1.75" stroke-linecap="round" d="M12 7v5l3 3"/></svg><span class="main-nav-lbl">কার্যক্রম</span></a>
</nav>

<script src="../js/mm-session.js"></script>
<script src="../js/mm-hijri.js"></script>
<script src="../js/madrasa-accounts-api.js"></script>
<script src="../js/madrasa-daftar-accounts.js"></script>
<script src="../js/madrasa-accounts-reports.js"></script>
<script>
  if (!MMSession.requireAdminPerm('daftar', '../main-admin-madrasa.html')) { throw new Error('accounts permission denied'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function openModal(name) { document.getElementById('modal-' + name).classList.add('show'); }
  function closeModal(name) { document.getElementById('modal-' + name).classList.remove('show'); }

  function renderAccountStats() {
    const s = MdrAccAPI.Summary.get();
    const money = n => '৳' + MdrAccAPI.fa(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
    document.getElementById('admin-acc-income').textContent = money(s.ti);
    document.getElementById('admin-acc-expense').textContent = money(s.te);
    document.getElementById('admin-acc-balance').textContent = (s.bal < 0 ? '−' : '') + money(Math.abs(s.bal));
    document.getElementById('admin-acc-due').textContent = money(s.td);
    const balCard = document.getElementById('admin-acc-balance-card');
    balCard.classList.toggle('good', s.bal >= 0);
    balCard.classList.toggle('bad', s.bal < 0);
  }

  const baseRenderAccounts = window.renderAccounts;
  window.renderAccounts = function () {
    baseRenderAccounts();
    renderAccountStats();
  };

  renderAccounts();
</script>
</body>
</html>
