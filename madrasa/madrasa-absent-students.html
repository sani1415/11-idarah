<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>অনুপস্থিত তালিকা — মাদ্রাসা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .abs-page {
    max-width: 520px; margin: 0 auto;
    padding: 12px 16px calc(24px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column;
    min-height: calc(100vh - 56px); box-sizing: border-box;
  }
  .abs-head { font-family: 'Tiro Bangla', serif; font-size: 18px; font-weight: 700; color: var(--ink2); margin-bottom: 6px; flex-shrink: 0; }
  .abs-sub { font-size: 12px; color: var(--ink3); line-height: 1.5; margin-bottom: 12px; flex-shrink: 0; }
  .abs-scroll {
    flex: 1; min-height: 0; overflow-y: auto;
    -webkit-overflow-scrolling: touch; padding-right: 2px;
  }
  .abs-row {
    background: #fff;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid rgba(26, 18, 8, 0.06);
  }
  .abs-rank {
    font-family: 'Tiro Bangla', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    min-width: 36px;
    text-align: center;
  }
  .abs-info { flex: 1; min-width: 0; }
  .abs-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .abs-meta { font-size: 11px; color: var(--ink3); margin-top: 3px; }
  .abs-days {
    font-family: 'Tiro Bangla', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--red);
    flex-shrink: 0;
  }
  .abs-empty { text-align: center; color: var(--ink3); padding: 40px 16px; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">মাদ্রাসা</div>
    <div class="topbar-name">অনুপস্থিত তালিকা</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" onclick="location.href='/admin/madrasa.html'">← এডমিন</button>
  </div>
</div>

<div class="abs-page">
  <div class="abs-head">অনুপস্থিত রেকর্ডযুক্ত ছাত্র</div>
  <p class="abs-sub" id="abs-sub">যাদের কমপক্ষে এক দিন <strong>অনুপস্থিত</strong> রেকর্ড আছে। বেশি দিন থেকে কম — সাজানো।</p>
  <div class="abs-scroll" id="abs-scroll">
    <div id="abs-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../js/api/api-shared.js"></script>
<script src="../js/api/api-mdr.js"></script>
<script src="../js/core/mm-sample-data.js"></script>
<script src="../js/api/api.js"></script>
<script src="../js/madrasa/mdr-supabase-sync.js"></script>
<script src="../js/core/mm-session.js"></script>
<script src="../js/shared/mm-student-modal.js"></script>
<script>
  if (!MMSession.requireAdminPerm('dashboard', '/admin/madrasa.html')) { throw new Error('admin permission denied'); }

  const toBn = (n) => String(n).replace(/[0-9]/g, (d) => '০১২৩৪৫৬৭৮৯'[d]);

  const params = new URLSearchParams(location.search);
  const allowed = MMSession.getAllowedMadrasaDepts();
  let dept = params.get('dept') === 'all' && allowed.length > 1 ? 'all' : (params.get('dept') === 'maktab' ? 'maktab' : 'kitab');
  if (dept !== 'all' && !MMSession.canUseMadrasaDept(dept)) dept = allowed[0] || 'kitab';
  if (dept === 'all' && allowed.length <= 1) dept = allowed[0] || 'kitab';
  const deptName = (d) => d === 'maktab' ? 'মক্তব বিভাগ' : 'কিতাব বিভাগ';
  const deptLabel = dept === 'all' ? 'সামগ্রিক' : deptName(dept);
  const sub = document.getElementById('abs-sub');
  if (sub) sub.textContent = deptLabel + ' — যাদের কমপক্ষে এক দিন অনুপস্থিতের রেকর্ড আছে। বেশি দিন থেকে কম — সাজানো।';

  function scopeDepts() {
    if (dept === 'all') return allowed.filter((d) => d === 'kitab' || d === 'maktab');
    return allowed.includes(dept) ? [dept] : [allowed[0] || 'kitab'];
  }

  function render() {
    const depts = scopeDepts();
    const rows = depts
      .flatMap((d) => API.Attendance.getStudentsWithAbsentSortedByDept(d).map((x) => ({ ...x, dept: d })))
      .sort((a, b) => (b.absentDays || 0) - (a.absentDays || 0));
    const el = document.getElementById('abs-list');
    const scroll = document.getElementById('abs-scroll');
    if (!el) return;
    if (scroll) scroll.scrollTop = 0;
    if (!rows.length) {
      el.innerHTML = '<div class="abs-empty">কোনো ছাত্রের অনুপস্থিত রেকর্ড নেই। উপস্থিতি স্ক্রিনে অনুপস্থিত চিহ্নিত করলে এখানে দেখা যাবে।</div>';
      return;
    }
    const showDeptTag = depts.length > 1;
    el.innerHTML = rows
      .map((x, i) => {
        const cls = API.Classes.getById(x.student.class_id);
        const metaDept = showDeptTag ? ' · ' + deptName(x.dept) : '';
        return `<div class="abs-row">
          <div class="abs-rank">${toBn(i + 1)}</div>
          <div class="abs-info">
            <div class="abs-name"><button type="button" class="s-name-btn" style="font-size:14px;font-weight:600;" onclick="MMStudentModal.open('${x.student.id}')">${API.esc(x.student.name)}</button></div>
            <div class="abs-meta">${API.esc(cls ? cls.name : '—')}${metaDept} · রোল ${API.escBn(x.student.roll || '—')}</div>
          </div>
          <div class="abs-days">${toBn(x.absentDays)} দিন</div>
        </div>`;
      })
      .join('');
  }

  async function initPage() {
    if (window.MDRSupabaseSync && window.MMSharedAPI) {
      try { await MDRSupabaseSync.syncAdminUsers(); } catch (e) { console.warn('teacher sync failed', e); }
      try { await MDRSupabaseSync.syncAdminStudents(); } catch (e) { console.warn('student sync failed', e); }
    }
    render();
  }

  MMLoading.run(initPage);
</script>
</body>
</html>
