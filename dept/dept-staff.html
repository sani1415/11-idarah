<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিভাগ পোর্টাল</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .txn-item { background:#fff; border-radius:var(--radius-sm); padding:12px 14px; box-shadow:var(--shadow); margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .txn-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .txn-icon.income { background:var(--green-light); color:var(--green); }
  .txn-icon.expense { background:var(--red-light); color:var(--red); }
  .txn-info { flex:1; min-width:0; }
  .txn-desc { font-size:13px; font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .txn-sub { font-size:11px; color:var(--ink3); margin-top:2px; }
  .txn-amt { font-family:'Noto Serif Bengali',serif; font-size:15px; font-weight:700; flex-shrink:0; }
  .txn-amt.income { color:var(--green); }
  .txn-amt.expense { color:var(--red); }
  .inv-item { background:#fff; border-radius:var(--radius-sm); padding:12px 14px; box-shadow:var(--shadow); margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .prd-item { background:#fff; border-radius:var(--radius-sm); padding:11px 13px; box-shadow:var(--shadow); margin-bottom:7px; display:flex; align-items:center; gap:10px; }
  .month-nav { display:flex; align-items:center; justify-content:space-between; background:#fff; border-radius:var(--radius-sm); padding:10px 14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .month-nav-btn { background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink3); padding:4px; }
  .month-label { font-family:'Noto Serif Bengali',serif; font-size:14px; font-weight:600; color:var(--ink2); }
  .type-toggle { display:flex; gap:8px; margin-bottom:14px; }
  .type-btn { flex:1; padding:10px; border:1.5px solid var(--cream3); border-radius:var(--radius-sm); background:#fff; font-family:'Noto Sans Bengali',sans-serif; font-size:13px; cursor:pointer; text-align:center; transition:.15s; }
  .type-btn.sel-income { background:var(--green-light); border-color:var(--green2); color:var(--green); font-weight:600; }
  .type-btn.sel-expense { background:var(--red-light); border-color:var(--red); color:var(--red); font-weight:600; }
  .cat-pill { display:inline-block; font-size:10px; padding:2px 7px; border-radius:10px; background:var(--cream2); color:var(--ink3); margin-right:4px; }
  .cat-pill.production { background:var(--teal-light); color:var(--teal); }
  .cat-pill.operational { background:var(--blue-light); color:var(--blue); }
  .add-btn-row { display:flex; gap:8px; margin-bottom:12px; }
  .add-btn-half { flex:1; padding:11px 0; background:#fff; border:1.5px dashed var(--cream3); border-radius:var(--radius-sm); font-family:'Noto Sans Bengali',sans-serif; font-size:13px; cursor:pointer; color:var(--ink3); text-align:center; transition:.15s; }
  .add-btn-half:active { background:var(--cream2); }
  /* line items in slide panel */
  .li-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--cream2); }
  .li-name { flex:1; font-size:13px; color:var(--ink); }
  .li-amt { font-family:'Noto Serif Bengali',serif; font-size:13px; font-weight:600; color:var(--ink2); }
  .li-del { background:none; border:none; color:var(--red); font-size:16px; cursor:pointer; padding:2px 4px; }
  .items-total-bar { display:flex; justify-content:space-between; align-items:center; padding:10px 0 6px; border-top:2px solid var(--cream2); margin-top:4px; }
  #modal-txn .modal { max-width:min(760px, calc(100vw - 24px)); overflow-y:auto; }
  .txn-top-grid { display:grid; grid-template-columns:minmax(116px,.8fr) minmax(132px,1fr); gap:8px; align-items:end; margin-bottom:10px; }
  .txn-form-grid { display:grid; grid-template-columns:minmax(116px,.8fr) minmax(116px,.8fr); gap:8px; align-items:end; }
  .txn-form-wide { grid-column:1 / -1; }
  .sale-lines { display:grid; gap:8px; margin-bottom:10px; overflow-x:auto; padding-bottom:4px; }
  .sale-row { display:grid; grid-template-columns:minmax(190px,2fr) 86px 112px 104px 100px 42px; gap:8px; align-items:end; min-width:650px; }
  .sale-row .form-group { margin-bottom:0; }
  .sale-row .form-input { height:42px; }
  .sale-total { height:42px; display:flex; align-items:center; justify-content:flex-end; padding:0 10px; background:#fff; border:1px solid var(--cream3); border-radius:var(--radius-sm); font-family:'Noto Serif Bengali',serif; font-weight:700; color:var(--ink2); white-space:nowrap; }
  .sale-action-btn { width:42px; height:42px; border:0; border-radius:var(--radius-sm); background:var(--ink); color:var(--gold2); font-size:18px; cursor:pointer; }
  .sale-action-btn.remove { background:#fff; color:var(--red); border:1px solid var(--cream3); }
  .sale-hint { font-size:11px; color:var(--ink3); margin:0 0 8px; }
  .stock-mode { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
  .stock-mode button { padding:10px; border:1.5px solid var(--cream3); border-radius:var(--radius-sm); background:#fff; font-family:'Noto Sans Bengali',sans-serif; cursor:pointer; }
  .stock-mode button.active { border-color:var(--ink); background:var(--cream2); font-weight:700; }
  @media (max-width:640px) {
    .sale-row { grid-template-columns:190px 82px 104px 96px 92px 42px; min-width:630px; }
  }
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="topbar-left">
    <div class="topbar-role">বিভাগ দায়িত্বশীল</div>
    <div class="topbar-name" id="dept-name">—</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn" id="topbar-hub" style="display:none" onclick="location.href='../main-admin-madrasa.html'">এডমিন</button>
    <button type="button" class="topbar-btn topbar-btn--icon" id="topbar-lockout" onclick="MMSession.logoutToIndex('../index.html')" title="লগআউট" aria-label="লগআউট"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<!-- PANELS -->
<div class="content" id="panel-txn" style="padding-bottom:var(--app-content-pad-bottom);">
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label">—</span>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="stat-row-2" id="txn-summary"></div>
  <div class="add-btn-row">
    <button class="add-btn-half" onclick="openAddTxn('income')">↑ আয় যোগ</button>
    <button class="add-btn-half" onclick="openAddTxn('expense')">↓ ব্যয় যোগ</button>
  </div>
  <div id="txn-list"></div>
</div>

<div class="content" id="panel-products" style="display:none;padding-bottom:var(--app-content-pad-bottom);">
  <div class="sec-header"><div class="sec-title">পণ্য তালিকা</div></div>
  <button class="add-btn" onclick="openAddProduct()">+ নতুন পণ্য যোগ করুন</button>
  <div id="product-list"></div>
</div>

<div class="content" id="panel-inv" style="display:none;padding-bottom:var(--app-content-pad-bottom);">
  <div class="sec-header"><div class="sec-title">মজুদ তালিকা</div></div>
  <button class="add-btn" onclick="openAddInv()">+ মজুদ আপডেট করুন</button>
  <div id="inv-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="নিচের নেভিগেশন">
  <div class="nav-item active" id="nav-txn" onclick="switchPanel('txn')">
    <span class="nav-icon"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
    <span class="nav-label">হিসাব</span>
  </div>
  <div class="nav-item" id="nav-products" onclick="switchPanel('products')">
    <span class="nav-icon"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
    <span class="nav-label">পণ্য</span>
  </div>
  <div class="nav-item" id="nav-inv" onclick="switchPanel('inv')">
    <span class="nav-icon"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
    <span class="nav-label">মজুদ</span>
  </div>
  <div class="nav-item" onclick="location.href='../chat.html'">
    <span class="nav-icon"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
    <span class="nav-label">বার্তা</span>
  </div>
</nav>

<!-- ══ FLOATING MODAL: লেনদেন যোগ ══ -->
<div class="modal-bg modal-float" id="modal-txn">
  <div class="modal">
    <div class="modal-title" id="modal-txn-title">লেনদেন <button class="modal-close" onclick="closeModal('modal-txn')">✕</button></div>
    <div class="txn-top-grid">
      <div class="form-group">
        <label class="form-label">তারিখ</label>
        <input class="form-input" type="date" id="txn-date">
      </div>
      <div class="form-group" id="buyer-name-wrap">
        <label class="form-label">ক্রেতার নাম <span style="font-weight:400;color:var(--ink3)">(ঐচ্ছিক)</span></label>
        <input class="form-input" id="txn-buyer-name" placeholder="ক্রেতার নাম">
      </div>
    </div>

    <!-- আয়: পণ্য dropdown -->
    <div id="area-income">
      <div class="sale-lines" id="sale-line-list"></div>
      <div class="sale-hint">প্রতি লাইনে পণ্য, পরিমাণ, একক ও দর দিন। + চাপলে নতুন লাইন আসবে।</div>
    </div>

    <!-- ব্যয়: ক্যাটাগরি -->
    <div id="area-expense" style="display:none">
      <div class="form-group">
        <label class="form-label">ক্যাটাগরি</label>
        <select class="form-input" id="txn-category">
          <option value="production">উৎপাদন উপকরণ (কাঁচামাল)</option>
          <option value="operational">পরিচালন খরচ</option>
          <option value="other">অন্যান্য</option>
        </select>
      </div>
    </div>

    <div class="txn-form-grid">
      <div class="form-group">
        <label class="form-label">পরিমাণ (টাকা)</label>
        <input class="form-input" type="number" id="txn-amount" placeholder="০">
      </div>
      <div class="form-group" id="honor-wrap">
        <label class="form-label">মর্যাদা মূল্য</label>
        <input class="form-input" type="number" id="txn-honor" placeholder="০" oninput="updateTxnAmount()">
      </div>
      <div class="form-group txn-form-wide">
        <label class="form-label">বিবরণ</label>
        <input class="form-input" id="txn-desc" placeholder="সংক্ষিপ্ত বিবরণ">
      </div>
    </div>

    <!-- ব্যয়: বিস্তারিত লাইন বোতাম -->
    <div id="area-items-btn" style="display:none;margin-bottom:12px;">
      <button type="button" onclick="openItemsPanel()"
        style="width:100%;padding:10px;border:1.5px dashed var(--cream3);border-radius:var(--radius-sm);background:#fff;font-family:'Noto Sans Bengali',sans-serif;font-size:13px;cursor:pointer;color:var(--ink3);text-align:center;">
        ≡ বিস্তারিত লাইন যোগ করুন <span id="items-badge" style="display:none;background:var(--gold);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:6px;"></span>
      </button>
    </div>

    <div id="txn-extra-wrap"></div>
    <button class="submit-btn" onclick="saveTxn()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- ══ RIGHT-SIDE PANEL: বিস্তারিত ব্যয় ══ -->
<div class="side-panel" id="panel-items">
  <div class="side-panel-backdrop" onclick="closeItemsPanel()"></div>
  <div class="side-panel-drawer">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="font-family:'Noto Serif Bengali',serif;font-size:16px;font-weight:700;color:var(--ink2);">ব্যয়ের বিস্তারিত</div>
      <button onclick="closeItemsPanel()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3);">✕</button>
    </div>
    <div id="li-list"></div>
    <div style="margin-top:10px;background:var(--cream2);border-radius:var(--radius-sm);padding:10px;">
      <div style="font-size:11px;color:var(--ink3);margin-bottom:6px;font-weight:600;">নতুন আইটেম</div>
      <input class="form-input" id="li-name" placeholder="আইটেমের নাম (যেমন: চিনি, তেল)" style="margin-bottom:6px;">
      <div style="display:flex;gap:6px;">
        <input class="form-input" type="number" id="li-amt" placeholder="টাকা" style="flex:1;">
        <button onclick="addLineItem()" class="submit-btn" style="flex:0 0 auto;padding:10px 16px;margin:0;">+ যোগ</button>
      </div>
    </div>
    <div class="items-total-bar">
      <div style="font-size:13px;color:var(--ink3);font-weight:600;">মোট</div>
      <div id="li-total" style="font-family:'Noto Serif Bengali',serif;font-size:18px;font-weight:700;color:var(--ink2);">৳০</div>
    </div>
    <button class="submit-btn" onclick="applyItems()" style="background:var(--ink);color:var(--gold2);">← মোট প্রয়োগ করুন</button>
  </div>
</div>

<!-- ══ FLOATING MODAL: পণ্য যোগ ══ -->
<div class="modal-bg modal-float" id="modal-product">
  <div class="modal">
    <div class="modal-title">পণ্য যোগ <button class="modal-close" onclick="closeModal('modal-product')">✕</button></div>
    <div class="form-group"><label class="form-label">পণ্যের নাম</label><input class="form-input" id="prd-name" placeholder="যেমন: মধু, রুটি, ধান"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">একক</label><select class="form-input" id="prd-unit"></select></div>
      <div class="form-group"><label class="form-label">বিক্রয় মূল্য</label><input class="form-input" type="number" id="prd-price" placeholder="০"></div>
    </div>
    <button class="submit-btn" onclick="saveProduct()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- ══ FLOATING MODAL: মজুদ আপডেট ══ -->
<div class="modal-bg modal-float" id="modal-inv">
  <div class="modal">
    <div class="modal-title">মজুদ আপডেট <button class="modal-close" onclick="closeModal('modal-inv')">✕</button></div>
    <div class="stock-mode">
      <button type="button" id="inv-mode-in" class="active" onclick="setInvMode('stock_in')">মজুদ যোগ</button>
      <button type="button" id="inv-mode-waste" onclick="setInvMode('waste')">বাতিল / নষ্ট</button>
    </div>
    <div class="form-group">
      <label class="form-label">পণ্য <span style="font-weight:400;color:var(--ink3)">(তালিকা থেকে)</span></label>
      <select class="form-input" id="inv-product" onchange="onInvProductChange()"></select>
    </div>
    <div class="form-group"><label class="form-label">পণ্যের নাম</label><input class="form-input" id="inv-name" placeholder="যেমন: ধান, মধু"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">পরিমাণ</label><input class="form-input" type="number" id="inv-qty" placeholder="০"></div>
      <div class="form-group"><label class="form-label">একক</label><select class="form-input" id="inv-unit"></select></div>
    </div>
    <div class="form-group"><label class="form-label">নোট <span style="font-weight:400;color:var(--ink3)">(ঐচ্ছিক)</span></label><input class="form-input" id="inv-notes" placeholder="কারণ / মন্তব্য"></div>
    <button class="submit-btn" onclick="saveInv()">সংরক্ষণ করুন</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../api-shared.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/monitor-mode.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/dept-api.js"></script>
<script src="../js/dept-supabase-sync.js"></script>
<script>
  const deptId   = MMSession.getDeptId();
  const deptName = MMSession.getDeptName();
  const deptEmoji= MMSession.getDeptEmoji();
  const staffUserId = MMSession.getStaffUserId && MMSession.getStaffUserId();
  const staffPin = MMSession.getStaffPin && MMSession.getStaffPin();
  const isAdmin  = MMSession.isAdmin();
  if (!deptId && !isAdmin) { location.href = 'dept-index.html'; }

  document.getElementById('dept-name').textContent = (deptEmoji||'') + ' ' + (deptName||'বিভাগ');
  mmInsertMonitorBanner();
  MMSession.configureTopbarHubAndLockout();

  let curMonth = new Date().toISOString().slice(0,7);
  let addType  = 'income';
  let lineItems = [];
  let invMode = 'stock_in';

  const toBn   = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  const fmtAmt = n => '৳' + toBn(Number(n||0).toLocaleString('en'));
  const fmtDate= d => { if (!d) return ''; const p=d.split('-'); return toBn(p[2]+'/'+p[1]); };
  const monthLabel = m => { const p=m.split('-'); return toBn(p[1])+' — '+toBn(p[0]); };

  const CAT_LABEL = { production:'উৎপাদন উপকরণ', operational:'পরিচালন খরচ', other:'অন্যান্য' };
  const UNIT_OPTIONS = ['কেজি','গ্রাম','মন','লিটার','মিলি','পিস','জোড়া','ডজন','প্যাকেট','বস্তা','গজ','রিল','প্লেট','কপি'];

  function showToast(msg) {
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2200);
  }
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function switchPanel(name) {
    ['txn','products','inv'].forEach(p => {
      document.getElementById('panel-'+p).style.display = p===name ? '' : 'none';
      document.getElementById('nav-'+p).classList.toggle('active', p===name);
    });
    if (name==='txn')      renderTxn();
    if (name==='products') renderProducts();
    if (name==='inv')      renderInv();
  }

  function changeMonth(dir) {
    const d=new Date(curMonth+'-01'); d.setMonth(d.getMonth()+dir);
    curMonth=d.toISOString().slice(0,7); renderTxn();
  }

  /* ── RENDER TXN ── */
  function renderTxn() {
    document.getElementById('month-label').textContent = monthLabel(curMonth);
    const txns = DeptAPI.Transactions.getByMonth(deptId, curMonth);
    const sum  = DeptAPI.Transactions.getSummary(deptId, curMonth);
    document.getElementById('txn-summary').innerHTML =
      `<div class="stat-card"><span class="stat-num" style="color:var(--green)">${fmtAmt(sum.income)}</span><span class="stat-label">আয়</span></div>
       <div class="stat-card"><span class="stat-num" style="color:var(--red)">${fmtAmt(sum.expense)}</span><span class="stat-label">ব্যয়</span></div>`;
    document.getElementById('txn-list').innerHTML = txns.length
      ? txns.map(t => {
          const cat = t.category ? `<span class="cat-pill ${t.category}">${DeptAPI.esc(CAT_LABEL[t.category]||t.category)}</span>` : '';
          const saleItems = t.metadata && Array.isArray(t.metadata.line_items) ? t.metadata.line_items : [];
          const prod = saleItems.length && t.type === 'income'
            ? `<span style="font-size:11px;color:var(--teal);">${saleItems.map(i=>DeptAPI.esc(i.product_name||i.name)+' '+toBn(i.qty||i.quantity||0)+' '+DeptAPI.esc(i.unit||'')).join(' · ')}</span>`
            : (t.metadata && t.metadata.product_name
              ? `<span style="font-size:11px;color:var(--teal);">${DeptAPI.esc(t.metadata.product_name)} · ${toBn(t.metadata.qty||0)} ${DeptAPI.esc(t.metadata.unit||'')} · ${fmtAmt(t.metadata.rate||0)}/একক</span>` : '');
          const items = t.metadata && t.metadata.line_items && t.metadata.line_items.length
            ? `<div style="font-size:11px;color:var(--ink3);margin-top:2px;">${t.metadata.line_items.map(i=>DeptAPI.esc(i.name||i.product_name)+' '+fmtAmt(i.amount)).join(' · ')}</div>` : '';
          const honor = Number(t.honor_amount || (t.metadata && t.metadata.honor_amount) || 0);
          const honorHtml = honor > 0 ? `<div style="font-size:11px;color:var(--green);margin-top:2px;">মর্যাদা মূল্য: ${fmtAmt(honor)}</div>` : '';
          return `<div class="txn-item">
            <div class="txn-icon ${t.type}">${t.type==='income'?'↑':'↓'}</div>
            <div class="txn-info">
              <div class="txn-desc">${DeptAPI.esc(t.description)}</div>
              <div class="txn-sub">${fmtDate(t.date||t.txn_date)} ${cat}${prod}</div>
              ${items}
              ${honorHtml}
            </div>
            <div class="txn-amt ${t.type}">${fmtAmt(t.amount)}</div>
          </div>`;
        }).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:32px 0;font-size:13px;">এই মাসে কোনো লেনদেন নেই</div>';
  }

  /* ── ADD TXN MODAL ── */
  function openAddTxn(type) {
    lineItems = [blankSaleItem()];
    updateItemsBadge();
    ['txn-amount','txn-desc','txn-honor','txn-buyer-name'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value='';
    });
    document.getElementById('txn-date').value = new Date().toISOString().split('T')[0];
    renderSaleItems();
    renderTxnExtraFields();
    selType(type || 'income');
    document.getElementById('modal-txn-title').innerHTML = (addType === 'income' ? 'আয় যোগ' : 'ব্যয় যোগ') + " <button class=\"modal-close\" onclick=\"closeModal('modal-txn')\">✕</button>";
    openModal('modal-txn');
  }

  function selType(t) {
    addType = t;
    document.getElementById('area-income').style.display  = t==='income'  ? '' : 'none';
    document.getElementById('area-expense').style.display = t==='expense' ? '' : 'none';
    document.getElementById('area-items-btn').style.display = t==='expense' ? '' : 'none';
    document.getElementById('honor-wrap').style.display = t==='income' ? '' : 'none';
    document.getElementById('buyer-name-wrap').style.display = t==='income' ? '' : 'none';
    if (t==='income') populateProductDropdown();
    updateTxnAmount();
  }

  function unitOptionsHtml(selected) {
    return UNIT_OPTIONS.map(u => `<option value="${DeptAPI.esc(u)}"${u === selected ? ' selected' : ''}>${DeptAPI.esc(u)}</option>`).join('');
  }

  function blankSaleItem() {
    return { product_id:'', product_name:'', unit:'পিস', qty:'', rate:'', amount:0 };
  }

  function populateProductDropdown() {
    renderSaleItems();
  }

  function productOptionsHtml(selected) {
    const prds = DeptAPI.Products.getByDept(deptId);
    return '<option value="">— পণ্য নির্বাচন —</option>' +
      prds.map(p=>`<option value="${p.id}" data-unit="${DeptAPI.esc(p.unit)}" data-price="${p.price}"${p.id === selected ? ' selected' : ''}>${DeptAPI.esc(p.name)}</option>`).join('');
  }

  function onProductChange(idx) {
    const row = lineItems[idx];
    const sel = document.getElementById('sale-product-' + idx);
    if (!row || !sel) return;
    const opt = sel.options[sel.selectedIndex];
    const prd = DeptAPI.Products.getById(sel.value);
    row.product_id = sel.value;
    row.product_name = prd ? prd.name : '';
    if (opt && opt.dataset.unit) row.unit = opt.dataset.unit;
    if (opt && opt.dataset.price) row.rate = Number(opt.dataset.price) || '';
    calcTotal(idx);
    renderSaleItems();
  }

  function updateSaleField(idx, field, value) {
    if (!lineItems[idx]) return;
    lineItems[idx][field] = value;
    calcTotal(idx);
  }

  function calcTotal(idx) {
    const row = lineItems[idx];
    if (!row) return;
    const qty = parseFloat(row.qty) || 0;
    const rate = parseFloat(row.rate) || 0;
    row.amount = qty * rate;
    const el = document.getElementById('sale-total-' + idx);
    if (el) el.textContent = fmtAmt(row.amount);
    updateTxnAmount();
  }

  function saleBaseTotal() {
    return collectSaleItems(false).reduce((sum, item) => sum + Number(item.amount || 0), 0);
  }

  function updateTxnAmount() {
    if (addType !== 'income') return;
    const base = saleBaseTotal();
    const honor = parseFloat(document.getElementById('txn-honor').value) || 0;
    if (base > 0 || honor > 0) document.getElementById('txn-amount').value = base + honor;
  }

  function renderSaleItems() {
    const box = document.getElementById('sale-line-list');
    if (!box) return;
    if (!lineItems.length) lineItems.push(blankSaleItem());
    box.innerHTML = lineItems.map((i,idx)=>`<div class="sale-row">
      <div class="form-group">
        <label class="form-label">${idx === 0 ? 'পণ্য' : '&nbsp;'}</label>
        <select class="form-input" id="sale-product-${idx}" onchange="onProductChange(${idx})">${productOptionsHtml(i.product_id)}</select>
      </div>
      <div class="form-group">
        <label class="form-label">${idx === 0 ? 'পরিমাণ' : '&nbsp;'}</label>
        <input class="form-input" type="number" value="${DeptAPI.esc(i.qty)}" placeholder="০" oninput="updateSaleField(${idx},'qty',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">${idx === 0 ? 'একক' : '&nbsp;'}</label>
        <select class="form-input" onchange="updateSaleField(${idx},'unit',this.value)">${unitOptionsHtml(i.unit || 'পিস')}</select>
      </div>
      <div class="form-group">
        <label class="form-label">${idx === 0 ? 'দর' : '&nbsp;'}</label>
        <input class="form-input" type="number" value="${DeptAPI.esc(i.rate)}" placeholder="০" oninput="updateSaleField(${idx},'rate',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">${idx === 0 ? 'মোট' : '&nbsp;'}</label>
        <div class="sale-total" id="sale-total-${idx}">${fmtAmt(i.amount || 0)}</div>
      </div>
      <button type="button" class="sale-action-btn ${idx === lineItems.length - 1 ? '' : 'remove'}" onclick="${idx === lineItems.length - 1 ? 'addSaleItem()' : `removeSaleItem(${idx})`}" title="${idx === lineItems.length - 1 ? 'নতুন লাইন' : 'বাদ দিন'}">${idx === lineItems.length - 1 ? '+' : '×'}</button>
    </div>`).join('');
    updateTxnAmount();
  }

  function addSaleItem() {
    lineItems.push(blankSaleItem());
    renderSaleItems();
  }

  function removeSaleItem(idx) {
    lineItems.splice(idx, 1);
    if (!lineItems.length) lineItems.push(blankSaleItem());
    renderSaleItems();
  }

  function collectSaleItems(showErrors) {
    const items = [];
    for (const row of lineItems) {
      const hasAny = row.product_id || row.qty || row.rate;
      if (!hasAny) continue;
      const prd = DeptAPI.Products.getById(row.product_id);
      const qty = parseFloat(row.qty) || 0;
      const rate = parseFloat(row.rate) || 0;
      if (!prd) {
        if (showErrors) showToast('সব লাইনে পণ্য নির্বাচন করুন');
        return null;
      }
      if (qty <= 0) {
        if (showErrors) showToast('সব লাইনে পরিমাণ দিন');
        return null;
      }
      if (rate <= 0) {
        if (showErrors) showToast('সব লাইনে দর দিন');
        return null;
      }
      items.push({
        product_id: prd.id,
        product_name: prd.name,
        name: prd.name,
        unit: row.unit || prd.unit || 'পিস',
        qty,
        rate,
        amount: qty * rate
      });
    }
    return items;
  }

  function renderTxnExtraFields() {
    const wrap = document.getElementById('txn-extra-wrap');
    const defs = DeptAPI.getSubdeptFields(deptId);
    wrap.innerHTML = defs.map(d => {
      const opt = d.optional !== false;
      return `<div class="form-group">
        <label class="form-label">${DeptAPI.esc(d.label)}${opt?' <span style="font-weight:400;color:var(--ink3)">(ঐচ্ছিক)</span>':''}</label>
        <input class="form-input" type="${d.type==='number'?'number':'text'}" id="txn-x-${d.key}" data-key="${d.key}">
      </div>`;
    }).join('');
  }

  function collectExtra() {
    const defs = DeptAPI.getSubdeptFields(deptId);
    const meta = {};
    for (const d of defs) {
      const el = document.getElementById('txn-x-' + d.key);
      if (!el) continue;
      const raw = el.value.trim();
      if (!raw && d.optional === false) return { err: d.label + ' দিন' };
      if (raw) meta[d.key] = d.type === 'number' ? parseFloat(raw) : raw;
    }
    return { meta };
  }

  async function saveTxn() {
    updateTxnAmount();
    const amount = parseFloat(document.getElementById('txn-amount').value);
    const desc   = document.getElementById('txn-desc').value.trim();
    const date   = document.getElementById('txn-date').value;
    if (!amount || amount <= 0) { showToast('সঠিক পরিমাণ দিন'); return; }
    if (!desc) { showToast('বিবরণ দিন'); return; }
    const ext = collectExtra();
    if (ext.err) { showToast(ext.err); return; }

    const meta = { ...ext.meta };
    let category = null;

    if (addType === 'income') {
      const saleItems = collectSaleItems(true);
      if (!saleItems) return;
      const honor = parseFloat(document.getElementById('txn-honor').value) || 0;
      meta.honor_amount = honor;
      meta.buyer_name = document.getElementById('txn-buyer-name').value.trim();
      meta.buyer_phone = '';
      if (saleItems.length) {
        meta.line_items = saleItems.slice();
        const first = saleItems[0];
        meta.product_id = first.product_id;
        meta.product_name = first.product_name || first.name;
        meta.unit = first.unit;
        meta.qty = first.qty;
        meta.rate = first.rate;
      }
      lineItems = saleItems;
    } else {
      category = document.getElementById('txn-category').value;
      if (lineItems.length) meta.line_items = lineItems;
    }

    const payload = {
      dept_id:deptId,
      type:addType,
      amount,
      honor_amount: meta.honor_amount || 0,
      buyer_name: meta.buyer_name || '',
      buyer_phone: '',
      description:desc,
      date,
      category,
      metadata:meta,
      items: lineItems.slice()
    };
    try {
      if (window.DeptSync && staffUserId && staffPin) {
        await DeptSync.saveTransaction(staffUserId, staffPin, deptId, payload);
      } else {
        DeptAPI.Transactions.add(payload);
      }
    } catch (e) {
      console.warn('[Dept] transaction save failed, using local fallback:', e);
      DeptAPI.Transactions.add(payload);
      showToast('Supabase সংযোগ হয়নি, লোকালভাবে সংরক্ষিত');
    }
    closeModal('modal-txn');
    renderTxn();
    renderInv();
    showToast('লেনদেন সংরক্ষিত হয়েছে');
  }

  /* ── LINE ITEMS PANEL ── */
  function openItemsPanel() {
    renderLineItems();
    document.getElementById('li-name').value = '';
    document.getElementById('li-amt').value  = '';
    document.getElementById('panel-items').classList.add('open');
  }
  function closeItemsPanel() { document.getElementById('panel-items').classList.remove('open'); }

  function renderLineItems() {
    const total = lineItems.reduce((s,i)=>s+i.amount,0);
    document.getElementById('li-total').textContent = fmtAmt(total);
    document.getElementById('li-list').innerHTML = lineItems.length
      ? lineItems.map((i,idx)=>`
          <div class="li-row">
            <div class="li-name">${DeptAPI.esc(i.name)}</div>
            <div class="li-amt">${fmtAmt(i.amount)}</div>
            <button class="li-del" onclick="removeLineItem(${idx})">✕</button>
          </div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:20px 0;font-size:12px;">এখনো কোনো আইটেম নেই</div>';
  }

  function addLineItem() {
    const name = document.getElementById('li-name').value.trim();
    const amt  = parseFloat(document.getElementById('li-amt').value);
    if (!name) { showToast('আইটেমের নাম দিন'); return; }
    if (!amt || amt <= 0) { showToast('পরিমাণ দিন'); return; }
    lineItems.push({ name, amount: amt });
    document.getElementById('li-name').value = '';
    document.getElementById('li-amt').value  = '';
    renderLineItems();
  }

  function removeLineItem(idx) {
    lineItems.splice(idx, 1);
    renderLineItems();
  }

  function applyItems() {
    const total = lineItems.reduce((s,i)=>s+i.amount,0);
    if (total > 0) document.getElementById('txn-amount').value = total;
    updateItemsBadge();
    closeItemsPanel();
  }

  function updateItemsBadge() {
    const badge = document.getElementById('items-badge');
    if (lineItems.length) {
      badge.style.display = 'inline';
      badge.textContent   = toBn(lineItems.length) + 'টি আইটেম';
    } else {
      badge.style.display = 'none';
    }
  }

  /* ── PRODUCTS ── */
  function renderProducts() {
    const prds = DeptAPI.Products.getByDept(deptId);
    document.getElementById('product-list').innerHTML = prds.length
      ? prds.map(p=>`<div class="prd-item">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">${DeptAPI.esc(p.name)}</div>
            <div style="font-size:11px;color:var(--ink3);">একক: ${DeptAPI.esc(p.unit)} · মূল্য: ${fmtAmt(p.price)}/একক</div>
          </div>
          <button onclick="DeptAPI.Products.remove('${p.id}');renderProducts();"
            style="background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px;">✕</button>
        </div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:32px 0;font-size:13px;">কোনো পণ্য নেই — উপরের বোতাম থেকে যোগ করুন</div>';
  }

  function openAddProduct() {
    ['prd-name','prd-price'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('prd-unit').innerHTML = unitOptionsHtml('পিস');
    openModal('modal-product');
  }

  async function saveProduct() {
    const name  = document.getElementById('prd-name').value.trim();
    const unit  = document.getElementById('prd-unit').value.trim() || 'পিস';
    const price = parseFloat(document.getElementById('prd-price').value)||0;
    if (!name) { showToast('পণ্যের নাম দিন'); return; }
    try {
      if (window.DeptSync && staffUserId && staffPin) {
        await DeptSync.saveProduct(staffUserId, staffPin, deptId, { name, unit, price });
      } else {
        DeptAPI.Products.add({ dept_id:deptId, name, unit, price });
      }
    } catch (e) {
      console.warn('[Dept] product save failed, using local fallback:', e);
      DeptAPI.Products.add({ dept_id:deptId, name, unit, price });
      showToast('Supabase সংযোগ হয়নি, লোকালভাবে সংরক্ষিত');
    }
    closeModal('modal-product');
    renderProducts();
    showToast('পণ্য যোগ হয়েছে');
  }

  /* ── INVENTORY ── */
  function renderInv() {
    const items = DeptAPI.Inventory.getByDept(deptId);
    document.getElementById('inv-list').innerHTML = items.length
      ? items.map(i=>`<div class="inv-item">
          <div class="list-avatar">📦</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">${DeptAPI.esc(i.item_name)}</div>
            <div style="font-size:11px;color:var(--ink3);">${DeptAPI.esc(i.unit)}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:700;">${toBn(i.quantity)}</div>
          </div>
        </div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:32px 0;font-size:13px;">কোনো মজুদ নেই</div>';
  }

  function openAddInv() {
    ['inv-name','inv-qty','inv-unit','inv-notes'].forEach(id=>document.getElementById(id).value='');
    setInvMode('stock_in');
    populateInvProductDropdown();
    openModal('modal-inv');
  }

  function setInvMode(mode) {
    invMode = mode === 'waste' ? 'waste' : 'stock_in';
    document.getElementById('inv-mode-in').classList.toggle('active', invMode === 'stock_in');
    document.getElementById('inv-mode-waste').classList.toggle('active', invMode === 'waste');
  }

  function populateInvProductDropdown() {
    const sel = document.getElementById('inv-product');
    const prds = DeptAPI.Products.getByDept(deptId);
    sel.innerHTML = '<option value="">— তালিকার বাইরে / নিজে লিখুন —</option>' +
      prds.map(p=>`<option value="${p.id}" data-name="${DeptAPI.esc(p.name)}" data-unit="${DeptAPI.esc(p.unit)}">${DeptAPI.esc(p.name)}</option>`).join('');
    document.getElementById('inv-unit').innerHTML = unitOptionsHtml('পিস');
  }

  function onInvProductChange() {
    const sel = document.getElementById('inv-product');
    if (!sel.value) return;
    const opt = sel.options[sel.selectedIndex];
    document.getElementById('inv-name').value = opt.dataset.name || '';
    document.getElementById('inv-unit').innerHTML = unitOptionsHtml(opt.dataset.unit || 'পিস');
  }

  async function saveInv() {
    const name = document.getElementById('inv-name').value.trim();
    const qty  = parseFloat(document.getElementById('inv-qty').value);
    const unit = document.getElementById('inv-unit').value.trim();
    const productId = document.getElementById('inv-product').value;
    const notes = document.getElementById('inv-notes').value.trim();
    if (!name) { showToast('পণ্যের নাম দিন'); return; }
    if (!unit) { showToast('একক দিন'); return; }
    if (isNaN(qty) || qty <= 0) { showToast('পরিমাণ দিন'); return; }
    const delta = invMode === 'waste' ? -Math.abs(qty) : Math.abs(qty);
    try {
      if (window.DeptSync && staffUserId && staffPin) {
        await DeptSync.adjustInventory(staffUserId, staffPin, deptId, {
          product_id: productId || null,
          item_name: name,
          unit,
          quantity_delta: delta,
          reason: invMode,
          notes
        });
      } else {
        DeptAPI.Inventory.add({ dept_id:deptId, product_id:productId || null, item_name:name, unit, quantity:delta });
      }
    } catch (e) {
      console.warn('[Dept] inventory update failed, using local fallback:', e);
      DeptAPI.Inventory.add({ dept_id:deptId, product_id:productId || null, item_name:name, unit, quantity:delta });
      showToast('Supabase সংযোগ হয়নি, লোকালভাবে সংরক্ষিত');
    }
    closeModal('modal-inv');
    renderInv();
    showToast('মজুদ আপডেট হয়েছে');
  }

  async function initDeptPage() {
    if (window.DeptSync && staffUserId && staffPin && deptId) {
      await DeptSync.bootstrapData(staffUserId, staffPin, deptId);
    }
    renderTxn();
  }

  initDeptPage();
</script>
</body>
</html>
