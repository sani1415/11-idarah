<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিভাগ লগইন — মাদরাসাতুল মদীনা</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .dept-index-screen {
    justify-content: flex-start;
    padding: 0;
  }
  .dept-index-screen .topbar {
    align-self: stretch;
    flex-shrink: 0;
  }
  .dept-index-screen .topbar-actions { flex-shrink: 0; }
  .dept-head-one-line {
    min-width: 0;
    flex: 1;
    font-size: 12px;
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dept-head-one-line .dept-ar {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink2);
  }
  .dept-head-one-line .dept-dot { color: var(--ink3); opacity: 0.7; padding: 0 4px; }
  .dept-head-one-line .dept-bn { font-weight: 600; color: var(--ink2); }
  .dept-head-one-line .dept-tag { color: var(--ink3); font-weight: 500; }
  .dept-index-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 24px 24px;
    width: 100%;
    box-sizing: border-box;
    min-height: 0;
  }
  /* All departments same: two columns (no special admin row) */
  .role-grid.role-grid-dept {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }
  .role-grid.role-grid-dept .role-btn {
    padding: 12px 12px;
    gap: 10px;
    align-items: flex-start;
  }
  .role-grid.role-grid-dept .role-icon { font-size: 22px; }
  .role-grid.role-grid-dept .role-name { font-size: 13px; line-height: 1.25; }
  .role-grid.role-grid-dept .role-desc { font-size: 10px; line-height: 1.3; margin-top: 3px; }
</style>
</head>
<body>

<!-- DEPT SELECT -->
<div class="login-screen dept-index-screen" id="dept-screen">
  <div class="topbar">
    <div class="topbar-left dept-head-one-line" title="مدرسة المدينة · বিভাগ নির্বাচন · স্টাফ লগইন">
      <span class="dept-ar" dir="rtl">مدرسة المدينة</span><span class="dept-dot">·</span><span class="dept-bn">বিভাগ নির্বাচন</span><span class="dept-dot">·</span><span class="dept-tag">স্টাফ লগইন</span>
    </div>
    <div class="topbar-actions">
      <button type="button" class="topbar-btn topbar-btn--icon" onclick="exitDeptLoginToMain()" title="লগআউট" aria-label="লগআউট"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
  <div class="dept-index-body">
  <div class="role-grid role-grid-dept" id="dept-list"></div>
  </div>
</div>

<!-- PIN SCREEN -->
<div class="login-screen dept-index-screen" id="pin-screen" style="display:none;">
  <div class="topbar">
    <button type="button" class="topbar-btn" onclick="backToDepts()">← বিভাগ</button>
    <button type="button" class="topbar-btn topbar-btn--icon" onclick="exitDeptLoginToMain()" title="লগআউট" aria-label="লগআউট"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
  <div class="dept-index-body">
  <div style="text-align:center;margin-bottom:32px;">
    <span style="font-size:40px;display:block;margin-bottom:8px;" id="dept-icon">📦</span>
    <div style="font-family:'Noto Serif Bengali',serif;font-size:19px;font-weight:700;color:var(--ink2);" id="dept-title">বিভাগ লগইন</div>
    <div style="font-size:12px;color:var(--ink3);margin-top:4px;">পিন দিন</div>
  </div>
  <div class="login-box">
    <span class="login-label">পিন দিন</span>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pressPin('১')">১</button>
      <button class="num-btn" onclick="pressPin('২')">২</button>
      <button class="num-btn" onclick="pressPin('৩')">৩</button>
      <button class="num-btn" onclick="pressPin('৪')">৪</button>
      <button class="num-btn" onclick="pressPin('৫')">৫</button>
      <button class="num-btn" onclick="pressPin('৬')">৬</button>
      <button class="num-btn" onclick="pressPin('৭')">৭</button>
      <button class="num-btn" onclick="pressPin('৮')">৮</button>
      <button class="num-btn" onclick="pressPin('৯')">৯</button>
      <button class="num-btn empty"></button>
      <button class="num-btn" onclick="pressPin('০')">০</button>
      <button class="num-btn del" onclick="delPin()">⌫</button>
    </div>
    <div class="login-error" id="pin-error"></div>
  </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../api-shared.js"></script>
<script src="../js/mm-sample-data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mm-session.js"></script>
<script src="../js/dept-api.js"></script>
<script src="../js/dept-supabase-sync.js"></script>
<script>
  const BN = {'০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9'};
  let selectedDept = null;
  let pinVal = '';

  /* sample data re-seed বন্ধ: existing local data মুছবে না */
  function init() {
    const depts = DeptAPI.Departments.getAll();
    const el = document.getElementById('dept-list');
    el.innerHTML = depts.length
      ? depts.map(d=>
          `<div class="role-btn" onclick="selectDept('${d.id}')">
            <div class="role-icon">${d.emoji}</div>
            <div><div class="role-name">${DeptAPI.esc(d.name)}</div><div class="role-desc">স্টাফ লগইন</div></div>
          </div>`
        ).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:32px 0;font-size:13px;">কোনো বিভাগ পাওয়া যায়নি।</div>';
  }

  async function startPage() {
    try { await DeptSync.bootstrap(); } catch (e) { /* localStorage fallback */ }
    init();
  }

  function selectDept(id) {
    selectedDept = DeptAPI.Departments.getById(id);
    if (!selectedDept) return;
    document.getElementById('dept-icon').textContent  = selectedDept.emoji;
    document.getElementById('dept-title').textContent = selectedDept.name;
    document.getElementById('dept-screen').style.display = 'none';
    document.getElementById('pin-screen').style.display  = 'flex';
    resetPin();
  }

  function backToDepts() {
    selectedDept = null;
    document.getElementById('dept-screen').style.display = 'flex';
    document.getElementById('pin-screen').style.display  = 'none';
    resetPin();
  }

  function exitDeptLoginToMain() {
    MMSession.clearAppSession();
    location.href = '../index.html';
  }

  function pressPin(n) {
    if (pinVal.length >= 4) return;
    pinVal += BN[n];
    updateDots();
    if (pinVal.length === 4) setTimeout(checkPin, 200);
  }
  function delPin() { pinVal=pinVal.slice(0,-1); updateDots(); document.getElementById('pin-error').textContent=''; }
  function updateDots() { for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinVal.length); }
  function resetPin() { pinVal=''; updateDots(); document.getElementById('pin-error').textContent=''; }

  async function checkPin() {
    let remoteUser = null;
    if (window.MMSharedAPI) {
      try {
        const res = await MMSharedAPI.loginStaff('dept_head', selectedDept.id, pinVal);
        remoteUser = res && res.ok ? res.user : null;
      } catch (e) {
        remoteUser = null;
      }
    }
    if (remoteUser) {
      /* বিভাগ স্টাফ: আগের জিম্মাদার/মাদ্রাসা সেশন থাকলে সরিয়ে শুধু বিভাগ সেশন */
      MMSession.clearAppSession();
      MMSession.setDeptSession(selectedDept.id, selectedDept.name, selectedDept.emoji, remoteUser.id, pinVal);
      location.href = 'dept-staff.html';
    } else { showError(); }
  }

  function showError() {
    document.getElementById('pin-error').textContent='পিন ভুল হয়েছে।';
    pinVal=''; updateDots();
  }

  startPage();
</script>
</body>
</html>
