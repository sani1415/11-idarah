<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিভাগ ড্যাশবোর্ড — অ্যাডমিন</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .dept-card { background:#fff; border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:10px; cursor:pointer; transition:transform .12s; }
  .dept-card:active { transform:scale(.98); }
  .dept-head { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .dept-emoji { font-size:26px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:var(--cream2); border-radius:50%; flex-shrink:0; }
  .dept-info { flex:1; }
  .dept-name { font-family:'Noto Serif Bengali',serif; font-size:15px; font-weight:700; color:var(--ink2); }
  .dept-pin-info { font-size:11px; color:var(--ink3); margin-top:2px; }
  .dept-fin { display:flex; gap:8px; }
  .fin-pill { flex:1; padding:8px 10px; border-radius:var(--radius-sm); text-align:center; }
  .fin-pill.income { background:var(--green-light); }
  .fin-pill.expense { background:var(--red-light); }
  .fin-pill.balance { background:var(--gold-light); }
  .fin-pill-val { font-family:'Noto Serif Bengali',serif; font-size:13px; font-weight:700; }
  .fin-pill.income .fin-pill-val { color:var(--green); }
  .fin-pill.expense .fin-pill-val { color:var(--red); }
  .fin-pill.balance .fin-pill-val { color:var(--gold); }
  .fin-pill-label { font-size:9px; color:var(--ink3); margin-top:2px; }

  .req-item { background:#fff; border-radius:var(--radius-sm); padding:13px; box-shadow:var(--shadow); margin-bottom:8px; border-left:3px solid var(--gold); }
  .req-meta { font-size:11px; color:var(--ink3); margin-bottom:5px; display:flex; justify-content:space-between; }
  .req-reason { font-size:13px; color:var(--ink); margin-bottom:8px; }
  .req-actions { display:flex; gap:8px; }
  .req-btn { flex:1; padding:8px; border:none; border-radius:var(--radius-xs); font-family:'Noto Sans Bengali',sans-serif; font-size:12px; font-weight:600; cursor:pointer; }
  .req-btn.approve { background:var(--green-light); color:var(--green); }
  .req-btn.reject { background:var(--red-light); color:var(--red); }

  .month-nav { display:flex; align-items:center; justify-content:space-between; background:#fff; border-radius:var(--radius-sm); padding:10px 14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .month-nav-btn { background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink3); padding:4px; }
  .month-label { font-family:'Noto Serif Bengali',serif; font-size:14px; font-weight:600; color:var(--ink2); }

  .tab-bar { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
  .tab-btn { background:#fff; border:1px solid var(--cream3); border-radius:20px; padding:7px 14px; font-size:12px; white-space:nowrap; cursor:pointer; font-family:'Noto Sans Bengali',sans-serif; color:var(--ink3); }
  .tab-btn.active { background:var(--ink); color:var(--gold2); border-color:var(--ink); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">মুহতামিম</div>
    <div class="topbar-name">বিভাগ ড্যাশবোর্ড</div>
  </div>
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="location.href='../admin-hub.html'">হোম</button>
  </div>
</div>

<div class="content" id="panel-overview" style="padding-bottom:90px;">
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label">—</span>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="stat-row" id="overview-stats"></div>
  <button class="add-btn" onclick="openAddDept()">+ নতুন বিভাগ যোগ করুন</button>
  <div id="dept-list"></div>
</div>

<div class="content" id="panel-requests" style="display:none;padding-bottom:90px;">
  <div class="sec-header" style="margin-top:14px;"><div class="sec-title">সংশোধন অনুরোধ</div></div>
  <div id="req-list"></div>
</div>

<div class="content" id="panel-all-txn" style="display:none;padding-bottom:90px;">
  <div class="sec-header" style="margin-top:14px;"><div class="sec-title">সব লেনদেন</div></div>
  <div id="all-txn-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="নিচের নেভিগেশন">
  <div class="nav-item active" id="nav-overview" onclick="switchTab('overview')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M4 10.25 12 4l8 6.25V20a1 1 0 01-1 1h-4.5v-7h-3v7H5a1 1 0 01-1-1v-9.75z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">বিভাগ</span>
  </div>
  <div class="nav-item" id="nav-requests" onclick="switchTab('requests')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M14.857 17.082A23.848 23.848 0 0112 21c-1.874 0-3.646-.485-5.19-1.337m10.19-2.745a23.91 23.91 0 001.853-8.94A23.674 23.674 0 0018.292 3 2.25 2.25 0 0015.75 1.5h-7.5A2.25 2.25 0 007.708 3c-.558 0-1.089.128-1.563.354A23.91 23.91 0 003 9.09c0 3.071.78 5.94 2.142 8.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">অনুরোধ</span>
  </div>
  <div class="nav-item" id="nav-all-txn" onclick="switchTab('all-txn')">
    <span class="nav-icon" aria-hidden="true"><svg class="nav-svg" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-label">সব হিসাব</span>
  </div>
</nav>

<!-- ADD DEPT MODAL -->
<div class="modal-bg" id="modal-add-dept">
  <div class="modal">
    <div class="modal-title">নতুন বিভাগ <button class="modal-close" onclick="closeModal('modal-add-dept')">✕</button></div>
    <div class="form-group">
      <label class="form-label">বিভাগের নাম</label>
      <input class="form-input" id="nd-name" placeholder="যেমন: মৎস্য বিভাগ">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">ইমোজি</label>
        <input class="form-input" id="nd-emoji" placeholder="🏢" maxlength="2">
      </div>
      <div class="form-group">
        <label class="form-label">পিন (৪ সংখ্যা)</label>
        <input class="form-input" id="nd-pin" type="number" placeholder="0000" maxlength="4">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">বিবরণ (ঐচ্ছিক)</label>
      <input class="form-input" id="nd-desc" placeholder="সংক্ষিপ্ত বিবরণ">
    </div>
    <button class="submit-btn" onclick="saveDept()">সংরক্ষণ করুন</button>
  </div>
</div>

<!-- DEPT DETAIL VIEW -->
<div class="detail-view" id="dept-detail">
  <div class="detail-topbar">
    <span class="detail-back" onclick="closeDeptDetail()">←</span>
    <span class="detail-title" id="dd-title">—</span>
  </div>
  <div class="detail-content">
    <div class="tab-bar">
      <button class="tab-btn active" id="ddt-txn" onclick="ddTab('txn')">লেনদেন</button>
      <button class="tab-btn" id="ddt-inv" onclick="ddTab('inv')">মজুদ</button>
    </div>
    <div id="dd-txn-list"></div>
    <div id="dd-inv-list" style="display:none;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/mm-session.js"></script>
<script src="../js/monitor-mode.js"></script>
<script src="../js/dept-api.js"></script>
<script>
  if (!MMSession.isAdmin()) { location.href = 'dept-index.html'; }
  mmInsertMonitorBanner();

  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  const fmtAmt = n => '৳' + toBn(Number(n).toLocaleString('en'));
  const fmtDate = d => { if (!d) return ''; const p = d.split('-'); return toBn(p[2]+'/'+p[1]); };
  const monthLabel = m => { const p = m.split('-'); return toBn(p[1]) + ' — ' + toBn(p[0]); };

  let curMonth = new Date().toISOString().slice(0,7);
  let activeDeptId = null;

  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function openModal(id) {
    if (mmMutationBlocked(showToast)) return;
    document.getElementById(id).classList.add('open');
  }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function switchTab(name) {
    ['overview','requests','all-txn'].forEach(p => {
      document.getElementById('panel-'+p).style.display = p===name ? '' : 'none';
      document.getElementById('nav-'+p).classList.toggle('active', p===name);
    });
    if (name==='overview') renderOverview();
    if (name==='requests') renderRequests();
    if (name==='all-txn') renderAllTxn();
  }

  function changeMonth(dir) {
    const d = new Date(curMonth + '-01');
    d.setMonth(d.getMonth() + dir);
    curMonth = d.toISOString().slice(0,7);
    renderOverview();
  }

  function renderOverview() {
    document.getElementById('month-label').textContent = monthLabel(curMonth);
    const depts = DeptAPI.Departments.getAll();
    let totalIn = 0, totalEx = 0;
    depts.forEach(d => {
      const s = DeptAPI.Transactions.getSummary(d.id, curMonth);
      totalIn += s.income; totalEx += s.expense;
    });
    document.getElementById('overview-stats').innerHTML =
      `<div class="stat-card"><span class="stat-num">${toBn(depts.length)}</span><span class="stat-label">বিভাগ</span></div>
       <div class="stat-card"><span class="stat-num" style="color:var(--green)">${fmtAmt(totalIn)}</span><span class="stat-label">মোট আয়</span></div>
       <div class="stat-card"><span class="stat-num" style="color:var(--red)">${fmtAmt(totalEx)}</span><span class="stat-label">মোট ব্যয়</span></div>`;
    document.getElementById('dept-list').innerHTML = depts.map(d => {
      const s = DeptAPI.Transactions.getSummary(d.id, curMonth);
      return `<div class="dept-card" onclick="openDeptDetail('${d.id}')">
        <div class="dept-head">
          <div class="dept-emoji">${d.emoji}</div>
          <div class="dept-info">
            <div class="dept-name">${DeptAPI.esc(d.name)}</div>
            <div class="dept-pin-info">পিন: ${d.pin} · ${DeptAPI.esc(d.description||'')}</div>
          </div>
        </div>
        <div class="dept-fin">
          <div class="fin-pill income"><div class="fin-pill-val">${fmtAmt(s.income)}</div><div class="fin-pill-label">আয়</div></div>
          <div class="fin-pill expense"><div class="fin-pill-val">${fmtAmt(s.expense)}</div><div class="fin-pill-label">ব্যয়</div></div>
          <div class="fin-pill balance"><div class="fin-pill-val">${fmtAmt(s.income-s.expense)}</div><div class="fin-pill-label">নিট</div></div>
        </div>
      </div>`;
    }).join('');
  }

  function renderRequests() {
    const reqs = DeptAPI.EditRequests.getPending();
    document.getElementById('req-list').innerHTML = reqs.length
      ? reqs.map(r => `
        <div class="req-item">
          <div class="req-meta"><span>অনুরোধ #${DeptAPI.esc(r.id.slice(-4))}</span><span>${fmtDate(r.created_at?.split('T')[0]||'')}</span></div>
          <div class="req-reason">${DeptAPI.esc(r.reason)}</div>
          <div class="req-actions">
            <button class="req-btn approve" onclick="approveReq('${r.id}')">অনুমোদন</button>
            <button class="req-btn reject" onclick="rejectReq('${r.id}')">প্রত্যাখ্যান</button>
          </div>
        </div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:40px 0;font-size:13px;">কোনো সংশোধন অনুরোধ নেই</div>';
  }

  function renderAllTxn() {
    const all = DeptAPI.Transactions.getAll();
    const depts = DeptAPI.Departments.getAll();
    const deptMap = {};
    depts.forEach(d => deptMap[d.id] = d.name);
    document.getElementById('all-txn-list').innerHTML = all.length
      ? all.map(t => `
        <div style="background:#fff;border-radius:var(--radius-sm);padding:13px 14px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:${t.type==='income'?'var(--green-light)':'var(--red-light)'};">${t.type==='income'?'↑':'↓'}</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;color:var(--ink);">${DeptAPI.esc(t.description)}</div>
            <div style="font-size:11px;color:var(--ink3);margin-top:2px;">${DeptAPI.esc(deptMap[t.dept_id]||'—')} · ${fmtDate(t.date || t.txn_date)}</div>
          </div>
          <div style="font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:700;color:${t.type==='income'?'var(--green)':'var(--red)'};">${fmtAmt(t.amount)}</div>
        </div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:40px 0;font-size:13px;">কোনো লেনদেন নেই</div>';
  }

  function approveReq(id) { DeptAPI.EditRequests.approve(id); renderRequests(); showToast('অনুমোদন করা হয়েছে'); }
  function rejectReq(id)  { DeptAPI.EditRequests.reject(id);  renderRequests(); showToast('প্রত্যাখ্যান করা হয়েছে'); }

  function openAddDept() {
    ['nd-name','nd-emoji','nd-pin','nd-desc'].forEach(id => document.getElementById(id).value='');
    openModal('modal-add-dept');
  }

  function saveDept() {
    if (mmMutationBlocked(showToast)) return;
    const name = document.getElementById('nd-name').value.trim();
    const emoji = document.getElementById('nd-emoji').value.trim() || '🏢';
    const pin  = document.getElementById('nd-pin').value.trim();
    const desc = document.getElementById('nd-desc').value.trim();
    if (!name) { showToast('নাম দিন'); return; }
    if (!/^\d{4}$/.test(pin)) { showToast('৪ সংখ্যার পিন দিন'); return; }
    DeptAPI.Departments.add({ name, emoji, pin, description:desc });
    closeModal('modal-add-dept');
    renderOverview();
    showToast('বিভাগ যোগ হয়েছে');
  }

  function openDeptDetail(id) {
    activeDeptId = id;
    const dept = DeptAPI.Departments.getById(id);
    document.getElementById('dd-title').textContent = (dept?.emoji||'') + ' ' + (dept?.name||'');
    ddTab('txn');
    document.getElementById('dept-detail').classList.add('open');
  }

  function closeDeptDetail() { document.getElementById('dept-detail').classList.remove('open'); }

  function ddTab(name) {
    document.getElementById('ddt-txn').className = 'tab-btn' + (name==='txn'?' active':'');
    document.getElementById('ddt-inv').className = 'tab-btn' + (name==='inv'?' active':'');
    document.getElementById('dd-txn-list').style.display = name==='txn' ? '' : 'none';
    document.getElementById('dd-inv-list').style.display = name==='inv' ? '' : 'none';
    if (name==='txn') {
      const txns = DeptAPI.Transactions.getByDept(activeDeptId);
      document.getElementById('dd-txn-list').innerHTML = txns.length
        ? txns.map(t => `
          <div style="background:#fff;border-radius:var(--radius-sm);padding:12px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;gap:10px;align-items:center;">
            <span style="font-size:14px;">${t.type==='income'?'↑':'↓'}</span>
            <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${DeptAPI.esc(t.description)}</div><div style="font-size:11px;color:var(--ink3);">${fmtDate(t.date || t.txn_date)}</div></div>
            <span style="font-family:'Noto Serif Bengali',serif;font-size:14px;font-weight:700;color:${t.type==='income'?'var(--green)':'var(--red)'};">${fmtAmt(t.amount)}</span>
          </div>`).join('')
        : '<div style="text-align:center;color:var(--ink3);padding:30px 0;font-size:13px;">কোনো লেনদেন নেই</div>';
    }
    if (name==='inv') {
      const items = DeptAPI.Inventory.getByDept(activeDeptId);
      document.getElementById('dd-inv-list').innerHTML = items.length
        ? items.map(i => `
          <div style="background:#fff;border-radius:var(--radius-sm);padding:12px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:10px;">
            <span style="font-size:20px;">📦</span>
            <div style="flex:1;font-size:13px;font-weight:600;">${DeptAPI.esc(i.item_name)}</div>
            <div style="text-align:right;"><div style="font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:700;">${toBn(i.quantity)}</div><div style="font-size:11px;color:var(--ink3);">${DeptAPI.esc(i.unit)}</div></div>
          </div>`).join('')
        : '<div style="text-align:center;color:var(--ink3);padding:30px 0;font-size:13px;">কোনো মজুদ নেই</div>';
    }
  }

  renderOverview();
</script>
</body>
</html>
