<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মেইন এডমিন — মাদরাসাতুল মদীনা</title>
<link rel="stylesheet" href="css/style.css">
<style>
  /* ── Login ── */
  .hub-login-wrap {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 20px 32px;
    background:
      radial-gradient(ellipse 100% 70% at 50% 0%, rgba(232,184,75,.14) 0%, transparent 50%),
      radial-gradient(ellipse 80% 50% at 100% 100%, rgba(26,82,118,.08) 0%, transparent 45%),
      linear-gradient(165deg,#faf6ef 0%,#f2ead8 50%,#ebe4d4 100%);
  }
  .hub-login-card { width:100%; max-width:340px; background:#fff; border:1px solid rgba(26,18,8,.08); border-radius:22px; padding:28px 22px 24px; box-shadow:0 16px 48px rgba(26,18,8,.1); }
  .hub-login-logo { font-family:'Noto Serif Bengali',serif; font-size:26px; font-weight:700; color:var(--gold2); text-align:center; letter-spacing:.02em; margin-bottom:4px; }
  .hub-login-title { font-family:'Noto Serif Bengali',serif; font-size:19px; font-weight:700; color:var(--ink2); text-align:center; margin-bottom:6px; }
  .hub-login-tag { font-size:11px; color:var(--ink3); text-align:center; line-height:1.45; margin-bottom:20px; }
  .hub-login-label { font-size:11px; color:var(--ink3); text-align:center; margin-bottom:10px; letter-spacing:.06em; text-transform:uppercase; }

  /* ── Dashboard shell ── */
  #dashboard { min-height:100vh; min-height:100dvh; background:linear-gradient(180deg,var(--cream2) 0%,var(--cream) 28%,var(--cream) 100%); display:flex; flex-direction:column; }
  .hub-main { flex:1; display:flex; flex-direction:column; min-height:0; }
  .hub-tab-panels { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 16px; padding-top:calc(58px + max(8px,env(safe-area-inset-top,0px))); padding-bottom:calc(68px + env(safe-area-inset-bottom,0px)); }
  .hub-tab-panel { display:none; padding-bottom:8px; }
  .hub-tab-panel.is-active { display:block; }

  /* ── Bottom nav ── */
  .hub-bottom-nav { position:fixed; left:12px; right:12px; bottom:max(12px,env(safe-area-inset-bottom,12px)); z-index:100; display:flex; align-items:center; justify-content:space-around; gap:4px; padding:6px 8px; background:linear-gradient(180deg,#ffffff 0%,#faf6ef 100%); border:1px solid rgba(26,18,8,.08); border-radius:999px; box-shadow:0 4px 6px rgba(26,18,8,.04),0 14px 36px rgba(26,18,8,.1); max-width:456px; margin:0 auto; box-sizing:border-box; }
  .hub-nav-btn { flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:6px 6px 8px; border:none; border-radius:14px; background:transparent; color:var(--ink3); font-family:'Noto Sans Bengali',sans-serif; font-size:10px; font-weight:600; line-height:1.2; cursor:pointer; transition:background .15s,color .15s; -webkit-tap-highlight-color:transparent; text-decoration:none; }
  .hub-nav-ico { width:22px; height:22px; flex-shrink:0; opacity:.88; color:inherit; }
  .hub-nav-ico path, .hub-nav-ico rect, .hub-nav-ico circle { fill:none; stroke:currentColor; }
  .hub-nav-btn.is-active .hub-nav-ico { opacity:1; }
  .hub-nav-label { display:block; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hub-nav-btn:hover, .hub-nav-btn:focus-visible { background:rgba(255,255,255,.7); color:var(--ink2); outline:none; }
  .hub-nav-btn.is-active { background:rgba(232,184,75,.22); color:var(--ink2); }
  .hub-nav-badge { position:absolute; top:4px; right:6px; min-width:16px; height:16px; padding:0 4px; border-radius:999px; background:var(--red); color:#fff; font-size:9px; font-weight:700; line-height:16px; text-align:center; display:none; }
  .hub-nav-btn.has-badge-wrap { position:relative; }
  .hub-nav-btn.has-badge-wrap .hub-nav-badge.is-visible { display:inline-block; }

  /* ── Header ── */
  .hub-header { position:fixed; top:0; left:0; right:0; z-index:50; background:linear-gradient(180deg,#fffefb 0%,#f3ecdf 55%,#ebe4d4 100%); color:var(--ink); padding:max(8px,env(safe-area-inset-top,0px)) 14px 10px; border-bottom:1px solid rgba(26,18,8,.06); box-shadow:0 8px 28px rgba(26,18,8,.05); box-sizing:border-box; }
  .hub-header-inner { max-width:520px; margin:0 auto; display:flex; flex-direction:row; align-items:center; justify-content:space-between; gap:12px; min-height:44px; }
  .hub-header-lead { flex:1 1 auto; min-width:0; display:flex; flex-direction:column; align-items:flex-start; gap:3px; line-height:1.25; }
  .hub-title-name { font-family:'Noto Serif Bengali',serif; font-size:15px; font-weight:700; color:var(--ink2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
  .hub-date-sub { font-size:11px; line-height:1.4; color:var(--ink3); width:100%; word-break:break-word; }
  .hub-logout { flex-shrink:0; font-size:11px; color:var(--ink3); padding:6px 10px; border:1px solid rgba(26,18,8,.1); border-radius:10px; background:rgba(255,255,255,.75); cursor:pointer; font-family:'Noto Sans Bengali',sans-serif; transition:background .15s,border-color .15s; }
  .hub-logout:hover { background:#fff; border-color:rgba(201,149,42,.28); color:var(--ink2); }
  .hub-body { max-width:520px; margin:0 auto; position:relative; width:100%; box-sizing:border-box; }

  /* ── Inbox/chat ── */
  #hub-panel-inbox { position:relative; padding-bottom:80px; min-height:200px; }
  .hub-inbox-lead { font-size:12px; color:var(--ink3); line-height:1.5; margin:0 0 6px; }
  .hub-inbox-subline { font-size:13px; font-weight:600; color:var(--ink2); margin:0 0 12px; }
  .hub-thread-list { display:flex; flex-direction:column; gap:8px; }
  .hub-thread-item { background:#fff; border-radius:var(--radius-sm); padding:12px 14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:12px; cursor:pointer; border:1px solid rgba(26,18,8,.06); transition:transform .12s; text-align:left; width:100%; font:inherit; color:inherit; -webkit-appearance:none; appearance:none; }
  .hub-thread-item:active { transform:scale(.99); }
  .hub-t-avatar { width:46px; height:46px; border-radius:50%; background:var(--cream2); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; position:relative; }
  .hub-t-unread { position:absolute; top:-2px; right:-2px; min-width:16px; height:16px; padding:0 4px; background:var(--red); color:#fff; border-radius:50%; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; border:2px solid #fff; }
  .hub-t-info { flex:1; min-width:0; }
  .hub-t-name { font-size:14px; font-weight:600; color:var(--ink); }
  .hub-t-role { font-size:10px; color:var(--ink3); margin-top:1px; }
  .hub-t-preview { font-size:12px; color:var(--ink3); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hub-t-preview.unread { color:var(--ink); font-weight:600; }
  .hub-t-right { text-align:right; flex-shrink:0; }
  .hub-t-time { font-size:10px; color:var(--ink3); }
  .hub-thread-empty { text-align:center; color:var(--ink3); padding:36px 16px; font-size:13px; line-height:1.55; background:rgba(255,255,255,.6); border-radius:var(--radius); border:1px dashed var(--cream3); }
  .hub-inbox-fab { position:fixed; bottom:calc(76px + env(safe-area-inset-bottom,0px)); right:max(16px,calc(50% - 240px)); width:52px; height:52px; border-radius:50%; background:var(--gold); color:var(--ink); border:none; font-size:22px; cursor:pointer; box-shadow:0 6px 22px rgba(26,18,8,.18); z-index:45; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
  .hub-inbox-fab:active { transform:scale(.94); }
  @media (min-width:560px) { .hub-inbox-fab { right:calc(50% - 260px); } }

  /* ── Section titles ── */
  .hub-section-title { font-family:'Noto Serif Bengali',serif; font-size:15px; font-weight:700; color:var(--ink2); margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .hub-section-title::before { content:''; width:4px; height:18px; border-radius:3px; background:linear-gradient(180deg,var(--gold),var(--gold2)); }
  .hub-section-sub { font-size:11px; color:var(--ink3); margin-bottom:14px; line-height:1.45; padding-left:12px; }

  /* ── Recent feed ── */
  .recent-wrap { margin-bottom:16px; }
  .recent-item { background:#fff; border-radius:var(--radius-sm); padding:12px 14px; box-shadow:var(--shadow); margin-bottom:8px; display:flex; align-items:flex-start; gap:12px; border:1px solid rgba(26,18,8,.05); }
  .recent-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
  .recent-text { flex:1; font-size:12px; color:var(--ink); line-height:1.45; }
  .recent-date { font-size:10px; color:var(--ink3); flex-shrink:0; margin-top:2px; }
  .recent-empty { text-align:center; color:var(--ink3); padding:28px 16px; font-size:13px; background:rgba(255,255,255,.5); border-radius:var(--radius-sm); border:1px dashed var(--cream3); }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen hub-login-wrap" id="login-screen">
  <div class="hub-login-card">
    <div class="login-logo hub-login-logo">مدرسة المدينة</div>
    <div class="hub-login-title">মেইন এডমিন</div>
    <div class="hub-login-tag">সব মডিউল এক জায়গা থেকে · একটি পিন</div>
    <div class="hub-login-label">পিন দিন</div>
    <div class="login-box" style="background:transparent;border:none;box-shadow:none;padding:0;">
      <div class="pin-dots" style="margin-bottom:16px;">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="numpad">
        <button type="button" class="num-btn" onclick="pressPin('১')">১</button>
        <button type="button" class="num-btn" onclick="pressPin('২')">২</button>
        <button type="button" class="num-btn" onclick="pressPin('৩')">৩</button>
        <button type="button" class="num-btn" onclick="pressPin('৪')">৪</button>
        <button type="button" class="num-btn" onclick="pressPin('৫')">৫</button>
        <button type="button" class="num-btn" onclick="pressPin('৬')">৬</button>
        <button type="button" class="num-btn" onclick="pressPin('৭')">৭</button>
        <button type="button" class="num-btn" onclick="pressPin('৮')">৮</button>
        <button type="button" class="num-btn" onclick="pressPin('৯')">৯</button>
        <button type="button" class="num-btn num-btn--del" onclick="delPin()">⌫</button>
        <button type="button" class="num-btn" onclick="pressPin('০')">০</button>
        <button type="button" class="num-btn num-btn--ok" onclick="checkPin()">✓</button>
      </div>
      <div class="pin-error" id="pin-error"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <header class="hub-header">
    <div class="hub-header-inner">
      <div class="hub-header-lead">
        <span class="hub-title-name">মেইন এডমিন</span>
        <div class="hub-date-sub" id="date-line">—</div>
      </div>
      <button type="button" class="hub-logout" onclick="logout()">লগআউট</button>
    </div>
  </header>

  <div class="hub-main hub-body">
    <div class="hub-tab-panels" id="hub-tab-panels">

      <!-- Tab: বার্তা -->
      <section class="hub-tab-panel is-active" id="hub-panel-inbox" role="tabpanel">
        <p class="hub-inbox-lead">শিক্ষক ও স্টাফের বার্তা এখানে আসে। থ্রেড বেছে চ্যাট খুলুন। ✏️ চেপে নতুন বার্তা লিখুন।</p>
        <p class="hub-inbox-subline" id="hub-inbox-subline">—</p>
        <div id="hub-thread-list" class="hub-thread-list"></div>
        <button type="button" class="hub-inbox-fab" onclick="location.href='chat.html?compose=1'" title="নতুন বার্তা">✏️</button>
      </section>

      <!-- Tab: কার্যক্রম -->
      <section class="hub-tab-panel" id="hub-panel-recent" role="tabpanel">
        <div class="hub-section-title" style="margin-top:4px;">সাম্প্রতিক কার্যক্রম</div>
        <p class="hub-section-sub">মাদ্রাসা লগ, বিভাগ লেনদেন ও খেদমত থেকে মিশ্রিত</p>
        <div class="recent-wrap" id="recent-feed"></div>
      </section>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="hub-bottom-nav" role="navigation" aria-label="মেইন এডমিন নেভিগেশন">
      <a class="hub-nav-btn" href="main-admin-madrasa.html" aria-label="মাদ্রাসা মডিউল">
        <svg class="hub-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span class="hub-nav-label">মাদ্রাসা</span>
      </a>
      <a class="hub-nav-btn" href="main-admin-dept.html" aria-label="বিভাগ মডিউল">
        <svg class="hub-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 22V12h6v10"/></svg>
        <span class="hub-nav-label">বিভাগ</span>
      </a>
      <a class="hub-nav-btn" href="main-admin-khedmat.html" aria-label="খেদমত মডিউল">
        <svg class="hub-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        <span class="hub-nav-label">খেদমত</span>
      </a>
      <button type="button" class="hub-nav-btn has-badge-wrap is-active" id="hub-nav-inbox" data-hub-tab="inbox" aria-label="বার্তা">
        <span class="hub-nav-badge" id="hub-nav-inbox-badge" aria-hidden="true"></span>
        <svg class="hub-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M22 6l-10 7L2 6"/></svg>
        <span class="hub-nav-label">বার্তা</span>
      </button>
      <button type="button" class="hub-nav-btn" id="hub-nav-recent" data-hub-tab="recent" aria-label="কার্যক্রম">
        <svg class="hub-nav-ico" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle stroke-width="1.75" cx="12" cy="12" r="9"/><path stroke-width="1.75" stroke-linecap="round" d="M12 7v5l3 3"/></svg>
        <span class="hub-nav-label">কার্যক্রম</span>
      </button>
    </nav>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/mm-sample-data.js"></script>
<script src="js/mm-session.js"></script>
<script src="js/hijri-utils.js"></script>
<script src="js/dept-api.js"></script>
<script src="js/khedmat-api.js"></script>
<script src="js/chat-api.js"></script>
<script>
  const BN = {'০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9'};
  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  const fmtAmt = n => '৳' + toBn(Math.round(Number(n)).toLocaleString('en'));
  const fmtDate = d => { if (!d) return ''; const p = d.split('-'); return p[2]+'/'+p[1]; };

  let pinVal = '';

  if (MMSession.isAdmin()) showDashboard();

  function pressPin(n) {
    if (pinVal.length >= 4) return;
    pinVal += BN[n]; updateDots();
    if (pinVal.length === 4) setTimeout(checkPin, 200);
  }
  function delPin() { pinVal = pinVal.slice(0,-1); updateDots(); document.getElementById('pin-error').textContent=''; }
  function updateDots() { for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinVal.length); }
  function resetPin() { pinVal=''; updateDots(); document.getElementById('pin-error').textContent=''; }

  function checkPin() {
    const s = API.Settings.get();
    if (pinVal === (s.admin_pin||'0000')) {
      MMSession.setRole('admin'); MMSession.setName('মুহতামিম'); showDashboard();
    } else {
      document.getElementById('pin-error').textContent='পিন ভুল হয়েছে।';
      pinVal=''; updateDots();
    }
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='flex';
    loadDashboard();
    initHubBottomNav();
    applyHubUrlTab();
  }

  function applyHubUrlTab() {
    try {
      const t = new URLSearchParams(location.search).get('tab');
      if (t && ['inbox','recent'].includes(t)) {
        switchHubTab(t);
        history.replaceState({}, '', 'admin-hub.html');
      }
    } catch(e) {}
  }

  function initHubBottomNav() {
    const nav = document.querySelector('.hub-bottom-nav');
    if (!nav || nav.dataset.bound === '1') return;
    nav.dataset.bound = '1';
    nav.querySelectorAll('.hub-nav-btn[data-hub-tab]').forEach(btn => {
      btn.addEventListener('click', () => switchHubTab(btn.dataset.hubTab));
    });
  }

  function switchHubTab(tab) {
    const ids = { inbox: 'hub-panel-inbox', recent: 'hub-panel-recent' };
    const panelId = ids[tab];
    if (!panelId) return;
    document.querySelectorAll('.hub-tab-panel').forEach(p => p.classList.toggle('is-active', p.id === panelId));
    document.querySelectorAll('.hub-nav-btn[data-hub-tab]').forEach(btn => {
      const on = btn.dataset.hubTab === tab;
      btn.classList.toggle('is-active', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    const scrollEl = document.getElementById('hub-tab-panels');
    if (scrollEl) scrollEl.scrollTop = 0;
    if (tab === 'inbox') renderHubInbox();
  }

  function fmtTimeHub(ts) {
    try {
      const d = new Date(ts), h = d.getHours(), m = d.getMinutes();
      const hh = h > 12 ? h-12 : h||12, ap = h >= 12 ? ' PM' : ' AM';
      return toBn(String(hh).padStart(2,'0')+':'+String(m).padStart(2,'0'))+ap;
    } catch(e) { return ''; }
  }

  function renderHubInbox() {
    const el = document.getElementById('hub-thread-list');
    const sub = document.getElementById('hub-inbox-subline');
    if (!el) return;
    const threads = ChatAPI.getThreads();
    const totalUnread = threads.reduce((s,t) => s+t.unread, 0);
    if (sub) sub.textContent = totalUnread > 0 ? toBn(totalUnread)+' টি অপঠিত বার্তা · স্টাফ → মুহতামিম' : 'সব পঠিত বা এখনো কোনো থ্রেড নেই';
    if (!threads.length) {
      el.innerHTML = '<div class="hub-thread-empty">কোনো থ্রেড নেই।<br>✏️ বাটনে চেপে কোনো স্টাফকে প্রথম বার্তা লিখুন।</div>';
      return;
    }
    el.innerHTML = threads.map(t => {
      const isUnread = t.unread > 0;
      const preview = t.last_msg ? (t.last_msg.from_role==='admin'?'আপনি: ':'')+t.last_msg.text.slice(0,48)+(t.last_msg.text.length>48?'…':'') : '—';
      const href = 'chat.html?thread='+encodeURIComponent(t.thread_id);
      const unr = isUnread ? `<span class="hub-t-unread">${toBn(t.unread)}</span>` : '';
      return `<button type="button" class="hub-thread-item" onclick="location.href='${href}'">
        <div class="hub-t-avatar">${t.label.icon}${unr}</div>
        <div class="hub-t-info">
          <div class="hub-t-name">${ChatAPI.esc(t.staff_name)}</div>
          <div class="hub-t-role">${ChatAPI.esc(t.label.name)}</div>
          <div class="hub-t-preview ${isUnread?'unread':''}">${ChatAPI.esc(preview)}</div>
        </div>
        <div class="hub-t-right"><div class="hub-t-time">${t.last_msg?fmtTimeHub(t.last_msg.ts):''}</div></div>
      </button>`;
    }).join('');
  }

  function loadDashboard() {
    const today = new Date();
    const iso = today.toISOString().split('T')[0];
    const wdShort = ['রবি','সোম','মঙ্গল','বুধ','বৃহঃ','শুক্র','শনি'];
    let dateLine = wdShort[today.getDay()]+', '+toBn(today.getDate())+'/'+toBn(today.getMonth()+1)+'/'+toBn(today.getFullYear());
    if (typeof HijriUtils !== 'undefined' && HijriUtils.formatLong) {
      const h = HijriUtils.formatLong(iso, { bengaliDigits:true });
      if (h) dateLine += ' · '+String(h).replace(/\s+/g,' ').trim();
    }
    const dateEl = document.getElementById('date-line');
    if (dateEl) dateEl.textContent = dateLine;

    const unreadChat = ChatAPI.countUnreadAdmin();
    renderHubInbox();
    const navBadge = document.getElementById('hub-nav-inbox-badge');
    if (navBadge) {
      if (unreadChat > 0) { navBadge.textContent = toBn(unreadChat); navBadge.classList.add('is-visible'); }
      else { navBadge.textContent=''; navBadge.classList.remove('is-visible'); }
    }

    const feed = [];
    const khLog = KhAPI.DailyLogs.getLatest();
    if (khLog) feed.push({ color:'var(--gold)', text:'খেদমত লগ: '+khLog.content.slice(0,50)+(khLog.content.length>50?'...':''), date:fmtDate(khLog.date) });
    KhAPI.Activities.getAll().slice(0,2).forEach(a => {
      const ben = KhAPI.Beneficiaries.getById(a.beneficiary_id);
      feed.push({ color:'var(--teal)', text:(ben?.name||'—')+': '+a.title, date:fmtDate(a.date) });
    });
    const curMonth = today.toISOString().slice(0,7);
    DeptAPI.Transactions.getAll().slice(0,2).forEach(t => {
      const dept = DeptAPI.Departments.getById(t.dept_id);
      const dStr = t.date||t.txn_date;
      feed.push({ color:t.type==='income'?'var(--green)':'var(--red)', text:(dept?.name||'—')+' — '+t.description+' '+fmtAmt(t.amount), date:fmtDate(dStr) });
    });
    API.Logs.getAll().slice(0,2).forEach(l => {
      feed.push({ color:'var(--blue)', text:l.text.slice(0,60)+(l.text.length>60?'...':''), date:fmtDate(l.date) });
    });
    feed.sort((a,b) => (b.date||'').localeCompare(a.date||''));
    document.getElementById('recent-feed').innerHTML = feed.slice(0,6).map(f =>
      `<div class="recent-item"><div class="recent-dot" style="background:${f.color};"></div><div class="recent-text">${API.esc(f.text)}</div><div class="recent-date">${f.date}</div></div>`
    ).join('') || '<div class="recent-empty">এখনো কোনো কার্যক্রমের রেকর্ড নেই।</div>';
  }

  function logout() { MMSession.logoutToIndex('index.html'); }
</script>
