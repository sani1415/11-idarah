<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">

<title>কর্মসূচি হিসাব — পূর্ণাঙ্গ প্রোটোটাইপ</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#faf6ef;color:#1a1208;font-family:system-ui,-apple-system,"Noto Sans Bengali",sans-serif}.top{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#fffaf0,#f2e6d4);padding:12px 14px;display:flex;justify-content:space-between;gap:8px;align-items:center;box-shadow:0 3px 16px rgba(26,18,8,.08)}.role{font-size:11px;color:#7b6b52;font-weight:800}.title{font-size:18px;font-weight:900}.wrap{max-width:1040px;margin:0 auto;padding:12px 12px 90px}.btn{border:0;border-radius:13px;padding:9px 11px;font:inherit;font-weight:900;cursor:pointer;background:#1a1208;color:#f2c86b}.btn.green{background:#dcfce7;color:#065f46}.btn.red{background:#fee2e2;color:#991b1b}.btn.light{background:#fff8e8;color:#7a5118;border:1px solid rgba(154,106,33,.16)}.btn.gray{background:#f3f0ea;color:#5b4a32}.btn.small{padding:6px 8px;font-size:12px}.card{background:#fff;border:1px solid rgba(26,18,8,.06);border-radius:20px;box-shadow:0 8px 22px rgba(26,18,8,.06);overflow:hidden;margin-bottom:10px}.head{padding:12px 13px;border-bottom:1px solid rgba(26,18,8,.07);display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:900}.body{padding:12px}.project-select{width:100%;padding:11px;border:1px solid rgba(26,18,8,.14);border-radius:14px;background:#fff;font-family:inherit;font-weight:800}.hero h1{margin:0 0 5px;font-size:21px}.hero p{margin:0;color:#7b6b52;font-size:12px;line-height:1.55}.tag{display:inline-block;margin-top:7px;background:#fff4d9;color:#8a5a12;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:900}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.kpi{background:linear-gradient(180deg,#fff,#fffaf2);border:1px solid rgba(26,18,8,.06);border-radius:16px;padding:10px 7px;text-align:center}.kpi span{display:block;font-size:10px;color:#7b6b52;font-weight:800;margin-bottom:4px}.kpi b{font-size:17px}.greenTxt{color:#2d6a4f}.redTxt{color:#c1440e}.goldTxt{color:#c9952a}.toolbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}.tabs{display:flex;gap:5px;background:#fff8e8;border-radius:15px;padding:4px;margin-bottom:10px;overflow:auto}.tab{border:0;background:transparent;border-radius:12px;padding:8px 11px;font:inherit;font-weight:900;font-size:12px;color:#7b6b52;white-space:nowrap;cursor:pointer}.tab.active{background:#1a1208;color:#f2c86b}.tableWrap{overflow:auto;border:1px solid rgba(26,18,8,.07);border-radius:16px}.tbl{border-collapse:collapse;width:100%;min-width:700px;font-size:13px}.tbl th{background:#faf3e8;color:#7b6b52;text-align:right;padding:8px;font-size:11px}.tbl td{padding:8px;border-bottom:1px solid rgba(26,18,8,.06);white-space:nowrap}.tbl tr:nth-child(even) td{background:#fffaf2}.actions{display:flex;gap:5px}.mini{display:flex;justify-content:space-between;gap:8px;background:#fffaf2;border:1px solid rgba(26,18,8,.06);border-radius:14px;padding:9px 10px;margin-bottom:8px}.mini small{color:#7b6b52}.form{display:grid;grid-template-columns:1fr 1fr;gap:9px}.field label{display:block;color:#7b6b52;font-size:12px;font-weight:800;margin-bottom:4px}.field input,.field select,.field textarea{width:100%;padding:10px;border:1px solid rgba(26,18,8,.15);border-radius:12px;font:inherit}.field textarea{min-height:74px}.wide{grid-column:1/-1}.hint{font-size:11px;color:#7b6b52;line-height:1.45;margin-top:6px}.modalBg{display:none;position:fixed;inset:0;background:rgba(26,18,8,.35);z-index:30;align-items:center;justify-content:center;padding:14px}.modalBg.open{display:flex}.modal{background:#fff;border-radius:22px;padding:17px;max-width:620px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 24px 70px rgba(26,18,8,.28)}.modalTitle{display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:900;margin-bottom:12px}.x{border:0;background:#eee;border-radius:50%;width:32px;height:32px}.settings-grid{display:grid;grid-template-columns:1fr;gap:10px}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{border:1px solid rgba(26,18,8,.12);background:#fffaf2;border-radius:999px;padding:6px 10px;font-size:12px}.note{position:fixed;left:12px;right:12px;bottom:10px;max-width:1040px;margin:auto;background:#1a1208;color:#fff;border-radius:16px;padding:10px 12px;font-size:12px;line-height:1.5;box-shadow:0 12px 32px rgba(26,18,8,.28)}.note b{color:#f2c86b}
@media(max-width:760px){.kpis,.toolbar{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}.wrap{padding-bottom:130px}.note{font-size:11px}.hero h1{font-size:19px}.top{align-items:flex-start}.title{font-size:16px}.toolbar .btn{font-size:13px}}
</style>
</head>
<body>
<div class="top"><div><div class="role">দফতর দায়িত্বশীল</div><div class="title">কর্মসূচি হিসাব</div></div><button class="btn light" onclick="openProgram()">+ নতুন</button></div>
<div class="wrap">
  <div class="card"><div class="body"><select class="project-select" id="projectSelect" onchange="changeProgram(this.value)"></select></div></div>
  <section class="card hero"><div class="body"><h1 id="hTitle"></h1><p id="hNote"></p><span class="tag" id="hType"></span><div class="kpis" id="kpis"></div></div></section>
  <div class="toolbar"><button class="btn green" onclick="openIncome()">+ আয় যোগ</button><button class="btn red" onclick="openExpense()">+ ব্যয় যোগ</button><button class="btn light" onclick="openProgram(true)">কর্মসূচি এডিট</button><button class="btn gray" onclick="openSettings()">সেটিং</button></div>
  <div class="tabs"><button class="tab active" data-tab="summary" onclick="setTab('summary')">সারাংশ</button><button class="tab" data-tab="income" onclick="setTab('income')">আয়</button><button class="tab" data-tab="expense" onclick="setTab('expense')">ব্যয়</button><button class="tab" data-tab="report" onclick="setTab('report')">রিপোর্ট</button></div>
  <div id="root"></div>
</div>
<div class="note"><b>সম্পূর্ণ প্রোটোটাইপ:</b> ডেটা এই ব্রাউজারের localStorage-এ সংরক্ষিত থাকবে। এডিট/ডিলিট/সেটিং/রিসেট সব কাজ করবে।</div>

<div class="modalBg" id="modal-program"><div class="modal"><div class="modalTitle"><span id="programTitle">কর্মসূচি</span><button class="x" onclick="closeModal('program')">×</button></div><div class="form"><input type="hidden" id="programEditId"><div class="field"><label>কর্মসূচির নাম</label><input id="programName"></div><div class="field"><label>Template</label><select id="programTemplate" onchange="syncProgramNote()"></select></div><div class="field"><label>অবস্থা</label><select id="programStatus"><option>চলমান</option><option>পরিকল্পনা</option><option>শেষ</option><option>স্থগিত</option></select></div><div class="field"><label>তারিখ</label><input id="programDate" type="date"></div><div class="field wide"><label>বিবরণ</label><textarea id="programNote"></textarea></div></div><button class="btn" style="width:100%;margin-top:12px" onclick="saveProgram()">সংরক্ষণ</button><button class="btn red" id="programDeleteBtn" style="width:100%;margin-top:8px;display:none" onclick="deleteProgram()">কর্মসূচি ডিলিট</button></div></div>

<div class="modalBg" id="modal-income"><div class="modal"><div class="modalTitle"><span id="incomeTitle">আয় যোগ</span><button class="x" onclick="closeModal('income')">×</button></div><div class="form"><input type="hidden" id="incomeEditId"><div class="field"><label>আয়ের ধরন</label><select id="incType" onchange="syncIncomeFields()"></select></div><div class="field"><label>ব্যক্তির ধরন</label><select id="incPersonType"><option>ছাত্র</option><option>সাধারণ মানুষ</option><option>প্রতিষ্ঠান</option></select></div><div class="field wide"><label>নাম</label><input id="incName" placeholder="নাম লিখুন"></div><div class="field" id="shareField"><label>ভাগ সংখ্যা</label><input id="incShare" type="number" min="1" value="1"></div><div class="field"><label>টাকা</label><input id="incAmount" type="number" value="1000"></div><div class="field wide"><label>পরিচিতি / মোবাইল / ছাত্র দাখেলা</label><input id="incRef" placeholder="ঐচ্ছিক"></div></div><div class="hint" id="incomeHint"></div><button class="btn green" style="width:100%;margin-top:12px" onclick="saveIncome()">সংরক্ষণ</button></div></div>

<div class="modalBg" id="modal-expense"><div class="modal"><div class="modalTitle"><span id="expenseTitle">ব্যয় যোগ</span><button class="x" onclick="closeModal('expense')">×</button></div><div class="form"><input type="hidden" id="expenseEditId"><div class="field"><label>ব্যয়ের খাত</label><select id="expType"></select></div><div class="field"><label>টাকা</label><input id="expAmount" type="number" value="1000"></div><div class="field wide"><label>বিবরণ</label><input id="expNote" placeholder="ব্যয়ের বিবরণ"></div></div><button class="btn red" style="width:100%;margin-top:12px" onclick="saveExpense()">সংরক্ষণ</button></div></div>

<div class="modalBg" id="modal-settings"><div class="modal"><div class="modalTitle">সেটিং <button class="x" onclick="closeModal('settings')">×</button></div><div class="settings-grid"><div class="field"><label>Template নির্বাচন</label><select id="settingsTemplate" onchange="renderSettings()"></select></div><div class="card"><div class="head">আয়ের ধরন</div><div class="body"><div class="chips" id="incomeChips"></div><div class="form" style="margin-top:10px"><input id="newIncomeType" placeholder="নতুন আয়ের ধরন"><button class="btn green" onclick="addType('income')">যোগ</button></div></div></div><div class="card"><div class="head">ব্যয়ের খাত</div><div class="body"><div class="chips" id="expenseChips"></div><div class="form" style="margin-top:10px"><input id="newExpenseType" placeholder="নতুন ব্যয়ের খাত"><button class="btn red" onclick="addType('expense')">যোগ</button></div></div></div><button class="btn gray" onclick="resetDemo()">ডেমো ডেটা রিসেট</button></div></div></div>

<script>
const KEY='mm_programs_full_proto_v2',B='০১২৩৪৫৬৭৮৯';const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);const bn=x=>String(x??0).replace(/[0-9]/g,d=>B[d]);const money=x=>'৳'+bn(Number(x||0).toLocaleString('en-US'));
const defaults=()=>({templates:{qurbani:{label:'কোরবানি',note:'পূর্ণ ভাগ হলে ভাগ সংখ্যা থাকবে, আংশিক টাকায় ভাগ সংখ্যা থাকবে না।',incomeTypes:['পূর্ণ ভাগ','আংশিক টাকা'],expenseTypes:['গরু ক্রয়','পরিবহন','খাদ্য','কসাই / জবাই','অন্যান্য']},mahfil:{label:'মাহফিল',note:'মাহফিলের অনুদান ও ব্যয়।',incomeTypes:['অনুদান','কালেকশন','স্পন্সর'],expenseTypes:['মাইক / সাউন্ড','খাবার','মেহমানদারি','স্টেজ','অন্যান্য']},construction:{label:'নির্মাণ',note:'নির্মাণ/মেরামতের আয়-ব্যয়।',incomeTypes:['অনুদান','প্রতিশ্রুতি আদায়','বিশেষ ফান্ড'],expenseTypes:['সিমেন্ট','বালু','ইট','রড','মিস্ত্রি / শ্রমিক','অন্যান্য']},trip:{label:'সফর',note:'সফরের ফি ও ব্যয়।',incomeTypes:['অংশগ্রহণ ফি','অনুদান'],expenseTypes:['গাড়ি','খাবার','টিকিট','থাকা','অন্যান্য']},custom:{label:'কাস্টম',note:'সাধারণ কাস্টম কর্মসূচি।',incomeTypes:['আয়','অনুদান','অন্যান্য'],expenseTypes:['ব্যয়','অন্যান্য']}},programs:[{id:'q1',name:'কোরবানি আয়োজন ১৪৪৭',template:'qurbani',status:'চলমান',date:'',note:'প্রতি ভাগ ১৭,০০০ টাকা। পূর্ণ ভাগ ও আংশিক টাকা একই আয় modal থেকে যোগ হবে।'},{id:'m1',name:'বার্ষিক মাহফিল',template:'mahfil',status:'পরিকল্পনা',date:'',note:'মাহফিলের অনুদান ও ব্যয়।'},{id:'c1',name:'ছাদ মেরামত',template:'construction',status:'চলমান',date:'',note:'নির্মাণ/মেরামতের বিশেষ হিসাব।'}],income:{q1:[{id:uid(),type:'পূর্ণ ভাগ',personType:'ছাত্র',name:'মুহাম্মদ আবদুল্লাহ',share:1,amount:17000,ref:'দাখেলা 47021'},{id:uid(),type:'পূর্ণ ভাগ',personType:'সাধারণ মানুষ',name:'হাজী আবু বকর',share:2,amount:34000,ref:'017xx'},{id:uid(),type:'আংশিক টাকা',personType:'সাধারণ মানুষ',name:'সাধারণ অনুদান',share:0,amount:3000,ref:'নগদ'}],m1:[{id:uid(),type:'অনুদান',personType:'সাধারণ মানুষ',name:'একজন দাতা',share:0,amount:5000,ref:'নগদ'}],c1:[{id:uid(),type:'অনুদান',personType:'সাধারণ মানুষ',name:'একজন দাতা',share:0,amount:15000,ref:'প্রথম কিস্তি'}]},expense:{q1:[{id:uid(),type:'গরু ক্রয়',amount:92000,note:'১টি গরু বুকিং'},{id:uid(),type:'পরিবহন',amount:3500,note:'হাট থেকে আনা'}],m1:[{id:uid(),type:'মাইক / সাউন্ড',amount:6000,note:'সাউন্ড সিস্টেম'}],c1:[{id:uid(),type:'সিমেন্ট',amount:18000,note:'প্রথম চালান'}]}});
let db,active='q1',tab='summary';
function load(){try{db=JSON.parse(localStorage.getItem(KEY))||defaults()}catch(e){db=defaults()}if(!db.programs?.length)db=defaults();if(!db.programs.find(p=>p.id===active))active=db.programs[0].id}
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function program(){return db.programs.find(p=>p.id===active)||db.programs[0]}function tmpl(){return db.templates[program().template]||db.templates.custom}function incomes(){return db.income[active]||(db.income[active]=[])}function expenses(){return db.expense[active]||(db.expense[active]=[])}function total(){const inc=incomes(),exp=expenses();const income=inc.reduce((s,x)=>s+Number(x.amount||0),0),cost=exp.reduce((s,x)=>s+Number(x.amount||0),0),shares=inc.reduce((s,x)=>s+Number(x.share||0),0);return{income,cost,balance:income-cost,shares,incCount:inc.length,expCount:exp.length}}
function render(){const p=program(),t=total(),tm=tmpl();projectSelect.innerHTML=db.programs.map(x=>`<option value="${x.id}" ${x.id===active?'selected':''}>${x.name}</option>`).join('');hTitle.textContent=p.name;hNote.textContent=p.note||tm.note;hType.textContent=tm.label+' · '+p.status+(p.date?' · '+p.date:'');kpis.innerHTML=`<div class="kpi"><span>মোট আয়</span><b class="greenTxt">${money(t.income)}</b></div><div class="kpi"><span>মোট ব্যয়</span><b class="redTxt">${money(t.cost)}</b></div><div class="kpi"><span>অবশিষ্ট</span><b class="${t.balance>=0?'greenTxt':'redTxt'}">${money(t.balance)}</b></div><div class="kpi"><span>${p.template==='qurbani'?'পূর্ণ ভাগ':'আয় এন্ট্রি'}</span><b>${p.template==='qurbani'?bn(t.shares)+' ভাগ':bn(t.incCount)+'টি'}</b></div>`;renderRoot()}
function changeProgram(id){active=id;tab='summary';document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab==='summary'));render()}function setTab(x){tab=x;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===x));renderRoot()}
function renderRoot(){const p=program(),t=total();if(tab==='summary')root.innerHTML=`<div class="card"><div class="head">সারাংশ</div><div class="body"><div class="mini"><div><b>মোট আয়</b><br><small>সব ধরনের আয় মিলিয়ে</small></div><b class="greenTxt">${money(t.income)}</b></div><div class="mini"><div><b>মোট ব্যয়</b><br><small>সব খরচ মিলিয়ে</small></div><b class="redTxt">${money(t.cost)}</b></div><div class="mini"><div><b>অবশিষ্ট</b><br><small>আয় − ব্যয়</small></div><b>${money(t.balance)}</b></div>${p.template==='qurbani'?`<div class="mini"><div><b>পূর্ণ ভাগ</b><br><small>শুধু পূর্ণ ভাগের হিসাব</small></div><b>${bn(t.shares)} ভাগ</b></div>`:''}</div></div>`;else if(tab==='income')root.innerHTML=`<div class="card"><div class="head">আয়ের তালিকা</div><div class="body"><div class="tableWrap"><table class="tbl"><thead><tr><th>ধরন</th><th>ব্যক্তি</th><th>নাম</th><th>ভাগ</th><th>টাকা</th><th>পরিচিতি</th><th>কাজ</th></tr></thead><tbody>${incomes().map(x=>`<tr><td>${x.type}</td><td>${x.personType}</td><td><b>${x.name}</b></td><td>${x.share?bn(x.share):'—'}</td><td class="greenTxt"><b>${money(x.amount)}</b></td><td>${x.ref||''}</td><td><div class="actions"><button class="btn small light" onclick="openIncome('${x.id}')">এডিট</button><button class="btn small red" onclick="delIncome('${x.id}')">ডিলিট</button></div></td></tr>`).join('')}</tbody></table></div></div></div>`;else if(tab==='expense')root.innerHTML=`<div class="card"><div class="head">ব্যয়ের তালিকা</div><div class="body"><div class="tableWrap"><table class="tbl"><thead><tr><th>খাত</th><th>বিবরণ</th><th>টাকা</th><th>কাজ</th></tr></thead><tbody>${expenses().map(x=>`<tr><td>${x.type}</td><td>${x.note||''}</td><td class="redTxt"><b>${money(x.amount)}</b></td><td><div class="actions"><button class="btn small light" onclick="openExpense('${x.id}')">এডিট</button><button class="btn small red" onclick="delExpense('${x.id}')">ডিলিট</button></div></td></tr>`).join('')}</tbody></table></div></div></div>`;else{const byInc={},byExp={};incomes().forEach(x=>byInc[x.type]=(byInc[x.type]||0)+Number(x.amount||0));expenses().forEach(x=>byExp[x.type]=(byExp[x.type]||0)+Number(x.amount||0));root.innerHTML=`<div class="card"><div class="head">রিপোর্ট</div><div class="body"><div class="mini"><div><b>আয়ের ধরনভিত্তিক</b><br><small>${Object.keys(byInc).map(k=>k+': '+money(byInc[k])).join(' · ')||'—'}</small></div></div><div class="mini"><div><b>ব্যয়ের খাতভিত্তিক</b><br><small>${Object.keys(byExp).map(k=>k+': '+money(byExp[k])).join(' · ')||'—'}</small></div></div><div class="mini"><div><b>চূড়ান্ত অবস্থা</b><br><small>মোট আয় ${money(t.income)} − মোট ব্যয় ${money(t.cost)}</small></div><b>${money(t.balance)}</b></div></div></div>`}}
function openModal(x){document.getElementById('modal-'+x).classList.add('open')}function closeModal(x){document.getElementById('modal-'+x).classList.remove('open')}
function openProgram(edit=false){programTemplate.innerHTML=Object.keys(db.templates).map(k=>`<option value="${k}">${db.templates[k].label}</option>`).join('');if(edit){let p=program();programTitle.textContent='কর্মসূচি এডিট';programEditId.value=p.id;programName.value=p.name;programTemplate.value=p.template;programStatus.value=p.status;programDate.value=p.date||'';programNote.value=p.note||'';programDeleteBtn.style.display='block'}else{programTitle.textContent='নতুন কর্মসূচি';programEditId.value='';programName.value='';programTemplate.value='qurbani';programStatus.value='চলমান';programDate.value='';programNote.value=db.templates.qurbani.note;programDeleteBtn.style.display='none'}openModal('program')}
function syncProgramNote(){if(!programEditId.value)programNote.value=db.templates[programTemplate.value].note}
function saveProgram(){let id=programEditId.value;if(id){let p=db.programs.find(x=>x.id===id);Object.assign(p,{name:programName.value||'নাম নেই',template:programTemplate.value,status:programStatus.value,date:programDate.value,note:programNote.value})}else{id=uid();db.programs.push({id,name:programName.value||'নতুন কর্মসূচি',template:programTemplate.value,status:programStatus.value,date:programDate.value,note:programNote.value});db.income[id]=[];db.expense[id]=[];active=id}save();closeModal('program');render()}
function deleteProgram(){if(db.programs.length<=1)return alert('কমপক্ষে একটি কর্মসূচি থাকতে হবে');if(!confirm('এই কর্মসূচি ও এর সব আয়-ব্যয় ডিলিট হবে?'))return;let id=programEditId.value;db.programs=db.programs.filter(p=>p.id!==id);delete db.income[id];delete db.expense[id];active=db.programs[0].id;save();closeModal('program');render()}
function openIncome(id=''){let tm=tmpl();incType.innerHTML=tm.incomeTypes.map(x=>`<option>${x}</option>`).join('');incomeEditId.value=id;let r=id?incomes().find(x=>x.id===id):null;incomeTitle.textContent=id?'আয় এডিট':'আয় যোগ';incPersonType.value=r?.personType||'ছাত্র';incName.value=r?.name||'';incType.value=r?.type||tm.incomeTypes[0];incShare.value=r?.share||1;incAmount.value=r?.amount||(program().template==='qurbani'?17000:1000);incRef.value=r?.ref||'';syncIncomeFields();openModal('income')}
function syncIncomeFields(){let show=program().template==='qurbani'&&incType.value==='পূর্ণ ভাগ';shareField.style.display=show?'block':'none';incomeHint.textContent=show?'পূর্ণ ভাগ হলে ভাগ সংখ্যা থাকবে। আংশিক টাকায় ভাগ সংখ্যা রাখা হবে না।':'এই আয়ে ভাগ সংখ্যা লাগবে না।'}
function saveIncome(){let id=incomeEditId.value,show=program().template==='qurbani'&&incType.value==='পূর্ণ ভাগ';let row={id:id||uid(),type:incType.value,personType:incPersonType.value,name:incName.value||'নাম নেই',share:show?(+incShare.value||1):0,amount:+incAmount.value||0,ref:incRef.value};if(id){let i=incomes().findIndex(x=>x.id===id);incomes()[i]=row}else incomes().push(row);save();closeModal('income');setTab('income');render()}
function delIncome(id){if(confirm('এই আয় ডিলিট করবেন?')){db.income[active]=incomes().filter(x=>x.id!==id);save();render()}}
function openExpense(id=''){let tm=tmpl();expType.innerHTML=tm.expenseTypes.map(x=>`<option>${x}</option>`).join('');expenseEditId.value=id;let r=id?expenses().find(x=>x.id===id):null;expenseTitle.textContent=id?'ব্যয় এডিট':'ব্যয় যোগ';expType.value=r?.type||tm.expenseTypes[0];expAmount.value=r?.amount||1000;expNote.value=r?.note||'';openModal('expense')}
function saveExpense(){let id=expenseEditId.value,row={id:id||uid(),type:expType.value,amount:+expAmount.value||0,note:expNote.value};if(id){let i=expenses().findIndex(x=>x.id===id);expenses()[i]=row}else expenses().push(row);save();closeModal('expense');setTab('expense');render()}
function delExpense(id){if(confirm('এই ব্যয় ডিলিট করবেন?')){db.expense[active]=expenses().filter(x=>x.id!==id);save();render()}}
function openSettings(){settingsTemplate.innerHTML=Object.keys(db.templates).map(k=>`<option value="${k}">${db.templates[k].label}</option>`).join('');settingsTemplate.value=program().template;renderSettings();openModal('settings')}
function renderSettings(){let t=db.templates[settingsTemplate.value];incomeChips.innerHTML=t.incomeTypes.map((x,i)=>`<span class="chip">${x} <button onclick="removeType('income',${i})">×</button></span>`).join('');expenseChips.innerHTML=t.expenseTypes.map((x,i)=>`<span class="chip">${x} <button onclick="removeType('expense',${i})">×</button></span>`).join('')}
function addType(kind){let t=db.templates[settingsTemplate.value],inp=kind==='income'?newIncomeType:newExpenseType,arr=kind==='income'?t.incomeTypes:t.expenseTypes;if(inp.value.trim()){arr.push(inp.value.trim());inp.value='';save();renderSettings();render()}}
function removeType(kind,i){let t=db.templates[settingsTemplate.value],arr=kind==='income'?t.incomeTypes:t.expenseTypes;if(arr.length<=1)return alert('কমপক্ষে একটি item থাকতে হবে');arr.splice(i,1);save();renderSettings();render()}
function resetDemo(){if(confirm('সব demo data reset হবে?')){localStorage.removeItem(KEY);load();render();closeModal('settings')}}
load();render();
</script>
</body>
</html>
