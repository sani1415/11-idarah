<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/main-admin-nav.css">
<style>
  .recent-wrap { padding:14px; padding-bottom:var(--app-content-pad-bottom); }
  .recent-head { background:#fff; border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:12px; }
  .recent-title { font-family:'Noto Serif Bengali',serif; font-size:18px; font-weight:700; color:var(--ink2); }
  .recent-sub { font-size:12px; color:var(--ink3); margin-top:4px; line-height:1.5; }
  .recent-item { background:#fff; border-radius:var(--radius-sm); padding:12px 14px; box-shadow:var(--shadow); margin-bottom:8px; display:flex; align-items:flex-start; gap:12px; border:1px solid rgba(26,18,8,.05); }
  .recent-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
  .recent-text { flex:1; font-size:12px; color:var(--ink); line-height:1.45; }
  .recent-date { font-size:10px; color:var(--ink3); flex-shrink:0; margin-top:2px; }
  .recent-empty { text-align:center; color:var(--ink3); padding:28px 16px; font-size:13px; background:rgba(255,255,255,.5); border-radius:var(--radius-sm); border:1px dashed var(--cream3); }

  /* ══ Desktop (≥ 960px) ══ */
  @media (min-width: 960px) {
    .recent-wrap { padding: 24px 32px; padding-bottom: var(--app-content-pad-bottom); }
    .recent-head { padding: 20px; }
    .recent-title { font-size: 20px; }
    .recent-item { padding: 14px 16px; }
    .recent-text { font-size: 13px; }
    .recent-date { font-size: 11px; }
  }
</style>
</head>

    <div class="topbar-name">সাম্প্রতিক কার্যক্রম</div>
  </div>
  <div class="topbar-actions">

  </div>
</div>

<main class="content recent-wrap">
  <section class="recent-head">
    <div class="recent-title">সাম্প্রতিক কার্যক্রম</div>
    <div class="recent-sub">মাদ্রাসা লগ, বিভাগ লেনদেন ও খেদমত থেকে সর্বশেষ রেকর্ড</div>
  </section>
  <div id="recent-feed"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="api-shared.js"></script>
<script src="js/api.js"></script>
<script src="js/mm-sample-data.js"></script>
<script src="js/mm-session.js"></script>
<script src="js/dept-api.js"></script>
<script src="js/khedmat-api.js"></script>
<script>
  if (!MMSession.requireAdminPerm('recent', 'main-admin-madrasa.html')) { throw new Error('admin permission denied'); }
  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  const fmtAmt = n => '৳' + toBn(Math.round(Number(n)).toLocaleString('en'));
  const fmtDate = d => { if (!d) return ''; const p = String(d).split('-'); return p[2] + '/' + p[1]; };

  function canSeeLog(log) {
    if (!MMSession.isRestrictedAdmin()) return true;
    const cids = new Set(MMSession.getAllowedMadrasaDepts().flatMap(dept => API.Classes.getByDept(dept).map(c => c.id)));
    if (log.type === 'class') return cids.has(log.ref_id);
    if (log.type === 'student') {
      const s = API.Students.getById(log.ref_id);
      return !!(s && cids.has(s.class_id));
    }
    if (log.type === 'teacher') {
      const t = API.Teachers.getById(log.ref_id);
      return !!(t && t.class_id && cids.has(t.class_id));
    }
    return false;
  }

  function renderRecent() {
    const today = new Date();
    const feed = [];
    if (!MMSession.isRestrictedAdmin()) {
      const khLog = KhAPI.DailyLogs.getLatest();
      if (khLog) feed.push({ color:'var(--gold)', text:'খেদমত লগ: ' + khLog.content.slice(0,50) + (khLog.content.length > 50 ? '...' : ''), date:fmtDate(khLog.date) });
      KhAPI.Activities.getAll().slice(0,2).forEach(a => {
        const ben = KhAPI.Beneficiaries.getById(a.beneficiary_id);
        feed.push({ color:'var(--teal)', text:(ben?.name || '—') + ': ' + a.title, date:fmtDate(a.date) });
      });
      DeptAPI.Transactions.getAll().slice(0,2).forEach(t => {
        const dept = DeptAPI.Departments.getById(t.dept_id);
        const dStr = t.date || t.txn_date || today.toISOString().slice(0,10);
        feed.push({ color:t.type === 'income' ? 'var(--green)' : 'var(--red)', text:(dept?.name || '—') + ' — ' + t.description + ' ' + fmtAmt(t.amount), date:fmtDate(dStr) });
      });
    }
    API.Logs.getAll().filter(canSeeLog).slice(0,4).forEach(l => {
      feed.push({ color:'var(--blue)', text:l.text.slice(0,60) + (l.text.length > 60 ? '...' : ''), date:fmtDate(l.date) });
    });
    feed.sort((a,b) => (b.date || '').localeCompare(a.date || ''));
    document.getElementById('recent-feed').innerHTML = feed.slice(0,10).map(f =>
      `<div class="recent-item"><div class="recent-dot" style="background:${f.color};"></div><div class="recent-text">${API.esc(f.text)}</div><div class="recent-date">${API.esc(f.date)}</div></div>`
    ).join('') || '<div class="recent-empty">এখনো কোনো কার্যক্রমের রেকর্ড নেই।</div>';
  }

  renderRecent();
</script>
</body>
</html>
