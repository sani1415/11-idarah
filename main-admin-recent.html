<script>
  if (!MMSession.requireAdminPerm('recent', 'main-admin-madrasa.html')) { throw new Error('admin permission denied'); }

  const restricted = MMSession.isRestrictedAdmin();
  const khActorId = MMSession.getId ? MMSession.getId() : MMSession.getAdminUserId();
  const khPin = MMSession.getPin ? MMSession.getPin() : MMSession.getAdminPin();
  const chatActorId = MMSession.getChatActorId ? MMSession.getChatActorId() : khActorId;
  const chatPin = MMSession.getChatPin ? MMSession.getChatPin() : khPin;
  let activeFilter = 'all';
  let isLoading = false;

  const esc = (s) => AdminRecentFeed.esc(s);
  const bn = (v) => AdminRecentFeed.bn(v);

  function setSyncStatus(text, type) {
    const el = document.getElementById('recent-sync-status');
    if (!el) return;
    el.textContent = text;
    el.className = 'recent-status' + (type === 'ok' ? ' is-ok' : type === 'warn' ? ' is-warn' : '');
  }

  function renderFilters() {
    const cats = AdminRecentFeed.getCategories().filter((c) => {
      if (restricted && c.key !== 'all' && c.key !== 'madrasa') return false;
      return true;
    });
    document.getElementById('recent-filters').innerHTML = cats.map((c) =>
      `<button type="button" class="recent-filter${c.key === activeFilter ? ' is-active' : ''}" data-filter="${esc(c.key)}" role="tab" aria-selected="${c.key === activeFilter}">${esc(c.label)}</button>`
    ).join('');
    document.querySelectorAll('.recent-filter').forEach((btn) => {
      btn.onclick = async () => {
        activeFilter = btn.getAttribute('data-filter') || 'all';
        renderFilters();
        if (activeFilter === 'chat' && !restricted) {
          try {
            await AdminRecentFeed.syncChatForFeed({ pin: khPin, actorId: khActorId, chatPin, chatActorId });
          } catch (e) {
            console.warn('[Recent] chat resync', e);
          }
        }
        renderFeed();
      };
    });
  }

  function renderFeed() {
    const items = AdminRecentFeed.buildFeed({
      restricted,
      filter: activeFilter,
      limit: AdminRecentFeed.MAX_ITEMS,
    });
    const countEl = document.getElementById('recent-count');
    if (countEl) {
      countEl.hidden = !items.length;
      countEl.textContent = 'মোট ' + bn(items.length) + ' টি সাম্প্রতিক রেকর্ড';
    }

    if (!items.length) {
      document.getElementById('recent-feed').innerHTML =
        '<div class="recent-empty">এই ফিল্টারে এখনো কোনো কার্যক্রমের রেকর্ড নেই। রিফ্রেশ চেষ্টা করুন।</div>';
      return;
    }

    let html = '';
    let lastGroup = '';
    items.forEach((it) => {
      if (it.dayGroup !== lastGroup) {
        lastGroup = it.dayGroup;
        html += `<div class="recent-day">${esc(it.dayGroup)}</div>`;
      }
      const tag = it.href ? 'a' : 'div';
      const hrefAttr = it.href ? ` href="${esc(it.href)}"` : '';
      html +=
        `<${tag} class="recent-item"${hrefAttr} data-id="${esc(it.id)}">` +
        `<div class="recent-item-top">` +
        `<span class="recent-badge"><span class="recent-badge-dot" style="background:${esc(it.color)};"></span>${esc(it.typeLabel)}</span>` +
        `<span class="recent-date">${esc(it.dateDisplay)}</span>` +
        `</div>` +
        `<div class="recent-text">${esc(it.text)}</div>` +
        (it.meta ? `<div class="recent-meta">${esc(it.meta)}</div>` : '') +
        `</${tag}>`;
    });
    document.getElementById('recent-feed').innerHTML = html;
  }

  async function loadAllData() {
    if (isLoading) return;
    isLoading = true;
    const btn = document.getElementById('recent-refresh-btn');
    if (btn) btn.disabled = true;
    setSyncStatus('সব উৎস থেকে ডাটা লোড হচ্ছে…');
    try {
      const res = await AdminRecentFeed.bootstrapAll({
        pin: khPin,
        actorId: khActorId,
        chatPin,
        chatActorId,
        restricted,
      });
      const errs = res.errors || [];
      if (errs.length) {
        const detail = errs.map((x) => x.label + (x.message ? ' (' + x.message + ')' : '')).join(', ');
        setSyncStatus('আংশিক লোড: ' + detail + ' — বাকি cache দেখানো হচ্ছে।', 'warn');
      } else {
        setSyncStatus('সর্বশেষ ডাটা লোড হয়েছে। ' + bn(AdminRecentFeed.MAX_ITEMS) + ' টি পর্যন্ত দেখানো হয়।', 'ok');
      }
      renderFeed();
    } catch (err) {
      console.error('[Recent]', err);
      setSyncStatus('ডাটা লোড ব্যর্থ। আবার রিফ্রেশ চেষ্টা করুন।', 'warn');
      renderFeed();
    } finally {
      isLoading = false;
      if (btn) btn.disabled = false;
    }
  }

  async function initRecent() {
    renderFilters();
    document.getElementById('recent-refresh-btn').onclick = () => loadAllData();
    await loadAllData();
  }

  MMLoading.run(initRecent);
</script>
