<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিভাগ — জিম্মাদার</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/main-admin-nav.css">
<style>
  .dept-table-wrap { overflow-x:auto; background:#fff; border-radius:var(--radius-sm); box-shadow:var(--shadow); border:1px solid rgba(26,18,8,.06); }
  .dept-table { width:100%; min-width:430px; border-collapse:collapse; table-layout:fixed; font-family:'Tiro Bangla',serif; }
  .dept-col-name { width:28%; }
  .dept-col-money { width:18%; }
  .dept-table th { position:sticky; top:0; background:var(--ink); color:var(--gold2); font-size:11px; font-weight:700; text-align:right; padding:9px 8px; white-space:nowrap; }
  .dept-table th:first-child { text-align:left; }
  .dept-table td { border-top:1px solid rgba(26,18,8,.08); padding:10px 8px; font-size:12px; color:var(--ink); text-align:right; white-space:nowrap; }
  .dept-table td:first-child { text-align:left; white-space:normal; min-width:0; }
  .dept-row { cursor:pointer; }
  .dept-row:active { background:var(--cream2); }
  .dept-title-cell { display:flex; align-items:center; gap:6px; min-width:0; }
  .dept-emoji { font-size:16px; width:24px; height:24px; display:flex; align-items:center; justify-content:center; background:var(--cream2); border-radius:50%; flex-shrink:0; }
  .dept-name { font-size:12px; line-height:1.35; font-weight:700; color:var(--ink2); overflow-wrap:anywhere; }
  .dept-money { font-weight:700; }
  .dept-income { color:var(--green); }
  .dept-expense { color:var(--red); }
  .dept-profit.pos { color:var(--green); }
  .dept-profit.neg { color:var(--red); }
  .dept-empty { text-align:center; color:var(--ink3); padding:32px 0; font-size:13px; background:#fff; border-radius:var(--radius-sm); box-shadow:var(--shadow); }
  .req-item { background:#fff; border-radius:var(--radius-sm); padding:13px; box-shadow:var(--shadow); margin-bottom:8px; border-left:3px solid var(--gold); }
  .req-meta { font-size:11px; color:var(--ink3); margin-bottom:5px; display:flex; justify-content:space-between; }
  .req-reason { font-size:13px; color:var(--ink); margin-bottom:8px; }
  .req-actions { display:flex; gap:8px; }
  .req-btn { flex:1; padding:8px; border:none; border-radius:var(--radius-xs); font-family:'Tiro Bangla',serif; font-size:12px; font-weight:600; cursor:pointer; }
  .req-btn.approve { background:var(--green-light); color:var(--green); }
  .req-btn.reject { background:var(--red-light); color:var(--red); }
  .month-nav { display:flex; align-items:center; justify-content:space-between; background:#fff; border-radius:var(--radius-sm); padding:10px 14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .month-nav-btn { background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink3); padding:4px; }
  .month-label { font-family:'Tiro Bangla',serif; font-size:14px; font-weight:600; color:var(--ink2); }
  .tab-bar { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
  .tab-btn { background:#fff; border:1px solid var(--cream3); border-radius:20px; padding:7px 14px; font-size:12px; white-space:nowrap; cursor:pointer; font-family:'Tiro Bangla',serif; color:var(--ink3); }
  .tab-btn.active { background:var(--ink); color:var(--gold2); border-color:var(--ink); }

  .ds-overlay { position:fixed; inset:0; background:rgba(26,18,8,.42); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
  .ds-sheet { width:100%; max-width:520px; background:#fff; border-radius:20px 20px 0 0; padding:22px 18px calc(28px + env(safe-area-inset-bottom,0px)); max-height:80vh; overflow-y:auto; box-sizing:border-box; }
  .ds-title { font-family:'Tiro Bangla',serif; font-size:17px; font-weight:700; color:var(--ink2); }
  .ds-dept-row { display:flex; align-items:center; gap:10px; padding:11px 13px; background:#fff; border-radius:var(--radius-sm); border:1px solid rgba(26,18,8,.06); box-shadow:var(--shadow); margin-bottom:8px; }
  .ds-dept-ico { font-size:22px; width:36px; text-align:center; flex-shrink:0; }
  .ds-dept-name { flex:1; font-size:14px; font-weight:600; color:var(--ink); }
  .ds-btn { font-size:11px; padding:5px 10px; border-radius:8px; border:1px solid rgba(26,18,8,.12); background:#fff; color:var(--ink2); cursor:pointer; font-family:'Tiro Bangla',serif; }
  .ds-field-item { display:flex; align-items:center; gap:8px; padding:9px 12px; background:#fff; border-radius:var(--radius-sm); border:1px solid rgba(26,18,8,.06); box-shadow:var(--shadow); margin-bottom:7px; }
  .ds-field-label { flex:1; font-size:13px; font-weight:600; color:var(--ink); }
  .ds-field-meta { font-size:10px; color:var(--ink3); margin-top:2px; }
  .ds-pin-chip { display:inline-flex; align-items:center; gap:5px; margin-top:4px; padding:3px 8px; border-radius:999px; background:var(--cream2); color:var(--ink2); font-size:11px; font-weight:700; }
  .ds-inp { width:100%; box-sizing:border-box; border:1px solid rgba(26,18,8,.14); border-radius:10px; padding:9px 11px; font-size:13px; font-family:'Tiro Bangla',serif; color:var(--ink); background:#fafafa; }
  .ds-inp:focus { outline:none; border-color:var(--gold2); background:#fff; }
  .ds-row { display:flex; gap:8px; }
  .ds-row .ds-grp { flex:1; }
  .ds-lbl { font-size:11px; color:var(--ink3); display:block; margin-bottom:4px; letter-spacing:.03em; }
  .ds-add-form { background:var(--cream); border-radius:var(--radius-sm); padding:12px; margin-top:4px; }

  /* ══ Desktop (≥ 960px) ══ */
  @media (min-width: 960px) {
    .adt-wrap { max-width: 1100px !important; }
    .dept-table th { font-size:12px; padding:10px 12px; }
    .dept-table td { font-size:13px; padding:11px 12px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-role">জিম্মাদার</div>
    <div class="topbar-name">বিভাগ মডিউল</div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="topbar-btn topbar-btn--icon" onclick="openDeptSettings()" title="সেটিং" aria-label="সেটিং"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    <button type="button" class="topbar-btn topbar-btn--icon" onclick="MMSession.logoutToIndex('index.html')" title="লগআউট" aria-label="লগআউট"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>

<div class="adt-wrap" style="max-width:520px;margin:0 auto;padding:8px 16px 0;">
  <div class="tab-bar" style="padding-bottom:0;margin-bottom:0;">
    <button class="tab-btn active" id="nav-overview" onclick="switchTab('overview')">বিভাগ</button>
    <button class="tab-btn" id="nav-filter" onclick="switchTab('filter')">ফিল্টার</button>
    <button class="tab-btn" id="nav-requests" onclick="switchTab('requests')">অনুরোধ</button>
    <button class="tab-btn" id="nav-all-txn" onclick="switchTab('all-txn')">সব হিসাব</button>
  </div>
</div>

<div class="content" id="panel-overview" style="padding-bottom: var(--app-content-pad-bottom);">
  <button class="add-btn" onclick="openAddDept()">+ নতুন বিভাগ যোগ করুন</button>
  <div id="dept-list"></div>
</div>

<div class="content" id="panel-filter" style="display:none;padding-bottom: var(--app-content-pad-bottom);">
  <div class="sec-header" style="margin-top:14px;"><div class="sec-title">হিসাব ফিল্টার</div></div>
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label">—</span>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="stat-row" id="filter-stats"></div>
</div>

<div class="content" id="panel-requests" style="display:none;padding-bottom: var(--app-content-pad-bottom);">
  <div class="sec-header" style="margin-top:14px;"><div class="sec-title">সংশোধন অনুরোধ</div></div>
  <div id="req-list"></div>
</div>

<div class="content" id="panel-all-txn" style="display:none;padding-bottom: var(--app-content-pad-bottom);">
  <div class="sec-header" style="margin-top:14px;"><div class="sec-title">সব লেনদেন</div></div>
  <div id="all-txn-list"></div>
</div>

<!-- Dept Settings Sheet -->
<div class="ds-overlay" id="dept-settings-overlay" style="display:none;" onclick="if(event.target===this)closeDeptSettings()">
  <div class="ds-sheet">

    <!-- স্তর ১: বিভাগ তালিকা -->
    <div id="ds-view-list">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="ds-title">বিভাগ সেটিং</div>
        <button onclick="closeDeptSettings()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3);padding:4px 8px;">✕</button>
      </div>
      <div id="dept-settings-list" style="margin-bottom:12px;max-height:50vh;overflow-y:auto;"></div>
      <button class="add-btn" onclick="closeDeptSettings();openAddDept()">+ নতুন বিভাগ যোগ করুন</button>
    </div>

    <!-- স্তর ২: নির্দিষ্ট বিভাগের কনফিগারেশন -->
    <div id="ds-view-config" style="display:none;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <button onclick="showDeptList()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink3);padding:4px 8px 4px 0;line-height:1;">←</button>
        <div class="ds-title" id="ds-config-title" style="flex:1;"></div>
      </div>
      <div style="font-size:11px;color:var(--ink3);margin-bottom:10px;">লেনদেনের ফর্মে অতিরিক্ত ইনপুট ক্ষেত্র</div>
      <div id="ds-field-list" style="margin-bottom:10px;"></div>
      <div class="ds-add-form">
        <div style="font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:10px;">+ নতুন ক্ষেত্র</div>
        <div style="margin-bottom:10px;"><label class="ds-lbl">ক্ষেত্রের নাম (বাংলায়)</label><input type="text" class="ds-inp" id="nf-label" placeholder="যেমন: জমি / প্লট রেফারেন্স"></div>
        <div class="ds-row" style="margin-bottom:10px;">
          <div class="ds-grp"><label class="ds-lbl">ধরন</label><select class="ds-inp" id="nf-type"><option value="text">টেক্সট</option><option value="number">সংখ্যা</option></select></div>
          <div class="ds-grp"><label class="ds-lbl">ঐচ্ছিক?</label><select class="ds-inp" id="nf-optional"><option value="true">হ্যাঁ</option><option value="false">না</option></select></div>
        </div>
        <button class="add-btn" style="margin-top:0;" onclick="addDeptField()">ক্ষেত্র যোগ করুন</button>
      </div>
    </div>

  </div>
</div>

<!-- ADD DEPT MODAL -->
<div class="modal-bg" id="modal-add-dept">
  <div class="modal">
    <div class="modal-title">নতুন বিভাগ <button class="modal-close" onclick="closeModal('modal-add-dept')">✕</button></div>
    <div class="form-group"><label class="form-label">বিভাগের নাম</label><input class="form-input" id="nd-name" placeholder="যেমন: মৎস্য বিভাগ"></div>

<!-- DEPT DETAIL VIEW -->
<div class="detail-view" id="dept-detail">
  <div class="detail-topbar">
    <span class="detail-back" onclick="closeDeptDetail()">←</span>
    <span class="detail-title" id="dd-title">—</span>
  </div>
  <div class="detail-content">
    <div class="tab-bar">
      <button class="tab-btn active" id="ddt-txn" onclick="ddTab('txn')">লেনদেন</button>
      <button class="tab-btn" id="ddt-inv" onclick="ddTab('inv')">মজুদ</button>
    </div>

    <div id="dd-inv-list" style="display:none;"></div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="api-shared.js"></script>
<script src="js/mm-sample-data.js"></script>
<script src="js/mm-session.js"></script>
<script src="js/monitor-mode.js"></script>
<script src="js/dept-api.js"></script>
<script src="js/dept-units.js"></script>
<script src="js/dept-supabase-sync.js"></script>
<script>
  if (!MMSession.isAdmin() || MMSession.isRestrictedAdmin()) { location.href = 'main-admin-madrasa.html'; }
  mmInsertMonitorBanner();

  const toBn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  const fmtAmt = n => '৳' + toBn(Number(n).toLocaleString('en'));
  const fmtDate = d => { if (!d) return ''; const p = d.split('-'); return toBn(p[2]+'/'+p[1]); };
  const monthLabel = m => { const p = m.split('-'); return toBn(p[1]) + ' — ' + toBn(p[0]); };
  const deptNameReplacements = [
    [/বেকারি|bakery/gi, 'মাখাবিজ'],
    [/স্টোর|store/gi, 'খাজানা'],
    [/নার্সারি|nursery/gi, 'মাশতাল'],
  ];
  const deptDisplayName = name => deptNameReplacements.reduce((out, pair) => out.replace(pair[0], pair[1]), String(name || ''));
  const pctText = (value, base) => base > 0 ? toBn((value / base * 100).toFixed(1)) + '%' : '০%';

  let curMonth = new Date().toISOString().slice(0,7);
  let activeDeptId = null;

  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function openModal(id) {
    if (mmMutationBlocked(showToast)) return;
    document.getElementById(id).classList.add('open');
  }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function switchTab(name) {
    ['overview','filter','requests','all-txn'].forEach(p => {
      document.getElementById('panel-'+p).style.display = p===name ? '' : 'none';
      document.getElementById('nav-'+p).classList.toggle('active', p===name);
    });
    if (name==='overview') renderOverview();
    if (name==='filter') renderFilter();
    if (name==='requests') renderRequests();
    if (name==='all-txn') renderAllTxn();
  }

  function changeMonth(dir) {
    const d = new Date(curMonth+'-01'); d.setMonth(d.getMonth()+dir);
    curMonth = d.toISOString().slice(0,7);
    renderFilter();
    renderOverview();
  }

  function renderFilter() {
    const monthEl = document.getElementById('month-label');
    if (monthEl) monthEl.textContent = monthLabel(curMonth);
    const statsEl = document.getElementById('filter-stats');
    if (!statsEl) return;
    const depts = DeptAPI.Departments.getAll();
    let totalIn=0, totalEx=0;
    depts.forEach(d => { const s=DeptAPI.Transactions.getSummary(d.id,curMonth); totalIn+=s.income; totalEx+=s.expense; });
    statsEl.innerHTML =
      `<div class="stat-card"><span class="stat-num">${toBn(depts.length)}</span><span class="stat-label">বিভাগ</span></div>
       <div class="stat-card"><span class="stat-num" style="color:var(--green)">${fmtAmt(totalIn)}</span><span class="stat-label">মোট আয়</span></div>
       <div class="stat-card"><span class="stat-num" style="color:var(--red)">${fmtAmt(totalEx)}</span><span class="stat-label">মোট ব্যয়</span></div>`;
  }

  function renderOverview() {
    const depts = DeptAPI.Departments.getAll();
    document.getElementById('dept-list').innerHTML = depts.length ? `<div class="dept-table-wrap">
      <table class="dept-table">
        <colgroup>
          <col class="dept-col-name">
          <col class="dept-col-money">
          <col class="dept-col-money">
          <col class="dept-col-money">
          <col class="dept-col-money">
        </colgroup>
        <thead>
          <tr>
            <th>বিভাগ</th>
            <th>আয়</th>
            <th>ব্যয়</th>
            <th>মুনাফা</th>
            <th>প্রফিট %</th>
          </tr>
        </thead>
        <tbody>
          ${depts.map(d => {
      const s = DeptAPI.Transactions.getSummary(d.id, curMonth);
      const profit = s.income - s.expense;
      const profitClass = profit >= 0 ? 'pos' : 'neg';
      return `<tr class="dept-row" onclick="openDeptDetail('${d.id}')">
        <td><div class="dept-title-cell"><span class="dept-emoji">${d.emoji||'🏢'}</span><span class="dept-name">${DeptAPI.esc(deptDisplayName(d.name))}</span></div></td>
        <td class="dept-money dept-income">${fmtAmt(s.income)}</td>
        <td class="dept-money dept-expense">${fmtAmt(s.expense)}</td>
        <td class="dept-money dept-profit ${profitClass}">${fmtAmt(profit)}</td>
        <td class="dept-money dept-profit ${profitClass}">${pctText(profit, s.income)}</td>
      </tr>`;
    }).join('')}
        </tbody>
      </table>
    </div>` : '<div class="dept-empty">কোনো বিভাগ নেই।</div>';
  }

  function renderRequests() {
    const reqs = DeptAPI.EditRequests.getPending();
    document.getElementById('req-list').innerHTML = reqs.length
      ? reqs.map(r => `<div class="req-item">
          <div class="req-meta"><span>অনুরোধ #${DeptAPI.esc(r.id.slice(-4))}</span><span>${fmtDate(r.created_at?.split('T')[0]||'')}</span></div>
          <div class="req-reason">${DeptAPI.esc(r.reason)}</div>
          <div class="req-actions">
            <button class="req-btn approve" onclick="approveReq('${r.id}')">অনুমোদন</button>
            <button class="req-btn reject" onclick="rejectReq('${r.id}')">প্রত্যাখ্যান</button>
          </div></div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:40px 0;font-size:13px;">কোনো সংশোধন অনুরোধ নেই</div>';
  }

  function renderAllTxn() {
    const all = DeptAPI.Transactions.getAll();
    const depts = DeptAPI.Departments.getAll();
    const deptMap = {};
    depts.forEach(d => deptMap[d.id] = deptDisplayName(d.name));
    document.getElementById('all-txn-list').innerHTML = all.length
      ? all.map(t => `<div style="background:#fff;border-radius:var(--radius-sm);padding:13px 14px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:${t.type==='income'?'var(--green-light)':'var(--red-light)'};">${t.type==='income'?'↑':'↓'}</div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;color:var(--ink);">${DeptAPI.esc(t.description)}</div><div style="font-size:11px;color:var(--ink3);margin-top:2px;">${DeptAPI.esc(deptMap[t.dept_id]||'—')} · ${fmtDate(t.date||t.txn_date)}</div></div>
          <div style="font-family:'Tiro Bangla',serif;font-size:15px;font-weight:700;color:${t.type==='income'?'var(--green)':'var(--red)'};">${fmtAmt(t.amount)}</div>
        </div>`).join('')
      : '<div style="text-align:center;color:var(--ink3);padding:40px 0;font-size:13px;">কোনো লেনদেন নেই</div>';
  }

  async function approveReq(id) {
    const pin = MMSession.getAdminPin();
    if (!pin) { showToast('সেশন শেষ, আবার লগইন করুন।'); return; }
    try {
      await DeptSync.resolveEditRequest(pin, id, 'approved');
      renderRequests();
      showToast('অনুমোদন করা হয়েছে');
    } catch (e) {
      showToast('ত্রুটি: ' + (e.message || 'অনুমোদন ব্যর্থ'));
    }
  }
  async function rejectReq(id)  {
    const pin = MMSession.getAdminPin();
    if (!pin) { showToast('সেশন শেষ, আবার লগইন করুন।'); return; }
    try {
      await DeptSync.resolveEditRequest(pin, id, 'rejected');
      renderRequests();
      showToast('প্রত্যাখ্যান করা হয়েছে');
    } catch (e) {
      showToast('ত্রুটি: ' + (e.message || 'প্রত্যাখ্যান ব্যর্থ'));
    }
  }

  function openAddDept() {
    ['nd-name','nd-emoji','nd-desc'].forEach(id => document.getElementById(id) && (document.getElementById(id).value=''));
    openModal('modal-add-dept');
  }
  async function saveDept() {
    if (mmMutationBlocked(showToast)) return;
    const name  = document.getElementById('nd-name').value.trim();
    const emoji = document.getElementById('nd-emoji').value.trim() || '🏢';
    const desc  = document.getElementById('nd-desc') ? document.getElementById('nd-desc').value.trim() : '';
    if (!name) { showToast('নাম দিন'); return; }
    const pin = MMSession.getAdminPin();
    if (!pin) { showToast('সেশন মেয়াদ শেষ, আবার লগইন করুন।'); return; }
    try {
      await DeptSync.saveDepartment(pin, null, name, emoji);
      await DeptSync.bootstrapAllData(null, pin);
      closeModal('modal-add-dept'); renderOverview(); showToast('বিভাগ যোগ হয়েছে');
    } catch (e) {
      showToast('ত্রুটি: ' + (e.message || 'সংরক্ষণ ব্যর্থ'));
    }
  }

  function openDeptDetail(id) {
    activeDeptId = id;
    const dept = DeptAPI.Departments.getById(id);
    document.getElementById('dd-title').textContent = (dept?.emoji||'') + ' ' + deptDisplayName(dept?.name||'');
    ddTab('txn');
    document.getElementById('dept-detail').classList.add('open');
  }
  function closeDeptDetail() { document.getElementById('dept-detail').classList.remove('open'); }

  function ddTab(name) {
    document.getElementById('ddt-txn').className = 'tab-btn'+(name==='txn'?' active':'');
    document.getElementById('ddt-inv').className = 'tab-btn'+(name==='inv'?' active':'');
    document.getElementById('dd-txn-list').style.display = name==='txn' ? '' : 'none';
    document.getElementById('dd-inv-list').style.display = name==='inv' ? '' : 'none';
    if (name==='txn') {
      const txns = DeptAPI.Transactions.getByDept(activeDeptId);
      document.getElementById('dd-txn-list').innerHTML = txns.length
        ? txns.map(t => `<div style="background:#fff;border-radius:var(--radius-sm);padding:12px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;gap:10px;align-items:center;">
            <span style="font-size:14px;">${t.type==='income'?'↑':'↓'}</span>
            <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${DeptAPI.esc(t.description)}</div><div style="font-size:11px;color:var(--ink3);">${fmtDate(t.date||t.txn_date)}</div></div>
            <span style="font-family:'Tiro Bangla',serif;font-size:14px;font-weight:700;color:${t.type==='income'?'var(--green)':'var(--red)'};">${fmtAmt(t.amount)}</span>
          </div>`).join('')
        : '<div style="text-align:center;color:var(--ink3);padding:30px 0;font-size:13px;">কোনো লেনদেন নেই</div>';
    }
    if (name==='inv') {
      const items = DeptAPI.Inventory.getByDept(activeDeptId);
      document.getElementById('dd-inv-list').innerHTML = items.length
        ? items.map(i => {
            const product = i.product_id ? DeptAPI.Products.getById(i.product_id) : null;
            const line = product && window.DeptUnits ? DeptUnits.inventoryLine(i.quantity, product) : ((window.DeptUnits ? DeptUnits.formatQty(i.quantity) : i.quantity) + ' ' + (i.unit || 'পিস'));
            return `<div style="background:#fff;border-radius:var(--radius-sm);padding:12px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:10px;">
            <span style="font-size:20px;">📦</span>
            <div style="flex:1;font-size:13px;font-weight:600;">${DeptAPI.esc(i.item_name)}</div>
            <div style="text-align:right;font-family:'Tiro Bangla',serif;font-size:14px;font-weight:700;">${DeptAPI.esc(line)}</div>
          </div>`;
          }).join('')
        : '<div style="text-align:center;color:var(--ink3);padding:30px 0;font-size:13px;">কোনো মজুদ নেই</div>';
    }
  }

  let _activeDeptId = null;

  function showDeptList() {
    document.getElementById('ds-view-list').style.display = '';
    document.getElementById('ds-view-config').style.display = 'none';
  }

  async function toggleDeptActive(dbId, makeActive) {
    const pin = MMSession.getAdminPin();
    if (!pin) { showToast('সেশন শেষ, আবার লগইন করুন।'); return; }
    try {
      await DeptSync.toggleDepartment(pin, dbId, makeActive);
      await DeptSync.bootstrapAllData(null, pin);
      openDeptSettings(); renderOverview();
    } catch (e) { showToast('ত্রুটি: ' + (e.message || 'আপডেট ব্যর্থ')); }
  }

  function openDeptSettings() {
    const list = document.getElementById('dept-settings-list');
    const depts = DeptAPI.Departments.getAll_();
    list.innerHTML = depts.length ? depts.map(d => {
      const inactive = d.is_active === false;
      const dbId = d.db_id || '';
      return `<div class="ds-dept-row">
        <span class="ds-dept-ico">${d.emoji||'🏢'}</span>
        <span class="ds-dept-name" style="${inactive?'opacity:.5;':''}">
          ${DeptAPI.esc(deptDisplayName(d.name))}${inactive?' <small style="color:var(--red);font-size:10px;">(নিষ্ক্রিয়)</small>':''}
          <span class="ds-pin-chip">PIN: ${DeptAPI.esc(d.pin || '—')}</span>
        </span>
        <div style="display:flex;gap:5px;flex-shrink:0;">
          <button class="ds-btn" onclick="openDeptConfig('${d.id}')">⚙</button>
          <button class="ds-btn" style="${inactive?'color:var(--green)':'color:var(--red)'}"
            onclick="toggleDeptActive('${dbId}',${inactive})">
            ${inactive?'সক্রিয়':'নিষ্ক্রিয়'}
          </button>
        </div>
      </div>`;
    }).join('') : '<div style="text-align:center;color:var(--ink3);padding:24px;font-size:13px;">কোনো বিভাগ নেই।</div>';
    showDeptList();
    document.getElementById('dept-settings-overlay').style.display = 'flex';
  }

  function closeDeptSettings() {
    document.getElementById('dept-settings-overlay').style.display = 'none';
  }

  function openDeptConfig(deptId) {
    _activeDeptId = deptId;
    const dept = DeptAPI.Departments.getById(deptId);
    if (!dept) return;
    document.getElementById('ds-config-title').textContent = (dept.emoji||'🏢') + ' ' + deptDisplayName(dept.name);
    document.getElementById('nf-label').value = '';
    document.getElementById('nf-type').value = 'text';
    document.getElementById('nf-optional').value = 'true';
    document.getElementById('ds-view-list').style.display = 'none';
    document.getElementById('ds-view-config').style.display = '';
    renderDeptFields(deptId);
  }

  function renderDeptFields(deptId) {
    const el = document.getElementById('ds-field-list');
    if (!el) return;
    const fields = DeptAPI.ExtraFields.get(deptId);
    el.innerHTML = fields.length ? fields.map(f =>
      `<div class="ds-field-item">
        <div style="flex:1;">
          <div class="ds-field-label">${DeptAPI.esc(f.label)}</div>
          <div class="ds-field-meta">${f.type==='number'?'সংখ্যা':'টেক্সট'}${f.optional?' · ঐচ্ছিক':''}</div>
        </div>
        <button class="ds-btn" style="color:var(--red)" onclick="removeDeptField('${deptId}','${f.key}')">✕</button>
      </div>`
    ).join('') : '<div style="text-align:center;color:var(--ink3);padding:12px;font-size:12px;">কোনো অতিরিক্ত ক্ষেত্র নেই।</div>';
  }

  async function addDeptField() {
    const label = document.getElementById('nf-label').value.trim();
    const type = document.getElementById('nf-type').value;
    const optional = document.getElementById('nf-optional').value === 'true';
    if (!label) { showToast('ক্ষেত্রের নাম লিখুন।'); return; }
    const pin = MMSession.getAdminPin();
    if (!pin) { showToast('সেশন শেষ, আবার লগইন করুন।'); return; }
    const key = 'f_' + Date.now().toString(36);
    try {
      await DeptSync.saveExtraField(pin, _activeDeptId, { key, label, type, optional });
      document.getElementById('nf-label').value = '';
      renderDeptFields(_activeDeptId);
      showToast('ক্ষেত্র যোগ হয়েছে।');
    } catch (e) {
      showToast('ত্রুটি: ' + (e.message || 'ক্ষেত্র যোগ হয়নি'));
    }
  }

  async function removeDeptField(deptId, key) {
    const pin = MMSession.getAdminPin();
    if (!pin) { showToast('সেশন শেষ, আবার লগইন করুন।'); return; }
    try {
      await DeptSync.deleteExtraField(pin, deptId, key);
      renderDeptFields(deptId);
      showToast('ক্ষেত্র বাদ দেওয়া হয়েছে।');
    } catch (e) {
      showToast('ত্রুটি: ' + (e.message || 'ক্ষেত্র বাদ যায়নি'));
    }
  }

  async function initPage() {
    const pin = MMSession.getAdminPin();
    try {
      await DeptSync.bootstrapAllData(null, pin);
      renderOverview();
    } catch (e) {
      showToast('Supabase থেকে বিভাগ ডেটা লোড হয়নি');
      document.getElementById('dept-list').innerHTML = '<div style="text-align:center;color:var(--red);padding:32px 0;font-size:13px;">ডাটাবেজ সংযোগ ব্যর্থ। আবার চেষ্টা করুন।</div>';
    }
  }

  MMLoading.run(initPage);
</script>
<script src="js/admin-nav.js"></script>
</body>
</html>
